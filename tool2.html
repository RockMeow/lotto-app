                                            </div>
                                        </div>

                                        <div className="bg-sky-50 p-4 sm:p-6 rounded-xl border border-sky-100 flex flex-col md:flex-row items-center gap-4 sm:gap-6">
                                            <div className="flex-shrink-0 w-24 text-center">
                                                <div className="text-sm font-bold text-sky-800 mb-1">7不出</div>
                                            </div>
                                            <div className="flex gap-2 sm:gap-3 flex-wrap justify-center flex-1">
                                                {sevenNotToPlay.map((num, i) => ( <div key={i} className="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center font-black text-lg text-sky-700 shadow-sm border-2 border-sky-200">{num}</div> ))}
                                            </div>
                                        </div>

                                        <div className="bg-emerald-50 p-4 sm:p-6 rounded-xl border border-emerald-100 flex flex-col md:flex-row items-center gap-4 sm:gap-6">
                                            <div className="flex-shrink-0 w-24 text-center">
                                                <div className="text-sm font-bold text-emerald-800 mb-1">8不出</div>
                                            </div>
                                            <div className="flex gap-2 sm:gap-3 flex-wrap justify-center flex-1">
                                                {eightNotToPlay.map((num, i) => ( <div key={i} className="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center font-black text-lg text-emerald-700 shadow-sm border-2 border-emerald-200">{num}</div> ))}
                                            </div>
                                        </div>

                                        <div className="bg-amber-50 p-4 sm:p-6 rounded-xl border border-amber-100 flex flex-col md:flex-row items-center gap-4 sm:gap-6">
                                            <div className="flex-shrink-0 w-24 text-center">
                                                <div className="text-sm font-bold text-amber-800 mb-1">9不出</div>
                                            </div>
                                            <div className="flex gap-2 sm:gap-3 flex-wrap justify-center flex-1">
                                                {nineNotToPlay.map((num, i) => ( <div key={i} className="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center font-black text-lg text-amber-700 shadow-sm border-2 border-amber-200">{num}</div> ))}
                                            </div>
                                        </div>

                                        <div className="bg-orange-50 p-4 sm:p-6 rounded-xl border border-orange-100 flex flex-col md:flex-row items-center gap-4 sm:gap-6">
                                            <div className="flex-shrink-0 w-24 text-center">
                                                <div className="text-sm font-bold text-orange-800 mb-1">10不出</div>
                                            </div>
                                            <div className="flex gap-2 sm:gap-3 flex-wrap justify-center flex-1">
                                                {tenNotToPlay.map((num, i) => ( <div key={i} className="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center font-black text-lg text-orange-700 shadow-sm border-2 border-orange-200">{num}</div> ))}
                                            </div>
                                        </div>

                                        <div className="bg-pink-50 p-4 sm:p-6 rounded-xl border border-pink-100 flex flex-col md:flex-row items-center gap-4 sm:gap-6">
                                            <div className="flex-shrink-0 w-24 text-center">
                                                <div className="text-sm font-bold text-pink-800 mb-1">11不出</div>
                                            </div>
                                            <div className="flex gap-2 sm:gap-3 flex-wrap justify-center flex-1">
                                                {elevenNotToPlay.map((num, i) => ( <div key={i} className="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center font-black text-lg text-pink-700 shadow-sm border-2 border-pink-200">{num}</div> ))}
                                            </div>
                                        </div>

                                        <div className="bg-rose-50 p-4 sm:p-6 rounded-xl border border-rose-100 flex flex-col md:flex-row items-center gap-4 sm:gap-6">
                                            <div className="flex-shrink-0 w-24 text-center">
                                                <div className="text-sm font-bold text-rose-800 mb-1">12不出</div>
                                            </div>
                                            <div className="flex gap-2 sm:gap-3 flex-wrap justify-center flex-1">
                                                {twelveNotToPlay.map((num, i) => ( <div key={i} className="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center font-black text-lg text-rose-700 shadow-sm border-2 border-rose-200">{num}</div> ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 推薦車牌區塊 */}
                                <div className="mt-12 border-t-4 border-dashed border-indigo-100 pt-8">
                                    <h2 className="text-2xl font-black text-indigo-800 mb-6 flex items-center gap-2"><i className="w-6 h-6"></i> 推薦車牌</h2>
                                    <div className="space-y-4">
                                        <div className="bg-gradient-to-r from-slate-800 to-slate-700 p-6 rounded-xl shadow-lg flex flex-col gap-4">
                                            <div className="flex flex-col md:flex-row items-center gap-6">
                                                <div className="flex-shrink-0 w-28 text-center text-white"><div className="text-sm font-black text-amber-400 mb-1 tracking-widest">車牌</div></div>
                                                <div className="flex gap-4 sm:gap-6 justify-center flex-1 flex-wrap">
                                                    {carPlates.top2.map((num, i) => (
                                                        <div key={`car2-${i}`} className="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-b from-amber-300 to-amber-500 rounded-full flex items-center justify-center font-black text-3xl sm:text-4xl text-slate-900 shadow-xl border-4 border-amber-200 transform hover:scale-105 transition-transform">{num}</div>
                                                    ))}
                                                </div>
                                            </div>
                                            {carPlates.others && carPlates.others.length > 0 && (
                                                <div className="mt-2 pt-4 border-t border-slate-600/50 flex flex-col sm:flex-row items-center gap-3">
                                                    <span className="text-sm font-bold text-slate-400">其他高機率組合：</span>
                                                    <div className="flex gap-2 flex-wrap justify-center flex-1">
                                                        {carPlates.others.map(num => ( <span key={`others-${num}`} className="px-3 py-1.5 bg-slate-800/80 text-amber-200/80 rounded-lg border border-slate-600/50 text-sm font-bold shadow-inner">{num}</span> ))}
                                                    </div>
                                                </div>
                                            )}
                                            {fullHistoryRecords.totalCount > 0 && (
                                                <div className="mt-4 p-4 bg-slate-800/80 rounded-xl border border-slate-600 max-h-96 overflow-y-auto">
                                                    <h4 className="font-bold text-amber-400 mb-3 text-sm flex items-center justify-between sticky top-0 bg-slate-800 p-2 rounded z-10 border-b border-slate-600">
                                                        <span className="flex items-center gap-2"><span><i data-lucide="history" className="w-4 h-4"></i></span> 車牌 完整預測與開獎紀錄 (共 {fullHistoryRecords.totalCount} 期)</span>
                                                        <span className="text-emerald-400 bg-emerald-900/50 px-2 py-1 rounded text-xs border border-emerald-700">車牌勝率: {((fullHistoryRecords.totalHits2 / fullHistoryRecords.totalCount) * 100).toFixed(1)}% ({fullHistoryRecords.totalHits2}勝)</span>
                                                    </h4>
                                                    <div className="flex flex-col gap-2 mt-2">
                                                        {fullHistoryRecords.records.map((rec, idx) => (
                                                            <div key={`hist2-${idx}`} className={`p-3 rounded-lg border text-sm flex flex-col sm:flex-row sm:items-center justify-between gap-3 ${rec.isHit2 ? 'bg-amber-900/30 border-amber-500/50' : 'bg-slate-700/30 border-slate-600/50'}`}>
                                                                <div className="flex flex-col gap-1 w-full sm:w-auto">
                                                                    <span className="text-slate-400 font-mono text-[11px]">基準期: {rec.triggerDate}</span>
                                                                    <span className="text-slate-200 font-medium">目標期: <span className="font-mono text-white">{rec.targetDate}</span></span>
                                                                </div>
                                                                <div className="flex flex-col sm:items-center gap-1 flex-1">
                                                                    <span className="text-slate-300">車牌: <span className={`font-black text-base tracking-wider ${rec.isHit2 ? 'text-amber-400' : 'text-slate-400'}`}>{rec.predicted2.join(', ')}</span></span>
                                                                    <span className="text-[11px] text-slate-400 tracking-widest flex items-center flex-wrap justify-center gap-1">實際開出: {rec.actual.join(', ')}</span>
                                                                </div>
                                                                <div className="w-full sm:w-24 text-right flex items-center justify-end">
                                                                    {rec.isHit2 ? ( <span className="inline-flex items-center gap-1 px-2.5 py-1.5 bg-amber-500/20 text-amber-400 rounded border border-amber-500/30 text-xs font-bold"><span><i data-lucide="check" className="w-3 h-3"></i></span>中 {rec.hits2.join(', ')}</span> ) : ( <span className="inline-block px-2.5 py-1.5 bg-slate-600/30 text-slate-500 rounded border border-slate-600/50 text-xs">未中</span> )}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* 開獎驗證區塊 */}
                                <div className="mt-8 border-t border-gray-200 pt-8">
                                    <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4">
                                        <span><i data-lucide="check-circle" className="w-5 h-5 text-emerald-600"></i></span>
                                        開獎驗證
                                    </h2>
                                    <div className="bg-emerald-50 p-5 sm:p-6 rounded-xl border border-emerald-100 mb-6">
                                        <label className="block text-sm font-semibold text-emerald-800 mb-3 flex items-center gap-2">
                                            <span><i data-lucide="target" className="w-4 h-4"></i></span>
                                            請輸入本期開出號碼
                                        </label>
                                        <div className={`grid grid-cols-${config.balls} gap-3 sm:gap-4`}>
                                            {validationBalls[orderType].map((ball, index) => (
                                                <div key={`val-${index}`} className="flex flex-col items-center">
                                                    <input type="text" value={ball} onChange={(e) => handleValidationBallChange(index, e.target.value)} className="ball-input w-full text-center text-xl sm:text-2xl font-bold py-2 sm:py-3 rounded-lg border-2 border-emerald-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all shadow-sm text-emerald-900" maxLength="2" placeholder="??" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {validationResults && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                                                <h3 className="font-bold text-gray-700 mb-3 border-b border-gray-100 pb-2">🎯 車牌驗證</h3>
                                                <div className="space-y-3 mt-4">
                                                    <div className="flex items-center justify-between flex-wrap gap-2">
                                                        <span className="text-sm font-bold text-amber-700">車牌: {carPlates.top2.join(', ')} 
                                                            {carPlates.others && carPlates.others.length > 0 && <span className="text-xs text-slate-500 font-normal ml-2">其他: {carPlates.others.join(', ')}</span>}
                                                        </span>
                                                        <div className="flex items-center gap-2">
                                                            {validationResults.carPlateCheck.passed ? 
                                                                <span className="text-sm font-bold bg-emerald-100 text-emerald-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 命中 ({validationResults.carPlateCheck.hits.join(', ')})</span> : 
                                                                <span className="text-sm font-bold bg-gray-100 text-gray-500 px-3 py-1 rounded-md">未中</span>
                                                            }
                                                            {validationResults.carPlateCheck.othersHits && validationResults.carPlateCheck.othersHits.length > 0 && (
                                                                <span className="text-sm font-bold bg-teal-100 text-teal-700 px-3 py-1 rounded-md flex items-center gap-1">其他命中 ({validationResults.carPlateCheck.othersHits.join(', ')})</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                                                <h3 className="font-bold text-gray-700 mb-3 border-b border-gray-100 pb-2">🛡️ 不出牌過關結果</h3>
                                                <div className="space-y-3">
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-sm font-bold text-purple-700">5不出</span>
                                                        {validationResults.five.passed ? <span className="text-sm font-bold bg-green-100 text-green-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 完美過關</span> : <span className="text-sm font-bold bg-red-100 text-red-700 px-3 py-1 rounded-md">失敗 (命中 {validationResults.five.hits.join(', ')})</span>}
                                                    </div>
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-sm font-bold text-indigo-700">6不出</span>
                                                        {validationResults.six.passed ? <span className="text-sm font-bold bg-green-100 text-green-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 完美過關</span> : <span className="text-sm font-bold bg-red-100 text-red-700 px-3 py-1 rounded-md">失敗 (命中 {validationResults.six.hits.join(', ')})</span>}
                                                    </div>
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-sm font-bold text-sky-700">7不出</span>
                                                        {validationResults.seven.passed ? <span className="text-sm font-bold bg-green-100 text-green-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 完美過關</span> : <span className="text-sm font-bold bg-red-100 text-red-700 px-3 py-1 rounded-md">失敗 (命中 {validationResults.seven.hits.join(', ')})</span>}
                                                    </div>
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-sm font-bold text-emerald-700">8不出</span>
                                                        {validationResults.eight.passed ? <span className="text-sm font-bold bg-green-100 text-green-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 完美過關</span> : <span className="text-sm font-bold bg-red-100 text-red-700 px-3 py-1 rounded-md">失敗 (命中 {validationResults.eight.hits.join(', ')})</span>}
                                                    </div>
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-sm font-bold text-amber-700">9不出</span>
                                                        {validationResults.nine.passed ? <span className="text-sm font-bold bg-green-100 text-green-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 完美過關</span> : <span className="text-sm font-bold bg-red-100 text-red-700 px-3 py-1 rounded-md">失敗 (命中 {validationResults.nine.hits.join(', ')})</span>}
                                                    </div>
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-sm font-bold text-orange-700">10不出</span>
                                                        {validationResults.ten.passed ? <span className="text-sm font-bold bg-green-100 text-green-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 完美過關</span> : <span className="text-sm font-bold bg-red-100 text-red-700 px-3 py-1 rounded-md">失敗 (命中 {validationResults.ten.hits.join(', ')})</span>}
                                                    </div>
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-sm font-bold text-pink-700">11不出</span>
                                                        {validationResults.eleven.passed ? <span className="text-sm font-bold bg-green-100 text-green-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 完美過關</span> : <span className="text-sm font-bold bg-red-100 text-red-700 px-3 py-1 rounded-md">失敗 (命中 {validationResults.eleven.hits.join(', ')})</span>}
                                                    </div>
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-sm font-bold text-rose-700">12不出</span>
                                                        {validationResults.twelve.passed ? <span className="text-sm font-bold bg-green-100 text-green-700 px-3 py-1 rounded-md flex items-center gap-1"><span><i data-lucide="check" className="w-4 h-4"></i></span> 完美過關</span> : <span className="text-sm font-bold bg-red-100 text-red-700 px-3 py-1 rounded-md">失敗 (命中 {validationResults.twelve.hits.join(', ')})</span>}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root-tool2'));
        root.render(<App />);
    </script>
</body>
</html>
