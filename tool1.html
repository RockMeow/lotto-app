<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立柱撞柱工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
    </style>
</head>
<body>
    <div class="bg-slate-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex flex-wrap gap-2 sm:gap-4 justify-center">
            <a href="index.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">🏠 首頁</a>
            <a href="tool1.html" class="px-5 py-2.5 rounded-lg font-bold text-white bg-blue-600 shadow-md transition-all">立柱撞柱工具</a>
            <a href="tool5.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">星期版路工具</a>
            <a href="tool3.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">尾數拖牌工具</a>
            <a href="tool6.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">版路分析工具</a>
        </div>
    </div>

    <div id="root-tool1"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const defaultCSV = ``;

        const App = () => {
            const [csvText, setCsvText] = useState(defaultCSV);
            const [historyData, setHistoryData] = useState([]);
            const [colCount, setColCount] = useState(3);
            const [columns, setColumns] = useState(['', '', '', '', '', '']);
            const [unitPrice, setUnitPrice] = useState(1);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const lines = csvText.trim().split('\n');
                const parsedData = [];
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split(',').map(s => s.trim());
                    if (parts.length >= 6) {
                        parsedData.push({
                            date: parts[0],
                            nums: parts.slice(1, 6).map(Number).filter(n => !isNaN(n))
                        });
                    }
                }
                setHistoryData(parsedData);
            }, [csvText]);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => { setCsvText(event.target.result); };
                    reader.readAsText(file);
                }
            };

            const handleColChange = (index, val) => {
                const newCols = [...columns];
                newCols[index] = val;
                setColumns(newCols);
            };

            const parsedColumns = useMemo(() => {
                return columns.slice(0, colCount).map(colStr => {
                    return Array.from(new Set(
                        colStr.replace(/[^0-9\s,]/g, ' ')
                              .split(/[\s,]+/)
                              .filter(s => s !== '')
                              .map(Number)
                              .filter(n => n > 0 && n <= 39)
                    )).sort((a,b) => a - b);
                });
            }, [columns, colCount]);

            const collisions = useMemo(() => {
                const results = [];
                parsedColumns.forEach((colNums, colIndex) => {
                    if (colNums.length < 2) return;
                    for (let i = 0; i < colNums.length; i++) {
                        for (let j = i + 1; j < colNums.length; j++) {
                            const num1 = colNums[i];
                            const num2 = colNums[j];
                            const collidedDraws = historyData.filter(draw => 
                                draw.nums.includes(num1) && draw.nums.includes(num2)
                            );
                            if (collidedDraws.length > 0) {
                                results.push({
                                    column: colIndex + 1,
                                    num1: num1 < 10 ? '0'+num1 : String(num1),
                                    num2: num2 < 10 ? '0'+num2 : String(num2),
                                    dates: collidedDraws.map(d => d.date).join(', ')
                                });
                            }
                        }
                    }
                });
                return results;
            }, [parsedColumns, historyData]);

            const calculateCombinations = (sizes, targetStar) => {
                const helper = (startIndex, currentK) => {
                    if (currentK === 0) return 1;
                    if (startIndex >= sizes.length) return 0;
                    let sum = 0;
                    sum += sizes[startIndex] * helper(startIndex + 1, currentK - 1);
                    sum += helper(startIndex + 1, currentK);
                    return sum;
                };
                return helper(0, targetStar);
            };

            const combinationResults = useMemo(() => {
                const sizes = parsedColumns.map(col => col.length).filter(len => len > 0);
                const validColCount = sizes.length;
                const results = [];
                for (let star = 2; star <= Math.min(validColCount, 4); star++) {
                    const combs = calculateCombinations(sizes, star);
                    if (combs > 0) {
                        results.push({ star: star, combinations: combs, totalCost: combs * unitPrice });
                    }
                }
                return results;
            }, [parsedColumns, unitPrice]);

            const totalInputBalls = parsedColumns.reduce((sum, col) => sum + col.length, 0);

            return (
                <div className="py-8 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto">
                    <div className="bg-slate-800 rounded-t-2xl p-6 sm:p-8 text-white shadow-xl border-b-4 border-blue-500">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-black flex items-center gap-3">
                                    <i data-lucide="columns" className="w-8 h-8 text-blue-400"></i>
                                    立柱撞柱與成本分析工具
                                </h1>
                                <p className="mt-2 text-slate-300 font-medium opacity-90">匯入歷史開獎數據，即時偵測同柱號碼是否曾經同期開出，並自動計算碰數成本。</p>
                            </div>
                            <div className="bg-slate-700/50 p-3 rounded-xl border border-slate-600 flex items-center gap-3 shadow-inner">
                                <span className="text-sm font-bold text-slate-300">歷史資料筆數:</span>
                                <span className="text-2xl font-black text-blue-400">{historyData.length}</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white shadow-xl p-6 sm:p-8 border border-slate-200 rounded-b-2xl">
                        <div className="mb-10">
                            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                                <i data-lucide="database" className="w-5 h-5 text-blue-600"></i>
                                第一步：匯入歷史開獎資料庫 (CSV)
                            </h2>
                            <div className="flex flex-col md:flex-row gap-6">
                                <div className="flex-1">
                                    <textarea 
                                        className="w-full h-32 p-3 border-2 border-slate-200 rounded-xl text-sm font-mono text-slate-600 focus:border-blue-500 focus:ring-0 outline-none transition-colors shadow-inner"
                                        value={csvText} onChange={(e) => setCsvText(e.target.value)}
                                        placeholder="Date,N1,N2,N3,N4,N5&#10;01/01,1,2,3,4,5..."
                                    ></textarea>
                                </div>
                                <div className="w-full md:w-64 flex flex-col justify-center gap-3">
                                    <div className="text-sm text-slate-500 font-medium">或直接上傳 CSV 檔案：</div>
                                    <input type="file" accept=".csv,.txt" className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
                                    <button onClick={() => fileInputRef.current.click()} className="w-full py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl border border-slate-300 transition-colors flex items-center justify-center gap-2 shadow-sm">
                                        <i data-lucide="upload-cloud" className="w-5 h-5"></i> 選擇檔案
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="mb-10">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 border-b border-slate-100 pb-2 gap-4">
                                <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                    <i data-lucide="layout-grid" className="w-5 h-5 text-blue-600"></i>
                                    第二步：設定立柱與號碼
                                </h2>
                                <div className="flex items-center gap-3 bg-blue-50 p-1.5 rounded-xl border border-blue-100">
                                    <span className="text-sm font-bold text-blue-800 px-2">立柱數量：</span>
                                    {[2, 3, 4, 5, 6].map(num => (
                                        <button key={`colbtn-${num}`} onClick={() => setColCount(num)} className={`w-10 h-8 rounded-lg font-black transition-all ${colCount === num ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-blue-600 hover:bg-blue-100'}`}>
                                            {num}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {Array.from({length: colCount}).map((_, i) => (
                                    <div key={`col-${i}`} className={`p-5 rounded-2xl border-2 transition-all shadow-sm ${parsedColumns[i].length > 0 ? 'border-blue-400 bg-blue-50/30' : 'border-slate-200 bg-slate-50'}`}>
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="font-black text-lg text-slate-700">第 {i + 1} 柱</span>
                                            <span className="text-xs font-bold bg-slate-200 text-slate-600 px-2 py-1 rounded-md">{parsedColumns[i].length} 顆球</span>
                                        </div>
                                        <input type="text" className="w-full p-3 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all font-mono text-lg font-bold text-blue-800 placeholder-slate-300 shadow-sm" placeholder="例: 1, 15, 23" value={columns[i]} onChange={(e) => handleColChange(i, e.target.value)} />
                                        <div className="mt-3 flex flex-wrap gap-1.5 min-h-[2rem]">
                                            {parsedColumns[i].map(num => (
                                                <span key={`num-${num}`} className="w-8 h-8 rounded-full bg-blue-100 text-blue-800 font-bold flex items-center justify-center text-sm border border-blue-200 shadow-sm">
                                                    {num < 10 ? '0'+num : num}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="mb-10">
                            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                                <i data-lucide="alert-triangle" className="w-5 h-5 text-red-500"></i>
                                撞柱偵測警告
                            </h2>
                            {totalInputBalls < 2 ? (
                                <div className="p-6 bg-slate-50 rounded-xl border border-slate-200 text-center text-slate-400 font-medium shadow-inner">請在上方輸入立柱號碼以進行分析...</div>
                            ) : collisions.length === 0 ? (
                                <div className="p-6 bg-emerald-50 rounded-xl border border-emerald-200 flex items-center justify-center gap-3 shadow-sm">
                                    <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-md"><i data-lucide="check" className="w-6 h-6"></i></div>
                                    <div className="text-emerald-800">
                                        <div className="font-black text-lg">完美！未偵測到任何撞柱</div>
                                        <div className="text-sm opacity-90">同柱內的號碼在歷史紀錄中從未一起開出過，配置非常安全！</div>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    <div className="p-4 bg-red-500 text-white font-bold rounded-xl shadow-md flex items-center gap-3">
                                        <i data-lucide="shield-alert" className="w-6 h-6"></i>
                                        警告！偵測到 {collisions.length} 組歷史撞柱，建議將以下號碼拆分至不同柱！
                                    </div>
                                    {collisions.map((col, idx) => (
                                        <div key={`colli-${idx}`} className="flex items-center gap-4 p-4 bg-red-50 rounded-xl border border-red-200 shadow-sm transition-all hover:shadow-md">
                                            <div className="bg-red-100 text-red-800 font-black px-3 py-2 rounded-lg text-sm whitespace-nowrap border border-red-200">第 {col.column} 柱</div>
                                            <div className="flex gap-2">
                                                <span className="w-10 h-10 rounded-full bg-white text-red-600 font-black border-2 border-red-300 flex items-center justify-center shadow-sm text-lg">{col.num1}</span>
                                                <span className="w-10 h-10 rounded-full bg-white text-red-600 font-black border-2 border-red-300 flex items-center justify-center shadow-sm text-lg">{col.num2}</span>
                                            </div>
                                            <div className="flex-1 text-sm font-medium text-red-800 bg-white/60 p-2.5 rounded-lg border border-red-100">
                                                曾在 <span className="font-bold underline decoration-red-400">{col.dates}</span> 同期開出！
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="bg-slate-50 rounded-2xl border border-slate-200 p-6 sm:p-8 shadow-inner">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                                <h2 className="text-xl font-black text-slate-800 flex items-center gap-2">
                                    <i data-lucide="calculator" className="w-6 h-6 text-slate-600"></i>
                                    連碰組合與計價結算
                                </h2>
                                <div className="flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-300 shadow-sm">
                                    <label className="text-sm font-bold text-slate-600 pl-2">每碰金額(元):</label>
                                    <input type="number" className="w-20 p-2 text-lg font-black text-slate-800 bg-slate-100 rounded-lg border-none focus:ring-2 focus:ring-blue-400 text-center outline-none transition-all shadow-inner" value={unitPrice} onChange={(e) => setUnitPrice(Number(e.target.value))} min="1" />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                {combinationResults.length === 0 ? (
                                    <div className="col-span-full py-8 text-center text-slate-400 font-medium">請在至少 2 柱中輸入號碼以計算碰數...</div>
                                ) : (
                                    combinationResults.map(res => (
                                        <div key={`res-${res.star}`} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden group hover:shadow-md transition-all">
                                            <div className="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                                            <div className="text-slate-500 text-sm font-bold mb-1">{res.star} 星立柱組合</div>
                                            <div className="flex items-baseline gap-1 mb-4">
                                                <span className="text-3xl font-black text-slate-800">{res.combinations}</span>
                                                <span className="text-slate-500 font-medium">碰</span>
                                            </div>
                                            <div className="border-t border-slate-100 pt-3 flex justify-between items-center">
                                                <span className="text-sm font-bold text-slate-400">總金額</span>
                                                <span className="text-xl font-black text-blue-600">${res.totalCost.toLocaleString()}</span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root-tool1'));
        root.render(<App />);
        setTimeout(() => { lucide.createIcons(); }, 100);
    </script>
</body>
</html>
