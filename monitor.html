<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>版路分析工具 - 拖牌</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --primary: #3b82f6; --primary-active: #2563eb;
            --bg: #f8fafc; --card-bg: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444; --danger-bg: #fee2e2;
            --warning: #b45309; --warning-bg: #fffbeb; --warning-border: #fde68a;
            --success: #15803d; --success-bg: #dcfce7;
            --header-bg: rgba(255, 255, 255, 0.85);
            --select-bg: #f8fafc; --detail-bg: #f8fafc;
            --process-bg: #f1f5f9;
        }

        /* 🌙 深色模式變數 */
        [data-theme="dark"] {
            --primary: #60a5fa; --primary-active: #3b82f6;
            --bg: #0f172a; --card-bg: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border: #334155;
            --danger: #f87171; --danger-bg: rgba(239, 68, 68, 0.15);
            --warning: #fbbf24; --warning-bg: rgba(245, 158, 11, 0.1); --warning-border: #92400e;
            --success: #4ade80; --success-bg: rgba(34, 197, 94, 0.15);
            --header-bg: rgba(30, 41, 59, 0.85);
            --select-bg: #0f172a; --detail-bg: #1e293b;
            --process-bg: #334155;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg); color: var(--text-main); 
            -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .app-container { max-width: 480px; margin: 0 auto; background-color: var(--bg); min-height: 100vh; padding-bottom: 80px; transition: background-color 0.3s ease; }

        .app-header { 
            background: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            padding: 18px 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
        }
        .app-header h1 { margin: 0; font-size: 18px; color: var(--text-main); font-weight: 800; grid-column: 2; text-align: center; }

        .theme-toggle { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px; border-radius: 50%; color: var(--text-main); justify-self: end; }

        .content { padding: 16px; }

        .control-panel { background: var(--card-bg); border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; text-align: center; }

        select { 
            width: 100%; appearance: none; background-color: var(--select-bg); border: 1.5px solid var(--border); 
            padding: 16px 20px; border-radius: 16px; font-size: 16px; font-weight: 600; color: var(--text-main); 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; background-position: right 16px center; background-size: 18px; 
        }

        .loading-text { text-align: center; color: var(--text-muted); font-size: 15px; padding: 40px 20px; background: var(--card-bg); border-radius: 24px; font-weight: 600; }

        /* 預測區塊 */
        .pred-block { background: var(--card-bg); border-radius: 24px; padding: 24px 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); border: 2px solid var(--warning-border); background-color: var(--warning-bg); }
        .pred-title { color: var(--warning); font-size: 18px; font-weight: 900; margin-bottom: 15px; border-bottom: 1.5px solid var(--warning-border); padding-bottom: 12px; text-align: center; }

        /* 觸發紀錄區塊 */
        .trigger-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .card-header { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border); padding-bottom: 10px; margin-bottom: 12px; }
        .t-info { font-size: 13px; color: var(--text-muted); }
        .t-num { font-size: 18px; font-weight: 900; color: var(--text-main); }
        .rate-badge { background: var(--success-bg); color: var(--success); padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        
        .process-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); font-size: 13px; }
        .process-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .step-tag { background: var(--process-bg); color: var(--text-muted); padding: 2px 6px; border-radius: 6px; font-weight: bold; font-size: 11px; }

        /* 立體樂透球 */
        .balls-wrap { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .lotto-ball {
            display: inline-flex; align-items: center; justify-content: center; 
            width: 36px; height: 36px; border-radius: 50%; color: white; font-weight: 900; font-size: 16px; 
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.25), 0 3px 6px rgba(0,0,0,0.2); 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4); position: relative;
        }
        .ball-0 { background: linear-gradient(135deg, #60a5fa, #2563eb); } 
        .ball-1 { background: linear-gradient(135deg, #34d399, #059669); } 
        .ball-2 { background: linear-gradient(135deg, #f87171, #dc2626); } 
        .ball-3 { background: linear-gradient(135deg, #fbbf24, #d97706); } 
        .ball-4 { background: linear-gradient(135deg, #c084fc, #7e22ce); } 
        
        /* 單色球 (用於歷史過程) */
        .p-ball { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: var(--text-muted); }
        .p-ball.is-hit { background: var(--success); color: white; border-color: var(--success); box-shadow: 0 0 5px rgba(34, 197, 94, 0.4); }

        .star-tag { position: absolute; top: -6px; right: -6px; color: var(--warning); font-size: 14px; text-shadow: 0px 0px 2px var(--card-bg); font-weight: bold; }

        /* 底部導航 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 20px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 12px; font-weight: 800; padding: 5px; transition: color 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <h1>版路分析工具 - 拖牌</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </header>
    
    <div class="content">
        <div class="control-panel">
            <div class="form-group">
                <label>選擇彩券類型</label>
                <select id="csvSource" onchange="fetchGoogleCSV()">
                    <option value="">請選擇彩券...</option>
                    <option value="./539_history_all_sorted.csv">今彩539</option>
                    <option value="./649_history_all_sorted.csv">大樂透</option>
                    <option value="./Fan_history_all_sorted.csv">天天樂</option>
                    <option value="./Six_history_all_sorted.csv">六合彩</option>
                </select>   
            </div>
        </div>

        <div id="resultBox">
            <div class="loading-text">請先從上方選單選擇彩券類型。</div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item">
        <span class="nav-icon">📊</span>主版路
    </a>
    <a href="monitor.html" class="nav-item active">
        <span class="nav-icon">🎯</span>拖牌
    </a>
</div>

<script>
    const WINDOW = 3;

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('themeIcon');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.innerText = '🌙';
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#ffffff');
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.innerText = '☀️';
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0f172a');
        }
    }

    function padZero(num) { return num < 10 ? '0' + num : num.toString(); }

    // 生成立體球 HTML
    function get3DBallHtml(num, resonance) {
        let colorIdx = Math.floor(num / 10);
        if(colorIdx > 4) colorIdx = 4;
        let star = resonance > 1 ? '<span class="star-tag">★</span>' : '';
        return `<span class="lotto-ball ball-${colorIdx}">${padZero(num)}${star}</span>`;
    }

    async function fetchGoogleCSV() {
        const url = document.getElementById('csvSource').value;
        const resultBox = document.getElementById('resultBox');
        if (!url) {
            resultBox.innerHTML = `<div class="loading-text">請先從上方選單選擇彩券類型。</div>`;
            return;
        }
        resultBox.innerHTML = `<div class="loading-text">🔄 正在載入並分析 2026 版路...</div>`;
        try {
            const fetchUrl = url + '?t=' + new Date().getTime();
            const response = await fetch(fetchUrl);
            if (!response.ok) throw new Error(`HTTP 錯誤碼: ${response.status}`);
            const text = await response.text();
            processCSV(text);
        } catch (error) {
            resultBox.innerHTML = `<div class="loading-text" style="color:var(--danger);">❌ 載入失敗：${error.message}</div>`;
        }
    }

    function processCSV(text) {
        const lines = text.trim().split('\n');
        let data = lines.slice(1).map(l => {
            const p = l.split(',');
            return { date: p[0].trim(), nums: p.slice(1).map(n => parseInt(n, 10)).filter(n => !isNaN(n)) };
        });

        // 僅保留 2026 年資料
        let startIdx = 0;
        for (let i = data.length - 1; i >= 0; i--) {
            if (data[i].date === '01/01') { startIdx = i; break; }
        }
        const data2026 = data.slice(startIdx);
        
        const patterns = getPatterns(data2026);
        
        const resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '';
        
        const predHtml = buildPredictionHtml(data2026, patterns);
        const detailsHtml = buildDetailsHtml(data2026, patterns);
        
        resultBox.innerHTML = predHtml + detailsHtml;
    }

    function getPatterns(data) {
        const patterns = {};
        for (let n = 1; n <= 49; n++) { // 支援最大 49 球彩種
            const occs = [];
            data.forEach((d, i) => { if (d.nums.includes(n)) occs.push(i); });
            if (occs.length < 3) continue;

            const followers = {};
            occs.forEach(idx => {
                const seen = new Set();
                for (let s = 1; s <= WINDOW; s++) {
                    if (data[idx+s]) data[idx+s].nums.forEach(num => seen.add(num));
                }
                seen.forEach(num => followers[num] = (followers[num] || 0) + 1);
            });

            const top3 = Object.entries(followers).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>parseInt(e[0]));
            let hits = 0;
            occs.forEach(idx => {
                let ok = false;
                for (let s = 1; s <= WINDOW; s++) {
                    if (data[idx+s] && top3.some(t => data[idx+s].nums.includes(t))) ok = true;
                }
                if (ok) hits++;
            });
            patterns[n] = { top3, rate: (hits/occs.length*100).toFixed(1) };
        }
        return patterns;
    }

    function buildPredictionHtml(data, patterns) {
        const lastIdx = data.length - 1;
        let poolMap = new Map(); 

        for (let i = 2; i >= 0; i--) {
            const triggerIdx = lastIdx - i;
            if (triggerIdx < 0) continue;
            
            const draw = data[triggerIdx];
            draw.nums.forEach(n => {
                const p = patterns[n];
                if (p && p.rate >= 70) {
                    const checkRange = data.slice(triggerIdx + 1);
                    const alreadyHit = checkRange.some(d => p.top3.some(target => d.nums.includes(target)));
                    if (!alreadyHit) {
                        p.top3.forEach(target => {
                            if (!poolMap.has(target)) poolMap.set(target, { num: target, resonance: 0, maxRate: parseFloat(p.rate) });
                            poolMap.get(target).resonance += 1;
                            poolMap.get(target).maxRate = Math.max(poolMap.get(target).maxRate, parseFloat(p.rate));
                        });
                    }
                }
            });
        }

        const activeNums = Array.from(poolMap.values());
        if (activeNums.length === 0) return '';

        const sorted = activeNums.sort((a,b) => {
            if (b.resonance !== a.resonance) return b.resonance - a.resonance;
            return b.maxRate - a.maxRate;
        });

        const ballsHtml = sorted.map(item => get3DBallHtml(item.num, item.resonance)).join('');

        return `
            <div class="pred-block">
                <div class="pred-title">明日預測號碼</div>
                <div style="font-size:12px; text-align:center; color:var(--warning); margin-bottom:15px; opacity:0.8;">★ 代表被多個版路帶出</div>
                <div class="balls-wrap">${ballsHtml}</div>
            </div>
        `;
    }

    function buildDetailsHtml(data, patterns) {
        const lastIdx = data.length - 1;
        let html = '';

        for (let i = 2; i >= 0; i--) {
            const triggerIdx = lastIdx - i;
            if (triggerIdx < 0) continue;
            
            const draw = data[triggerIdx];
            draw.nums.forEach(n => {
                const p = patterns[n];
                if (p && p.rate >= 70) {
                    let processHtml = '';

                    for (let s = 1; s <= WINDOW; s++) {
                        const currentIdx = triggerIdx + s;
                        const targetDraw = data[currentIdx];
                        
                        if (!targetDraw) {
                            processHtml += `<div class="process-item"><span class="step-tag">T+${s}</span><span style="color:var(--text-muted)">等待開獎中...</span></div>`;
                            continue;
                        }

                        const hits = p.top3.filter(num => targetDraw.nums.includes(num));
                        if (hits.length > 0) {
                            processHtml += `
                                <div class="process-item">
                                    <span class="step-tag">T+${s}</span>
                                    <div style="flex:1"><b>${targetDraw.date}</b> <span style="color:var(--success); font-weight:bold;">命中：${hits.map(h=>padZero(h)).join(', ')}</span></div>
                                </div>`;
                        } else {
                            processHtml += `
                                <div class="process-item">
                                    <span class="step-tag">T+${s}</span>
                                    <div style="flex:1; color:var(--text-muted)">${targetDraw.date} 未開出</div>
                                </div>`;
                        }
                    }

                    const ballsHtml = p.top3.map(num => {
                        let isHitAnywhere = false;
                        for(let s=1; s<=WINDOW; s++) {
                            if(data[triggerIdx+s] && data[triggerIdx+s].nums.includes(num)) isHitAnywhere = true;
                        }
                        return `<div class="p-ball ${isHitAnywhere?'is-hit':''}">${padZero(num)}</div>`;
                    }).join('');

                    html += `
                        <div class="trigger-card">
                            <div class="card-header">
                                <div>
                                    <div class="t-info">${draw.date} ${i===0?'<span style="background:var(--warning-bg); color:var(--warning); padding:2px 4px; border-radius:4px; font-size:10px; margin-left:4px;">最新</span>':''}</div>
                                    <div class="t-num">號碼 ${padZero(n)}</div>
                                </div>
                                <div class="rate-badge">${p.rate}%</div>
                            </div>
                            <div style="font-size:12px; font-weight:bold; margin-bottom:8px; color:var(--text-main);">拖牌號碼：</div>
                            <div style="display:flex; gap:6px; margin-bottom:15px;">${ballsHtml}</div>
                            <div style="font-size:12px; font-weight:bold; margin-bottom:8px; color:var(--text-main);">三期內：</div>
                            <div>${processHtml}</div>
                        </div>
                    `;
                }
            });
        }
        return html;
    }
</script>
</body>
</html>
