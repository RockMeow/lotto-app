<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版路分析系統</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: left; font-size: 20px; margin-top: 0; border-bottom: 1px solid #ccc; padding-bottom: 10px; color: #222;}
        
        .top-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .data-input { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 100px; padding: 8px; border: 1px solid #ccc; font-family: monospace; font-size: 12px; resize: vertical; box-sizing: border-box;}
        
        .controls { flex: 1; background: #fafafa; border: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; gap: 10px;}
        select { font-size: 14px; padding: 6px; border: 1px solid #ccc; }
        button { background: #444; color: white; border: none; padding: 10px; font-size: 14px; cursor: pointer; transition: 0.2s;}
        button:hover { background: #222; }
        
        .options-bar { display: flex; gap: 15px; align-items: center; font-size: 14px; padding: 10px 0; border-bottom: 1px solid #eee; margin-bottom: 15px;}
        
        /* 圖例與歷史紀錄區 */
        .legend-container { margin-bottom: 20px; }
        .legend-item { margin-bottom: 10px; background: #fff; border: 1px solid #eee; }
        .legend-header { padding: 10px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; background: #fafafa;}
        .legend-header:hover { background: #f0f0f0; }
        .history-list { padding: 10px; font-size: 13px; color: #555; background: #fff; border-top: 1px solid #eee; display: none;}
        .history-row { padding: 4px 0; border-bottom: 1px dashed #eee; display: flex; gap: 15px; }
        .history-row:last-child { border-bottom: none; }
        
        /* 調整透明度的版路專屬顏色 */
        .bg-color-0 { background-color: rgba(231, 76, 60, 0.5) !important; color: #111 !important; border-color: rgba(231, 76, 60, 0.8) !important; }
        .bg-color-1 { background-color: rgba(52, 152, 219, 0.5) !important; color: #111 !important; border-color: rgba(52, 152, 219, 0.8) !important; }
        .bg-color-2 { background-color: rgba(155, 89, 182, 0.5) !important; color: #111 !important; border-color: rgba(155, 89, 182, 0.8) !important; }
        .bg-color-3 { background-color: rgba(46, 204, 113, 0.5) !important; color: #111 !important; border-color: rgba(46, 204, 113, 0.8) !important; }
        .bg-color-4 { background-color: rgba(241, 196, 15, 0.5) !important; color: #111 !important; border-color: rgba(241, 196, 15, 0.8) !important; }
        
        /* 列表 */
        .list-wrapper { max-height: 700px; overflow-y: auto; border: 1px solid #ccc; }
        table.draw-list { border-collapse: collapse; width: 100%; text-align: center; background: #fff; font-size: 14px;}
        .draw-list thead { position: sticky; top: 0; z-index: 10; background: #e0e0e0; color: #333; }
        .draw-list th { padding: 10px 8px; border: 1px solid #ccc; font-weight: normal;}
        .draw-list td { padding: 6px; border: 1px solid #eee; }
        .draw-list tr:nth-child(even) { background-color: #fcfcfc; }
        .draw-list tr:hover { background-color: #f5f5f5; }
        
        .date-col { width: 100px; color: #666;}
        .num-group { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap;}
        
        /* 號碼球 */
        .ball { 
            display: flex; align-items: center; justify-content: center; 
            width: 28px; height: 28px; border-radius: 50%; 
            background: #fff; color: #333; font-size: 14px;
            border: 1px solid #ccc;
        }
        
        .target-glow {
            box-shadow: 0 0 0 2px #333;
            font-weight: bold;
        }

        .prediction-row { background-color: #f9f9f9 !important; border-top: 2px solid #aaa; }
        .prediction-row td { padding: 15px 8px; font-weight: bold; }
        .pred-badge { font-size: 12px; color: #666; margin-right: 5px; }
        .pred-item { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; padding: 4px 8px; border-radius: 4px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>版路分析系統</h1>
    
    <div class="top-section">
        <div class="data-input">
            <select id="csvSelect" onchange="loadCsvData()">
                <option value="Fan_history_2026.csv">天天樂</option>
                <option value="Ghana_history_2026.csv">迦納彩</option>
                <option value="539_history_2026.csv" selected>今彩 539</option>
                <option value="649_history_2026.csv">大樂透</option>
                <option value="Six_history_2026.csv">六合彩</option>
            </select>
            <textarea id="dataInput" placeholder="若無法自動讀取檔案，請將 CSV 數據貼於此處..."></textarea>
        </div>
        
        <div class="controls">
            <select id="searchMode">
                <option value="strict">定位 (位置相同)</option>
                <option value="any" selected>不定位 (當期開出)</option>
            </select>
            <button onclick="runListEngine()">執行分析</button>
        </div>
    </div>

    <div class="options-bar">
        <label><input type="checkbox" id="chkOrig" checked onchange="toggleColumns()"> 顯示落球</label>
        <label><input type="checkbox" id="chkSorted" checked onchange="toggleColumns()"> 顯示順球</label>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="legend-container" id="legendBox"></div>
        
        <div class="list-wrapper">
            <table class="draw-list" id="drawListTable">
                <thead>
                    <tr>
                        <th class="date-col">日期</th>
                        <th class="col-orig">落球</th>
                        <th class="col-sorted">順球</th>
                    </tr>
                </thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const pad = (n) => n.toString().padStart(2, '0');

    // 自動讀取 CSV
    async function loadCsvData() {
        const file = document.getElementById('csvSelect').value;
        try {
            const res = await fetch(file);
            if (res.ok) {
                document.getElementById('dataInput').value = await res.text();
                runListEngine();
            }
        } catch (e) {
            console.log("本機環境無法自動讀取，請手動貼上。");
        }
    }

    function toggleHistory(id) {
        const el = document.getElementById('history-' + id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function toggleColumns() {
        const showOrig = document.getElementById('chkOrig').checked;
        const showSorted = document.getElementById('chkSorted').checked;
        
        document.querySelectorAll('.col-orig').forEach(el => {
            if(showOrig) el.classList.remove('hidden'); else el.classList.add('hidden');
        });
        document.querySelectorAll('.col-sorted').forEach(el => {
            if(showSorted) el.classList.remove('hidden'); else el.classList.add('hidden');
        });
    }

    function parseData() {
        const text = document.getElementById('dataInput').value;
        const lines = text.trim().split('\n');
        const data = [];
        for (let line of lines) {
            let parts = line.split(',');
            if (parts.length < 2 || parts[0].trim().toLowerCase() === 'date') continue;
            let date = parts[0];
            // 動態擷取所有號碼 (支援不同彩種球數)
            let origNums = parts.slice(1).map(Number).filter(n => !isNaN(n) && n > 0);
            let sortedNums = [...origNums].sort((a, b) => a - b);
            data.push({ date, origNums, sortedNums });
        }
        return data;
    }

    function runListEngine() {
        const data = parseData();
        if (data.length < 5) return;

        const searchMode = document.getElementById('searchMode').value;
        let allDiscoveredPatterns = [];
        const MAX_NUM = 49; // 擴充至支援六合彩

        for (let K = 1; K <= 3; K++) {
            let cond1Idx = data.length - 1 - K;
            let cond2Idx = data.length - 1; 
            if (cond1Idx < 0) continue;

            let cond1Draw = data[cond1Idx];
            let cond2Draw = data[cond2Idx];

            for (let pos1 = 0; pos1 < cond1Draw.sortedNums.length; pos1++) {
                let val1 = cond1Draw.sortedNums[pos1];
                for (let pos2 = 0; pos2 < cond2Draw.sortedNums.length; pos2++) {
                    let val2 = cond2Draw.sortedNums[pos2];

                    let historyMatches = [];
                    for (let i = 0; i <= data.length - 2 - K; i++) {
                        let isMatch1 = false, isMatch2 = false;
                        if (searchMode === 'strict') {
                            isMatch1 = data[i].sortedNums[pos1] === val1;
                            isMatch2 = data[i + K].sortedNums[pos2] === val2;
                        } else {
                            isMatch1 = data[i].sortedNums.includes(val1);
                            isMatch2 = data[i + K].sortedNums.includes(val2);
                        }

                        if (isMatch1 && isMatch2) {
                            historyMatches.push({
                                triggerIdx1: i,
                                triggerIdx2: i + K,
                                targetIdx: i + K + 1,
                                targetNums: data[i + K + 1].origNums
                            });
                        }
                    }

                    if (historyMatches.length > 0) {
                        let targetCounts = {};
                        historyMatches.forEach(match => match.targetNums.forEach(n => targetCounts[n] = (targetCounts[n] || 0) + 1));
                        let totalOccurrences = historyMatches.length;

                        for (let n = 1; n <= MAX_NUM; n++) {
                            if (targetCounts[n]) {
                                let hits = targetCounts[n];
                                let rate = hits / totalOccurrences;

                                if (rate >= 0.4 && totalOccurrences >= 2) {
                                    let uniqueKey = searchMode === 'strict' ? `${K}_${pos1}_${val1}_${pos2}_${val2}_${n}` : `${K}_any_${val1}_any_${val2}_${n}`;
                                    if (!allDiscoveredPatterns.some(p => p.key === uniqueKey)) {
                                        allDiscoveredPatterns.push({
                                            key: uniqueKey, pos1, val1, pos2, val2, targetNum: n,
                                            hits, total: totalOccurrences, rate, matches: historyMatches
                                        });
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        allDiscoveredPatterns.sort((a, b) => b.hits - a.hits || b.rate - a.rate);
        let topPatterns = allDiscoveredPatterns.slice(0, 5);

        let rowHighlights = Array.from({length: data.length + 1}, () => ({ orig: {}, sorted: {} }));

        topPatterns.forEach((p, colorIdx) => {
            let cssClass = `bg-color-${colorIdx}`;
            
            p.matches.forEach(match => {
                if (searchMode === 'strict') {
                    rowHighlights[match.triggerIdx1].sorted[p.pos1] = cssClass;
                    rowHighlights[match.triggerIdx2].sorted[p.pos2] = cssClass;
                } else {
                    data[match.triggerIdx1].origNums.forEach((n, i) => { if(n === p.val1) rowHighlights[match.triggerIdx1].orig[i] = cssClass; });
                    data[match.triggerIdx1].sortedNums.forEach((n, i) => { if(n === p.val1) rowHighlights[match.triggerIdx1].sorted[i] = cssClass; });
                    data[match.triggerIdx2].origNums.forEach((n, i) => { if(n === p.val2) rowHighlights[match.triggerIdx2].orig[i] = cssClass; });
                    data[match.triggerIdx2].sortedNums.forEach((n, i) => { if(n === p.val2) rowHighlights[match.triggerIdx2].sorted[i] = cssClass; });
                }

                if(match.targetNums.includes(p.targetNum)) {
                    data[match.targetIdx].origNums.forEach((n, i) => { if(n === p.targetNum) rowHighlights[match.targetIdx].orig[i] = `${cssClass} target-glow`; });
                    data[match.targetIdx].sortedNums.forEach((n, i) => { if(n === p.targetNum) rowHighlights[match.targetIdx].sorted[i] = `${cssClass} target-glow`; });
                }
            });

            let lastIdx = data.length - 1;
            let currentTrigger1 = lastIdx - parseInt(p.key.split('_')[0]);

            if (searchMode === 'strict') {
                rowHighlights[currentTrigger1].sorted[p.pos1] = cssClass;
                rowHighlights[lastIdx].sorted[p.pos2] = cssClass;
            } else {
                data[currentTrigger1].origNums.forEach((n, i) => { if(n === p.val1) rowHighlights[currentTrigger1].orig[i] = cssClass; });
                data[currentTrigger1].sortedNums.forEach((n, i) => { if(n === p.val1) rowHighlights[currentTrigger1].sorted[i] = cssClass; });
                data[lastIdx].origNums.forEach((n, i) => { if(n === p.val2) rowHighlights[lastIdx].orig[i] = cssClass; });
                data[lastIdx].sortedNums.forEach((n, i) => { if(n === p.val2) rowHighlights[lastIdx].sorted[i] = cssClass; });
            }
        });

        // 繪製圖例與歷史紀錄
        let legendHtml = '';
        topPatterns.forEach((p, idx) => {
            let historyHtml = p.matches.map(m => {
                let isHit = m.targetNums.includes(p.targetNum);
                let numsFormatted = m.targetNums.map(n => n === p.targetNum ? `<span style="font-weight:bold; color:#000;">${pad(n)}</span>` : pad(n)).join(', ');
                return `<div class="history-row">
                    <span style="width:140px;">${data[m.triggerIdx1].date} / ${data[m.triggerIdx2].date}</span>
                    <span>預測 ${data[m.targetIdx].date}</span>
                    <span>[ ${numsFormatted} ]</span>
                    <span>${isHit ? '中' : '-'}</span>
                </div>`;
            }).join('');

            legendHtml += `
            <div class="legend-item bg-color-${idx}">
                <div class="legend-header" onclick="toggleHistory(${idx})">
                    <span>版路 ${idx+1}: [${pad(p.val1)}] 拖 [${pad(p.val2)}] 預測 [${pad(p.targetNum)}]</span>
                    <span>勝率 ${(p.rate*100).toFixed(0)}% (發動 ${p.total} 次) ▼</span>
                </div>
                <div class="history-list" id="history-${idx}">
                    ${historyHtml}
                </div>
            </div>`;
        });
        document.getElementById('legendBox').innerHTML = legendHtml;

        // 繪製列表
        let listHtml = '';
        for (let i = 0; i < data.length; i++) {
            let row = data[i];
            let origBalls = row.origNums.map((n, idx) => `<div class="ball ${rowHighlights[i].orig[idx] || ''}">${pad(n)}</div>`).join('');
            let sortedBalls = row.sortedNums.map((n, idx) => `<div class="ball ${rowHighlights[i].sorted[idx] || ''}">${pad(n)}</div>`).join('');

            listHtml += `
            <tr>
                <td class="date-col">${row.date}</td>
                <td class="col-orig"><div class="num-group">${origBalls}</div></td>
                <td class="col-sorted"><div class="num-group">${sortedBalls}</div></td>
            </tr>`;
        }

        // 預測列
        let predBalls = topPatterns.map((p, idx) => `
            <div class="pred-item">
                <span class="pred-badge">版路 ${idx+1}</span>
                <div class="ball bg-color-${idx} target-glow">${pad(p.targetNum)}</div>
            </div>
        `).join('');

        if(topPatterns.length === 0) predBalls = '無條件發動';

        listHtml += `
        <tr class="prediction-row">
            <td class="date-col">下期預測</td>
            <td colspan="2"><div class="num-group" style="justify-content:flex-start;">${predBalls}</div></td>
        </tr>`;

        document.getElementById('listBody').innerHTML = listHtml;
        document.getElementById('dashboard').style.display = 'block';
        toggleColumns(); // 套用隱藏設定
        
        let listWrapper = document.querySelector('.list-wrapper');
        listWrapper.scrollTop = listWrapper.scrollHeight;
    }
    
    // 初始化時若 textarea 內有預設資料，就先跑一次
    window.onload = () => { if(document.getElementById('dataInput').value.trim() !== '') runListEngine(); };
</script>

</body>
</html>
