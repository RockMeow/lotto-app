<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開獎尾數規律搜尋器 PRO</title>
    <style>
        /* 現代化色彩變數 */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --danger: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 15px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        /* 標題設計 */
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* 控制面板 */
        .control-panel {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        .data-source-container {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .selector-box {
            display: flex;
            align-items: center;
            gap: 12px;
            border-right: 2px solid var(--border-color);
            padding-right: 20px;
        }
        .selector-box label {
            font-weight: 700;
            color: var(--text-main);
        }
        select.styled-select, input.styled-input {
            padding: 10px 15px;
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--card-bg);
            transition: all 0.2s;
            outline: none;
        }
        select.styled-select:hover, select.styled-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* 按鈕設計 */
        .file-upload {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .file-upload input[type="file"] {
            display: none;
        }
        .file-upload-btn {
            background: linear-gradient(135deg, var(--secondary), #059669);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }
        .file-upload-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .file-upload-btn:active { transform: translateY(1px); }

        /* 篩選器 */
        .filters {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
            padding: 5px 0;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: var(--text-main);
        }
        
        #statusMsg {
            font-weight: 600;
            margin-top: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            display: none;
        }
        .status-success { background: #dcfce7; color: #166534; display: block !important; border-left: 4px solid var(--secondary); }
        .status-error { background: #fee2e2; color: #991b1b; display: block !important; border-left: 4px solid var(--danger); }

        /* 表格設計 */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            text-align: center;
        }
        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 700;
            padding: 16px 12px;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }
        td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f1f5f9; }

        /* 徽章與特效文字 */
        .highlight { color: var(--danger); font-weight: 800; font-size: 16px; }
        .rate-100 { color: var(--secondary); font-weight: 800; font-size: 16px; }
        
        .badge {
            background-color: #f59e0b;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 10px;
            box-shadow: 0 2px 4px rgba(245, 158, 11, 0.2);
        }

        /* 號碼預測彩球樣式 */
        .prediction-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            align-items: center;
        }
        .num-pill {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fca5a5, var(--danger));
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 14px;
            font-weight: 800;
            box-shadow: 0 3px 5px rgba(239, 68, 68, 0.3);
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }
        .tail-hint {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .miss-text { font-size: 12px; color: var(--text-muted); text-align: left; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 開獎尾數規律搜尋器 PRO</h1>
    <div class="subtitle">自動分析歷史數據落點 · 智慧化推算下期精準彩球</div>
    
    <div class="control-panel">
        <div class="data-source-container">
            <div class="selector-box">
                <label for="csvSelect">📂 選擇彩種：</label>
                <select id="csvSelect" class="styled-select" onchange="loadSelectedCSV()">
                    <option value="" disabled selected>-- 點擊快速載入 --</option>
                    <option value="Fan_history_2026.csv">天天樂</option>
                    <option value="Ghana_history_2026.csv">迦納彩</option>
                    <option value="539_history_2026.csv">今彩 539</option>
                    <option value="649_history_2026.csv">大樂透</option>
                    <option value="Six_history_2026.csv">六合彩</option>
                </select>
            </div>

            <label class="file-upload">
                <span class="file-upload-btn">⬆️ 手動上傳 CSV</span>
                <span id="fileName" style="color:var(--text-muted); font-size: 14px;">(若無伺服器環境，請點此手動選檔)</span>
                <input type="file" id="csvFileInput" accept=".csv, .txt">
            </label>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="filterBase">基準星期：</label>
                <select id="filterBase" class="styled-select">
                    <option value="all">📅 全部</option>
                    <option value="0">星期日</option>
                    <option value="1">星期一</option>
                    <option value="2">星期二</option>
                    <option value="3">星期三</option>
                    <option value="4">星期四</option>
                    <option value="5">星期五</option>
                    <option value="6">星期六</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterTarget">預測目標：</label>
                <select id="filterTarget" class="styled-select">
                    <option value="all">📅 全部</option>
                    <option value="0">星期日</option>
                    <option value="1">星期一</option>
                    <option value="2">星期二</option>
                    <option value="3">星期三</option>
                    <option value="4">星期四</option>
                    <option value="5">星期五</option>
                    <option value="6">星期六</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="minWinRate">最低勝率限制：</label>
                <input type="number" id="minWinRate" class="styled-input" value="80" min="0" max="100" style="width: 80px;"> %
            </div>
        </div>
        
        <div id="statusMsg"></div>
    </div>

    <div id="resultsArea">
        <h3 style="text-align: center; color: var(--text-muted); padding: 40px 0;">✨ 請選擇彩種或上傳資料檔以開始智慧分析 ✨</h3>
    </div>
</div>

<script>
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    let allGeneratedRules = [];

    async function loadSelectedCSV() {
        const fileName = document.getElementById('csvSelect').value;
        if (!fileName) return;

        document.getElementById('fileName').textContent = `已鎖定來源：${fileName}`;
        showStatus(`⏳ 正在高速運算 ${fileName} 的歷史軌跡...`, 'normal');

        try {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error('無法讀取檔案');
            const text = await response.text();
            processDataAndGenerateRules(text, fileName);
        } catch (error) {
            showStatus(`⚠️ <b>載入失敗：</b>瀏覽器安全限制無法直接讀取本地 ${fileName}。<br>👉 <b>解決方法：</b>請使用「手動上傳 CSV」按鈕，或透過 Live Server 開啟。`, 'error');
        }
    }

    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('csvSelect').value = ""; 
        document.getElementById('fileName').textContent = `已上傳：${file.name}`;
        showStatus("⏳ 正在讀取並進行大數據分析中...", 'normal');

        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            processDataAndGenerateRules(text, file.name);
        };
        reader.readAsText(file);
    });

    document.getElementById('filterBase').addEventListener('change', renderTable);
    document.getElementById('filterTarget').addEventListener('change', renderTable);
    document.getElementById('minWinRate').addEventListener('input', renderTable);

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.className = type === 'error' ? 'status-error' : 'status-success';
        el.innerHTML = msg;
    }

    function processDataAndGenerateRules(rawText, fileName) {
        const lines = rawText.split('\n');
        const data = [];
        let currentDayOfWeek = 3; 
        let maxLotteryNum = 0; // 自動偵測彩種的最大號碼 (如39, 49, 90)
        let ballCount = 5; 

        const isFan = fileName.toLowerCase().includes('fan') || fileName.includes('天天樂');

        // 1. 解析並清理數據
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const parts = line.split(',');
            if (parts.length < 6 || parts[0].toLowerCase() === 'date') continue;
            
            const dateStr = parts[0];
            const dateParts = dateStr.split('/');
            const day = parseInt(dateParts[dateParts.length - 1], 10); 
            
            const nums = [];
            for (let k = 1; k < parts.length; k++) {
                const val = parseInt(parts[k], 10);
                if(!isNaN(val)) {
                    nums.push(val);
                    if (val > maxLotteryNum) maxLotteryNum = val; // 更新最大號碼
                }
            }

            if(nums.length > ballCount) ballCount = nums.length;

            if(nums.length >= 5) {
                if (!isFan) nums.sort((a, b) => a - b);
                data.push({
                    dateStr: dateStr,
                    day: day,
                    nums: nums,
                    weekday: currentDayOfWeek
                });
                currentDayOfWeek = (currentDayOfWeek + 1) % 7;
            }
        }

        // 建立最後一次出現的星期紀錄 (用於推算本期號碼)
        let lastRecordByWeekday = {};
        for (let entry of data) {
            lastRecordByWeekday[entry.weekday] = entry; 
        }

        allGeneratedRules = [];
        const sources = ['日期尾數'];
        for (let idx = 1; idx <= ballCount; idx++) {
            sources.push(`N${idx}尾數`);
        }

        // 2. 暴力演算所有規律
        for (let baseWd = 0; baseWd < 7; baseWd++) {
            for (let srcIdx = 0; srcIdx <= ballCount; srcIdx++) {
                for (let targetWd = 0; targetWd < 7; targetWd++) {
                    
                    let hits = 0;
                    let total = 0;
                    let missDetails = [];

                    for (let i = 0; i < data.length; i++) {
                        if (data[i].weekday === baseWd) {
                            if (srcIdx > 0 && !data[i].nums[srcIdx - 1]) continue;
                            let tailNum = (srcIdx === 0) ? (data[i].day % 10) : (data[i].nums[srcIdx - 1] % 10);
                            
                            for (let j = i + 1; j < data.length && j <= i + 7; j++) {
                                if (data[j].weekday === targetWd) {
                                    total++;
                                    const targetTails = data[j].nums.map(n => n % 10);
                                    if (targetTails.includes(tailNum)) {
                                        hits++;
                                    } else {
                                        missDetails.push(`[${data[i].dateStr}] 尾${tailNum} ➡️ [${data[j].dateStr}] 未開`);
                                    }
                                    break;
                                }
                            }
                        }
                    }

                    if (total >= 5) { 
                        // 計算本期即將預測的號碼
                        let predictTail = -1;
                        let latestBase = lastRecordByWeekday[baseWd];
                        if (latestBase) {
                            if (srcIdx === 0) {
                                predictTail = latestBase.day % 10;
                            } else if (latestBase.nums[srcIdx - 1] !== undefined) {
                                predictTail = latestBase.nums[srcIdx - 1] % 10;
                            }
                        }

                        let predictedNums = [];
                        if (predictTail !== -1) {
                            let start = predictTail === 0 ? 10 : predictTail;
                            for (let n = start; n <= maxLotteryNum; n += 10) {
                                predictedNums.push(n);
                            }
                        }

                        allGeneratedRules.push({
                            baseWd: baseWd,
                            targetWd: targetWd,
                            baseStr: `星期${weekdays[baseWd]} · ${sources[srcIdx]}`,
                            targetStr: `下個 星期${weekdays[targetWd]}`,
                            hits: hits,
                            total: total,
                            winRate: hits / total,
                            misses: missDetails.slice(-2).join("<br>"),
                            predictTail: predictTail,
                            predictedNums: predictedNums
                        });
                    }
                }
            }
        }

        let processNote = isFan ? "" : "<span class='badge'>已自動執行落球轉順球</span>";
        showStatus(`✅ 分析完成！成功掃描 <b>${data.length}</b> 期數據，找出最高勝率規律。(偵測到彩池最大號碼：<b>${maxLotteryNum}</b>) ${processNote}`, 'success');
        
        renderTable();
    }

    function renderTable() {
        if (allGeneratedRules.length === 0) return;

        const filterBase = document.getElementById('filterBase').value;
        const filterTarget = document.getElementById('filterTarget').value;
        const minWinRate = parseFloat(document.getElementById('minWinRate').value) / 100;

        let filteredRules = allGeneratedRules.filter(r => {
            let passBase = (filterBase === 'all') || (r.baseWd === parseInt(filterBase));
            let passTarget = (filterTarget === 'all') || (r.targetWd === parseInt(filterTarget));
            let passRate = r.winRate >= minWinRate;
            return passBase && passTarget && passRate;
        });

        filteredRules.sort((a, b) => b.winRate - a.winRate || b.total - a.total);

        const resultsArea = document.getElementById('resultsArea');

        if (filteredRules.length === 0) {
            resultsArea.innerHTML = `<h3 style="text-align:center; color: var(--danger); padding: 30px;">🔍 在目前的條件下，找不到符合的高勝率規律。建議調低勝率限制。</h3>`;
            return;
        }

        let html = `
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width:15%">基準觸發點</th>
                        <th style="width:15%">預測目標日</th>
                        <th style="width:10%">命中率</th>
                        <th style="width:10%">歷史戰績</th>
                        <th style="width:25%">🔥 本期預測推薦</th>
                        <th style="width:25%">近期斷龍紀錄 (防禦參考)</th>
                    </tr>
                </thead>
                <tbody>`;

        filteredRules.forEach(r => {
            const winRatePercent = (r.winRate * 100).toFixed(1);
            const rateClass = r.winRate === 1 ? 'rate-100' : 'highlight';
            
            // 產生預測號碼彩球 HTML
            let predictHtml = `<span style="color:#94a3b8; font-size:13px;">等待最新數據...</span>`;
            if (r.predictedNums && r.predictedNums.length > 0) {
                let pills = r.predictedNums.map(n => `<div class="num-pill">${n}</div>`).join('');
                predictHtml = `
                    <span class="tail-hint">鎖定尾數 <b>${r.predictTail}</b></span>
                    <div class="prediction-cell">${pills}</div>
                `;
            }

            html += `<tr>
                <td><strong>${r.baseStr}</strong></td>
                <td><strong>${r.targetStr}</strong></td>
                <td><span class="${rateClass}">${winRatePercent}%</span></td>
                <td><b style="color:var(--text-main)">${r.hits}</b> / <span style="color:var(--text-muted)">${r.total}</span></td>
                <td style="background-color: #fff1f2; border-left: 2px dashed #fecdd3; border-right: 2px dashed #fecdd3;">${predictHtml}</td>
                <td class="miss-text">${r.misses || '<span style="color:var(--secondary); font-weight:bold;">✨ 完美連莊中，無斷龍紀錄！</span>'}</td>
            </tr>`;
        });

        html += `</tbody></table></div>`;
        resultsArea.innerHTML = html;
    }
</script>

</body>
</html>
