<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開獎尾數規律搜尋器 (自動順球轉換版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .control-panel {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .data-source-container {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #bdc3c7;
        }
        .selector-box {
            display: flex;
            align-items: center;
            gap: 10px;
            border-right: 2px solid #ecf0f1;
            padding-right: 20px;
        }
        .selector-box select {
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            border: 2px solid #3498db;
            border-radius: 4px;
            cursor: pointer;
            background-color: #f0f8ff;
        }
        .file-upload {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-upload input[type="file"] {
            display: none;
        }
        .file-upload-btn {
            background-color: #2ecc71;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        select.filter-select, input[type="number"] {
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
        #statusMsg {
            color: #27ae60;
            font-weight: bold;
            margin-top: 10px;
        }
        .error-msg {
            color: #e74c3c !important;
            font-size: 14px;
        }
        .badge {
            background-color: #e67e22;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 開獎尾數規律搜尋器 <span style="font-size: 16px; color: #7f8c8d;">(自動順球轉換版)</span></h1>
    
    <div class="control-panel">
        <div class="data-source-container">
            <div class="selector-box">
                <label for="csvSelect"><strong>📂 選擇彩種：</strong></label>
                <select id="csvSelect" onchange="loadSelectedCSV()">
                    <option value="" disabled selected>-- 請選擇快速載入 --</option>
                    <option value="Fan_history_2026.csv">天天樂</option>
                    <option value="Ghana_history_2026.csv">迦納彩</option>
                    <option value="539_history_2026.csv">今彩 539</option>
                    <option value="649_history_2026.csv">大樂透</option>
                    <option value="Six_history_2026.csv">六合彩</option>
                </select>
            </div>

            <label class="file-upload">
                <span class="file-upload-btn">⬆️ 手動上傳 CSV</span>
                <span id="fileName" style="color:#7f8c8d; font-size: 14px;">(若無法自動讀取，請點此手動上傳)</span>
                <input type="file" id="csvFileInput" accept=".csv, .txt">
            </label>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="filterBase">基準星期：</label>
                <select id="filterBase" class="filter-select">
                    <option value="all">📅 全部</option>
                    <option value="0">星期日</option>
                    <option value="1">星期一</option>
                    <option value="2">星期二</option>
                    <option value="3">星期三</option>
                    <option value="4">星期四</option>
                    <option value="5">星期五</option>
                    <option value="6">星期六</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterTarget">目標星期：</label>
                <select id="filterTarget" class="filter-select">
                    <option value="all">📅 全部</option>
                    <option value="0">星期日</option>
                    <option value="1">星期一</option>
                    <option value="2">星期二</option>
                    <option value="3">星期三</option>
                    <option value="4">星期四</option>
                    <option value="5">星期五</option>
                    <option value="6">星期六</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="minWinRate">最低勝率 (%)：</label>
                <input type="number" id="minWinRate" value="80" min="0" max="100" style="width: 70px;">
            </div>
        </div>
        
        <div id="statusMsg"></div>
    </div>

    <div id="resultsArea">
        <h3 style="text-align: center; color: #7f8c8d;">請選擇彩種或上傳 CSV 檔案以進行分析</h3>
    </div>
</div>

<script>
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    let allGeneratedRules = [];

    async function loadSelectedCSV() {
        const fileName = document.getElementById('csvSelect').value;
        if (!fileName) return;

        document.getElementById('fileName').textContent = `(目前資料：${fileName})`;
        const statusEl = document.getElementById('statusMsg');
        statusEl.className = '';
        statusEl.textContent = `⏳ 正在嘗試載入 ${fileName}...`;

        try {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error('Network response was not ok');
            const text = await response.text();
            processDataAndGenerateRules(text, fileName);
        } catch (error) {
            console.error("Fetch error:", error);
            statusEl.className = 'error-msg';
            statusEl.innerHTML = `⚠️ <b>載入失敗：</b>瀏覽器安全限制無法直接讀取本地 ${fileName}。<br>👉 <b>解決方法：</b>請使用旁邊的「手動上傳 CSV」按鈕，或透過 VS Code 的 Live Server 開啟此網頁。`;
        }
    }

    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('csvSelect').value = ""; 
        document.getElementById('fileName').textContent = `已載入：${file.name}`;
        
        const statusEl = document.getElementById('statusMsg');
        statusEl.className = '';
        statusEl.textContent = "⏳ 讀取並分析中...";

        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            processDataAndGenerateRules(text, file.name);
        };
        reader.readAsText(file);
    });

    document.getElementById('filterBase').addEventListener('change', renderTable);
    document.getElementById('filterTarget').addEventListener('change', renderTable);
    document.getElementById('minWinRate').addEventListener('input', renderTable);

    function processDataAndGenerateRules(rawText, fileName) {
        const lines = rawText.split('\n');
        const data = [];
        let currentDayOfWeek = 3; 

        // 判斷是否為天天樂 (不需轉換順球)
        const isFan = fileName.toLowerCase().includes('fan') || fileName.includes('天天樂');
        let ballCount = 5; // 預設追蹤到 N5，會根據數據動態擴展

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const parts = line.split(',');
            if (parts.length < 6 || parts[0].toLowerCase() === 'date') continue;
            
            const dateStr = parts[0];
            const dateParts = dateStr.split('/');
            const day = parseInt(dateParts[dateParts.length - 1], 10); 
            
            const nums = [];
            // 動態讀取所有存在的號碼欄位 (相容 6 顆或以上的彩種)
            for (let k = 1; k < parts.length; k++) {
                const val = parseInt(parts[k], 10);
                if(!isNaN(val)) nums.push(val);
            }

            if(nums.length > ballCount) ballCount = nums.length;

            if(nums.length >= 5) {
                // 【核心邏輯】：如果不是天天樂，則進行「落球轉順球」排序 (由小到大)
                if (!isFan) {
                    nums.sort((a, b) => a - b);
                }

                data.push({
                    dateStr: dateStr,
                    day: day,
                    nums: nums,
                    weekday: currentDayOfWeek
                });
                currentDayOfWeek = (currentDayOfWeek + 1) % 7;
            }
        }

        allGeneratedRules = [];
        // 動態生成 sources 標籤 (確保涵蓋 N1 到 Nx)
        const sources = ['日期尾數'];
        for (let idx = 1; idx <= ballCount; idx++) {
            sources.push(`N${idx}尾數`);
        }

        for (let baseWd = 0; baseWd < 7; baseWd++) {
            for (let srcIdx = 0; srcIdx <= ballCount; srcIdx++) {
                for (let targetWd = 0; targetWd < 7; targetWd++) {
                    
                    let hits = 0;
                    let total = 0;
                    let missDetails = [];

                    for (let i = 0; i < data.length; i++) {
                        if (data[i].weekday === baseWd) {
                            // 防呆：如果某期號碼數量不足，跳過
                            if (srcIdx > 0 && !data[i].nums[srcIdx - 1]) continue;

                            let tailNum = (srcIdx === 0) ? (data[i].day % 10) : (data[i].nums[srcIdx - 1] % 10);
                            
                            for (let j = i + 1; j < data.length && j <= i + 7; j++) {
                                if (data[j].weekday === targetWd) {
                                    total++;
                                    const targetTails = data[j].nums.map(n => n % 10);
                                    if (targetTails.includes(tailNum)) {
                                        hits++;
                                    } else {
                                        missDetails.push(`基準:${data[i].dateStr}(尾${tailNum})➡️目標:${data[j].dateStr}(未開)`);
                                    }
                                    break;
                                }
                            }
                        }
                    }

                    if (total >= 5) { 
                        allGeneratedRules.push({
                            baseWd: baseWd,
                            targetWd: targetWd,
                            baseStr: `星期${weekdays[baseWd]} 的 ${sources[srcIdx]}`,
                            targetStr: `下個 星期${weekdays[targetWd]}`,
                            hits: hits,
                            total: total,
                            winRate: hits / total,
                            misses: missDetails.slice(-2).join("<br>") 
                        });
                    }
                }
            }
        }

        const statusEl = document.getElementById('statusMsg');
        statusEl.className = '';
        let processNote = isFan ? "" : "<span class='badge'>已自動將落球轉換為順球排列</span>";
        statusEl.innerHTML = `✅ 分析完成！共掃描 ${data.length} 期數據，計算出 ${allGeneratedRules.length} 種潛在規律組合。${processNote}`;
        
        renderTable();
    }

    function renderTable() {
        if (allGeneratedRules.length === 0) return;

        const filterBase = document.getElementById('filterBase').value;
        const filterTarget = document.getElementById('filterTarget').value;
        const minWinRate = parseFloat(document.getElementById('minWinRate').value) / 100;

        let filteredRules = allGeneratedRules.filter(r => {
            let passBase = (filterBase === 'all') || (r.baseWd === parseInt(filterBase));
            let passTarget = (filterTarget === 'all') || (r.targetWd === parseInt(filterTarget));
            let passRate = r.winRate >= minWinRate;
            return passBase && passTarget && passRate;
        });

        filteredRules.sort((a, b) => b.winRate - a.winRate || b.total - a.total);

        const resultsArea = document.getElementById('resultsArea');

        if (filteredRules.length === 0) {
            resultsArea.innerHTML = `<h3 style="text-align:center; color: #e74c3c;">在此篩選條件下，找不到符合的規律。</h3>`;
            return;
        }

        let html = `<h3>篩選結果：共 ${filteredRules.length} 條符合條件的規律</h3>`;
        html += `<table>
            <thead>
                <tr>
                    <th>找出規律 (基準)</th>
                    <th>預測目標 (驗證)</th>
                    <th>命中次數</th>
                    <th>總樣本數</th>
                    <th>歷史勝率</th>
                    <th>近期斷龍紀錄 (參考)</th>
                </tr>
            </thead>
            <tbody>`;

        filteredRules.forEach(r => {
            const rateStr = (r.winRate * 100).toFixed(1) + '%';
            html += `<tr>
                <td><strong>${r.baseStr}</strong></td>
                <td><strong>${r.targetStr}</strong></td>
                <td><span class="highlight">${r.hits}</span></td>
                <td>${r.total}</td>
                <td><span class="highlight">${rateStr}</span></td>
                <td style="font-size: 12px; color: #7f8c8d; text-align: left;">${r.misses || '無斷龍，全中！'}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        resultsArea.innerHTML = html;
    }
</script>

</body>
</html>
