<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開獎尾數規律自動搜尋器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            resize: vertical;
        }
        .settings {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 4px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 開獎尾數規律自動搜尋器</h1>
    
    <div class="control-panel">
        <label for="dataInput"><strong>請貼上歷史數據 (格式: 日期,N1,N2,N3,N4,N5)：</strong></label>
        <textarea id="dataInput" placeholder="1/1,1,3,9,11,21&#10;1/2,13,14,24,25,35...">Date,N1,N2,N3,N4,N5
1/1,1,3,9,11,21
1/2,13,14,24,25,35
1/3,9,14,19,20,24
1/4,1,4,34,37,39
1/5,9,19,20,26,32
1/6,5,9,15,21,24
1/7,1,10,28,31,39
1/8,2,3,9,11,31
1/9,2,15,19,24,36
1/10,23,25,28,29,35</textarea>
        
        <div class="settings">
            <label for="minWinRate">最低顯示勝率 (%)：</label>
            <input type="number" id="minWinRate" value="80" min="0" max="100" style="width: 60px; padding: 5px;">
            <button onclick="analyzeData()">開始分析出最高規律</button>
        </div>
    </div>

    <div id="resultsArea">
        <!-- 搜尋結果將顯示在這裡 -->
    </div>
</div>

<script>
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    
    function analyzeData() {
        const rawText = document.getElementById('dataInput').value.trim();
        const minWinRate = document.getElementById('minWinRate').value / 100;
        const resultsArea = document.getElementById('resultsArea');
        
        if (!rawText) {
            alert('請輸入數據！');
            return;
        }

        // 1. 解析數據
        const lines = rawText.split('\n');
        const data = [];
        let currentDayOfWeek = 3; // 假設 1/1 是星期三 (根據您的數據推算)

        for (let i = 0; i < lines.length; i++) {
            const parts = lines[i].split(',');
            if (parts.length < 6 || parts[0] === 'Date') continue;
            
            const dateStr = parts[0];
            const dateParts = dateStr.split('/');
            const month = parseInt(dateParts[0], 10);
            const day = parseInt(dateParts[1], 10);
            
            const nums = [
                parseInt(parts[1], 10),
                parseInt(parts[2], 10),
                parseInt(parts[3], 10),
                parseInt(parts[4], 10),
                parseInt(parts[5], 10)
            ];

            data.push({
                dateStr: dateStr,
                day: day,
                nums: nums,
                weekday: currentDayOfWeek
            });

            currentDayOfWeek = (currentDayOfWeek + 1) % 7;
        }

        // 2. 窮舉搜尋規律
        // 條件：基準日(0-6) x 基準位置(日期尾, N1-N5) x 目標日(0-6)
        const sources = ['日期尾數', 'N1尾數', 'N2尾數', 'N3尾數', 'N4尾數', 'N5尾數'];
        const rules = [];

        for (let baseWd = 0; baseWd < 7; baseWd++) {
            for (let srcIdx = 0; srcIdx < 6; srcIdx++) {
                for (let targetWd = 0; targetWd < 7; targetWd++) {
                    
                    let hits = 0;
                    let total = 0;
                    let missDetails = [];

                    // 尋找符合基準日的期數
                    for (let i = 0; i < data.length; i++) {
                        if (data[i].weekday === baseWd) {
                            
                            // 提取基準尾數
                            let tailNum = 0;
                            if (srcIdx === 0) tailNum = data[i].day % 10;
                            else tailNum = data[i].nums[srcIdx - 1] % 10;

                            // 往後尋找最近的一個「目標日」
                            let foundTarget = false;
                            for (let j = i + 1; j < data.length && j <= i + 7; j++) {
                                if (data[j].weekday === targetWd) {
                                    total++;
                                    foundTarget = true;
                                    
                                    // 驗證目標日是否有開出該尾數
                                    const targetTails = data[j].nums.map(n => n % 10);
                                    if (targetTails.includes(tailNum)) {
                                        hits++;
                                    } else {
                                        missDetails.push(`基準:${data[i].dateStr}(尾${tailNum}) ➡️ 目標:${data[j].dateStr}(未開)`);
                                    }
                                    break; // 只看下一個最近的目標日
                                }
                            }
                        }
                    }

                    // 記錄勝率
                    if (total >= 5) { // 樣本數過少不具參考價值
                        const winRate = hits / total;
                        if (winRate >= minWinRate) {
                            rules.push({
                                baseStr: `星期${weekdays[baseWd]} 的 ${sources[srcIdx]}`,
                                targetStr: `下個 星期${weekdays[targetWd]}`,
                                hits: hits,
                                total: total,
                                winRate: winRate,
                                misses: missDetails.slice(-2).join("<br>") // 顯示最近兩次沒中的紀錄
                            });
                        }
                    }
                }
            }
        }

        // 3. 排序與渲染結果 (勝率高到低)
        rules.sort((a, b) => b.winRate - a.winRate || b.total - a.total);

        if (rules.length === 0) {
            resultsArea.innerHTML = `<h3 style="text-align:center; color: #e74c3c;">找不到勝率高於 ${minWinRate * 100}% 的規律。建議調低標準或增加數據。</h3>`;
            return;
        }

        let html = `<h3>✅ 成功發現 ${rules.length} 條高勝率規律</h3>`;
        html += `<table>
            <thead>
                <tr>
                    <th>找出規律 (基準)</th>
                    <th>預測目標 (驗證)</th>
                    <th>命中次數</th>
                    <th>總樣本數</th>
                    <th>歷史勝率</th>
                    <th>近期斷龍紀錄 (參考)</th>
                </tr>
            </thead>
            <tbody>`;

        rules.forEach(r => {
            const rateStr = (r.winRate * 100).toFixed(1) + '%';
            html += `<tr>
                <td><strong>${r.baseStr}</strong></td>
                <td><strong>${r.targetStr}</strong></td>
                <td><span class="highlight">${r.hits}</span></td>
                <td>${r.total}</td>
                <td><span class="highlight">${rateStr}</span></td>
                <td style="font-size: 12px; color: #7f8c8d; text-align: left;">${r.misses || '無斷龍，全中！'}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        resultsArea.innerHTML = html;
    }
</script>

</body>
</html>
