<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>順球動態版路系統 (日期尾數與精選包牌)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; line-height: 1.4; }

        .container { max-width: 600px; margin: 0 auto; }

        .header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; color: #bdc3c7; }

        .selector-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        textarea { width: 100%; height: 120px; border-radius: 8px; border: 2px solid #dfe6e9; padding: 10px; font-family: monospace; font-size: 0.85rem; margin-bottom: 10px; resize: vertical; }
        button { width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        button:hover { background: #1a252f; }
        
        .status-bar { font-size: 0.85rem; color: #636e72; display: flex; align-items: center; gap: 5px; background: #e8f4f8; padding: 8px; border-radius: 6px; }

        .section-title { font-size: 1rem; font-weight: bold; margin: 15px 0 10px 5px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        #predictionArea { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .pred-card { background: var(--card); padding: 15px; border-radius: 12px; border-left: 6px solid var(--danger); box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .pred-card h3 { font-size: 0.95rem; margin-bottom: 5px; color: var(--primary); font-weight: 800; }
        .pred-info { font-size: 0.8rem; color: #636e72; margin-bottom: 8px; }
        .nums-highlight { font-size: 1.4rem; font-weight: 900; color: var(--danger); letter-spacing: 2px; display: block; margin-top: 5px; }
        .target-tail { font-size: 0.8rem; color: #fff; background: var(--danger); padding: 2px 6px; border-radius: 8px; vertical-align: middle; margin-right: 5px; display: inline-block; margin-bottom: 3px; }
        .score-tag { position: absolute; top: 0; right: 0; background: #ffeaa7; color: #d35400; padding: 4px 10px; border-bottom-left-radius: 10px; font-size: 0.75rem; font-weight: bold; }

        .summary { background: #e1f5fe; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid #b3e5fc; }

        .result-item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .res-date { font-weight: bold; color: var(--primary); }
        .res-actual { font-family: monospace; font-size: 1rem; color: #2d3436; font-weight: bold; }
        
        .hit-detail { background: #fdfaf0; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #f1c40f; }
        .miss-detail { background: #f5f6f7; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #eee; }
        .trigger-detail { background: #f0f8ff; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #cce5ff; }

        .hit-type, .trigger-type { font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; }
        .hit-type { color: #d35400; }
        .trigger-type { color: #0056b3; }
        
        .hit-nums { color: var(--success); font-weight: 900; font-size: 1.1rem; margin-top: 4px; }
        .trigger-nums { color: var(--danger); font-weight: 900; font-size: 1.1rem; margin-top: 4px; }

        .hit-status { font-size: 0.75rem; color: var(--success); font-weight: bold; margin-top: 5px; }
        .miss-status { font-size: 0.75rem; color: #636e72; font-weight: bold; margin-top: 5px; }
        .trigger-status { font-size: 0.75rem; color: #0056b3; font-weight: bold; margin-top: 5px; }
        .hit-badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; }

    </style>
</head>

    <div class="section-title">🕒 本期預測追蹤 (養兩期)</div>

    <div class="section-title">📜 歷史版路驗證與開出紀錄</div>

<script>
    const LOOKAHEAD = 2;              
    const WINDOW_SIZE = 10;           
    const MIN_WIN_RATE = 80.0;        
    const DOW_NAMES = ['日', '一', '二', '三', '四', '五', '六'];

    let parsedData = [];
    let maxNum = 39;

    function fNum(n) { return String(n).padStart(2, '0'); }
    function intersect(arr1, arr2) { return arr1.filter(value => arr2.includes(value)); }

    function getTailBalls(tail) {
        let balls = [];
        for (let i = 0; i <= 3; i++) {
            let n = i * 10 + tail;
            if (n > 0 && n <= maxNum) balls.push(n);
        }
        return balls.sort((a, b) => a - b);
    }

    function processData() {
        const text = document.getElementById('csvData').value.trim();
        const lines = text.split('\n');
        parsedData = [];
        
        for(let i = 0; i < lines.length; i++) {
            let cols = lines[i].split(',').map(s => s.trim());
            if(cols.length < 6 || isNaN(parseInt(cols[1]))) continue;
            let nums = [];
            for(let j = 1; j <= 5; j++) { 
                let n = parseInt(cols[j]);
                if(!isNaN(n)) nums.push(n);
            }
            // 【核心升級】無條件將落球轉為順球
            nums.sort((a, b) => a - b);
            
            let dateStr = cols[0];
            let parts = dateStr.split('/');
            let m = parseInt(parts[0], 10);
            let d = parseInt(parts[1], 10);
            let dt = new Date(2026, m - 1, d); 
            
            parsedData.push({ 
                date: dateStr, 
                nums: nums, 
                month: m,
                day: d,
                dow: dt.getDay()
            });
        }
        
        // 確保時間軸舊到新
        if (parsedData.length > 1) {
            let d1 = new Date(2026, parsedData[0].month - 1, parsedData[0].day);
            let d2 = new Date(2026, parsedData[parsedData.length - 1].month - 1, parsedData[parsedData.length - 1].day);
            if (d1 > d2) parsedData.reverse();
        }
        
        document.getElementById('dataStatus').innerText = `✅ 載入成功 (共 ${parsedData.length} 期，已全部轉換為順球排序)`;
        runAnalysis();
    }

    function getDailyPredictionSet(currentIndex) {
        if (currentIndex < WINDOW_SIZE) return null;

        let currentDraw = parsedData[currentIndex];
        let candidateFormulas = [];

        // 1. 【核心升級】掃描「日曆尾數版路」 (例如: 星期四日期+1 = 尾數)
        for (let testDow = 1; testDow <= 6; testDow++) {
            for (let offset = 0; offset < 10; offset++) {
                let hits = 0;
                let valid = 0;
                let occurrences = [];
                for (let i = 0; i <= currentIndex; i++) {
                    if (parsedData[i].dow === testDow) occurrences.push(i);
                }
                
                let recentOccurrences = occurrences.slice(-WINDOW_SIZE);
                if (recentOccurrences.length < 5) continue;
                
                for (let idx of recentOccurrences) {
                    valid++;
                    let tail = (parsedData[idx].day + offset) % 10;
                    let targetNums = getTailBalls(tail);
                    let hitSuccess = false;
                    
                    // 驗證當天或隔天是否開出該尾數
                    if (intersect(targetNums, parsedData[idx].nums).length > 0) {
                        hitSuccess = true;
                    } else if (idx + 1 <= currentIndex && intersect(targetNums, parsedData[idx + 1].nums).length > 0) {
                        hitSuccess = true;
                    }
                    
                    if (idx === currentIndex && !hitSuccess) {
                        valid--; // 如果是今天觸發但還沒開出，不計入失敗，進入「聽牌」狀態
                    } else if (hitSuccess) {
                        hits++;
                    }
                }
                
                if (valid > 0 && (hits / valid) * 100 >= MIN_WIN_RATE) {
                    // 預測明天的日期
                    let nextDayTime = new Date(2026, parsedData[currentIndex].month - 1, parsedData[currentIndex].day + 1);
                    if (nextDayTime.getDay() === 0) nextDayTime.setDate(nextDayTime.getDate() + 1);
                    let nextDow = nextDayTime.getDay();
                    let nextDayOfMonth = nextDayTime.getDate();

                    let ruleApplies = false;
                    let targetTail = -1;
                    let ruleDesc = "";
                    let opStr = offset === 0 ? '+0' : `+${offset}`;
                    
                    if (nextDow === testDow) {
                        ruleApplies = true;
                        targetTail = (nextDayOfMonth + offset) % 10;
                        ruleDesc = `星期${DOW_NAMES[testDow]}日期${opStr}尾數`;
                    } else if (parsedData[currentIndex].dow === testDow) {
                        let tail = (parsedData[currentIndex].day + offset) % 10;
                        let targetNums = getTailBalls(tail);
                        if (intersect(targetNums, parsedData[currentIndex].nums).length === 0) {
                            ruleApplies = true;
                            targetTail = tail;
                            ruleDesc = `星期${DOW_NAMES[testDow]}日期${opStr}尾數 (聽牌/抓隔天)`;
                        }
                    }

                    if (ruleApplies && targetTail !== -1) {
                        candidateFormulas.push({
                            desc: ruleDesc,
                            targets: getTailBalls(targetTail),
                            score: (hits / valid) * 100,
                            hits: hits,
                            isTail: true
                        });
                    }
                }
            }
        }

        // 2. 掃描正規的「順球 N 顆 + 偏移量」版路
        let numCount = currentDraw.nums.length;
        for (let bIndex = 0; bIndex < numCount; bIndex++) {
            for (let offset = 0; offset < maxNum; offset++) {
                let hits = 0;
                let validTriggers = 0;
                for (let k = currentIndex - WINDOW_SIZE; k < currentIndex; k++) {
                    validTriggers++;
                    let baseNum = parsedData[k].nums[bIndex];
                    let targetNum = ((baseNum - 1 + offset) % maxNum) + 1;
                    
                    let hitSuccess = false;
                    for (let j = 1; j <= LOOKAHEAD; j++) {
                        if (k + j <= currentIndex) {
                            if (parsedData[k + j].nums.includes(targetNum)) {
                                hitSuccess = true;
                                break;
                            }
                        }
                    }
                    if (hitSuccess) hits++;
                }

                let winRate = (hits / validTriggers) * 100;
                if (winRate >= MIN_WIN_RATE) {
                    let baseNumToday = currentDraw.nums[bIndex];
                    let targetToday = ((baseNumToday - 1 + offset) % maxNum) + 1;
                    let offsetText = offset === 0 ? '+0' : (offset <= maxNum/2 ? '+'+offset : '-'+(maxNum-offset));
                    
                    candidateFormulas.push({
                        desc: `順球第${bIndex + 1}顆${offsetText}`,
                        targets: [targetToday],
                        score: winRate,
                        hits: hits,
                        isTail: false
                    });
                }
            }
        }

        candidateFormulas.sort((a, b) => b.score - a.score || b.hits - a.hits);

        // 如果出現尾數版路，優先使用 (自帶3~4顆號碼)
        let tailPattern = candidateFormulas.find(f => f.isTail);
        if (tailPattern) {
            return {
                type: `日曆尾數版路 (${tailPattern.targets.length}碼包牌)`,
                targetDescList: [tailPattern.desc],
                targets: tailPattern.targets.sort((a, b) => a - b)
            };
        }

        // 若無尾數版路，取最強的 3 顆獨立號碼合併包牌
        let topTargets = [];
        let topDescs = [];
        for (let f of candidateFormulas) {
            if (!f.isTail && !topTargets.includes(f.targets[0])) {
                topTargets.push(f.targets[0]);
                topDescs.push(f.desc);
                if (topTargets.length === 3) break;
            }
        }

        if (topTargets.length === 0) return null;

        return {
            type: `順球動態精選 (${topTargets.length}碼包牌)`,
            targetDescList: topDescs,
            targets: topTargets.sort((a, b) => a - b)
        };
    }

    function runAnalysis() {
        let dailyView = parsedData.map(d => ({ date: d.date, nums: d.nums, dow: d.dow, events: [] }));
        let tracking = [];
        let stats = { total: 0, hit1: 0, hit2: 0, hit3: 0, hit4: 0 };

        for (let i = 0; i < parsedData.length; i++) {
            let pSet = getDailyPredictionSet(i);
            if (!pSet) continue;
            
            stats.total++;
            dailyView[i].events.push({ type: 'trigger', pattern: pSet });

            let hitNumsSet = new Set();
            let hitDetails = [];

            for (let j = 1; j <= LOOKAHEAD; j++) {
                if (i + j < parsedData.length) {
                    let matches = intersect(pSet.targets, parsedData[i+j].nums);
                    if (matches.length > 0) {
                        matches.forEach(m => hitNumsSet.add(m));
                        hitDetails.push(`第${j}期中${matches.length}碼`);
                    }
                }
            }

            let hitNums = Array.from(hitNumsSet).sort((a, b) => a - b);
            
            if (hitNums.length > 0) {
                if (hitNums.length === 1) stats.hit1++;
                else if (hitNums.length === 2) stats.hit2++;
                else if (hitNums.length === 3) stats.hit3++;
                else if (hitNums.length >= 4) stats.hit4++;

                let hitTypeStr = `${pSet.targets.length}中${hitNums.length}`;
                let firstHitPeriod = hitDetails[0].includes('1') ? 1 : 2;
                
                dailyView[i + firstHitPeriod].events.push({
                    type: 'hit',
                    pattern: pSet,
                    triggerDate: parsedData[i].date,
                    hitTypeStr: hitTypeStr,
                    hitNums: hitNums,
                    desc: hitDetails.join(' | ')
                });
            } else if (parsedData.length - 1 - i < LOOKAHEAD) {
                tracking.push({ ...pSet, date: parsedData[i].date, waitPeriod: parsedData.length - i });
            } else {
                dailyView[i + LOOKAHEAD].events.push({
                    type: 'miss',
                    pattern: pSet,
                    triggerDate: parsedData[i].date
                });
            }
        }

        tracking.reverse();
        document.getElementById('predictionArea').innerHTML = tracking.length > 0 ? tracking.map(t => {
            let tagsHtml = t.targetDescList.map(desc => `<span class="target-tail">${desc}</span>`).join(' ');
            return `
            <div class="pred-card">
                <div class="score-tag score-high">強勢推薦包牌</div>
                <h3>${t.type}</h3>
                <div style="margin-bottom: 8px;">${tagsHtml}</div>
                <div class="pred-info">觸發日: ${t.date} | 準備下注第 ${t.waitPeriod} 期</div>
                <span class="nums-highlight">${t.targets.map(fNum).join(', ')}</span>
            </div>`
        }).join('') : '<div style="padding:20px; color:#999; text-align:center; background: var(--card); border-radius: 12px;">目前無符合條件之版路 ☕</div>';

        const listHtml = dailyView.slice().reverse().map(d => {
            let eventsHtml = '';
            
            if (d.events.length === 0) {
                eventsHtml = `<div style="padding: 8px; color: #b2bec3; font-size: 0.85rem; text-align: center;">☕ 本期盤勢混亂，無穩定訊號</div>`;
            } else {
                eventsHtml = d.events.map(e => {
                    if (e.type === 'trigger') {
                        let tagsHtml = e.pattern.targetDescList.map(desc => `<span class="target-tail" style="background:#e74c3c;">${desc}</span>`).join(' ');
                        return `
                        <div class="trigger-detail">
                            <div class="trigger-type">🔔 鎖定組合: ${tagsHtml}</div>
                            <div class="trigger-nums">包牌號碼: ${e.pattern.targets.map(fNum).join(', ')}</div>
                            <div class="trigger-status">👉 開始追蹤兩期</div>
                        </div>`;
                    } else if (e.type === 'hit') {
                        let badgeColor = e.hitNums.length > 1 ? '#e74c3c' : '#f39c12';
                        return `
                        <div class="hit-detail">
                            <div class="hit-type"><span class="hit-badge" style="background:${badgeColor};">${e.hitTypeStr}</span> 預測組合: ${e.pattern.targets.map(fNum).join(', ')}</div>
                            <div class="hit-nums">順利開出: ${e.hitNums.map(fNum).join(', ')}</div>
                            <div class="hit-status">🎯 觸發日: ${e.triggerDate} (${e.desc})</div>
                        </div>`;
                    } else if (e.type === 'miss') {
                        return `
                        <div class="miss-detail">
                            <div class="hit-type" style="color:#636e72;">預測組合: ${e.pattern.targets.map(fNum).join(', ')}</div>
                            <div class="miss-status">❌ 兩期皆未中 (觸發日: ${e.triggerDate})</div>
                        </div>`;
                    }
                }).join('');
            }

            let dowStr = `(星期${DOW_NAMES[d.dow]})`;
            return `
            <div class="result-item">
                <div class="res-header">
                    <span class="res-date">開獎日: ${d.date} ${dowStr}</span>
                    <span class="res-actual">${d.nums.map(fNum).join(' ')}</span>
                </div>
                ${eventsHtml}
            </div>`;
        }).join('');
        
        document.getElementById('resultList').innerHTML = listHtml || '<div style="text-align:center;padding:20px; color:#999;">尚無紀錄</div>';

        let totalHits = stats.hit1 + stats.hit2 + stats.hit3 + stats.hit4;
        let hitRate = stats.total > 0 ? (totalHits / stats.total * 100).toFixed(1) : 0;
        document.getElementById('summaryArea').style.display = 'block';
        document.getElementById('summaryArea').innerHTML = `
            💡 <b>動態結算：</b>共出牌 <b>${stats.total}</b> 次，二期內成功中獎 <b>${totalHits}</b> 次 (勝率 <b>${hitRate}%</b>)<br>
            <span style="color:var(--danger); font-weight:bold; font-size:0.85rem; margin-top:5px; display:inline-block;">
                🏆 戰況：包牌中1 (${stats.hit1}次) / 包牌中2 (${stats.hit2}次) / 包牌中3以上 (${stats.hit3 + stats.hit4}次)
            </span>`;
    }
</script>
</body>
</html>
