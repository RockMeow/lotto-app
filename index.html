<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開獎尾數規律搜尋器 (CSV進階版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .control-panel {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .file-upload {
            border: 2px dashed #bdc3c7;
            padding: 20px;
            text-align: center;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
        }
        .file-upload input[type="file"] {
            display: none;
        }
        .file-upload-btn {
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
        }
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        select, input[type="number"] {
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
        #statusMsg {
            color: #27ae60;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 開獎尾數規律搜尋器 (CSV版)</h1>
    
    <div class="control-panel">
        <!-- CSV 檔案上傳區 -->
        <label class="file-upload">
            <span class="file-upload-btn">📁 選擇本地 CSV 檔案</span>
            <span id="fileName">尚未選擇檔案... (請確保格式為 Date,N1,N2,N3,N4,N5)</span>
            <input type="file" id="csvFileInput" accept=".csv, .txt">
        </label>

        <!-- 篩選器區塊 -->
        <div class="filters">
            <div class="filter-group">
                <label for="filterBase">基準星期 (從哪天找)：</label>
                <select id="filterBase">
                    <option value="all">📅 全部</option>
                    <option value="0">星期日</option>
                    <option value="1">星期一</option>
                    <option value="2">星期二</option>
                    <option value="3">星期三</option>
                    <option value="4">星期四</option>
                    <option value="5">星期五</option>
                    <option value="6">星期六</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterTarget">目標星期 (預測哪天)：</label>
                <select id="filterTarget">
                    <option value="all">📅 全部</option>
                    <option value="0">星期日</option>
                    <option value="1">星期一</option>
                    <option value="2">星期二</option>
                    <option value="3">星期三</option>
                    <option value="4">星期四</option>
                    <option value="5">星期五</option>
                    <option value="6">星期六</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="minWinRate">最低勝率 (%)：</label>
                <input type="number" id="minWinRate" value="80" min="0" max="100" style="width: 70px;">
            </div>
        </div>
        
        <div id="statusMsg"></div>
    </div>

    <div id="resultsArea">
        <h3 style="text-align: center; color: #7f8c8d;">請先上傳 CSV 檔案以進行分析</h3>
    </div>
</div>

<script>
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    let allGeneratedRules = []; // 儲存所有算出來的規律

    // 監聽檔案上傳
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('fileName').textContent = `已載入檔案：${file.name}`;
        document.getElementById('statusMsg').textContent = "讀取並分析中...";

        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            processDataAndGenerateRules(text);
        };
        reader.readAsText(file);
    });

    // 監聽篩選器變更 (動態更新畫面，不需重新計算)
    document.getElementById('filterBase').addEventListener('change', renderTable);
    document.getElementById('filterTarget').addEventListener('change', renderTable);
    document.getElementById('minWinRate').addEventListener('input', renderTable);

    function processDataAndGenerateRules(rawText) {
        const lines = rawText.split('\n');
        const data = [];
        let currentDayOfWeek = 3; // 假設數據第一筆 (1/1) 是星期三

        // 1. 解析 CSV
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const parts = line.split(',');
            if (parts.length < 6 || parts[0].toLowerCase() === 'date') continue;
            
            const dateStr = parts[0];
            const dateParts = dateStr.split('/');
            const day = parseInt(dateParts[1], 10);
            
            const nums = [
                parseInt(parts[1], 10), parseInt(parts[2], 10),
                parseInt(parts[3], 10), parseInt(parts[4], 10),
                parseInt(parts[5], 10)
            ];

            data.push({
                dateStr: dateStr,
                day: day,
                nums: nums,
                weekday: currentDayOfWeek
            });

            currentDayOfWeek = (currentDayOfWeek + 1) % 7;
        }

        // 2. 一次性窮舉所有規律 (暴力運算)
        allGeneratedRules = [];
        const sources = ['日期尾數', 'N1尾數', 'N2尾數', 'N3尾數', 'N4尾數', 'N5尾數'];

        for (let baseWd = 0; baseWd < 7; baseWd++) {
            for (let srcIdx = 0; srcIdx < 6; srcIdx++) {
                for (let targetWd = 0; targetWd < 7; targetWd++) {
                    
                    let hits = 0;
                    let total = 0;
                    let missDetails = [];

                    for (let i = 0; i < data.length; i++) {
                        if (data[i].weekday === baseWd) {
                            
                            let tailNum = (srcIdx === 0) ? (data[i].day % 10) : (data[i].nums[srcIdx - 1] % 10);
                            
                            for (let j = i + 1; j < data.length && j <= i + 7; j++) {
                                if (data[j].weekday === targetWd) {
                                    total++;
                                    const targetTails = data[j].nums.map(n => n % 10);
                                    if (targetTails.includes(tailNum)) {
                                        hits++;
                                    } else {
                                        missDetails.push(`基準:${data[i].dateStr}(尾${tailNum})➡️目標:${data[j].dateStr}(未開)`);
                                    }
                                    break;
                                }
                            }
                        }
                    }

                    if (total >= 5) { 
                        allGeneratedRules.push({
                            baseWd: baseWd,
                            targetWd: targetWd,
                            baseStr: `星期${weekdays[baseWd]} 的 ${sources[srcIdx]}`,
                            targetStr: `下個 星期${weekdays[targetWd]}`,
                            hits: hits,
                            total: total,
                            winRate: hits / total,
                            misses: missDetails.slice(-2).join("<br>") 
                        });
                    }
                }
            }
        }

        document.getElementById('statusMsg').textContent = `✅ 分析完成！共掃描 ${data.length} 期數據，計算出 ${allGeneratedRules.length} 種潛在規律組合。`;
        
        // 3. 渲染表格
        renderTable();
    }

    function renderTable() {
        if (allGeneratedRules.length === 0) return;

        // 取得當前篩選條件
        const filterBase = document.getElementById('filterBase').value;
        const filterTarget = document.getElementById('filterTarget').value;
        const minWinRate = parseFloat(document.getElementById('minWinRate').value) / 100;

        // 過濾資料
        let filteredRules = allGeneratedRules.filter(r => {
            let passBase = (filterBase === 'all') || (r.baseWd === parseInt(filterBase));
            let passTarget = (filterTarget === 'all') || (r.targetWd === parseInt(filterTarget));
            let passRate = r.winRate >= minWinRate;
            return passBase && passTarget && passRate;
        });

        // 排序：勝率優先，總樣本數次之
        filteredRules.sort((a, b) => b.winRate - a.winRate || b.total - a.total);

        const resultsArea = document.getElementById('resultsArea');

        if (filteredRules.length === 0) {
            resultsArea.innerHTML = `<h3 style="text-align:center; color: #e74c3c;">在此篩選條件下，找不到符合的規律。</h3>`;
            return;
        }

        // 建立表格 HTML
        let html = `<h3>篩選結果：共 ${filteredRules.length} 條符合條件的規律</h3>`;
        html += `<table>
            <thead>
                <tr>
                    <th>找出規律 (基準)</th>
                    <th>預測目標 (驗證)</th>
                    <th>命中次數</th>
                    <th>總樣本數</th>
                    <th>歷史勝率</th>
                    <th>近期斷龍紀錄 (參考)</th>
                </tr>
            </thead>
            <tbody>`;

        filteredRules.forEach(r => {
            const rateStr = (r.winRate * 100).toFixed(1) + '%';
            html += `<tr>
                <td><strong>${r.baseStr}</strong></td>
                <td><strong>${r.targetStr}</strong></td>
                <td><span class="highlight">${r.hits}</span></td>
                <td>${r.total}</td>
                <td><span class="highlight">${rateStr}</span></td>
                <td style="font-size: 12px; color: #7f8c8d; text-align: left;">${r.misses || '無斷龍，全中！'}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        resultsArea.innerHTML = html;
    }
</script>

</body>
</html>
