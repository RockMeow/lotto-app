<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三期牌 / 週牌 (歷史狀態固定版)</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* =========================================
           現代化 UI 變數與亮色模式
           ========================================= */
        :root {
            --bg-color: #f1f5f9; 
            --container-bg: #ffffff;
            --text-color: #334155;
            --heading-color: #2563eb;
            --section-bg: #ffffff;
            --section-border: #e2e8f0;
            --card-bg: #f8fafc;
            --card-border: #e2e8f0;
            --th-bg: #f8fafc;
            --td-border: #e2e8f0;
            --tr-even: #ffffff;
            --tr-hover: #f1f5f9;
            --notice-bg: #fffbeb;
            --notice-border: #f59e0b;
            --notice-text: #92400e;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --ball-bg: linear-gradient(135deg, #3b82f6, #1d4ed8);
            --ball-text: #ffffff;
            --ball-shadow: rgba(37, 99, 235, 0.3);
            --high-rate-color: #ef4444; 
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* =========================================
           深色模式設定
           ========================================= */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #e2e8f0;
            --heading-color: #60a5fa;
            --section-bg: #1e293b;
            --section-border: #334155;
            --card-bg: #0f172a;
            --card-border: #334155;
            --th-bg: #0f172a;
            --td-border: #334155;
            --tr-even: #1e293b;
            --tr-hover: #334155;
            --notice-bg: #451a03;
            --notice-border: #d97706;
            --notice-text: #fde68a;
            --input-bg: #0f172a;
            --input-border: #475569;
            --ball-bg: linear-gradient(135deg, #60a5fa, #2563eb);
            --ball-shadow: rgba(96, 165, 250, 0.2);
            --high-rate-color: #f87171; 
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            line-height: 1.6; padding: 20px 10px; background-color: var(--bg-color); color: var(--text-color); margin: 0;
            -webkit-font-smoothing: antialiased; transition: background-color 0.3s, color 0.3s;
        }
        
        .container { 
            max-width: 1000px; margin: auto; background: var(--container-bg); padding: 40px; border-radius: 24px; 
            box-shadow: var(--shadow-lg); transition: background-color 0.3s; position: relative;
        }
        
        h1 { color: var(--heading-color); text-align: center; margin-top: 10px; margin-bottom: 35px; font-size: 2em; font-weight: 800; letter-spacing: -0.5px; }

        .theme-toggle {
            position: absolute; top: 25px; right: 25px; background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 50%; width: 44px; height: 44px; font-size: 1.2em; cursor: pointer; color: var(--text-color);
            display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s;
        }
        .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .section { background: var(--section-bg); border: 1px solid var(--section-border); padding: 25px; border-radius: 16px; margin-bottom: 24px; box-shadow: var(--shadow-sm); transition: background-color 0.3s, border-color 0.3s; }
        .section-title { font-weight: 700; font-size: 1.25em; margin-bottom: 20px; color: var(--text-color); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 6px; height: 20px; background: var(--heading-color); margin-right: 12px; border-radius: 6px; }

        .notice { background: var(--notice-bg); padding: 20px 25px; border-left: 6px solid var(--notice-border); border-radius: 12px; margin-bottom: 25px; font-size: 0.95em; color: var(--notice-text); box-shadow: var(--shadow-sm); transition: background-color 0.3s; }

        .analysis-content { color: var(--text-color); line-height: 1.8; }

        .control-group { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; }
        #gameTypeRow, #manualUploadRow { display: none !important; }
        
        select { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--input-border); font-size: 16px; color: var(--text-color); background-color: var(--input-bg); cursor: pointer; outline: none; box-shadow: var(--shadow-sm); transition: all 0.2s; }
        select:focus { border-color: var(--heading-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
        
        #autoLoadCsv { width: 100%; max-width: 450px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; align-items: start; }
        .stats-grid.single-card { grid-template-columns: 1fr; max-width: 600px; margin: 0 auto 24px auto; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 25px 20px; border-radius: 16px; text-align: center; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .stat-value { font-size: 2.2em; font-weight: 800; color: var(--heading-color); margin: 8px 0; letter-spacing: -1px; }
        .stat-label { font-size: 1em; font-weight: 700; opacity: 0.8; }
        .detailed-stats { margin-top: 15px; font-size: 0.9em; text-align: left; border-top: 1px dashed var(--card-border); padding-top: 12px; display: grid; grid-template-columns: 1fr; gap: 8px; }
        .detailed-stats-row { display: flex; justify-content: space-between; align-items: center; }
        .detailed-stats-row .type-name { color: var(--text-color); font-weight: 500; }
        .detailed-stats-row .type-rate { font-weight: 700; color: var(--heading-color); }
        .detailed-stats-row .type-rate.high-rate { color: var(--high-rate-color); }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; border: 1px solid var(--td-border); box-shadow: var(--shadow-sm); }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; min-width: 550px; }
        th, td { border-bottom: 1px solid var(--td-border); padding: 16px 12px; text-align: center; }
        th { background-color: var(--th-bg); color: var(--text-color); font-weight: 700; white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: var(--tr-even); }
        tr:hover { background-color: var(--tr-hover); }
        
        .status-active { color: #1d4ed8; font-weight: 600; background: #dbeafe; border-radius: 20px; padding: 6px 14px; display: inline-block; font-size: 0.9em;}
        .status-hit { color: #166534; font-weight: 600; background: #dcfce7; border-radius: 20px; padding: 6px 14px; display: inline-block; font-size: 0.9em;}
        .status-miss { color: #b91c1c; font-weight: 600; background: #fee2e2; border-radius: 20px; padding: 6px 14px; display: inline-block; font-size: 0.9em;}
        
        [data-theme="dark"] .status-active { background: rgba(37,99,235,0.2); color: #93c5fd; }
        [data-theme="dark"] .status-hit { background: rgba(22,101,52,0.3); color: #86efac; }
        [data-theme="dark"] .status-miss { background: rgba(185,28,28,0.2); color: #fca5a5; }

        .info-text { font-size: 0.85em; opacity: 0.7; margin-top: 8px; }
        .history-container { max-height: 500px; overflow-y: auto; }
        
        .ball-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .lottery-ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--ball-bg); color: var(--ball-text);
            font-weight: 700; font-size: 14px;
            box-shadow: 0 3px 6px var(--ball-shadow); text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .lottery-ball.target-ball { background: linear-gradient(135deg, #f87171, #dc2626); box-shadow: 0 3px 6px rgba(220, 38, 38, 0.3); }
        
        /* 光芒樣式 */
        .lottery-ball.three-period-tip { border: 2px solid #fbbf24; box-shadow: 0 0 12px #fbbf24; background: linear-gradient(135deg, #f59e0b, #d97706); }
        .lottery-ball.weekly-tip { border: 2px solid #4ade80; box-shadow: 0 0 12px #4ade80; background: linear-gradient(135deg, #22c55e, #15803d); }
        .lottery-ball.overheat-tip { border: 2px solid #ef4444; box-shadow: 0 0 12px #ef4444; background: linear-gradient(135deg, #7f1d1d, #450a0a); color: #fca5a5; }
        .lottery-ball.three-period-super { border: 2px solid #fef08a; box-shadow: 0 0 15px #facc15; background: linear-gradient(135deg, #ef4444, #991b1b); color: #ffffff; }
        .lottery-ball.three-period-dead { border: 2px solid #9ca3af; box-shadow: 0 0 10px #6b7280; background: linear-gradient(135deg, #4b5563, #1f2937); color: #d1d5db; }

        .heatmap-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .heatmap-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .heatmap-box {
            position: relative; display: inline-flex; align-items: center; justify-content: center;
            width: 42px; height: 42px; border-radius: 12px; font-weight: 700; font-size: 15px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .heatmap-box:hover { transform: scale(1.1); z-index: 2; box-shadow: var(--shadow-md); }
        .heatmap-badge {
            position: absolute; top: -8px; right: -8px; background: #111; color: #fff;
            font-size: 10px; font-weight: bold; border-radius: 50%; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border: 2px solid var(--section-bg); box-shadow: var(--shadow-sm);
        }
        .omission-text { font-size: 11px; font-weight: 600; opacity: 0.8; }
        .omission-warn { color: #ef4444; font-weight: 800; }

        @media (max-width: 768px) {
            .container { padding: 25px 20px; }
            h1 { font-size: 1.6em; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <h1>三期牌 / 週牌 (歷史狀態固定版)</h1>

    <div class="notice">
        <strong>提示：</strong>歷史紀錄中的顏色已與「當期狀態」凍結，確保分析準確性。<br>
        <span style="color: #ef4444; font-weight: bold;">🔥 焰紅：</span> 神球 | <span style="color: #6b7280; font-weight: bold;">💀 灰黑：</span> 死區 | <span style="color: #22c55e; font-weight: bold;">☘️ 綠色：</span> 最佳熱號 | <span style="color: #dc2626; font-weight: bold;">🚫 暗紅：</span> 陷阱
    </div>

    <div class="section" id="analysisSection" style="display:none; border-color: var(--heading-color);">
        <div class="section-title">📊 實戰動態分析 (即時更新)</div>
        <div id="dynamicAnalysis" class="analysis-content"></div>
    </div>

    <div id="statsGrid" class="stats-grid">
        <div class="stat-card" id="threePeriodCard">
            <div class="stat-label">三期牌 總命中率</div>
            <div id="threePeriodRate" class="stat-value">0%</div>
            <div id="threePeriodDetail" class="info-text">已結束: 0 | 命中: 0</div>
            <div id="threePeriodBreakdown" class="detailed-stats"></div>
        </div>
        <div class="stat-card" id="weeklyCard">
            <div class="stat-label">週牌 總命中率</div>
            <div id="weeklyRate" class="stat-value">0%</div>
            <div id="weeklyDetail" class="info-text">已結束: 0 | 命中: 0</div>
            <div id="weeklyBreakdown" class="detailed-stats"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">開獎數據載入</div>
        <div class="control-group" id="gameTypeRow">
            <select id="gameType">
                <option value="mark6">🇭🇰 香港 六合彩</option>
                <option value="649">🇹🇼 台灣 大樂透</option>
                <option value="539">🇹🇼 台灣 今彩 539</option>
                <option value="daily4">🇺🇸 加州 天天樂</option>
                <option value="ghana">🇬🇭 非洲 迦納彩</option>
            </select>
        </div>
        <div class="control-group">
            <select id="autoLoadCsv">
                <option value="">-- 請選擇歷史紀錄 --</option>
                <option value="Six_history_2026.csv">🇭🇰 香港 六合彩</option>
                <option value="649_history_2026.csv">🇹🇼 台灣 大樂透</option>
                <option value="539_history_2026.csv">🇹🇼 台灣 今彩 539</option>
                <option value="Fan_history_2026.csv">🇺🇸 加州 天天樂</option>
                <option value="Ghana_history_2026.csv">🇬🇭 非洲 迦納彩</option>
            </select>
        </div>
    </div>

    <div class="section">
        <div class="section-title">近 10 期熱門號與遺漏期分佈</div>
        <div id="heatmapContainer" class="heatmap-container"></div>
    </div>

    <div class="section">
        <div class="section-title">當前追蹤中的牌組 (中一即停)</div>
        <div class="table-responsive">
            <table id="activeTable">
                <thead><tr><th>類型</th><th>目標號碼</th><th>起始日期</th><th>剩餘期數</th><th>狀態</th></tr></thead>
                <tbody id="activeBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <div class="section-title">完整歷史命中紀錄</div>
        <div class="history-container table-responsive">
            <table id="historyTable">
                <thead><tr><th>起始日期</th><th>類型</th><th>目標號碼</th><th>結果</th><th>命中詳情</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let allRecords = []; 
    let currentHistoryData = [];

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const btn = document.querySelector('.theme-toggle');
        if (currentTheme === 'dark') {
            body.removeAttribute('data-theme');
            btn.textContent = '🌙';
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.textContent = '☀️';
        }
    }

    // 取得歷史中某一時刻的遺漏值
    function getOmissionAtMoment(num, historySlice) {
        let omission = 0;
        for (let i = historySlice.length - 1; i >= 0; i--) {
            if (historySlice[i].nums.includes(num)) return omission;
            omission++;
        }
        return omission;
    }

    // 取得歷史中某一時刻的頻率
    function getFreqAtMoment(num, historySlice) {
        let startIdx = Math.max(0, historySlice.length - 10);
        let count = 0;
        for (let i = startIdx; i < historySlice.length; i++) {
            if (historySlice[i].nums.includes(num)) count++;
        }
        return count;
    }

    // 取得歷史中某一時刻的尾數熱度
    function getTailFreqAtMoment(tail, historySlice) {
        let startIdx = Math.max(0, historySlice.length - 10);
        let count = 0;
        for (let i = startIdx; i < historySlice.length; i++) {
            historySlice[i].nums.forEach(n => { if (n % 10 === tail) count++; });
        }
        return count;
    }

    // 取得歷史中某一時刻的連莊數
    function getRepeatersAtMoment(historySlice) {
        if (historySlice.length < 2) return 0;
        let latest = historySlice[historySlice.length - 1].nums;
        let prev = historySlice[historySlice.length - 2].nums;
        return latest.filter(n => prev.includes(n)).length;
    }

    // 格式化球體，根據當時的狀態凍結顏色
    function formatBallsMoment(numsArray, typeName, historySlice) {
        const gameType = document.getElementById('gameType').value;
        const isThreePeriod = typeName.includes('三期');
        const isWeekly = typeName.includes('週牌');
        
        let ballsHtml = numsArray.map(n => {
            let numVal = Number(n);
            let carTipClass = "";
            
            // 重要：此處判斷完全基於 historySlice (即生成訊號那一刻的數據)
            if (historySlice.length > 0) {
                let currentOmi = getOmissionAtMoment(numVal, historySlice);
                let repeaters = getRepeatersAtMoment(historySlice);
                let tailFreq = getTailFreqAtMoment(numVal % 10, historySlice);
                let freq = getFreqAtMoment(numVal, historySlice);

                if (isThreePeriod) {
                    if (gameType === 'daily4' && [8,9,10,11].includes(currentOmi)) {
                        if (repeaters >= 1 && tailFreq <= 2) carTipClass = " three-period-dead";
                        else if (repeaters === 0 || [4, 6, 7].includes(tailFreq)) carTipClass = " three-period-super";
                        else carTipClass = " three-period-tip";
                    } else if (gameType === '539' && [8,9,11,15].includes(currentOmi)) {
                        if (repeaters >= 2 || [2,3].includes(tailFreq) || tailFreq >= 9) carTipClass = " three-period-dead";
                        else if (tailFreq <= 1 || [6,7,8].includes(tailFreq)) carTipClass = " three-period-super";
                        else carTipClass = " three-period-tip";
                    } else if (gameType === 'ghana' && [2,3,13,15].includes(currentOmi)) {
                        if (repeaters === 2 || tailFreq === 3 || tailFreq >= 9) carTipClass = " three-period-dead";
                        else if (tailFreq === 2 || repeaters === 1 || repeaters >= 3) carTipClass = " three-period-super";
                        else carTipClass = " three-period-tip";
                    }
                } else if (isWeekly) {
                    let isTargetOmi = false;
                    if (['daily4','ghana'].includes(gameType) && [0,1,2].includes(currentOmi)) isTargetOmi = true;
                    else if (gameType === '539' && [0,1].includes(currentOmi)) isTargetOmi = true;
                    
                    if (isTargetOmi) {
                        if (gameType === 'daily4') {
                            carTipClass = (freq === 3) ? " overheat-tip" : " weekly-tip";
                        } else {
                            carTipClass = (freq >= 4) ? " overheat-tip" : " weekly-tip";
                        }
                    }
                }
            }
            return `<span class="lottery-ball target-ball${carTipClass}">${numVal.toString().padStart(2, '0')}</span>`;
        }).join('');
        return `<div class="ball-container">${ballsHtml}</div>`;
    }

    function processCSV(text) {
        const lines = text.trim().split('\n');
        currentHistoryData = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if(cols.length >= 6) {
                let nums = [];
                for(let c=1; c<cols.length; c++) {
                    let val = parseInt(cols[c]);
                    if(!isNaN(val)) nums.push(val);
                }
                currentHistoryData.push({ date: cols[0].trim(), nums: nums });
            }
        }
        recalculateAll();
    }

    function recalculateAll() {
        allRecords = [];
        const gameType = document.getElementById('gameType').value;
        const weeklyCard = document.getElementById('weeklyCard');
        document.getElementById('statsGrid').classList.toggle('single-card', ['649','mark6'].includes(gameType));
        weeklyCard.style.display = ['649','mark6'].includes(gameType) ? 'none' : 'block';

        for(let i = 0; i < currentHistoryData.length; i++) {
            const draw = currentHistoryData[i];
            allRecords.forEach(target => {
                if(target.status === '進行中') {
                    const hits = target.targets.filter(n => draw.nums.includes(Number(n)));
                    if(hits.length > 0) {
                        target.status = '命中停止';
                        target.hitInfo = `${draw.date} 開出 ${formatBallsMoment(hits, target.type, [])}`;
                    } else {
                        target.life--;
                        if(target.life <= 0) { target.status = '未中結束'; target.hitInfo = '-'; }
                    }
                }
            });
            generateTargets(i);
        }
        renderTables(); renderHeatmap(); updateDynamicAnalysis(); 
    }

    function generateTargets(drawIndex) {
        let historySlice = currentHistoryData.slice(0, drawIndex + 1);
        let draw = currentHistoryData[drawIndex];
        let date = draw.date;
        const gameType = document.getElementById('gameType').value;
        let mainNums = draw.nums.slice(0, 5).sort((a,b)=>a-b);

        // 三期牌生成
        for(let i=0; i<mainNums.length-1; i++) {
            let diff = mainNums[i+1] - mainNums[i];
            if (['539','daily4','ghana'].includes(gameType)) {
                let t = null;
                if(diff === 4) t = { type: '三期牌 (3連號)', targets: [mainNums[i]+1, mainNums[i]+2, mainNums[i]+3] };
                else if(diff === 5) t = { type: '三期牌 (4連號)', targets: [mainNums[i]+1, mainNums[i]+2, mainNums[i]+3, mainNums[i]+4] };
                else if(diff === 6) t = { type: '三期牌 (5連號)', targets: [mainNums[i]+1, mainNums[i]+2, mainNums[i]+3, mainNums[i]+4, mainNums[i]+5] };
                if(t) allRecords.push({ ...t, startDate: date, life: 3, status: '進行中', momentData: [...historySlice] });
            }
        }
        const tc = {}; mainNums.map(n => n % 10).forEach(t => tc[t] = (tc[t] || 0) + 1);
        for(let t in tc) {
            if(tc[t] >= (gameType==='539'?3:2)) {
                allRecords.push({ type: `三期牌 (${tc[t]}同尾)`, targets: mainNums.filter(n => n % 10 == t), startDate: date, life: 3, status: '進行中', momentData: [...historySlice] });
            }
        }

        // 週牌生成
        const day = new Date("2026/" + date).getDay();
        if ((gameType === 'daily4' && day === 0) || (['539','ghana'].includes(gameType) && day === 6)) {
            let fq = {}; historySlice.slice(-10).forEach(d => d.nums.forEach(n => fq[n] = (fq[n] || 0) + 1));
            let sorted = Object.keys(fq).map(Number).sort((a, b) => fq[b] !== fq[a] ? fq[b] - fq[a] : a - b);
            let top6 = sorted.slice(0, 6);
            for(let k=0; k<3; k++) {
                allRecords.push({ type: `週牌 (第${k+1}組)`, targets: [top6[k*2], top6[k*2+1]], startDate: date, life: 6, status: '進行中', momentData: [...historySlice] });
            }
        }
    }

    function renderTables() {
        const activeBody = document.getElementById('activeBody');
        const historyBody = document.getElementById('historyBody');
        activeBody.innerHTML = ''; historyBody.innerHTML = '';
        let tTotal = 0, tHits = 0, wTotal = 0, wHits = 0, typeStats = {};

        [...allRecords].reverse().forEach(t => {
            const isThree = t.type.includes('三期');
            const isWeekly = t.type.includes('週牌');
            if(t.status !== '進行中') {
                if (!typeStats[t.type]) typeStats[t.type] = { total: 0, hits: 0 };
                typeStats[t.type].total++;
                if(isThree) { tTotal++; if(t.status === '命中停止') { tHits++; typeStats[t.type].hits++; } }
                else if(isWeekly) { wTotal++; if(t.status === '命中停止') { wHits++; typeStats[t.type].hits++; } }
            }

            const sClass = t.status === '進行中' ? 'status-active' : (t.status === '命中停止' ? 'status-hit' : 'status-miss');
            // 此處使用 momentData 渲染球體顏色，這保證了顏色永遠是產生時的狀態
            const ballsHtml = formatBallsMoment(t.targets, t.type, t.momentData || []);
            
            if(t.status === '進行中') {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${t.type}</td><td>${ballsHtml}</td><td>${t.startDate}</td><td>${t.life}</td><td><span class="${sClass}">${t.status}</span></td>`;
                activeBody.appendChild(tr);
            } else {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${t.startDate}</td><td>${t.type}</td><td>${ballsHtml}</td><td><span class="${sClass}">${t.status}</span></td><td>${t.hitInfo || '-'}</td>`;
                historyBody.appendChild(tr);
            }
        });
        
        document.getElementById('threePeriodRate').innerText = tTotal > 0 ? ((tHits / tTotal) * 100).toFixed(1) + '%' : '0%';
        document.getElementById('threePeriodDetail').innerText = `已結束: ${tTotal} | 命中: ${tHits}`;
        document.getElementById('weeklyRate').innerText = wTotal > 0 ? ((wHits / wTotal) * 100).toFixed(1) + '%' : '0%';
        document.getElementById('weeklyDetail').innerText = `已結束: ${wTotal} | 命中: ${wHits}`;
    }

    // (其餘 renderHeatmap, updateDynamicAnalysis 與前版本相同，維持核心邏輯)
    function renderHeatmap() {
        const container = document.getElementById('heatmapContainer'); container.innerHTML = '';
        if(currentHistoryData.length === 0) return;
        const gameType = document.getElementById('gameType').value;
        const maxNum = (gameType === '649' || gameType === 'mark6') ? 49 : 39;
        const recentDraws = currentHistoryData.slice(-10);
        const freq = {};
        for(let i=1; i<=maxNum; i++) freq[i] = 0;
        recentDraws.forEach(draw => { draw.nums.forEach(n => { if(n >= 1 && n <= maxNum) freq[n]++; }); });
        for(let i=1; i<=maxNum; i++) {
            let count = freq[i];
            let omission = 0;
            for (let j = currentHistoryData.length - 1; j >= 0; j--) {
                if (currentHistoryData[j].nums.includes(i)) break;
                omission++;
            }
            let item = document.createElement('div'); item.className = 'heatmap-item';
            let box = document.createElement('div'); box.className = 'heatmap-box';
            if(count === 0) { box.style.background = 'var(--th-bg)'; box.style.opacity = '0.5'; } 
            else if(count === 1) { box.style.background = 'linear-gradient(135deg, #4ade80, #16a34a)'; } 
            else if(count === 2) { box.style.background = 'linear-gradient(135deg, #fbbf24, #d97706)'; } 
            else { box.style.background = 'linear-gradient(135deg, #f87171, #dc2626)'; }
            box.style.color = count > 0 ? '#fff' : 'inherit';
            box.innerHTML = i.toString().padStart(2, '0');
            if(count > 0) { let badge = document.createElement('span'); badge.className = 'heatmap-badge'; badge.innerHTML = count; box.appendChild(badge); }
            let omiText = document.createElement('span'); omiText.className = 'omission-text' + (omission >= 20 ? ' omission-warn' : ''); omiText.innerHTML = `漏${omission}`;
            item.appendChild(box); item.appendChild(omiText); container.appendChild(item);
        }
    }

    function updateDynamicAnalysis() {
        const analysisSection = document.getElementById('analysisSection');
        const dynamicAnalysis = document.getElementById('dynamicAnalysis');
        if(!currentHistoryData || currentHistoryData.length < 5) return;
        analysisSection.style.display = 'block';
        const gameType = document.getElementById('gameType').value;
        const maxNum = (gameType === '649' || gameType === 'mark6') ? 49 : 39;
        
        let hungryBalls = [];
        for(let i=1; i<=maxNum; i++) {
            let omission = 0;
            for (let j = currentHistoryData.length - 1; j >= 0; j--) {
                if (currentHistoryData[j].nums.includes(i)) break;
                omission++;
            }
            if(gameType === 'daily4' && omission >= 12 && omission <= 16) hungryBalls.push(i);
            if(gameType === '539' && omission >= 16 && omission <= 19) hungryBalls.push(i);
            if(gameType === 'ghana' && omission >= 16 && omission <= 18) hungryBalls.push(i);
        }
        
        const latest = currentHistoryData[currentHistoryData.length-1];
        const prev = currentHistoryData[currentHistoryData.length-2];
        const repCount = latest.nums.filter(n => prev.nums.includes(n)).length;

        let advice = (repCount >= 2) ? "💀 <b style='color:#ef4444;'>絕對死區</b>：連莊壓制中，冷號勝率極低。" : "🔥 <b style='color:#22c55e;'>動能充沛</b>：目前盤面適合狙擊焰紅神球。";
        
        dynamicAnalysis.innerHTML = `
            <div style="background: var(--card-bg); border: 1px solid var(--card-border); padding: 18px; border-radius: 12px;">
                <div style="margin-bottom: 10px;">${advice}</div>
                <div><strong>🚀 深冷潛力球：</strong> ${hungryBalls.length > 0 ? hungryBalls.map(n => `<span style="color:#ef4444; font-weight:bold;">${n.toString().padStart(2, '0')}</span>`).join(', ') : '能量累積中'}</div>
            </div>`;
    }

    document.getElementById('autoLoadCsv').addEventListener('change', function(e) {
        const fileName = e.target.value; if (!fileName) return;
        fetch(fileName).then(res => res.text()).then(text => { processCSV(text); });
    });

    document.getElementById('gameType').addEventListener('change', function() { if(currentHistoryData.length > 0) recalculateAll(); });
</script>
</body>
