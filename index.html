<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>版路回測與預測系統</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="版路工具">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-active: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --warning: #b45309;
            --warning-bg: #fffbeb;
            --warning-border: #fde68a;
            --success: #15803d;
            --success-bg: #dcfce7;
            --header-bg: rgba(255, 255, 255, 0.85);
            --select-bg: #f8fafc;
            --toggle-bg: #f1f5f9;
        }

        /* 🌙 深色模式變數 */
        [data-theme="dark"] {
            --primary: #60a5fa;
            --primary-active: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #f87171;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --warning: #fbbf24;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --warning-border: #92400e;
            --success: #4ade80;
            --success-bg: rgba(34, 197, 94, 0.15);
            --header-bg: rgba(30, 41, 59, 0.85);
            --select-bg: #0f172a;
            --toggle-bg: #0f172a;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .app-container { 
            max-width: 480px; 
            margin: 0 auto; 
            background-color: var(--bg); 
            min-height: 100vh; 
            padding-bottom: 80px; 
            transition: background-color 0.3s ease;
        }

        .app-header { 
            background: var(--header-bg); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            padding: 18px 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid var(--border);
            display: grid; 
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        
        .app-header h1 { 
            margin: 0; 
            font-size: 18px; 
            color: var(--text-main); 
            font-weight: 800; 
            letter-spacing: 0.5px; 
            grid-column: 2;
            text-align: center;
            white-space: nowrap;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            transition: transform 0.2s;
            color: var(--text-main);
            justify-self: end;
        }
        .theme-toggle:active { transform: scale(0.8); }

        .content { padding: 16px; }

        .control-panel, .pred-block { 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 24px 20px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 20px; 
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .pred-title { 
            color: var(--primary); 
            font-size: 18px; 
            font-weight: 900; 
            margin-bottom: 20px; 
            padding-bottom: 16px; 
            border-bottom: 1.5px solid var(--border); 
            text-align: center;
        }

        /* 下拉選單樣式 */
        select { 
            width: 100%; 
            appearance: none; 
            -webkit-appearance: none; 
            background-color: var(--select-bg); 
            border: 1.5px solid var(--border); 
            padding: 16px 20px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 600;
            color: var(--text-main); 
            box-sizing: border-box; 
            transition: all 0.2s ease; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; 
            background-position: right 16px center; 
            background-size: 18px; 
            padding-right: 44px; 
            margin-bottom: 20px;
        }
        select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .setting-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 14px; 
        }
        
        .setting-row label, .detail-title { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-main); 
            margin: 0; 
        }

        .styled-input {
            width: 100px; 
            background-color: var(--select-bg); 
            border: 1.5px solid var(--border); 
            padding: 10px 14px; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 700;
            color: var(--text-main); 
            box-sizing: border-box; 
            text-align: right;
            transition: all 0.2s ease;
        }
        .styled-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        button.start-btn { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-active) 100%); 
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 16px; 
            font-weight: 800; 
            border-radius: 100px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 10px; 
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); 
            transition: transform 0.15s, box-shadow 0.15s; 
        }
        button.start-btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        button.start-btn:disabled { background: var(--border); box-shadow: none; color: var(--text-muted); cursor: not-allowed; }

        .loading-text { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 15px; 
            line-height: 1.6; 
            padding: 40px 20px; 
            background: var(--card-bg); 
            border-radius: 24px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); 
            font-weight: 600;
        }

        .detail-item { border-bottom: 1.5px dashed var(--border); padding-bottom: 16px; margin-bottom: 16px; line-height: 1.7; }
        .detail-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .history-card {
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 12px; 
            border: 1.5px solid var(--border); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .history-card-header {
            display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1.5px dashed var(--border); padding-bottom: 10px;
        }
        .history-card-date { color: var(--text-main); font-size: 16px; font-weight: 800; }
        .history-card-body { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
        .history-card-row { display: flex; justify-content: space-between; align-items: center; }
        .pool-nums { color: var(--text-main); font-weight: 700; letter-spacing: 0.5px; word-break: break-all; }
        
        .profit { color: var(--success); font-weight: 800; }
        .loss { color: var(--danger); font-weight: 800; }
        .neutral { color: var(--text-muted); font-weight: 700; }

        .cycle-badge { background: var(--primary); color: white; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 800; margin-right: 6px; }
        .mult-badge { background: var(--warning); color: white; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 800; }
        .action-box { background: var(--toggle-bg); padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; line-height: 1.5; border-left: 4px solid var(--border); }

        /* 新增：陣列顯示專用樣式 */
        .matrix-list {
            background: var(--toggle-bg);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.8;
            color: var(--text-main);
            overflow-x: auto;
            white-space: nowrap;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        /* 📱 底部導航列 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
            background: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border); display: flex; justify-content: space-around;
            padding: 10px 0 20px 0; z-index: 1000; transition: background 0.3s ease, border-color 0.3s ease;
        }
        .nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 800; padding: 10px; transition: color 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>版路回測與預測系統</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>
        </header>

        <div class="content">
            <div class="control-panel">
                <div class="pred-title" style="border:none; padding:0; margin-bottom:15px; color: var(--text-main);">選擇彩券與版路</div>
                
                <label style="font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; display: block;">選擇彩券類型</label>
                <select id="csvSource" onchange="fetchCSV()">
                    <option value="./539_history_all_sorted.csv" selected>今彩539</option>
                </select>

                <label style="font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 8px; display: block;">版路功能</label>
                <select id="logicType" onchange="toggleLogicUI(); runBacktest();" style="border-color: var(--primary);">
                    <option value="pool9">九碼 (二/三星連碰)</option>
                    <option value="matrix10" selected>十組 4x4 (二星柱碰)</option>
                </select>

                <div class="setting-row">
                    <label>二星每碰本金 (元)</label>
                    <input type="number" id="cost2" value="5" class="styled-input">
                </div>
                <div class="setting-row" id="row-cost3" style="display: none;">
                    <label>三星每碰本金 (元)</label>
                    <input type="number" id="cost3" value="1" class="styled-input">
                </div>
                <div class="setting-row">
                    <label>退水比例 (%)</label>
                    <input type="number" id="rebate" step="0.01" value="21.8" class="styled-input">
                </div>
                <div class="setting-row">
                    <label>二星賠率 (倍)</label>
                    <input type="number" id="odds2" value="53" class="styled-input">
                </div>
                <div class="setting-row" id="row-odds3" style="display: none;">
                    <label>三星賠率 (倍)</label>
                    <input type="number" id="odds3" value="570" class="styled-input">
                </div>
                <div class="setting-row" id="row-multStep">
                    <label style="color: var(--danger);">失效時倍數增加級距</label>
                    <input type="number" id="multStep" value="1" class="styled-input" style="border-color: var(--danger);">
                </div>
                
                <button id="runBtn" class="start-btn" onclick="runBacktest()">重新計算回測</button>
            </div>

            <div class="pred-block" style="background: var(--warning-bg); border: 1.5px solid var(--warning-border);">
                <div class="pred-title" style="color: var(--warning); border-bottom-color: var(--warning-border);">今日預測與下注清單</div>
                
                <div class="setting-row">
                    <label style="color: var(--warning); font-size: 15px;">欲推算日期 (自動讀取)</label>
                    <input type="text" id="predict-date" value="" placeholder="MM/DD" class="styled-input" style="width: 100px; text-align: center; border-color: var(--warning-border); color: var(--warning);">
                </div>
                <button class="start-btn" style="background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%); margin-bottom: 20px;" onclick="showPrediction()">產生今日預測</button>
                
                <div id="pool9-pred-ui" style="display: none;">
                    <div class="detail-item">
                        <div class="detail-title" style="color: var(--warning);">當日獨立版路 (推算)</div>
                        <div id="pred-result" style="color: var(--danger); font-weight: 900; font-size: 18px; text-align: center; letter-spacing: 2px;">--</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-title" style="color: var(--warning);">今日下注號碼池 (含未開出)</div>
                        <div id="next-pool" style="color: var(--danger); font-size: 20px; font-weight: 900; letter-spacing: 2px; text-align: center; word-break: break-all;">--</div>
                    </div>
                    <div class="setting-row" style="margin-bottom: 8px;">
                        <span class="detail-title" style="margin:0; color: var(--warning);">總計碰數 (二 / 三)</span>
                        <span id="next-combos" style="font-weight: 800; color: var(--text-main); font-size: 16px;">--</span>
                    </div>
                </div>

                <div id="matrix10-pred-ui">
                    <div class="setting-row" style="margin-top: 5px;">
                        <span class="detail-title" style="margin:0; color: var(--warning);">目前循環狀態</span>
                        <span id="pred-cycle-status" style="font-weight: 900; color: var(--danger); font-size: 16px;">--</span>
                    </div>
                    <div class="detail-item" style="border-bottom:none;">
                        <div class="detail-title" style="color: var(--warning);">今日 4x4 下注組合名單</div>
                        <div id="matrix-display" class="matrix-list">
                            -- <br> 等待產生...
                        </div>
                    </div>
                    <div class="setting-row" style="margin-bottom: 8px;">
                        <span class="detail-title" style="margin:0; color: var(--warning);">當前剩餘組數 / 碰數</span>
                        <span id="pred-remaining-groups" style="font-weight: 800; color: var(--text-main); font-size: 16px;">--</span>
                    </div>
                </div>

                <div class="setting-row" style="margin-bottom: 0; margin-top: 10px; border-top: 1px dashed var(--warning-border); padding-top: 15px;">
                    <span class="detail-title" style="margin:0; color: var(--warning);">退水後實付成本</span>
                    <span id="next-cost" class="loss" style="font-size: 18px;">--</span>
                </div>
            </div>

            <div class="pred-block">
                <div class="pred-title">歷史回測總結 (2026年)</div>
                <div class="setting-row" style="margin-bottom: 12px;">
                    <span class="detail-title" style="margin:0;">總實付成本</span>
                    <span id="summary-cost" class="loss" style="font-size: 16px;">0.0 元</span>
                </div>
                <div class="setting-row" style="margin-bottom: 12px;">
                    <span class="detail-title" style="margin:0;">總中獎金額</span>
                    <span id="summary-payout" class="profit" style="font-size: 16px;">0.0 元</span>
                </div>
                <div class="setting-row" style="padding-top: 16px; border-top: 1.5px dashed var(--border); margin-bottom: 12px;">
                    <span class="detail-title" style="margin:0; font-size: 16px;">最終淨利結算</span>
                    <span id="summary-net" style="font-size: 22px; font-weight: 900;">0.0 元</span>
                </div>
                <div class="setting-row" style="margin-bottom: 0;">
                    <span style="font-size: 13px; color: var(--text-muted); font-weight: 700;">最大連續虧損 (Max Drawdown)</span>
                    <span id="summary-drawdown" class="loss" style="font-size: 14px;">0.0 元</span>
                </div>
            </div>

            <h3 style="padding-left: 5px; color: var(--text-main); font-size: 16px; margin-top: 30px;">每日對帳單紀錄</h3>
            <div id="results-body">
                <div class="loading-text">資料載入中...</div>
            </div>

        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">⚙</span>版路回測與預測系統
        </a>
    </div>

    <script>
        // 共用歷史資料變數
        let draws = []; 

        // ---------------------------------
        // [版路 A] 累積九碼大本營連碰 全域變數
        // ---------------------------------
        let finalActiveGroups = [];

        // ---------------------------------
        // [版路 B] 10組 4x4 矩陣凹牌 全域變數
        // ---------------------------------
        const defaultMatrix = [
            {A: [11,8,36,27], B: [25,23,15,21]},
            {A: [8,11,15,21], B: [23,25,27,36]},
            {A: [8,36,4,12], B: [1,31,27,22]},
            {A: [11,1,32,34], B: [29,8,12,16]},
            {A: [1,8,11,12], B: [16,29,32,34]},
            {A: [8,32,11,12], B: [16,34,23,15]},
            {A: [8,11,12,15], B: [16,23,32,34]},
            {A: [8,36,32,12], B: [16,27,29,3]},
            {A: [3,8,12,16], B: [27,29,32,36]},
            {A: [1,4,8,12], B: [22,27,31,36]}
        ];
        let activeMatrix = [];
        let cycleDayCount = 1;
        let cycleMultiplier = 1;
        let cycleCumCost = 0;
        let cycleCumPayout = 0;

        // 主題與版面切換邏輯
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            document.getElementById('themeIcon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', newTheme);
        }

        function toggleLogicUI() {
            const logic = document.getElementById('logicType').value;
            if (logic === 'pool9') {
                document.getElementById('row-cost3').style.display = 'flex';
                document.getElementById('row-odds3').style.display = 'flex';
                document.getElementById('row-multStep').style.display = 'none';
                
                document.getElementById('pool9-pred-ui').style.display = 'block';
                document.getElementById('matrix10-pred-ui').style.display = 'none';
                document.getElementById('cost2').value = 5; // 九碼建議參數
            } else {
                document.getElementById('row-cost3').style.display = 'none';
                document.getElementById('row-odds3').style.display = 'none';
                document.getElementById('row-multStep').style.display = 'flex';
                
                document.getElementById('pool9-pred-ui').style.display = 'none';
                document.getElementById('matrix10-pred-ui').style.display = 'block';
                document.getElementById('cost2').value = 1; // 矩陣凹牌建議參數
            }
        }

        // CSV 讀取與資料清洗
        async function fetchCSV() {
            const url = document.getElementById('csvSource').value;
            const runBtn = document.getElementById('runBtn');
            const tbody = document.getElementById('results-body');

            runBtn.disabled = true;
            runBtn.textContent = '資料載入中...';
            tbody.innerHTML = '<div class="loading-text">正在抓取歷史資料，請稍候...</div>';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('檔案讀取失敗');
                const csvText = await response.text();
                
                parseCSV(csvText);
                runBtn.disabled = false;
                runBtn.textContent = '重新計算回測';
                
                runBacktest(); // 載入完畢自動回測
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<div class="loading-text" style="color:var(--danger);">檔案載入失敗！</div>`;
                runBtn.textContent = '載入失敗';
            }
        }

        function parseCSV(csvText) {
            let allDraws = [];
            const lines = csvText.trim().split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const parts = line.split(',');
                if (parts.length >= 6 && !isNaN(parseInt(parts[1], 10))) {
                    let dateStr = parts[0].trim();
                    if (dateStr.length > 5 && dateStr.includes('/')) {
                        let dParts = dateStr.split('/');
                        dateStr = dParts[dParts.length - 2].padStart(2, '0') + '/' + dParts[dParts.length - 1].padStart(2, '0');
                    }
                    let nums = parts.slice(1, 6).map(n => parseInt(n, 10));
                    allDraws.push({ date: dateStr, nums: nums });
                }
            }
            
            // 從 2026 起點 (尋找最後一個 01/01)
            let startIndex = 0;
            for (let i = allDraws.length - 1; i >= 0; i--) {
                if (allDraws[i].date === '01/01') {
                    startIndex = i;
                    break;
                }
            }
            draws = allDraws.slice(startIndex);

            // 設定推演日期
            if (draws.length > 0) {
                let lastDateStr = draws[draws.length - 1].date;
                let parts = lastDateStr.split('/');
                let currentYear = 2026; 
                let lastDate = new Date(currentYear, parseInt(parts[0], 10) - 1, parseInt(parts[1], 10));
                
                lastDate.setDate(lastDate.getDate() + 1);
                if (lastDate.getDay() === 0) lastDate.setDate(lastDate.getDate() + 1);

                let nextMonth = String(lastDate.getMonth() + 1).padStart(2, '0');
                let nextDay = String(lastDate.getDate()).padStart(2, '0');
                document.getElementById('predict-date').value = `${nextMonth}/${nextDay}`;
            }
        }

        // 數學工具函數
        function generatePrediction(dateStr) {
            let parts = dateStr.split('/');
            let d = parseInt(parts[1], 10);
            if (d - 6 > 0 && d + 6 <= 39) return [d-6, d, d+6];
            else if (d - 6 <= 0) return [d, d+6, d+12];
            else if (d + 6 > 39) return [d-12, d-6, d];
            return [d-6, d, d+6]; 
        }

        function factorial(n) {
            if (n < 0) return 0;
            if (n === 0 || n === 1) return 1;
            let r = 1;
            for(let i=2; i<=n; i++) r *= i;
            return r;
        }

        function nCr(n, r) {
            if (n < r) return 0;
            return factorial(n) / (factorial(r) * factorial(n - r));
        }

        // 選擇分支執行
        function runBacktest() {
            if (draws.length === 0) return;
            const logic = document.getElementById('logicType').value;
            if (logic === 'pool9') {
                runBacktestPool9();
            } else {
                runBacktestMatrix10();
            }
        }

        function showPrediction() {
            if (draws.length === 0) return;
            const logic = document.getElementById('logicType').value;
            if (logic === 'pool9') {
                showPredictionPool9();
            } else {
                showPredictionMatrix10();
            }
        }

        // =========================================================================
        // 版路功能 A：累積九碼大本營連碰
        // =========================================================================
        function runBacktestPool9() {
            const cost2 = parseFloat(document.getElementById('cost2').value);
            const cost3 = parseFloat(document.getElementById('cost3').value);
            const rebate = parseFloat(document.getElementById('rebate').value) / 100;
            const odds2 = parseFloat(document.getElementById('odds2').value);
            const odds3 = parseFloat(document.getElementById('odds3').value);
            
            let activeGroups = [];
            let totalActualCost = 0, totalPayout = 0, runningBalance = 0, maxDrawdown = 0;
            let weeklyCost = 0, weeklyPayout = 0;
            
            let tbody = document.getElementById('results-body');
            let cardsHtml = '';

            for (let i = 0; i < draws.length; i++) {
                let draw = draws[i];
                let dateStr = draw.date;
                let actualNumsSet = new Set(draw.nums);
                let actualNumsStr = draw.nums.map(n => n.toString().padStart(2, '0')).join(', ');
                
                let dateParts = dateStr.split('/');
                let drawDateObj = new Date(2026, parseInt(dateParts[0], 10) - 1, parseInt(dateParts[1], 10));
                let isSaturday = drawDateObj.getDay() === 6;
                let isLastDraw = (i === draws.length - 1);
                
                let newNums = generatePrediction(dateStr);
                activeGroups.push({ date: dateStr, nums: newNums, age: 0 });
                if (activeGroups.length > 3) activeGroups.shift();
                
                let poolNums = new Set();
                for (let g of activeGroups) { for (let n of g.nums) poolNums.add(n); }
                let poolArr = [...poolNums].sort((a,b) => a-b);
                let poolStr = poolArr.join(', ');
                
                let c2 = nCr(poolArr.length, 2);
                let c3 = nCr(poolArr.length, 3);
                
                let dailyNominalCost = (c2 * cost2) + (c3 * cost3);
                let dailyActualCost = dailyNominalCost * (1 - rebate);
                
                totalActualCost += dailyActualCost;
                weeklyCost += dailyActualCost;
                
                let match = poolArr.filter(x => actualNumsSet.has(x));
                let hitCount = match.length;
                let dailyPayout = 0;
                let isHit = false;
                let hitResultHtml = `<span class="neutral">槓龜</span>`;
                
                if (hitCount >= 2) {
                    isHit = true;
                    dailyPayout += nCr(hitCount, 2) * (cost2 * odds2);
                    if (hitCount >= 3) {
                        dailyPayout += nCr(hitCount, 3) * (cost3 * odds3);
                        hitResultHtml = `<span class="profit">🎯 中${hitCount}顆 (${match.join(',')})</span>`;
                    } else {
                        hitResultHtml = `<span class="profit">🎯 中2顆 (${match.join(',')})</span>`;
                    }
                }
                
                totalPayout += dailyPayout;
                weeklyPayout += dailyPayout;
                
                runningBalance += (dailyPayout - dailyActualCost);
                if (runningBalance < maxDrawdown) maxDrawdown = runningBalance;
                
                let netColor = runningBalance >= 0 ? 'profit' : 'loss';
                let dailyResultHtml = isHit ? `<span class="profit">+${dailyPayout.toFixed(1)}</span>` : `<span class="loss">-${dailyActualCost.toFixed(1)}</span>`;

                let cardHtml = `
                <div class="history-card">
                    <div class="history-card-header">
                        <span class="history-card-date">${dateStr}</span>
                        ${dailyResultHtml}
                    </div>
                    <div class="history-card-body">
                        <div class="history-card-row">
                            <span><span style="color:var(--text-main); font-weight:700;">開獎:</span> ${actualNumsStr}</span>
                            <span>成本: -${dailyActualCost.toFixed(1)}</span>
                        </div>
                        <div style="margin-top: 6px;">池: <span class="pool-nums">${poolStr}</span> <span style="font-size: 11px;">(${c2}/${c3}碰)</span></div>
                        <div class="history-card-row" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);">
                            ${hitResultHtml}
                            <span style="font-weight: 800; color: var(--text-main);">總淨利: <span class="${netColor}">${runningBalance.toFixed(1)}</span></span>
                        </div>
                    </div>
                </div>`;
                
                cardsHtml = cardHtml + cardsHtml; 
                
                if (isSaturday || isLastDraw) {
                    let weeklyNet = weeklyPayout - weeklyCost;
                    let weeklyColor = weeklyNet >= 0 ? 'profit' : 'loss';
                    let sign = weeklyNet >= 0 ? '+' : '';
                    let title = isSaturday ? '💰 每週日結算交割 (當週累計)' : '💰 結算交割 (當期未滿週累計)';
                    let settlementHtml = `
                    <div class="history-card" style="background: var(--warning-bg); border: 1.5px solid var(--warning-border); text-align: center; padding: 18px 16px; margin-bottom: 16px;">
                        <div style="color: var(--warning); font-weight: 900; font-size: 16px; letter-spacing: 1px;">${title}</div>
                        <div style="margin-top: 12px; font-size: 14px; color: var(--text-main); font-weight: 700;">
                            下注成本: <span class="loss">-${weeklyCost.toFixed(1)}</span> &nbsp;|&nbsp; 總中獎: <span class="profit">+${weeklyPayout.toFixed(1)}</span>
                        </div>
                        <div style="margin-top: 14px; font-size: 18px; font-weight: 900; border-top: 1px dashed var(--warning-border); padding-top: 14px;">
                            當週實際損益: <span class="${weeklyColor}" style="font-size: 20px;">${sign}${weeklyNet.toFixed(1)} 元</span>
                        </div>
                    </div>`;
                    cardsHtml = settlementHtml + cardsHtml;
                    weeklyCost = 0; weeklyPayout = 0;
                }

                let groupsToRemove = [];
                for (let g of activeGroups) {
                    g.age++;
                    let gMatch = g.nums.filter(x => actualNumsSet.has(x));
                    if (g.age >= 6 || gMatch.length >= 2) groupsToRemove.push(g);
                }
                activeGroups = activeGroups.filter(g => !groupsToRemove.includes(g));
            }
            
            tbody.innerHTML = cardsHtml;
            finalActiveGroups = JSON.parse(JSON.stringify(activeGroups));
            
            document.getElementById('summary-cost').innerText = `-${totalActualCost.toFixed(1)} 元`;
            document.getElementById('summary-payout').innerText = `+${totalPayout.toFixed(1)} 元`;
            let netEl = document.getElementById('summary-net');
            let netVal = totalPayout - totalActualCost;
            netEl.innerText = (netVal >= 0 ? '+' : '') + netVal.toFixed(1) + ' 元';
            netEl.className = netVal >= 0 ? 'val profit' : 'val loss';
            document.getElementById('summary-drawdown').innerText = `${maxDrawdown.toFixed(1)} 元`;
            
            showPredictionPool9();
        }

        function showPredictionPool9() {
            let dateStr = document.getElementById('predict-date').value.trim();
            if(!/^\d{2}\/\d{2}$/.test(dateStr)) { alert("請輸入正確日期格式，例如：03/18"); return; }

            let newNums = generatePrediction(dateStr);
            document.getElementById('pred-result').innerText = newNums.map(n => n.toString().padStart(2, '0')).join(', ');

            let nextGroups = JSON.parse(JSON.stringify(finalActiveGroups));
            nextGroups.push({ date: dateStr, nums: newNums, age: 0 });
            if (nextGroups.length > 3) nextGroups.shift();

            let poolNums = new Set();
            for (let g of nextGroups) { for (let n of g.nums) poolNums.add(n); }
            let poolArr = [...poolNums].sort((a,b) => a-b);
            document.getElementById('next-pool').innerText = poolArr.length > 0 ? poolArr.map(n => n.toString().padStart(2, '0')).join(', ') : '--';

            let c2 = nCr(poolArr.length, 2);
            let c3 = nCr(poolArr.length, 3);
            document.getElementById('next-combos').innerText = `${c2} / ${c3}`;

            const cost2 = parseFloat(document.getElementById('cost2').value);
            const cost3 = parseFloat(document.getElementById('cost3').value);
            const rebate = parseFloat(document.getElementById('rebate').value) / 100;
            
            let dailyNominalCost = (c2 * cost2) + (c3 * cost3);
            let dailyActualCost = dailyNominalCost * (1 - rebate);
            document.getElementById('next-cost').innerText = `-${dailyActualCost.toFixed(1)} 元`;
        }


        // =========================================================================
        // 版路功能 B：10組 4x4 矩陣凹牌 (使用固定 10 組)
        // =========================================================================
        function resetMatrixCycle() {
            activeMatrix = JSON.parse(JSON.stringify(defaultMatrix));
            cycleDayCount = 1;
            cycleMultiplier = 1;
            cycleCumCost = 0;
            cycleCumPayout = 0;
        }

        // ★ 新增：將矩陣轉換成可以在 HTML 顯示的格式
        function formatMatrixHTML(matrixArr) {
            if (!matrixArr || matrixArr.length === 0) return "-- <br>等待產生或已重新循環...";
            let html = '';
            matrixArr.forEach((g, index) => {
                let strA = g.A.map(n => String(n).padStart(2, '0')).join(',');
                let strB = g.B.map(n => String(n).padStart(2, '0')).join(',');
                html += `${String(index + 1).padStart(2,'0')}. [ ${strA} ]  x  [ ${strB} ]<br>`;
            });
            return html;
        }

        function runBacktestMatrix10() {
            const cost2 = parseFloat(document.getElementById('cost2').value);
            const rebate = parseFloat(document.getElementById('rebate').value) / 100;
            const odds2 = parseFloat(document.getElementById('odds2').value);
            const multStep = parseFloat(document.getElementById('multStep').value);
            
            resetMatrixCycle();
            
            let totalActualCost = 0, totalPayout = 0, overallNet = 0, maxDrawdown = 0;
            let weeklyCost = 0, weeklyPayout = 0;
            
            let tbody = document.getElementById('results-body');
            let cardsHtml = '';

            for (let i = 0; i < draws.length; i++) {
                let draw = draws[i];
                let dateStr = draw.date;
                let actualNumsSet = new Set(draw.nums);
                let actualNumsStr = draw.nums.map(n => n.toString().padStart(2, '0')).join(', ');
                
                let dateParts = dateStr.split('/');
                let drawDateObj = new Date(2026, parseInt(dateParts[0], 10) - 1, parseInt(dateParts[1], 10));
                let isSaturday = drawDateObj.getDay() === 6;
                let isLastDraw = (i === draws.length - 1);
                
                // 1. 當日成本結算
                let currentGroupsCount = activeMatrix.length;
                let dailyCombos = currentGroupsCount * 16;
                let dailyNominalCost = dailyCombos * cost2 * cycleMultiplier;
                let dailyActualCost = dailyNominalCost * (1 - rebate);
                
                cycleCumCost += dailyActualCost;
                totalActualCost += dailyActualCost;
                weeklyCost += dailyActualCost;
                
                // 2. 對獎與扣除邏輯
                let dailyPayout = 0;
                let dailyHitCombos = 0;
                let groupsToRemove = [];
                
                for (let j = 0; j < activeMatrix.length; j++) {
                    let g = activeMatrix[j];
                    let matchA = g.A.filter(n => actualNumsSet.has(n));
                    let matchB = g.B.filter(n => actualNumsSet.has(n));
                    let hits = matchA.length * matchB.length;
                    
                    if (hits > 0) {
                        dailyHitCombos += hits;
                        dailyPayout += hits * cost2 * odds2 * cycleMultiplier;
                        groupsToRemove.push(j);
                    }
                }
                
                cycleCumPayout += dailyPayout;
                totalPayout += dailyPayout;
                weeklyPayout += dailyPayout;
                
                let cycleNet = cycleCumPayout - cycleCumCost;
                overallNet += (dailyPayout - dailyActualCost);
                if (overallNet < maxDrawdown) maxDrawdown = overallNet;
                
                let isHit = dailyHitCombos > 0;
                let hitResultHtml = isHit ? `<span class="profit">🎯 中${dailyHitCombos}碰</span>` : `<span class="neutral">槓龜</span>`;
                let dailyResultHtml = isHit ? `<span class="profit">+${dailyPayout.toFixed(1)}</span>` : `<span class="loss">-${dailyActualCost.toFixed(1)}</span>`;
                let overallNetColor = overallNet >= 0 ? 'profit' : 'loss';

                // 3. 判斷循環操作
                let actionHtml = '';
                let displayCycleDay = cycleDayCount;
                let displayMult = cycleMultiplier;
                
                if (cycleNet > 0) {
                    actionHtml = `<div class="action-box" style="border-left-color: var(--success);">
                                    <span style="color: var(--success); font-weight:900;">✅ 循環獲利達標 (+${cycleNet.toFixed(1)}元)</span><br>
                                    整組作廢，下期重新從 10 組開始。
                                  </div>`;
                    resetMatrixCycle();
                } else {
                    if (groupsToRemove.length > 0) {
                        actionHtml = `<div class="action-box" style="border-left-color: var(--warning);">
                                        <span style="color: var(--warning); font-weight:800;">⚠️ 尚未獲利回本 (目前累計 ${cycleNet.toFixed(1)}元)</span><br>
                                        依規則剔除本期中獎的 ${groupsToRemove.length} 組。
                                      </div>`;
                        activeMatrix = activeMatrix.filter((_, index) => !groupsToRemove.includes(index));
                    } else {
                        actionHtml = `<div class="action-box" style="border-left-color: var(--text-muted);">
                                        <span style="color: var(--text-muted); font-weight:800;">📉 本期無中獎 (目前累計 ${cycleNet.toFixed(1)}元)</span>
                                      </div>`;
                    }

                    if (activeMatrix.length === 0) {
                        actionHtml += `<div style="color: var(--danger); font-weight: 900; margin-top: 8px;">🚨 剩餘組數歸零但仍虧損！強制作廢，認賠重新循環。</div>`;
                        resetMatrixCycle();
                    } else {
                        cycleMultiplier += multStep;
                        cycleDayCount += 1;
                        actionHtml += `<div style="color: var(--primary); font-weight: 800; margin-top: 8px; font-size: 14px;">➔ 下期剩餘 ${activeMatrix.length} 組，倍數提升至 ${cycleMultiplier}x</div>`;
                    }
                }

                // 4. 輸出 HTML (倒序)
                let cardHtml = `
                <div class="history-card">
                    <div class="history-card-header">
                        <span class="history-card-date">${dateStr}</span>
                        ${dailyResultHtml}
                    </div>
                    <div class="history-card-body">
                        <div style="margin-bottom: 10px;">
                            <span class="cycle-badge">循環第 ${displayCycleDay} 天</span>
                            <span class="mult-badge">當期倍數 ${displayMult}x</span>
                        </div>
                        <div class="history-card-row">
                            <span><span style="color:var(--text-main); font-weight:700;">開獎:</span> ${actualNumsStr}</span>
                            <span>成本: -${dailyActualCost.toFixed(1)}</span>
                        </div>
                        <div style="margin-top: 6px;">
                            下注狀態: <span style="font-weight: 700; color: var(--text-main);">${currentGroupsCount}</span> 組 (${dailyCombos} 碰)
                        </div>
                        <div class="history-card-row" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);">
                            ${hitResultHtml}
                            <span style="font-weight: 800; color: var(--text-main);">總淨利: <span class="${overallNetColor}">${overallNet.toFixed(1)}</span></span>
                        </div>
                        ${actionHtml}
                    </div>
                </div>`;
                
                cardsHtml = cardHtml + cardsHtml; 
                
                // 週結算
                if (isSaturday || isLastDraw) {
                    let weeklyNet = weeklyPayout - weeklyCost;
                    let weeklyColor = weeklyNet >= 0 ? 'profit' : 'loss';
                    let sign = weeklyNet >= 0 ? '+' : '';
                    let title = isSaturday ? '💰 每週日結算交割 (當週累計)' : '💰 結算交割 (當期未滿週累計)';
                    
                    let settlementHtml = `
                    <div class="history-card" style="background: var(--warning-bg); border: 1.5px solid var(--warning-border); text-align: center; padding: 18px 16px; margin-bottom: 16px;">
                        <div style="color: var(--warning); font-weight: 900; font-size: 16px; letter-spacing: 1px;">${title}</div>
                        <div style="margin-top: 12px; font-size: 14px; color: var(--text-main); font-weight: 700;">
                            下注成本: <span class="loss">-${weeklyCost.toFixed(1)}</span> &nbsp;|&nbsp; 總中獎: <span class="profit">+${weeklyPayout.toFixed(1)}</span>
                        </div>
                        <div style="margin-top: 14px; font-size: 18px; font-weight: 900; border-top: 1px dashed var(--warning-border); padding-top: 14px;">
                            當週實際損益: <span class="${weeklyColor}" style="font-size: 20px;">${sign}${weeklyNet.toFixed(1)} 元</span>
                        </div>
                    </div>`;
                    cardsHtml = settlementHtml + cardsHtml;
                    weeklyCost = 0; weeklyPayout = 0;
                }
            }
            
            tbody.innerHTML = cardsHtml;
            
            document.getElementById('summary-cost').innerText = `-${totalActualCost.toFixed(1)} 元`;
            document.getElementById('summary-payout').innerText = `+${totalPayout.toFixed(1)} 元`;
            
            let netEl = document.getElementById('summary-net');
            netEl.innerText = (overallNet >= 0 ? '+' : '') + overallNet.toFixed(1) + ' 元';
            netEl.className = overallNet >= 0 ? 'val profit' : 'val loss';
            document.getElementById('summary-drawdown').innerText = `${maxDrawdown.toFixed(1)} 元`;
            
            showPredictionMatrix10();
        }

        function showPredictionMatrix10() {
            let dateStr = document.getElementById('predict-date').value.trim();
            if(!/^\d{2}\/\d{2}$/.test(dateStr)) { alert("請輸入正確日期格式，例如：03/18"); return; }

            let currentGroupsCount = activeMatrix.length;
            let dailyCombos = currentGroupsCount * 16;
            const cost2 = parseFloat(document.getElementById('cost2').value);
            const rebate = parseFloat(document.getElementById('rebate').value) / 100;
            
            let dailyNominalCost = dailyCombos * cost2 * cycleMultiplier;
            let dailyActualCost = dailyNominalCost * (1 - rebate);

            // 將當下的 activeMatrix 印到畫面中
            document.getElementById('matrix-display').innerHTML = formatMatrixHTML(activeMatrix);

            document.getElementById('pred-cycle-status').innerText = `第 ${cycleDayCount} 天 (倍數 ${cycleMultiplier}x)`;
            document.getElementById('pred-remaining-groups').innerText = `${currentGroupsCount} 組 / ${dailyCombos} 碰`;
            document.getElementById('next-cost').innerText = `-${dailyActualCost.toFixed(1)} 元`;
        }

        // 初始化
        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').textContent = '☀️';
            }
            toggleLogicUI();
            fetchCSV();
        };
    </script>
