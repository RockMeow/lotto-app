<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔法心算大冒險</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fff3e0;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation; /* 改善移動端點擊延遲 */
        }

        .game-container {
            background-color: #ffffff;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            border: 5px solid #ffcc80;
            position: relative;
            overflow: hidden;
        }

        .top-bar {
            margin-bottom: 15px;
        }

        h1 {
            color: #ff7043;
            font-size: 26px;
            margin: 0;
            text-shadow: 1px 1px 0px #ffe0b2;
            animation: titleBounce 2s infinite alternate;
        }

        /* 模式選擇 (針對手機優化成 2x2 排列或自動換行) */
        .mode-selection {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            gap: 8px;
        }
        .mode-btn {
            background-color: #ffe082;
            border: none;
            border-bottom: 4px solid #ffb300;
            border-radius: 12px;
            padding: 10px 8px;
            font-size: 15px;
            font-weight: bold;
            color: #5d4037;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1 1 40%; /* 手機上自動變成兩排 */
            min-width: 110px;
            -webkit-tap-highlight-color: transparent; /* 取消手機點擊的藍色預設底色 */
        }
        /* 專為手機觸控設計的按下效果 */
        .mode-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .mode-btn.active {
            background-color: #ff9800;
            border-bottom-width: 0px;
            transform: translateY(4px);
            color: white;
        }

        /* 狀態列 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            color: #29b6f6;
            margin-bottom: 10px;
            padding: 0 5px;
        }
        .progress-container {
            background-color: #eeeeee;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 20px;
        }
        .progress-bar {
            background: linear-gradient(90deg, #66bb6a, #43a047);
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* 題目區 */
        .question-box {
            font-size: 48px;
            font-weight: 800;
            color: #37474f;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* 視覺輔助區 */
        .visual-container {
            margin: 15px auto;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        /* 算式家族/好朋友專用視覺 */
        .bond-diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            font-size: 22px;
        }
        .bond-top {
            width: 60px; height: 60px;
            border-radius: 50%;
            background-color: #ce93d8;
            color: white;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
        }
        .bond-bottom { display: flex; gap: 30px; }
        .bond-circle {
            width: 50px; height: 50px;
            border-radius: 50%;
            background-color: #81d4fa;
            color: #01579b;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        .bond-line {
            position: absolute;
            width: 3px; height: 35px;
            background-color: #bdbdbd;
            top: -28px;
            z-index: -1;
        }
        .bond-line.left { transform: rotate(25deg); left: 25px; }
        .bond-line.right { transform: rotate(-25deg); right: 25px; }

        /* 乘法專用視覺 */
        .multiply-groups { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px;}
        .plate {
            background-color: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            align-items: center;
            justify-items: center;
            min-width: 50px; min-height: 50px;
        }
        .apple {
            width: 12px; height: 12px;
            background-color: #ef5350;
            border-radius: 50%;
            animation: popIn 0.3s forwards;
        }

        /* 選項按鈕 (大尺寸方便手指點擊) */
        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        .option-btn {
            background-color: #ffffff;
            border: 2px solid #cfd8dc;
            border-bottom: 6px solid #cfd8dc;
            border-radius: 18px;
            padding: 15px 10px;
            font-size: 32px;
            font-weight: bold;
            color: #37474f;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            background-color: #eceff1;
        }

        /* 回饋特效 */
        .feedback-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        .feedback-content { font-size: 80px; transform: scale(0.5); transition: transform 0.3s; }
        .correct-bg { background-color: rgba(102, 187, 106, 0.2); }
        .wrong-bg { background-color: rgba(239, 83, 80, 0.2); }

        /* 動畫 */
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes titleBounce { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .confetti {
            position: absolute; width: 10px; height: 10px; border-radius: 50%;
            animation: particle 1s ease-out forwards;
        }
        @keyframes particle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        #summaryView { display: none; padding: 20px 0; }
        .restart-btn {
            background-color: #4caf50; color: white; border: none; border-bottom: 5px solid #388e3c;
            border-radius: 15px; padding: 15px 30px; font-size: 22px; font-weight: bold; cursor: pointer;
            margin-top: 15px; width: 100%; max-width: 250px;
            -webkit-tap-highlight-color: transparent;
        }
        .restart-btn:active {
            transform: translateY(3px); border-bottom-width: 2px;
        }
        
        .helper-text {
            background: #fff3e0; padding: 12px; border-radius: 12px; border: 2px dashed #ffb300; font-size: 15px; color: #5d4037; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameWindow">
        
        <div class="top-bar">
            <h1>✨ 魔法心算大冒險 ✨</h1>
        </div>

        <div class="feedback-overlay" id="feedbackOverlay">
            <div class="feedback-content" id="feedbackContent">🌟</div>
        </div>

        <div id="quizView">
            <div class="mode-selection">
                <button class="mode-btn active" onclick="setMode('bonds')">找好朋友 (湊10)</button>
                <button class="mode-btn" onclick="setMode('doubles')">雙胞胎數</button>
                <button class="mode-btn" onclick="setMode('family')">算式家族</button>
                <button class="mode-btn" onclick="setMode('multiply')">乘法魔法</button>
            </div>

            <div class="status-bar">
                <div id="scoreText">得分⭐: 0</div>
                <div id="questionNumText">題數: 1/5</div>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

            <div class="question-box" id="questionDisplay">
                </div>

            <div class="visual-container" id="visualContainer">
                </div>

            <div class="options-container" id="optionsContainer"></div>
        </div>

        <div id="summaryView">
            <h1 style="font-size: 36px;">🎉 挑戰成功！ 🎉</h1>
            <p style="font-size: 20px; margin: 20px 0; font-weight:bold; color:#ff7043;" id="finalScoreText"></p>
            <div style="font-size: 80px; margin-bottom: 20px;">🏆</div>
            <button class="restart-btn" onclick="resetGame()">再玩一次 🚀</button>
        </div>
    </div>

    <script>
        let currentMode = 'bonds'; 
        let currentQuestionIdx = 1;
        const totalQuestions = 5;
        let score = 0;
        let correctAnswer = 0;
        let isWaitingForNext = false;

        function initGame() {
            currentQuestionIdx = 1; score = 0; isWaitingForNext = false;
            document.getElementById('quizView').style.display = 'block';
            document.getElementById('summaryView').style.display = 'none';
            updateStatusBar();
            generateQuestion();
        }

        function setMode(mode) {
            if (isWaitingForNext) return;
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            initGame();
        }

        function updateStatusBar() {
            document.getElementById('scoreText').innerText = `得分⭐: ${score}`;
            document.getElementById('questionNumText').innerText = `題數: ${currentQuestionIdx}/${totalQuestions}`;
            document.getElementById('progressBar').style.width = `${((currentQuestionIdx - 1) / totalQuestions) * 100}%`;
        }

        function generateQuestion() {
            let qHtml = "";
            let vHtml = "";

            if (currentMode === 'bonds') {
                let n1 = Math.floor(Math.random() * 9) + 1;
                correctAnswer = 10 - n1;
                qHtml = `<span>${n1}</span> <span>+</span> <span style="color:#ff9800">?</span> <span>=</span> <span>10</span>`;
                
                vHtml = `
                <div class="bond-diagram">
                    <div class="bond-top">10</div>
                    <div class="bond-bottom">
                        <div class="bond-circle"><div class="bond-line left"></div>${n1}</div>
                        <div class="bond-circle" style="background-color:#ffe082;"><div class="bond-line right"></div>?</div>
                    </div>
                </div>`;
            } 
            else if (currentMode === 'doubles') {
                let n1 = Math.floor(Math.random() * 6) + 3; // 3~8
                let isNearDouble = Math.random() > 0.5;
                let n2 = isNearDouble ? n1 + 1 : n1;
                correctAnswer = n1 + n2;
                
                qHtml = `<span>${n1}</span> <span>+</span> <span>${n2}</span> <span>=</span> <span style="color:#ff9800">?</span>`;
                
                let helperText = isNearDouble ? `想一想：${n1} + ${n1} = ${n1*2}<br>再多 1 是多少呢？` : `💡 雙胞胎數字相加！`;
                vHtml = `<div class="helper-text" style="color: #00796b; border-color:#80cbc4;">${helperText}</div>`;
            }
            else if (currentMode === 'family') {
                let a = Math.floor(Math.random() * 7) + 2;
                let b = Math.floor(Math.random() * 7) + 2;
                let sum = a + b;
                correctAnswer = a;
                
                qHtml = `<span>${sum}</span> <span>-</span> <span>${b}</span> <span>=</span> <span style="color:#ff9800">?</span>`;
                vHtml = `
                <div class="helper-text">
                    <strong>💡 因為我們知道：</strong><br>
                    <span style="font-size:1.2em; color:#d84315;">${a} + ${b} = ${sum}</span><br>
                    所以它們是一家人！
                </div>`;
            }
            else if (currentMode === 'multiply') {
                let groupSize = Math.floor(Math.random() * 3) + 2; // 2~4個
                let numGroups = Math.floor(Math.random() * 4) + 2; // 2~5盤
                correctAnswer = groupSize * numGroups;
                
                qHtml = `<span>${groupSize}</span> <span style="font-size:0.8em">×</span> <span>${numGroups}</span> <span>=</span> <span style="color:#ff9800">?</span>`;
                
                let platesHtml = '';
                for(let i=0; i<numGroups; i++) {
                    let apples = '';
                    for(let j=0; j<groupSize; j++) {
                        apples += `<div class="apple" style="animation-delay:${(i*groupSize+j)*50}ms"></div>`;
                    }
                    platesHtml += `<div class="plate">${apples}</div>`;
                }
                vHtml = `
                <div style="text-align:center;">
                    <div style="margin-bottom:5px; font-size:14px; color:#5d4037;">
                        💡 也就是 <b>${numGroups}</b> 盤蘋果，每盤 <b>${groupSize}</b> 顆
                    </div>
                    <div class="multiply-groups">${platesHtml}</div>
                </div>`;
            }

            document.getElementById('questionDisplay').innerHTML = qHtml;
            document.getElementById('visualContainer').innerHTML = vHtml;
            generateOptions(correctAnswer);
        }

        function generateOptions(correct) {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            let options = [correct];
            
            while (options.length < 4) {
                let offset = (Math.floor(Math.random() * 3) + 1) * (Math.random() < 0.5 ? 1 : -1);
                let fakeAns = correct + offset;
                if (fakeAns > 0 && !options.includes(fakeAns)) {
                    options.push(fakeAns);
                }
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = val;
                btn.onclick = () => checkAnswer(val, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (isWaitingForNext) return;
            isWaitingForNext = true;

            const overlay = document.getElementById('feedbackOverlay');
            const content = document.getElementById('feedbackContent');
            const windowEl = document.getElementById('gameWindow');

            if (selected === correctAnswer) {
                score++;
                overlay.className = "feedback-overlay correct-bg";
                content.innerText = "⭕";
                overlay.style.opacity = 1;
                content.style.transform = "scale(1)";
                createConfetti();
                setTimeout(nextQuestion, 1500);
            } else {
                overlay.className = "feedback-overlay wrong-bg";
                content.innerText = "❌";
                overlay.style.opacity = 1;
                content.style.transform = "scale(1)";
                windowEl.classList.add('shake');
                btn.style.borderColor = '#ff5252';
                btn.style.color = '#ff5252';

                setTimeout(() => {
                    overlay.style.opacity = 0;
                    content.style.transform = "scale(0.5)";
                    windowEl.classList.remove('shake');
                    isWaitingForNext = false;
                }, 1000); // 縮短手機上的錯誤等待時間
            }
        }

        function nextQuestion() {
            document.getElementById('feedbackOverlay').style.opacity = 0;
            document.getElementById('feedbackContent').style.transform = "scale(0.5)";

            if (currentQuestionIdx < totalQuestions) {
                currentQuestionIdx++;
                updateStatusBar();
                isWaitingForNext = false;
                generateQuestion();
            } else {
                document.getElementById('progressBar').style.width = `100%`;
                setTimeout(() => {
                    document.getElementById('quizView').style.display = 'none';
                    document.getElementById('summaryView').style.display = 'block';
                    document.getElementById('finalScoreText').innerText = `你在 ${totalQuestions} 題中答對了，獲得了 ${score} 顆星星！`;
                }, 500);
            }
        }

        function resetGame() { initGame(); }

        function createConfetti() {
            const windowEl = document.getElementById('gameWindow');
            const colors = ['#ffca28', '#ef5350', '#66bb6a', '#29b6f6', '#ab47bc'];
            // 為了手機效能考量，粒子數量稍微減少
            for (let i = 0; i < 30; i++) { 
                const p = document.createElement('div');
                p.className = 'confetti';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 30;
                p.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
                p.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                p.style.left = `calc(50% + ${Math.random() * 20 - 10}px)`;
                p.style.top = `calc(50% + ${Math.random() * 20 - 10}px)`;
                windowEl.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
