        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2f; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #2a2a40; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #00d2ff; font-size: 28px; margin-top: 0; border-bottom: 2px solid #3a3a5c; padding-bottom: 15px;}
        .grid { display: flex; gap: 20px; margin-bottom: 20px; }
        .col-data { flex: 1; }
        textarea { width: 100%; height: 150px; padding: 12px; background: #1a1a2e; border: 1px solid #4a4a6a; border-radius: 6px; font-family: monospace; color: #00d2ff; box-sizing: border-box; resize: vertical;}
        .controls { text-align: center; margin: 20px 0; }
        button { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);}
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5); }
        .dashboard { display: none; }
        .summary-panel { background: #32324e; border-left: 6px solid #ff007c; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between;}
        .target-draw { font-size: 20px; font-weight: bold; color: #fff; }
        .top-picks { display: flex; gap: 10px; margin-top: 10px; }
        .ball { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: white; background: radial-gradient(circle at 30% 30%, #ff4b91, #d80056); box-shadow: 0 3px 8px rgba(0,0,0,0.4); text-shadow: 1px 1px 2px rgba(0,0,0,0.5);}
        .ball-sub { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); }
        .pattern-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .pattern-card { background: #252538; border: 1px solid #3a3a5c; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); position: relative; overflow: hidden;}
        .pattern-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #00d2ff; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a3a5c; padding-bottom: 8px; margin-bottom: 10px; }
        .card-title { font-weight: bold; color: #fff; font-size: 15px;}
        .card-rate { background: #00d2ff; color: #000; padding: 3px 8px; border-radius: 12px; font-size: 13px; font-weight: bold; }
        .card-body { font-size: 14px; color: #bbb; line-height: 1.6;}
        .highlight-num { color: #ff007c; font-weight: bold; font-size: 16px; }
        .freq-info { margin-top: 10px; font-size: 12px; color: #888; background: #1a1a2e; padding: 8px; border-radius: 4px;}
        .section-title { font-size: 20px; color: #fff; margin-bottom: 15px; border-bottom: 1px solid #4a4a6a; padding-bottom: 5px; display: inline-block;}

        <div class="section-title">📊 正在發動中的高勝率版路明細 (命中率 > 60%)</div>

        </div>

<script>
    const MAX_NUM = 39;
    const pad = (n) => n.toString().padStart(2, '0');

    function parseData() {
        const text = document.getElementById('dataInput').value;
        const lines = text.trim().split('\n');
        const data = [];
        for (let line of lines) {
            let parts = line.split(',');
            if (parts.length < 6 || parts[0] === 'Date') continue;
            let date = parts[0];
            let origNums = parts.slice(1, 6).map(Number);
            let sortedNums = [...origNums].sort((a, b) => a - b);
            data.push({ date, origNums, sortedNums });
        }
        return data;
    }

    function autoAnalyze() {
        const data = parseData();
        if (data.length < 5) return alert("資料量不足！");

        const lastIdx = data.length - 1;
        const lastDate = data[lastIdx].date;
        
        let allDiscoveredPatterns = [];
        let scoreBoard = {}; // 用於統計綜合推薦號碼

        // 系統自動往回推 3 期，尋找 T+1, T+2, T+3 的連動版路
        // back=1 代表看最後一期，預測下一期 (偏移量 1)
        for (let back = 1; back <= 3; back++) {
            let triggerIdx = data.length - back;
            let offset = back; 
            let triggerDraw = data[triggerIdx];

            // 建立這期所有可能發動的「條件集合」
            let conditionsToTest = [];

            // 1. 順球定位條件
            triggerDraw.sortedNums.forEach((val, posIndex) => {
                conditionsToTest.push({ type: 'sorted', pos: posIndex + 1, val: val, name: `順球第${posIndex + 1}顆` });
            });
            // 2. 落球定位條件
            triggerDraw.origNums.forEach((val, posIndex) => {
                conditionsToTest.push({ type: 'orig', pos: posIndex + 1, val: val, name: `落球第${posIndex + 1}顆` });
            });
            // 3. 不定位條件 (只要有開出)
            triggerDraw.origNums.forEach((val) => {
                conditionsToTest.push({ type: 'orig', pos: 'any', val: val, name: `不定位` });
                conditionsToTest.push({ type: 'sorted', pos: 'any', val: val, name: `不定位` }); // 其實跟 orig 一樣
            });

            // 去重複條件
            let uniqueConditions = [];
            let seen = new Set();
            conditionsToTest.forEach(c => {
                let key = `${c.type}-${c.pos}-${c.val}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueConditions.push(c);
                }
            });

            // 對每一個條件，去歷史尋找其拖牌規律
            uniqueConditions.forEach(cond => {
                let historyMatches = [];
                // 掃描歷史 (排除最後幾期無法驗證的資料)
                for (let i = 0; i < data.length - offset; i++) {
                    let isMatch = false;
                    let arr = cond.type === 'sorted' ? data[i].sortedNums : data[i].origNums;
                    if (cond.pos === 'any') {
                        isMatch = arr.includes(cond.val);
                    } else {
                        isMatch = arr[cond.pos - 1] === cond.val;
                    }

                    if (isMatch) {
                        // 紀錄 T+offset 期開了什麼號碼
                        historyMatches.push(data[i + offset].origNums);
                    }
                }

                // 計算拖出的號碼頻率
                if (historyMatches.length >= 2) { // 至少在歷史發動過 2 次才算數
                    let targetCounts = {};
                    historyMatches.forEach(targetDrawNums => {
                        targetDrawNums.forEach(n => {
                            targetCounts[n] = (targetCounts[n] || 0) + 1;
                        });
                    });

                    // 篩選出勝率高的目標號碼
                    for (let n = 1; n <= MAX_NUM; n++) {
                        if (targetCounts[n]) {
                            let hitCount = targetCounts[n];
                            let totalCount = historyMatches.length;
                            let rate = hitCount / totalCount;

                            // 嚴格篩選：勝率大於等於 60% 的才列入最強版路
                            if (rate >= 0.6) {
                                allDiscoveredPatterns.push({
                                    triggerSource: triggerDraw.date,
                                    offset: offset,
                                    condName: cond.name,
                                    condVal: cond.val,
                                    targetNum: n,
                                    hits: hitCount,
                                    total: totalCount,
                                    rate: rate
                                });

                                // 累加綜合分數 (勝率 * 發動次數 * 權重)
                                let score = (rate * 100) + (hitCount * 10);
                                scoreBoard[n] = (scoreBoard[n] || 0) + score;
                            }
                        }
                    }
                }
            });
        }

        // 排序版路：勝率優先，次數其次
        allDiscoveredPatterns.sort((a, b) => b.rate - a.rate || b.hits - a.hits);

        // 渲染綜合排行榜
        let sortedScores = Object.keys(scoreBoard).map(n => ({ num: parseInt(n), score: scoreBoard[n] })).sort((a, b) => b.score - a.score);
        let top5 = sortedScores.slice(0, 5);
        
        document.getElementById('targetInfo').innerText = `🎯 基於最新一期 (${lastDate}) 自動運算完成`;
        
        let ballsHtml = '';
        top5.forEach((item, index) => {
            let cssClass = index < 2 ? 'ball' : 'ball ball-sub'; // 前兩名用紅球，後面用藍球
            ballsHtml += `<div class="${cssClass}">${pad(item.num)}</div>`;
        });
        if(top5.length === 0) ballsHtml = '<div style="color:#aaa;">目前無強烈訊號</div>';
        document.getElementById('topPicksContainer').innerHTML = ballsHtml;

        // 渲染最強版路卡片 (最多顯示 12 組避免眼花)
        let cardsHtml = '';
        let displayPatterns = allDiscoveredPatterns.slice(0, 12);

        if (displayPatterns.length === 0) {
            cardsHtml = '<div style="color: #aaa; padding: 20px;">近期無吻合度高於 60% 的版路條件。</div>';
        } else {
            displayPatterns.forEach(p => {
                let periodText = p.offset === 1 ? '上 1 期' : `上 ${p.offset} 期`;
                cardsHtml += `
                <div class="pattern-card">
                    <div class="card-header">
                        <span class="card-title">預測開出 👉 <span style="font-size: 22px; color: #ff007c;">${pad(p.targetNum)}</span></span>
                        <span class="card-rate">${(p.rate * 100).toFixed(0)}% 勝率</span>
                    </div>
                    <div class="card-body">
                        當 ${periodText} (${p.triggerSource})<br>
                        【<span style="color:#00d2ff;">${p.condName}</span>】開出 <span class="highlight-num">${pad(p.condVal)}</span> 時<br>
                        <div class="freq-info">
                            📊 歷史發動 <b>${p.total}</b> 次，成功拖出 <b>${p.hits}</b> 次。
                        </div>
                    </div>
                </div>`;
            });
        }
        document.getElementById('patternGrid').innerHTML = cardsHtml;

        // 顯示結果
        document.getElementById('dashboard').style.display = 'block';
    }
</script>
