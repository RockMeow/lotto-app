<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天天樂/539 全自動預測掃描系統 (無限制全開版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #252526;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #4fc1ff;
            margin-top: 0;
            font-size: 1.8em;
            border-bottom: 1px solid #3c3c3c;
            padding-bottom: 15px;
        }
        .upload-section {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #3c3c3c;
        }
        input[type="file"] {
            color: #d4d4d4;
            margin: 10px 0;
            font-size: 1.1em;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.2em;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
        }
        button:hover {
            background-color: #0098ff;
        }
        .output-area {
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #1e1e1e;
            color: #ce9178;
            border: 1px solid #3c3c3c;
            padding: 15px;
            font-size: 1.4em;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .log-area {
            width: 100%;
            height: 250px;
            background-color: #1e1e1e;
            color: #9cdcfe;
            border: 1px solid #3c3c3c;
            padding: 10px;
            font-size: 0.9em;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 10px;
        }
        .note {
            color: #808080;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .highlight-info {
            color: #4fc1ff;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 全自動預測掃描系統 (無限制全開版)</h1>
    
    <div class="upload-section">
        <label>1. 載入歷史資料 (Fan_history_2026.csv)：</label><br>
        <div class="note">* 系統會自動抓取最後一期號碼作為基準，並計算所有版路的歷史勝率。</div>
        <input type="file" id="csvFileInput" accept=".csv">
        <br>
        <button onclick="runPrediction()">2. 自動抓取最新期數並產生預測</button>
        <div id="statusMsg" class="highlight-info"></div>
    </div>

    <div class="output-area">
        <label>🎯 所有版路預測結果 (已依歷史勝率高 -> 低排序)：</label>
        <textarea id="outputText" readonly placeholder="產生的號碼會顯示在這裡..."></textarea>
        
        <label style="display:block; margin-top:15px;">📊 系統分析與勝率日誌：</label>
        <textarea id="logText" class="log-area" readonly></textarea>
    </div>
</div>

<script>
    let historicalData = [];

    // 六宮格字典
    const modGroups = {
        1: [1, 7, 13, 19, 25, 31, 37],
        2: [2, 8, 14, 20, 26, 32, 38],
        3: [3, 9, 15, 21, 27, 33, 39],
        4: [4, 10, 16, 22, 28, 34],
        5: [5, 11, 17, 23, 29, 35],
        0: [6, 12, 18, 24, 30, 36]
    };

    // 讀取 CSV
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            parseCSV(event.target.result);
            document.getElementById('statusMsg').innerText = `✅ 資料載入成功！共讀取 ${historicalData.length} 期歷史紀錄。可以點擊下方按鈕開始預測。`;
        };
        reader.readAsText(file);
    });

    function parseCSV(text) {
        historicalData = [];
        const lines = text.split('\n');
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line || line.toLowerCase().includes('date')) continue;
            const cols = line.split(',');
            if (cols.length >= 6) {
                const nums = [
                    parseInt(cols[1]), parseInt(cols[2]), 
                    parseInt(cols[3]), parseInt(cols[4]), parseInt(cols[5])
                ].filter(n => !isNaN(n));
                if (nums.length === 5) {
                    historicalData.push({ date: cols[0].trim(), nums: nums });
                }
            }
        }
    }

    // 計算未來三天日期
    function getNext3DaysRange(dateStr) {
        let parts = dateStr.split('/');
        let month = parseInt(parts[0]);
        let day = parseInt(parts[1]);
        
        let d = new Date(2026, month - 1, day);
        let startD = new Date(d);
        startD.setDate(d.getDate() + 1);
        let endD = new Date(d);
        endD.setDate(d.getDate() + 3);
        
        return `${startD.getMonth()+1}/${startD.getDate()}~${endD.getMonth()+1}/${endD.getDate()}`;
    }

    // 評估拖牌勝率
    function evaluateWinRate(type, triggerVal, targetNums) {
        if (historicalData.length === 0) return 100; 
        
        let triggerCount = 0;
        let hitCount = 0;

        // 計算歷史資料 (不含最後三天，避免抓不到未來三期造成勝率失真)
        for (let i = 0; i < historicalData.length - 3; i++) {
            let triggered = false;
            let currentNums = historicalData[i].nums;

            if (type === 'N+1') {
                triggered = currentNums.includes(triggerVal);
            } else if (type === 'Mod6') {
                let mods = currentNums.map(n => n % 6);
                triggered = !mods.includes(triggerVal);
            }

            if (triggered) {
                triggerCount++;
                let isHit = false;
                for (let j = 1; j <= 3; j++) {
                    let nextDraw = historicalData[i+j].nums;
                    if (targetNums.some(num => nextDraw.includes(num))) {
                        isHit = true;
                        break;
                    }
                }
                if (isHit) hitCount++;
            }
        }

        if (triggerCount === 0) return 0;
        return (hitCount / triggerCount) * 100;
    }

    function runPrediction() {
        if (historicalData.length === 0) {
            alert('請先選擇並載入 CSV 檔案！');
            return;
        }

        // 自動抓取陣列中的最後一筆資料作為「最新期數」
        const latestDraw = historicalData[historicalData.length - 1];
        const dateStr = latestDraw.date;
        const nums = latestDraw.nums;

        let numsStr = nums.map(n => String(n).padStart(2, '0')).join(',');
        document.getElementById('statusMsg').innerText = `🔎 已自動抓取最新一期：[${dateStr}] 號碼為 ${numsStr}，運算中...`;
        
        let candidates = [];

        // 邏輯一 (N+1)
        nums.forEach(n => {
            if (n >= 36) {
                candidates.push({ type: 'N+1', trigger: n, target: [1, 2, 3], name: `大號 ${n} 歸零` });
            } else if (n + 3 <= 39) {
                candidates.push({ type: 'N+1', trigger: n, target: [n+1, n+2, n+3], name: `號碼 ${n} 拖牌` });
            }
        });

        // 邏輯二 (Mod 6)
        let appearedMods = new Set(nums.map(n => n % 6));
        let allMods = [0, 1, 2, 3, 4, 5];
        let missingMods = allMods.filter(m => !appearedMods.has(m));

        missingMods.forEach(mod => {
            let group = modGroups[mod];
            if (group.length >= 3) {
                candidates.push({ type: 'Mod6', trigger: mod, target: group.slice(0, 3), name: `餘數 ${mod} 漏牌(前段)` });
                if (group.length >= 6) {
                    candidates.push({ type: 'Mod6', trigger: mod, target: group.slice(-3), name: `餘數 ${mod} 漏牌(後段)` });
                }
            }
        });

        // 打分數並記錄 Log
        let logs = [];
        logs.push(`===== 最新期數 [${dateStr}] 號碼: ${numsStr} =====\n`);
        
        candidates.forEach(c => {
            c.winRate = evaluateWinRate(c.type, c.trigger, c.target);
        });

        // 依照勝率排序 (不限制數量，全部顯示)
        candidates.sort((a, b) => b.winRate - a.winRate);

        let dateRange = getNext3DaysRange(dateStr);
        let outputLines = [];
        
        candidates.forEach(pick => {
            let targetStr = pick.target.map(n => String(n).padStart(2, '0')).join(',');
            
            // 加入到純文字輸出區塊 (原版作者格式)
            outputLines.push(`${dateRange} ${targetStr}`);
            
            // 加入到日誌區塊 (附帶勝率)
            logs.push(`[${pick.name}] => 候選: ${targetStr} | 歷史三期開出勝率: ${pick.winRate.toFixed(1)}%`);
        });

        document.getElementById('outputText').value = outputLines.join('\n');
        document.getElementById('logText').value = logs.join('\n') + '\n\n✅ 分析完成！已列出所有符合的版路。';
    }
</script>

</body>
</html>
