<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三期牌</title>
    <style>
        :root {
            --primary-color: #1a237e;
            --primary-hover: #283593;
            --bg-color: #f0f2f5;
            --card-bg: #fff;
            --border-color: #e0e0e0;
            --hit-1-3-bg: #e8f5e9;
            --hit-1-3-text: #2e7d32;
            --track-1-3-bg: #fff8e1;
            --track-1-3-border: #f57c00;
            --fail-bg: #fafafa;
            --fail-text: #9e9e9e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: #333; line-height: 1.5; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { font-size: 1.4rem; margin-bottom: 15px; border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .ai-status { display: flex; align-items: center; gap: 10px; }
        .ai-badge { background: #ff1744; color: white; font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 23, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); } }

        .controls { background: #e8eaf6; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c5cae9; }
        
        /* 下拉選單樣式 */
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); margin-top: 8px; margin-bottom: 15px; font-size: 1rem; background-color: #fff; cursor: pointer; }
        
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); }

        #predictionArea { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .pred-card { padding: 15px; border-radius: 8px; width: calc(50% - 7.5px); background: var(--card-bg); box-shadow: 0 2px 6px rgba(0,0,0,0.05); position: relative; }
        .pred-card h3 { font-size: 1.1rem; margin-bottom: 8px; color: #424242; }
        .nums-highlight { font-size: 1.4em; font-weight: bold; letter-spacing: 2px; }
        .score-badge { position: absolute; top: 15px; right: 15px; background: #3949ab; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }

        .t1-3 { border-left: 6px solid var(--track-1-3-border); background-color: var(--track-1-3-bg); }
        .t1-3 .nums-highlight { color: var(--track-1-3-border); }

        .summary { background: #e8eaf6; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 1rem; display: flex; gap: 20px; flex-wrap: wrap; border: 1px solid #c5cae9; }
        .summary span { font-weight: bold; }

        .table-container { width: 100%; overflow-x: auto; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; background: #fff; }
        th, td { border: 1px solid var(--border-color); padding: 12px 8px; text-align: center; vertical-align: middle; line-height: 1.8; }
        th { background-color: var(--primary-color); color: white; position: sticky; top: 0; white-space: nowrap; }
        
        #resultTable td { 
            white-space: normal !important; 
            word-break: break-word; 
        }
        .hit-item { 
            display: block;
            margin-bottom: 8px;
            padding: 2px 0;
            min-height: 1.5em;
        }
        .hit-item:last-child { margin-bottom: 0; }

        tr:nth-child(even) { background-color: #fcfcfc; }

        .row-hit-1-3 { color: var(--hit-1-3-text); font-weight: bold; }

        @media screen and (max-width: 768px) {
            .pred-card { width: 100%; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { display: none; }
            tr { border: 1px solid var(--border-color); margin-bottom: 15px; border-radius: 8px; overflow: hidden; }
            td { text-align: right; padding-left: 45%; position: relative; border-bottom: 1px solid #f0f0f0; min-height: 40px; }
            td:before { position: absolute; left: 12px; width: 40%; text-align: left; font-weight: bold; color: #666; }
            td:nth-of-type(1):before { content: "開獎日期"; }
            td:nth-of-type(2):before { content: "開出號碼"; }
            td:nth-of-type(3):before { content: "命中版路 (觸發日)"; }
            td:nth-of-type(4):before { content: "命中號碼"; }
            td:nth-of-type(5):before { content: "狀態"; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <span>三期牌分析系統</span>
        <div class="ai-status">
            <span id="aiBadge" class="ai-badge" style="display:none;">過濾中</span>
            <div id="toggleFilter" class="toggle-btn toggle-off" onclick="toggleFilter()">過濾 OFF</div>
        </div>
    </h2>
    
    <div class="controls">
        <label><strong>選擇彩球類型：</strong></label>
        <select id="csvSelect" onchange="processData()">
            <option value="Fan_history_2026.csv">天天樂</option>
            <option value="539_history_2026.csv">今彩539</option>
            <option value="Ghana_history_2026.csv">迦納彩</option>
        </select>
        
        <label style="display:block;"><strong>資料狀態：</strong> <span id="dataStatus" style="color:#1a237e; font-weight:bold;">等待讀取...</span></label>
    </div>

    <h2 style="font-size: 1.2rem; margin-top: 25px;">目前追蹤中</h2>
    <div id="predictionArea">
        <div style="padding: 10px; color: #666;">系統自動解析中...</div>
    </div>
    
    <div id="summaryArea" class="summary" style="display:none;"></div>

    <h2 style="font-size: 1.2rem; margin-top: 25px;">回測紀錄</h2>
    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>開獎日期</th>
                    <th>開出號碼</th>
                    <th style="text-align: right; padding-right: 20px;">命中版路 (觸發日)</th>
                    <th>命中號碼</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                <tr><td colspan="5" style="text-align:center;">正在讀取 CSV 檔案...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let parsedData = [];
    let isFilterEnabled = false;

    function fNum(n) { return String(n).padStart(2, '0'); }
    function intersect(arr1, arr2) { return arr1.filter(value => arr2.includes(value)); }

    function toggleFilter() {
        isFilterEnabled = !isFilterEnabled;
        const btn = document.getElementById('toggleFilter');
        const badge = document.getElementById('aiBadge');
        if (isFilterEnabled) {
            btn.innerText = "過濾 ON";
            btn.className = "toggle-btn toggle-on";
            badge.style.display = "block";
        } else {
            btn.innerText = "過濾 OFF";
            btn.className = "toggle-btn toggle-off";
            badge.style.display = "none";
        }
        if(parsedData.length > 0) runAnalysis();
    }

    function getSmartPatterns(nums, currentIndex, allData) {
        let rawPatterns = [];
        let numSet = new Set(nums);

        // 策略一：連號拖牌 (歷史勝率 68%)
        let consecutives = [];
        let sortedNums = [...nums].sort((a, b) => a - b);
        for (let i = 0; i < sortedNums.length - 1; i++) {
            if (sortedNums[i + 1] - sortedNums[i] === 1) {
                consecutives.push(sortedNums[i + 1]);
            }
        }
        if (consecutives.length > 0) {
            let targets = [];
            consecutives.forEach(c => {
                if (c + 1 <= 39) targets.push(c + 1);
                if (c + 2 <= 39) targets.push(c + 2);
            });
            targets = [...new Set(targets)]; // 移除重複號碼
            if (targets.length > 0) {
                rawPatterns.push({ type: `連號拖牌`, target: targets.slice(0, 3), score: 68.9 });
            }
        }

        // 策略二：同尾牽引 (歷史勝率 54% - 偏低)
        let tails = nums.map(n => n % 10);
        let tailCounts = {};
        tails.forEach(t => tailCounts[t] = (tailCounts[t] || 0) + 1);
        let doubleTails = Object.keys(tailCounts).filter(t => tailCounts[t] > 1).map(Number);
        
        if (doubleTails.length > 0) {
            doubleTails.forEach(t => {
                let targets = [];
                // 產生該尾數的 4 個可能號碼 (如 4尾 -> 4, 14, 24, 34)
                for (let i = 0; i <= 3; i++) {
                    let cand = i * 10 + t;
                    if (cand > 0 && cand <= 39 && !numSet.has(cand)) {
                        targets.push(cand);
                    }
                }
                if (targets.length > 0) {
                    rawPatterns.push({ type: `同尾牽引 (${t}尾)`, target: targets.slice(0, 3), score: 54.2 });
                }
            });
        }

        // 策略三：斷區回補 (將版面分為三區，若某區掛零則預測回補)
        let z1 = nums.filter(n => n >= 1 && n <= 13).length;
        let z2 = nums.filter(n => n >= 14 && n <= 26).length;
        let z3 = nums.filter(n => n >= 27 && n <= 39).length;
        
        // 賦予歷史回測勝率作為分數
        if (z1 === 0) rawPatterns.push({ type: `一區斷層回補`, target: [6, 7, 8], score: 70.0 });
        if (z2 === 0) rawPatterns.push({ type: `二區斷層回補`, target: [19, 20, 21], score: 90.0 });
        if (z3 === 0) rawPatterns.push({ type: `三區斷層回補`, target: [32, 33, 34], score: 50.0 });

        // =========== 過濾系統：歷史勝率汰弱留強 ===========
        if (isFilterEnabled) {
            // 1. 直接剔除歷史勝率低於 65% 的爛版路 (同尾、三區斷層)
            let strongPatterns = rawPatterns.filter(p => p.score >= 65.0);
            
            // 2. 如果當期沒有強勢版路，堅決不出牌
            if (strongPatterns.length === 0) {
                return [];
            }
            
            // 3. 依照歷史勝率由高到低排序
            strongPatterns.sort((a, b) => b.score - a.score);
            
            // 4. 只回傳勝率最高的那「唯一 1 組」
            let bestPattern = strongPatterns[0];
            return [{ 
                type: `⭐ 嚴選: ${bestPattern.type}`, 
                target: bestPattern.target, 
                score: `勝率 ${bestPattern.score}%` 
            }];
        }

        // 若未開啟過濾，則回傳所有觸發的版路 (最多顯示 2 組避免雜亂)
        return rawPatterns.slice(0, 2);
    }

    async function processData() {
        // 從下拉選單取得檔名
        const fileName = document.getElementById('csvSelect').value;
        const statusEl = document.getElementById('dataStatus');
        
        try {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error('找不到檔案');
            const text = await response.text();
            const lines = text.trim().split('\n');
            parsedData = [];
            for (let i = 0; i < lines.length; i++) {
                let cols = lines[i].split(',').map(c => c.trim());
                if (!cols[0] || cols[0].toLowerCase().includes('date') || cols.length < 6) continue;
                let nums = [parseInt(cols[1]), parseInt(cols[2]), parseInt(cols[3]), parseInt(cols[4]), parseInt(cols[5])];
                if (!nums.some(isNaN)) parsedData.push({ date: cols[0], nums: nums });
            }
            if(parsedData.length > 0) {
                statusEl.innerText = `✅ 已成功讀取`;
                runAnalysis();
            }
        } catch (error) {
            statusEl.innerHTML = `<span style="color:red;">❌ 失敗：${error.message} (請確認檔案是否在同資料夾內)</span>`;
            document.getElementById('resultBody').innerHTML = '<tr><td colspan="5" style="text-align:center;">檔案讀取失敗</td></tr>';
            document.getElementById('predictionArea').innerHTML = '<div style="padding: 10px; color: #666;">無法解析版路，請檢查檔案狀態。</div>';
            document.getElementById('summaryArea').style.display = 'none';
        }
    }

    window.onload = processData;

    function runAnalysis() {
        const resultBody = document.getElementById('resultBody');
        const predictionArea = document.getElementById('predictionArea');
        const summaryArea = document.getElementById('summaryArea');

        let dailyResults = parsedData.map(d => ({ date: d.date, actual: d.nums, hits: [] }));
        let currentlyTracking = [];
        let stats = { total: 0, hit13: 0 };

        for (let i = 0; i < parsedData.length; i++) {
            let patterns = getSmartPatterns(parsedData[i].nums, i, parsedData);
            patterns.forEach(p => {
                stats.total++;
                let foundHit = false;
                for (let j = 1; j <= 3; j++) {
                    if (i + j < parsedData.length) {
                        let inter = intersect(p.target, parsedData[i + j].nums);
                        if (inter.length > 0) {
                            stats.hit13++;
                            dailyResults[i + j].hits.push({
                                triggerDate: parsedData[i].date,
                                type: p.type,
                                hitNums: inter,
                                period: j
                            });
                            foundHit = true;
                            break;
                        }
                    }
                }
                let age = parsedData.length - 1 - i;
                if (!foundHit && age < 3) {
                    currentlyTracking.push({
                        triggerDate: parsedData[i].date, age: age + 1, type: p.type, targetStr: p.target.map(fNum).join(', '),
                        cardClass: 't1-3', score: p.score || '-'
                    });
                }
            });
        }

        currentlyTracking.reverse();
        predictionArea.innerHTML = currentlyTracking.length > 0 ? currentlyTracking.map(t => `
            <div class="pred-card ${t.cardClass}">
                ${isFilterEnabled ? `<div class="score-badge">${t.score}</div>` : `<div class="score-badge">${t.score}</div>`}
                <h3>${t.type}</h3>
                <p>觸發日期：${t.triggerDate} (第 ${t.age} 期)</p>
                <p>預測號碼：<span class="nums-highlight">${t.targetStr}</span></p>
            </div>
        `).join('') : '<div style="padding: 10px; color: #666;">無追蹤中版路。</div>';

        let hitTableHtml = dailyResults.slice().reverse().filter(d => d.hits.length > 0).map(d => {
            let triggerInfo = d.hits.map(h => `<div class="hit-item">${h.type} (${h.triggerDate})</div>`).join('');
            let hitNumsInfo = d.hits.map(h => `<div class="hit-item">${h.hitNums.map(fNum).join(', ')}</div>`).join('');
            let statusInfo = d.hits.map(h => {
                let text = `1~3期內命中 (${h.period})`;
                let colorClass = 'row-hit-1-3';
                return `<div class="hit-item ${colorClass}">${text}</div>`;
            }).join('');

            return `
            <tr>
                <td>${d.date}</td>
                <td>${d.actual.map(fNum).join(', ')}</td>
                <td style="text-align: right; padding-right: 20px;">${triggerInfo}</td>
                <td>${hitNumsInfo}</td>
                <td>${statusInfo}</td>
            </tr>`;
        }).join('');
        
        resultBody.innerHTML = hitTableHtml || '<tr><td colspan="5" style="text-align:center;">尚無命中紀錄</td></tr>';

        summaryArea.style.display = 'flex';
        let totalHits = stats.hit13;
        let rate13 = stats.total > 0 ? ((stats.hit13 / stats.total) * 100).toFixed(1) : 0;
        let rateTotal = stats.total > 0 ? ((totalHits / stats.total) * 100).toFixed(1) : 0;

        summaryArea.innerHTML = `
            <div style="width: 100%;"><strong>回測統計：</strong> 共產生 ${stats.total} 組號碼</div>
            <div style="color: var(--track-1-3-border);"><span>● 1~3期內命中：</span> ${stats.hit13} 組 (${rate13}%)</div>
        `;
    }
</script>
</body>
</html>
