<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天天樂/539 動態演算法預測系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #252526;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #4fc1ff;
            margin-top: 0;
            font-size: 1.8em;
            border-bottom: 1px solid #3c3c3c;
            padding-bottom: 15px;
        }
        .upload-section, .input-section {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #3c3c3c;
        }
        input[type="file"], input[type="text"] {
            color: #d4d4d4;
            margin: 10px 0;
            font-size: 1.1em;
        }
        input[type="text"] {
            background: #1e1e1e;
            border: 1px solid #007acc;
            padding: 8px;
            width: 80%;
            border-radius: 4px;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1em;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0098ff;
        }
        .output-area {
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #1e1e1e;
            color: #ce9178;
            border: 1px solid #3c3c3c;
            padding: 15px;
            font-size: 1.4em;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .log-area {
            width: 100%;
            height: 200px;
            background-color: #1e1e1e;
            color: #9cdcfe;
            border: 1px solid #3c3c3c;
            padding: 10px;
            font-size: 0.9em;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 10px;
        }
        .note {
            color: #808080;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 動態演算法預測系統 (自動運算版)</h1>
    
    <div class="upload-section">
        <label>1. 載入歷史資料 (作為大數據回測母體)：</label><br>
        <input type="file" id="csvFileInput" accept=".csv">
        <div class="note">* 系統會使用這份資料來計算每一種版路的「歷史拖牌勝率」。</div>
    </div>

    <div class="input-section">
        <label>2. 輸入最新一期的開獎日期與號碼：</label><br>
        <div class="note">格式範例：5/10,1,14,21,33,39 (日期後接5個號碼，用逗號隔開)</div>
        <input type="text" id="latestDrawInput" placeholder="例如：5/10,1,14,21,33,39">
        <br>
        <button onclick="runPrediction()">3. 產生預測號碼</button>
    </div>

    <div class="output-area">
        <label>🎯 最終預測結果 (輸出勝率最高的 1~2 組)：</label>
        <textarea id="outputText" readonly></textarea>
        
        <label style="display:block; margin-top:15px;">📊 系統運算日誌 (供參考)：</label>
        <textarea id="logText" class="log-area" readonly></textarea>
    </div>
</div>

<script>
    let historicalData = [];

    // 六宮格字典
    const modGroups = {
        1: [1, 7, 13, 19, 25, 31, 37],
        2: [2, 8, 14, 20, 26, 32, 38],
        3: [3, 9, 15, 21, 27, 33, 39],
        4: [4, 10, 16, 22, 28, 34],
        5: [5, 11, 17, 23, 29, 35],
        0: [6, 12, 18, 24, 30, 36]
    };

    // 讀取 CSV
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            parseCSV(event.target.result);
            alert("歷史資料載入成功！共 " + historicalData.length + " 筆。");
        };
        reader.readAsText(file);
    });

    function parseCSV(text) {
        historicalData = [];
        const lines = text.split('\n');
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line || line.toLowerCase().includes('date')) continue;
            const cols = line.split(',');
            if (cols.length >= 6) {
                const nums = [
                    parseInt(cols[1]), parseInt(cols[2]), 
                    parseInt(cols[3]), parseInt(cols[4]), parseInt(cols[5])
                ].filter(n => !isNaN(n));
                if (nums.length === 5) {
                    historicalData.push({ date: cols[0].trim(), nums: nums });
                }
            }
        }
    }

    // 計算未來三天日期 (如 5/10 -> 5/11~5/13)
    function getNext3DaysRange(dateStr) {
        let parts = dateStr.split('/');
        let month = parseInt(parts[0]);
        let day = parseInt(parts[1]);
        
        let d = new Date(2026, month - 1, day);
        
        let startD = new Date(d);
        startD.setDate(d.getDate() + 1);
        
        let endD = new Date(d);
        endD.setDate(d.getDate() + 3);
        
        return `${startD.getMonth()+1}/${startD.getDate()}~${endD.getMonth()+1}/${endD.getDate()}`;
    }

    // 核心算法：評估拖牌勝率
    // type: 'N+1' 或 'Mod6'
    // triggerVal: 觸發號碼(N+1) 或 漏牌餘數(Mod6)
    // targetNums: 預測的3顆號碼
    function evaluateWinRate(type, triggerVal, targetNums) {
        if (historicalData.length === 0) return 100; // 沒資料就不打分數
        
        let triggerCount = 0;
        let hitCount = 0;

        for (let i = 0; i < historicalData.length - 3; i++) {
            let triggered = false;
            let currentNums = historicalData[i].nums;

            if (type === 'N+1') {
                triggered = currentNums.includes(triggerVal);
            } else if (type === 'Mod6') {
                let mods = currentNums.map(n => n % 6);
                triggered = !mods.includes(triggerVal);
            }

            if (triggered) {
                triggerCount++;
                // 檢查未來三期有沒有開出 targetNums 裡的任何一號
                let isHit = false;
                for (let j = 1; j <= 3; j++) {
                    let nextDraw = historicalData[i+j].nums;
                    if (targetNums.some(num => nextDraw.includes(num))) {
                        isHit = true;
                        break;
                    }
                }
                if (isHit) hitCount++;
            }
        }

        if (triggerCount === 0) return 0;
        return (hitCount / triggerCount) * 100; // 回傳勝率百分比
    }

    function runPrediction() {
        const inputStr = document.getElementById('latestDrawInput').value.trim();
        if (!inputStr) {
            alert('請輸入最新開獎結果！');
            return;
        }

        const parts = inputStr.split(',');
        if (parts.length < 6) {
            alert('格式錯誤，請確認包含日期與5個號碼。');
            return;
        }

        const dateStr = parts[0].trim();
        const nums = [
            parseInt(parts[1]), parseInt(parts[2]), 
            parseInt(parts[3]), parseInt(parts[4]), parseInt(parts[5])
        ];
        
        let candidates = [];

        // 產生邏輯一所有可能 (N+1)
        nums.forEach(n => {
            if (n >= 36) {
                candidates.push({ type: 'N+1', trigger: n, target: [1, 2, 3], name: `大號 ${n} 歸零` });
            } else if (n + 3 <= 39) {
                candidates.push({ type: 'N+1', trigger: n, target: [n+1, n+2, n+3], name: `號碼 ${n} 拖牌` });
            }
        });

        // 產生邏輯二所有可能 (Mod 6)
        let appearedMods = new Set(nums.map(n => n % 6));
        let allMods = [0, 1, 2, 3, 4, 5];
        let missingMods = allMods.filter(m => !appearedMods.has(m));

        missingMods.forEach(mod => {
            let group = modGroups[mod];
            if (group.length >= 3) {
                // 前段3顆
                candidates.push({ type: 'Mod6', trigger: mod, target: group.slice(0, 3), name: `餘數 ${mod} 漏牌(前段)` });
                // 後段3顆 (如果群組夠長)
                if (group.length >= 6) {
                    candidates.push({ type: 'Mod6', trigger: mod, target: group.slice(-3), name: `餘數 ${mod} 漏牌(後段)` });
                }
            }
        });

        // 打分數
        let logs = [];
        candidates.forEach(c => {
            c.winRate = evaluateWinRate(c.type, c.trigger, c.target);
            let targetStr = c.target.map(n => String(n).padStart(2, '0')).join(',');
            logs.push(`掃描 [${c.name}] => 候選組合 ${targetStr}，歷史勝率: ${c.winRate.toFixed(1)}%`);
        });

        // 依照勝率排序，只取前 2 名
        candidates.sort((a, b) => b.winRate - a.winRate);
        let finalPicks = candidates.slice(0, 2);

        // 產生輸出結果
        let dateRange = getNext3DaysRange(dateStr);
        let outputLines = [];
        
        finalPicks.forEach(pick => {
            let targetStr = pick.target.map(n => String(n).padStart(2, '0')).join(',');
            outputLines.push(`${dateRange} ${targetStr}`);
        });

        document.getElementById('outputText').value = outputLines.join('\n');
        document.getElementById('logText').value = logs.join('\n') + '\n\n✅ 篩選完成，已挑選歷史勝率最高的號碼輸出。';
    }
</script>

</body>
</html>
