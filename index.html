    <script>
        function runAnalysis() {
            const textArea = document.getElementById('csvTextTab3');
            const fileInput = document.getElementById('csvFile');

            if (textArea && textArea.value.trim() !== '') {
                processAnalysis(textArea.value.trim());
                return;
            }

            if (!fileInput.files.length) {
                alert('請貼上 CSV 數據或選擇要上傳的檔案！');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const csvText = e.target.result;
                processAnalysis(csvText);
            };
            reader.readAsText(file);
        }

        function processAnalysis(csvText) {
            const maxNum = parseInt(document.getElementById('lotteryType').value);
            const minP = parseInt(document.getElementById('minPeriod').value);
            const maxP = parseInt(document.getElementById('maxPeriod').value);
            const minOccur = parseInt(document.getElementById('minOccur').value);
            const minRate = parseFloat(document.getElementById('minRate').value) / 100;

            const cardsContainer = document.getElementById('cardsContainer');
            const statusMsg = document.getElementById('statusMsg');
            cardsContainer.innerHTML = '';
            document.getElementById('resultsArea').style.display = 'block';

            const lines = csvText.split('\n');
            const draws = [];
            const dates = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const parts = lines[i].split(',');
                if (parts.length < 2) continue;
                
                dates.push(parts[0].trim());
                const nums = new Set();
                for (let j = 1; j < parts.length; j++) {
                    const num = parseInt(parts[j].trim());
                    if (!isNaN(num)) nums.add(num);
                }
                draws.push(nums);
            }

            if (draws.length < minOccur) {
                statusMsg.innerHTML = '<i data-lucide="x-circle" class="w-6 h-6"></i>數據量太少！請上傳更多歷史資料才能準確回測。';
                setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
                return;
            }

            const tailTargets = {};
            for (let i = 0; i < 10; i++) {
                const s = new Set();
                for (let n = 1; n <= maxNum; n++) {
                    if (n % 10 === i) s.add(n);
                }
                tailTargets[`${i}尾`] = s;
            }

            let activePatterns = [];

            for (let trigger = 1; trigger <= maxNum; trigger++) {
                let triggerIndices = [];
                for (let i = 0; i < draws.length; i++) {
                    if (draws[i].has(trigger)) triggerIndices.push(i);
                }
                
                if (triggerIndices.length < minOccur) continue;

                for (let p = minP; p <= maxP; p++) {
                    for (let [targetName, targetSet] of Object.entries(tailTargets)) {
                        let hits = 0;
                        let validTrials = 0;
                        let numberHitCounts = {};
                        let recentRecords = []; 
                        
                        for (let idx of triggerIndices) {
                            if (idx + p < draws.length) {
                                validTrials++;
                                let found = false;
                                let trialHitNumbers = new Set();
                                let hitPeriod = 0;
                                let hitDate = "";
                                
                                for (let j = 1; j <= p; j++) {
                                    for (let item of targetSet) {
                                        if (draws[idx + j].has(item)) { 
                                            found = true; 
                                            trialHitNumbers.add(item);
                                            if(hitPeriod === 0) {
                                                hitPeriod = j;
                                                hitDate = dates[idx+j];
                                            }
                                        }
                                    }
                                }
                                if (found) {
                                    hits++;
                                    for (let num of trialHitNumbers) {
                                        numberHitCounts[num] = (numberHitCounts[num] || 0) + 1;
                                    }
                                    let hitNumsStr = Array.from(trialHitNumbers).sort((a,b)=>a-b).map(n => String(n).padStart(2,'0')).join(', ');
                                    recentRecords.push(`[${dates[idx]} 開出] ➔ 第 ${hitPeriod} 期 (${hitDate}) 成功開出: <span class="font-black text-red-600">${hitNumsStr}</span>`);
                                } else {
                                    recentRecords.push(`[${dates[idx]} 開出] ➔ ❌ ${p}期內未開出 (破版)`);
                                }
                            }
                        }

                        let rate = validTrials > 0 ? hits / validTrials : 0;
                        
                        if (rate >= minRate && validTrials >= minOccur) {
                            let hitStats = [];
                            for (let num in numberHitCounts) {
                                let count = numberHitCounts[num];
                                let nRate = validTrials > 0 ? (count / validTrials) : 0;
                                hitStats.push({
                                    num: parseInt(num),
                                    count: count,
                                    rate: nRate
                                });
                            }
                            hitStats.sort((a, b) => {
                                if (b.count !== a.count) return b.count - a.count;
                                return a.num - b.num;
                            });

                            let lastIdx = triggerIndices[triggerIndices.length - 1];
                            let passedPeriods = (draws.length - 1) - lastIdx;

                            if (passedPeriods < p) {
                                let alreadyHit = false;
                                let hitPeriod = 0;
                                let hitDate = "";
                                if (passedPeriods > 0) {
                                    for (let j = 1; j <= passedPeriods; j++) {
                                        for (let item of targetSet) {
                                            if (draws[lastIdx + j].has(item)) { 
                                                alreadyHit = true; 
                                                hitPeriod = j;
                                                hitDate = dates[lastIdx + j];
                                                break; 
                                            }
                                        }
                                        if (alreadyHit) break;
                                    }
                                }

                                activePatterns.push({
                                    trigger: trigger,
                                    target: targetName,
                                    period: p,
                                    rate: rate,
                                    success: hits,
                                    total: validTrials,
                                    triggerDate: dates[lastIdx],
                                    remaining: p - passedPeriods,
                                    alreadyHit: alreadyHit,
                                    hitPeriod: hitPeriod,
                                    hitDate: hitDate,
                                    hitStats: hitStats,
                                    recentRecords: recentRecords.slice()
                                });
                            }
                        }
                    }
                }
            }

            activePatterns.sort((a, b) => {
                if (a.alreadyHit !== b.alreadyHit) return a.alreadyHit ? 1 : -1;
                if (a.remaining !== b.remaining) return a.remaining - b.remaining;
                return b.rate - a.rate;
            });

            statusMsg.innerHTML = `<i data-lucide="siren" class="w-6 h-6"></i>掃描完成！近期觸發了 ${activePatterns.length} 個版路：`;

            if (activePatterns.length === 0) {
                cardsContainer.innerHTML = `<div class="text-center text-slate-400 p-8 border border-slate-200 rounded-xl bg-slate-50 font-bold">近期沒有任何高勝率版路被觸發，請等待下一期開獎或調低勝率門檻。</div>`;
                setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
                return;
            }

            activePatterns.forEach(ap => {
                const ratePct = (ap.rate * 100).toFixed(1);
                const isPerfect = ap.rate === 1.0;
                
                const statusBadge = ap.alreadyHit 
                    ? `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm"><i data-lucide="check-circle" class="w-4 h-4"></i>已於第 ${ap.hitPeriod} 期 (${ap.hitDate}) 開出</span>`
                    : `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm"><i data-lucide="alert-circle" class="w-4 h-4"></i>聽牌中：剩餘 ${ap.remaining} 期</span>`;
                    
                let hitStatsHTML = '';
                if (ap.hitStats && ap.hitStats.length > 0) {
                    hitStatsHTML = `<div class="mt-4 pt-4 border-t border-slate-100"><strong class="text-slate-700 text-sm mb-3 flex items-center gap-1"><i data-lucide="bar-chart-2" class="w-4 h-4"></i> 尾數內各號碼命中分析：</strong><div class="grid grid-cols-2 sm:grid-cols-3 gap-3">`;
                    ap.hitStats.forEach(stat => {
                        hitStatsHTML += `<div class="text-sm text-slate-600 bg-slate-50 p-2.5 rounded-lg border border-slate-200"><span class="font-black text-red-600 mr-2">${String(stat.num).padStart(2, '0')}</span>命中 ${stat.count} 次 <span class="text-xs text-slate-400 font-bold block mt-1">(${(stat.rate * 100).toFixed(1)}%)</span></div>`;
                    });
                    hitStatsHTML += `</div></div>`;
                }

                let recordsHTML = '';
                if (ap.recentRecords && ap.recentRecords.length > 0) {
                    recordsHTML = `<div class="mt-4 pt-4 border-t border-slate-100"><strong class="text-slate-700 text-sm mb-3 flex items-center gap-1"><i data-lucide="history" class="w-4 h-4"></i> 命中紀錄：</strong><ul class="space-y-1.5 text-xs text-slate-500 list-disc list-inside bg-slate-50 p-3 rounded-lg border border-slate-200">`;
                    ap.recentRecords.forEach(rec => {
                        recordsHTML += `<li>${rec}</li>`;
                    });
                    recordsHTML += `</ul></div>`;
                }
                
                let cardHTML = `
                    <div class="bg-white p-5 sm:p-6 rounded-xl shadow-sm border-l-4 ${isPerfect ? 'border-l-amber-400 bg-amber-50/10' : 'border-l-red-500'} border-y border-r border-y-slate-200 border-r-slate-200 transition-all hover:shadow-md">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4 pb-4 border-b border-slate-100">
                            <span class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                ${isPerfect ? '<span class="text-amber-500">🔥</span>' : '<span class="text-red-500">🎯</span>'} 
                                【${ap.triggerDate}】開出 <span class="text-white bg-slate-800 px-2 py-0.5 rounded-md font-black">${String(ap.trigger).padStart(2, '0')}</span> ➔ 高機率拖出 <span class="text-red-600 font-black text-xl underline decoration-red-300">${ap.target}</span>
                            </span>
                            ${statusBadge}
                        </div>
                        <p class="text-sm text-slate-600 leading-relaxed font-medium">
                            版路條件：只要開出 <strong class="text-slate-800">${ap.trigger}</strong>，<strong class="text-slate-800">${ap.period}</strong> 期內開 <strong class="text-slate-800">${ap.target}</strong> <br>
                            整體尾數歷史勝率：<span class="text-red-600 font-black text-lg">${ratePct}%</span> <span class="text-slate-400">(${ap.success} / ${ap.total})</span>
                        </p>
                        ${hitStatsHTML}
                        ${recordsHTML}
                    </div>
                `;
                cardsContainer.innerHTML += cardHTML;
            });
            setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
        }
    </script>
    
    <script>
        const tab4Alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const tab4NumsPerPillar = 3; 

        document.addEventListener('DOMContentLoaded', function() {
            generatePillarInputsTab4();
        });

        function generatePillarInputsTab4() {
            const count = parseInt(document.getElementById("pillarCountTab4").value);
            const container = document.getElementById("pillars-containerTab4");
            container.innerHTML = ""; 

            for (let i = 0; i < count; i++) {
                const letter = tab4Alphabet[i];
                const div = document.createElement("div");
                div.className = "p-5 bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col gap-3 transition-colors hover:border-teal-300";
                div.innerHTML = `
                    <label class="font-black text-teal-700 flex justify-between items-center">
                        第 ${letter} 柱
                        <i data-lucide="grip-vertical" class="w-4 h-4 text-slate-300"></i>
                    </label>
                    <input type="text" id="pillarTab4_${letter}" placeholder="例如: 08, 19, 27" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-200 focus:border-teal-500 outline-none text-lg font-mono font-bold text-slate-700 transition-colors shadow-inner">
                `;
                container.appendChild(div);
            }
            setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 10);
        }

        function autoFindBestNumbersTab4() {
            const csvRaw = document.getElementById("csvDataTab4").value.trim();
            if (!csvRaw) {
                alert("請先貼上 CSV 數據！");
                return;
            }

            const filterType = document.getElementById("filterTypeTab4").value;
            const startRange = parseInt(document.getElementById("startRangeTab4").value);
            const endRange = parseInt(document.getElementById("endRangeTab4").value);
            const pillarCount = parseInt(document.getElementById("pillarCountTab4").value);

            const lines = csvRaw.split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().includes('date'));
            let dataByMonth = {};
            
            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length < 6) return;
                const dateStr = parts[0];
                const month = dateStr.split('/')[0];
                const day = parseInt(dateStr.split('/')[1], 10);
                const nums = parts.slice(1, 6).map(n => parseInt(n, 10));

                if (!dataByMonth[month]) dataByMonth[month] = [];
                dataByMonth[month].push({ date: dateStr, day: day, nums: nums });
            });

            let frequency = {};
            for (const [month, draws] of Object.entries(dataByMonth)) {
                let filteredDraws = [];
                if (filterType === 'draw') {
                    for (let i = 0; i < draws.length; i++) {
                        let drawIndex = i + 1;
                        if (drawIndex >= startRange && drawIndex <= endRange) filteredDraws.push(draws[i]);
                    }
                } else {
                    for (let i = 0; i < draws.length; i++) {
                        if (draws[i].day >= startRange && draws[i].day <= endRange) filteredDraws.push(draws[i]);
                    }
                }

                filteredDraws.forEach(draw => {
                    draw.nums.forEach(n => {
                        frequency[n] = (frequency[n] || 0) + 1;
                    });
                });
            }

            let sortedNumbers = Object.keys(frequency).map(n => ({
                num: parseInt(n),
                count: frequency[n]
            })).sort((a, b) => b.count - a.count);

            const totalNeeded = pillarCount * tab4NumsPerPillar;
            if (sortedNumbers.length < totalNeeded) {
                alert("該區間內的數據量太少，無法抓出足夠的號碼組合！");
                return;
            }

            let topNumbers = sortedNumbers.slice(0, totalNeeded).map(item => item.num);

            let distributed = Array.from({ length: pillarCount }, () => []);
            for (let i = 0; i < topNumbers.length; i++) {
                distributed[i % pillarCount].push(topNumbers[i]);
            }

            for (let i = 0; i < pillarCount; i++) {
                const letter = tab4Alphabet[i];
                distributed[i].sort((a, b) => a - b); 
                const formattedNums = distributed[i].map(n => String(n).padStart(2, '0')).join(', ');
                document.getElementById(`pillarTab4_${letter}`).value = formattedNums;
            }

            analyzeDataTab4();
        }

        function analyzeDataTab4() {
            const csvRaw = document.getElementById("csvDataTab4").value.trim();
            const filterType = document.getElementById("filterTypeTab4").value;
            const startRange = parseInt(document.getElementById("startRangeTab4").value);
            const endRange = parseInt(document.getElementById("endRangeTab4").value);
            const pillarCount = parseInt(document.getElementById("pillarCountTab4").value);

            if (!csvRaw) return;

            let pillars = [];
            for (let i = 0; i < pillarCount; i++) {
                const letter = tab4Alphabet[i];
                const val = document.getElementById(`pillarTab4_${letter}`).value;
                const nums = val.split(',').map(n => parseInt(n.trim(), 10)).filter(n => !isNaN(n));
                pillars.push({ name: letter, nums: nums });
            }

            const lines = csvRaw.split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().includes('date'));
            let dataByMonth = {};

            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length < 6) return;
                const dateStr = parts[0];
                const month = dateStr.split('/')[0];
                const day = parseInt(dateStr.split('/')[1], 10);
                const nums = parts.slice(1, 6).map(n => parseInt(n, 10));

                if (!dataByMonth[month]) dataByMonth[month] = [];
                dataByMonth[month].push({ date: dateStr, day: day, nums: nums });
            });

            let html = `<div class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm mt-4">
                <table class="w-full text-left border-collapse text-sm whitespace-nowrap">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="p-4 border-b border-slate-600 font-bold">月份</th>
                        <th class="p-4 border-b border-slate-600 font-bold">${filterType === 'draw' ? '期數' : '日期'}</th>
                        <th class="p-4 border-b border-slate-600 font-bold">實際開獎號碼</th>
                        <th class="p-4 border-b border-slate-600 font-bold">各柱命中狀況</th>
                        <th class="p-4 border-b border-slate-600 font-bold">跨組連碰狀況</th>
                    </tr>
                </thead>
                <tbody class="bg-white">`;

            for (const [month, draws] of Object.entries(dataByMonth)) {
                let rowSpanDrawn = false;
                let filteredDraws = [];

                if (filterType === 'draw') {
                    for (let i = 0; i < draws.length; i++) {
                        let drawIndex = i + 1;
                        if (drawIndex >= startRange && drawIndex <= endRange) {
                            filteredDraws.push({ ...draws[i], label: `第 ${drawIndex} 期` });
                        }
                    }
                } else {
                    for (let i = 0; i < draws.length; i++) {
                        if (draws[i].day >= startRange && draws[i].day <= endRange) {
                            filteredDraws.push({ ...draws[i], label: draws[i].date });
                        }
                    }
                }

                if (filteredDraws.length === 0) continue;

                filteredDraws.forEach((draw, index) => {
                    let hitSummary = [];
                    let hitGroups = []; 
                    let drawNumsFormatted = [];

                    draw.nums.forEach(n => {
                        let isHit = false;
                        pillars.forEach(p => {
                            if (p.nums.includes(n)) isHit = true;
                        });
                        if (isHit) {
                            drawNumsFormatted.push(`<span class="inline-flex w-7 h-7 sm:w-8 sm:h-8 bg-teal-100 text-teal-700 font-black rounded-full items-center justify-center border border-teal-300 shadow-sm text-xs sm:text-sm">${String(n).padStart(2, '0')}</span>`);
                        } else {
                            drawNumsFormatted.push(`<span class="inline-flex w-7 h-7 sm:w-8 sm:h-8 bg-slate-100 text-slate-500 rounded-full items-center justify-center border border-slate-200 text-xs sm:text-sm">${String(n).padStart(2, '0')}</span>`);
                        }
                    });

                    pillars.forEach(p => {
                        let hitsInThisPillar = p.nums.filter(n => draw.nums.includes(n));
                        if (hitsInThisPillar.length > 0) {
                            let formattedHits = hitsInThisPillar.map(n => String(n).padStart(2, '0')).join(', ');
                            hitSummary.push(`**${formattedHits}**(${p.name})`);
                            hitGroups.push(p.name);
                        }
                    });

                    let hitStatusText = hitSummary.length > 0 ? hitSummary.join('、').replace(/\*\*/g, '') : '<span class="text-slate-300">無</span>';
                    
                    let comboStatusText = '-';
                    if (hitGroups.length > 0) {
                        if (hitGroups.length === pillarCount) {
                            comboStatusText = `<span class="inline-flex items-center gap-1 bg-amber-100 text-amber-800 px-3 py-1 rounded-md font-bold shadow-sm"><i data-lucide="flame" class="w-4 h-4 text-amber-500"></i> ${hitGroups.join(' x ')} 完美連碰</span>`;
                        } else if (hitGroups.length === 1) {
                            comboStatusText = `<span class="text-slate-500">僅中 ${hitGroups[0]} 組</span>`;
                        } else {
                            comboStatusText = `<span class="text-teal-600 font-bold bg-teal-50 px-2 py-1 rounded-md">中 ${hitGroups.join('、')} 組</span>`;
                        }
                    }

                    html += `<tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">`;
                    if (!rowSpanDrawn) {
                        html += `<td rowspan="${filteredDraws.length}" class="p-4 border-r border-slate-100 align-top bg-slate-50"><b class="text-lg text-slate-700">${parseInt(month, 10)} 月</b></td>`;
                        rowSpanDrawn = true;
                    }
                    html += `
                        <td class="p-4 text-slate-600 font-medium">${draw.label}</td>
                        <td class="p-4 font-mono text-base"><div class="flex gap-1.5 items-center">${drawNumsFormatted.join('')}</div></td>
                        <td class="p-4">${hitStatusText}</td>
                        <td class="p-4">${comboStatusText}</td>
                    </tr>`;
                });
            }

            html += `</tbody></table></div>`;
            const resultArea = document.getElementById("resultAreaTab4");
            resultArea.style.display = "block";
            resultArea.innerHTML = html;
            setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
        }
    </script>
