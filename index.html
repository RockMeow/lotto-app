<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加州天天樂 版路預測分析系統</title>
    <style>
        :root {
            --base-font-size: 16px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            font-size: var(--base-font-size);
            transition: font-size 0.2s ease;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }
        /* 字體調整控制區 */
        .font-control {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .font-control span {
            font-size: 0.9em;
            color: #666;
            margin-right: 5px;
        }
        .font-control button {
            background: #eee;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            transition: 0.2s;
        }
        .font-control button:hover {
            background: #ddd;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 1.8em;
        }
        .author-note {
            background-color: #fff3cd;
            color: #856404;
            padding: 15px;
            border-left: 5px solid #ffeeba;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 1.1em;
        }
        .input-group {
            background-color: #e9ecef;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .input-group label {
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .inputs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        input[type="number"] {
            width: 70px;
            padding: 10px;
            font-size: 1.2em;
            text-align: center;
            border: 1px solid #ced4da;
            border-radius: 6px;
        }
        button.calc-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button.calc-btn:hover {
            background-color: #0056b3;
        }
        .results {
            display: none;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-box {
            background: #fafafa;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .result-box h3 {
            margin-top: 0;
            color: #17a2b8;
            border-bottom: 2px solid #17a2b8;
            padding-bottom: 10px;
            font-size: 1.3em;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            padding: 10px 0;
            border-bottom: 1px dashed #ccc;
            font-size: 1.1em;
        }
        li:last-child {
            border-bottom: none;
        }
        .highlight {
            color: #dc3545;
            font-weight: bold;
            font-size: 1.2em;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 字體大小調整工具 -->
    <div class="font-control">
        <span>字體調整：</span>
        <button onclick="changeFontSize(-1)">A-</button>
        <button onclick="changeFontSize(0)">預設</button>
        <button onclick="changeFontSize(1)">A+</button>
    </div>

    <h1>加州天天樂 版路自動推算系統</h1>
    <div class="author-note">
        💡 程式作者策略提示：追蹤下方推算版路，<strong>三期內可開出 1~3 號，六期內可開出 1~6 號</strong>。建議搭配籌碼分配進行養牌。
    </div>

    <div class="input-group">
        <label>請輸入最新一期開獎號碼 (5 個數字，範圍 1~39)：</label>
        <div class="inputs">
            <input type="number" id="n1" min="1" max="39" placeholder="N1">
            <input type="number" id="n2" min="1" max="39" placeholder="N2">
            <input type="number" id="n3" min="1" max="39" placeholder="N3">
            <input type="number" id="n4" min="1" max="39" placeholder="N4">
            <input type="number" id="n5" min="1" max="39" placeholder="N5">
        </div>
        <button class="calc-btn" onclick="calculate()">執行程式推測</button>
    </div>

    <div class="results" id="results">
        <h2>預測結果分析</h2>
        <div class="result-box">
            <h3>📌 版路一：N+1 延伸連號 (間距1)</h3>
            <ul id="logic1-list"></ul>
        </div>
        <div class="result-box">
            <h3>📌 版路二：六宮格漏牌補位 (間距6)</h3>
            <ul id="logic2-list"></ul>
        </div>
    </div>
</div>

<script>
    // --- 字體大小控制與記憶功能 ---
    let currentSize = 16;
    
    function initFontSize() {
        const savedSize = localStorage.getItem('appFontSize');
        if (savedSize) {
            currentSize = parseInt(savedSize);
            document.documentElement.style.setProperty('--base-font-size', currentSize + 'px');
        }
    }

    function changeFontSize(step) {
        if (step === 0) {
            currentSize = 16; // 回復預設
        } else {
            currentSize += (step * 2);
            // 設定極限值防呆
            if (currentSize < 12) currentSize = 12;
            if (currentSize > 28) currentSize = 28;
        }
        document.documentElement.style.setProperty('--base-font-size', currentSize + 'px');
        localStorage.setItem('appFontSize', currentSize); // 記憶設定
    }

    // 網頁載入時初始化字體設定
    initFontSize();

    // --- 預測核心邏輯 ---
    const modGroups = {
        1: [1, 7, 13, 19, 25, 31, 37],
        2: [2, 8, 14, 20, 26, 32, 38],
        3: [3, 9, 15, 21, 27, 33, 39],
        4: [4, 10, 16, 22, 28, 34],
        5: [5, 11, 17, 23, 29, 35],
        0: [6, 12, 18, 24, 30, 36]
    };

    function calculate() {
        let nums = [];
        for (let i = 1; i <= 5; i++) {
            let val = parseInt(document.getElementById('n' + i).value);
            if (isNaN(val) || val < 1 || val > 39) {
                alert("請確保 5 個欄位都已填寫，且數字落在 1 到 39 之間！");
                return;
            }
            nums.push(val);
        }

        // 過濾重複數字並排序
        let uniqueNums = [...new Set(nums)].sort((a, b) => a - b);
        if (uniqueNums.length !== 5) {
            alert("請勿輸入重複的號碼！");
            return;
        }

        // 邏輯一：N+1 延伸連號
        let logic1Html = "";
        uniqueNums.forEach(num => {
            if (num >= 36) {
                logic1Html += `<li>由 <strong>${num}</strong> 觸發極端大號歸零 ➔ 推薦組合：<span class="highlight">[01, 02, 03]</span></li>`;
            } else {
                let n1 = String(num + 1).padStart(2, '0');
                let n2 = String(num + 2).padStart(2, '0');
                let n3 = String(num + 3).padStart(2, '0');
                if ((num + 3) <= 39) {
                     logic1Html += `<li>由 <strong>${num}</strong> 順勢觸發連號 ➔ 推薦組合：<span class="highlight">[${n1}, ${n2}, ${n3}]</span></li>`;
                }
            }
        });

        // 邏輯二：六宮格漏牌追蹤
        let logic2Html = "";
        let appearedMods = new Set(uniqueNums.map(n => n % 6));
        let allMods = [0, 1, 2, 3, 4, 5];
        
        // 找出沒開出的餘數
        let missingMods = allMods.filter(m => !appearedMods.has(m));

        missingMods.forEach(mod => {
            let group = modGroups[mod];
            if (group.length >= 3) {
                let p1 = group.slice(0, 3).map(n => String(n).padStart(2, '0')).join(', ');
                logic2Html += `<li>餘數 ${mod} 區間漏牌 (前段補位) ➔ 推薦組合：<span class="highlight">[${p1}]</span></li>`;
            }
            if (group.length >= 6) {
                let p2 = group.slice(3, 6).map(n => String(n).padStart(2, '0')).join(', ');
                logic2Html += `<li>餘數 ${mod} 區間漏牌 (後段補位) ➔ 推薦組合：<span class="highlight">[${p2}]</span></li>`;
            }
        });

        // 若無邏輯結果的防呆處理
        if (logic1Html === "") logic1Html = "<li>本期無符合邊界的連號版路。</li>";
        if (logic2Html === "") logic2Html = "<li>本期餘數分佈平均，無明顯漏牌區間。</li>";

        // 更新畫面並顯示結果區塊
        document.getElementById("logic1-list").innerHTML = logic1Html;
        document.getElementById("logic2-list").innerHTML = logic2Html;
        document.getElementById("results").style.display = "block";
    }
</script>

</body>
</html>
