<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小一全科大冒險</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f4c3; 
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        .game-container {
            background-color: #ffffff;
            border-radius: 30px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 650px;
            padding: 20px;
            text-align: center;
            border: 6px solid #81c784;
            position: relative;
        }

        .top-bar { 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        h1 {
            color: #2e7d32;
            font-size: clamp(20px, 5.5vw, 26px); 
            margin: 0;
            text-shadow: 2px 2px 0px #c8e6c9;
            animation: titleBounce 2s infinite alternate;
            white-space: nowrap;
        }

        .top-buttons { display: flex; gap: 8px; }
        
        .bgm-toggle-btn, .stamp-btn {
            color: white; border: none; border-bottom: 3px solid;
            padding: 6px 12px; border-radius: 15px; font-weight: bold; font-size: clamp(13px, 3.5vw, 15px);
            cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .bgm-toggle-btn { background: #e57373; border-bottom-color: #c62828; }
        .bgm-toggle-btn.playing { background: #4caf50; border-bottom-color: #2e7d32; }
        .stamp-btn { background: #ffb300; border-bottom-color: #f39c12; color: #5d4037; }
        .bgm-toggle-btn:active, .stamp-btn:active { transform: translateY(3px); border-bottom-width: 0px; }

        .mascot-container { position: relative; height: 75px; margin-bottom: 10px; }
        .mascot {
            font-size: 60px; position: absolute; left: 50%; transform: translateX(-50%);
            animation: float 3s ease-in-out infinite; z-index: 5; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.15));
        }

        /* 首頁選單樣式 */
        .home-menu { display: flex; flex-direction: column; gap: 15px; }
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .subject-btn {
            border: none; border-bottom: 5px solid; border-radius: 20px; padding: 20px 10px;
            font-size: clamp(18px, 5vw, 22px); font-weight: 900; color: white; cursor: pointer;
            transition: all 0.2s; -webkit-tap-highlight-color: transparent; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .subject-btn:active { transform: translateY(4px); border-bottom-width: 1px; }
        .subj-math { background: #4fc3f7; border-color: #0288d1; }
        .subj-chinese { background: #81c784; border-color: #388e3c; }
        .subj-life { background: #ffb74d; border-color: #f57c00; }
        .subj-amis { background: #ba68c8; border-color: #7b1fa2; }
        .subj-english { background: #f06292; border-color: #c2185b; grid-column: span 2; } /* 英語佔滿寬度 */

        .mode-toggle-container {
            background: #eeeeee; border-radius: 25px; padding: 5px; display: flex;
            margin: 15px auto; width: 100%; max-width: 400px; position: relative;
        }
        .mode-toggle-btn {
            flex: 1; padding: 12px; font-size: 18px; font-weight: bold; border: none; background: transparent;
            border-radius: 20px; cursor: pointer; color: #757575; transition: all 0.3s; z-index: 2;
        }
        .mode-toggle-btn.active { color: white; }
        .mode-selector-bg {
            position: absolute; top: 5px; left: 5px; width: calc(50% - 5px); height: calc(100% - 10px);
            background: #29b6f6; border-radius: 20px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1;
        }
        .mode-exam .mode-selector-bg { left: calc(50%); background: #ef5350; }

        /* 教學區樣式 */
        .tutorial-area {
            background: #fff9c4; border: 3px dashed #fbc02d; border-radius: 20px;
            padding: 12px; margin-bottom: 15px; text-align: center;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05); display: none;
        }
        
        .status-bar {
            display: flex; justify-content: space-between; font-size: clamp(14px, 4vw, 16px); font-weight: bold;
            color: #00acc1; margin-bottom: 8px; padding: 0 5px;
        }
        .progress-container { background-color: #e0e0e0; border-radius: 10px; height: 14px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #ffca28, #ff8f00); height: 100%; width: 0%; border-radius: 10px; transition: width 0.5s ease; }

        .question-box {
            font-size: clamp(26px, 7vw, 42px); font-weight: 900; color: #37474f; margin: 10px 0;
            display: flex; justify-content: center; align-items: center; flex-wrap: wrap; line-height: 1.4;
            background: #f5f5f5; border-radius: 20px; padding: 20px; min-height: 120px; word-break: break-word;
        }

        .options-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .option-btn {
            background-color: #ffffff; border: 3px solid #b2ebf2; border-bottom: 7px solid #80deea;
            border-radius: 20px; padding: 15px 10px; font-size: clamp(22px, 6vw, 32px); font-weight: 900;
            color: #00838f; cursor: pointer; transition: all 0.1s; -webkit-tap-highlight-color: transparent;
            animation: slideUpPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; display: flex; justify-content: center; align-items: center;
        }
        .option-btn:nth-child(1) { animation-delay: 0.05s; } .option-btn:nth-child(2) { animation-delay: 0.1s; }
        .option-btn:nth-child(3) { animation-delay: 0.15s; } .option-btn:nth-child(4) { animation-delay: 0.2s; }
        .option-btn:active { transform: translateY(5px); border-bottom-width: 2px; background-color: #e0f7fa; }

        .feedback-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; flex-direction: column;
            z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.2s; border-radius: 25px;
        }
        .feedback-emoji { font-size: 100px; transform: scale(0.5); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-bottom: -10px; }
        .feedback-text { font-size: 28px; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); transform: scale(0.5); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .correct-bg { background-color: rgba(76, 175, 80, 0.85); backdrop-filter: blur(2px); }
        .wrong-bg { background-color: rgba(244, 67, 54, 0.85); backdrop-filter: blur(2px); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(3px);
        }
        .modal-content {
            background: #ffffff; padding: 25px 20px; border-radius: 25px; text-align: center;
            width: 90%; max-width: 400px; border: 6px solid #ffb300; position: relative;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .close-btn {
            position: absolute; top: -15px; right: -15px; background: #ff5252; color: white;
            border: none; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; font-size: 24px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); line-height: 40px; text-align: center;
        }
        .stamp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .stamp-slot {
            aspect-ratio: 1; border: 3px dashed #e0e0e0; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: clamp(20px, 6vw, 28px); background: #fafafa;
        }
        .stamp-slot.filled {
            background: #fff9c4; border-color: #fbc02d; border-style: solid; 
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .redeem-btn {
            background: #4caf50; color: white; padding: 12px 25px; border-radius: 18px; border: none;
            border-bottom: 5px solid #388e3c; font-size: 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .redeem-btn:active { transform: translateY(4px); border-bottom-width: 1px; }
        .redeem-btn:disabled { background: #bdbdbd; border-color: #9e9e9e; cursor: not-allowed; border-bottom-width: 5px; transform: none;}

        .btn-home {
            background: #9e9e9e; color: white; border: none; padding: 10px 20px; border-radius: 15px;
            font-size: 16px; font-weight: bold; margin-bottom: 10px; cursor: pointer; border-bottom: 4px solid #757575;
        }
        .btn-home:active { transform: translateY(3px); border-bottom-width: 1px; }

        @keyframes float { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes slideUpPop { 0% { transform: translateY(30px) scale(0.8); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes titleBounce { 0% { transform: translateY(0) rotate(-1deg); } 100% { transform: translateY(-5px) rotate(1deg); } }
        @keyframes happyJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px) rotate(-2deg); } 40%, 80% { transform: translateX(15px) rotate(2deg); } }
        .confetti { position: absolute; width: 12px; height: 12px; border-radius: 4px; animation: particle 1s ease-out forwards; z-index: 15; }
        @keyframes particle { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0) rotate(360deg); opacity: 0; } }

        #quizView, #summaryView { display: none; }
        .restart-btn {
            background-color: #ff9800; color: white; border: none; border-bottom: 6px solid #e65100;
            border-radius: 20px; padding: 15px 30px; font-size: 22px; font-weight: bold; cursor: pointer;
            margin-top: 10px; width: 100%; max-width: 250px; -webkit-tap-highlight-color: transparent;
        }
        .restart-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
        
        .praise-text { font-size: clamp(16px, 4vw, 18px); color: #1565c0; background: #e3f2fd; padding: 10px; border-radius: 15px; margin: 15px 0; font-weight: bold; border: 2px dashed #90caf9;}
    </style>
</head>
<body>

    <div class="modal-overlay" id="stampModal">
        <div class="modal-content">
            <button class="close-btn" onclick="toggleStampCard()">×</button>
            <h2 style="color: #f57f17; margin-top:0;">🏆 我的集點卡</h2>
            <p style="color: #795548; font-weight: bold; font-size: 14px;">集滿 10 顆星，可以換獎勵喔！</p>
            <div class="stamp-grid" id="stampGrid"></div>
            <p style="font-size: 18px; font-weight: bold; color: #00838f;">目前收集了：<span id="modalTotalStars" style="color: #ff5252; font-size: 24px;">0</span> 顆星</p>
            <button class="redeem-btn" id="redeemBtn" onclick="redeemStars()">🎁 兌換禮物 (-10星)</button>
        </div>
    </div>

    <div class="game-container" id="gameWindow">
        <div class="top-bar">
            <h1>✨ 小一全科大冒險 ✨</h1>
            <div class="top-buttons">
                <button class="stamp-btn" onclick="toggleStampCard()">💳 集點卡</button>
                <button id="bgmBtn" class="bgm-toggle-btn" onclick="toggleBgm()">🔇 音樂</button>
            </div>
        </div>
        <div class="mascot-container">
            <div class="mascot" id="mascot">🐶</div>
        </div>
        
        <div class="feedback-overlay" id="feedbackOverlay">
            <div class="feedback-emoji" id="feedbackEmoji">🌟</div>
            <div class="feedback-text" id="feedbackText">好棒！</div>
        </div>

        <!-- 首頁：科目與模式選擇 -->
        <div id="homeView">
            <div class="mode-toggle-container" id="modeToggle">
                <div class="mode-selector-bg"></div>
                <button class="mode-toggle-btn active" onclick="selectMode('practice')" id="btnPractice">📖 練習模式</button>
                <button class="mode-toggle-btn" onclick="selectMode('exam')" id="btnExam">📝 評量測驗</button>
            </div>
            <p style="color:#795548; font-weight:bold; font-size:16px; margin:5px 0 15px;">請選擇今天要挑戰的科目：</p>
            
            <div class="subject-grid">
                <button class="subject-btn subj-math" onclick="startGame('math')"><span style="font-size:32px;">🧮</span>數學</button>
                <button class="subject-btn subj-chinese" onclick="startGame('chinese')"><span style="font-size:32px;">🖍️</span>國語</button>
                <button class="subject-btn subj-life" onclick="startGame('life')"><span style="font-size:32px;">🌱</span>生活</button>
                <button class="subject-btn subj-amis" onclick="startGame('amis')"><span style="font-size:32px;">⛰️</span>本土語</button>
                <button class="subject-btn subj-english" onclick="startGame('english')"><span style="font-size:32px;">🔤</span>英語</button>
            </div>
        </div>

        <!-- 遊戲區 -->
        <div id="quizView">
            <button class="btn-home" onclick="goHome()">🏠 回首頁</button>
            
            <div class="tutorial-area" id="tutorialArea"></div>

            <div class="status-bar">
                <div id="scoreText">本局答對: 0</div>
                <div id="questionNumText">題數: 1/5</div>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            
            <div class="question-box" id="questionDisplay"></div>
            <div class="options-container" id="optionsContainer"></div>
        </div>

        <!-- 結算區 -->
        <div id="summaryView">
            <h1 style="font-size: 32px; margin-bottom: 5px;">🎉 任務完成！ 🎉</h1>
            <div style="font-size: 70px; margin: 10px 0; animation: happyJump 1s infinite;">🏆🐶</div>
            <p style="font-size: 22px; margin: 10px 0; font-weight:bold; color:#ff5252;" id="finalScoreText"></p>
            <div class="praise-text" id="praiseText"></div>
            <button class="restart-btn" onclick="startGame(currentSubject)" style="background:#4caf50; border-color:#2e7d32;">再來一局 🚀</button>
            <button class="restart-btn" onclick="goHome()" style="background:#9e9e9e; border-color:#616161; margin-top:10px;">🏠 回主選單</button>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        let isBgmPlaying = false; let bgmInterval; let noteIndex = 0;
        const melody = [261.63, 293.66, 329.63, 392.00, 440.00, 392.00, 329.63, 293.66];
        function toggleBgm() {
            initAudio(); isBgmPlaying = !isBgmPlaying;
            const btn = document.getElementById('bgmBtn');
            if (isBgmPlaying) { btn.innerText = "🎵 音樂"; btn.classList.add("playing"); playNextBgmNote(); } 
            else { btn.innerText = "🔇 音樂"; btn.classList.remove("playing"); clearTimeout(bgmInterval); }
        }
        function playNextBgmNote() {
            if (!isBgmPlaying || !audioCtx) return;
            const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.value = melody[noteIndex];
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.08, now + 0.1); gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.4);
            noteIndex = (noteIndex + 1) % melody.length; bgmInterval = setTimeout(playNextBgmNote, 500); 
        }
        function playSound(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'square'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1); osc.frequency.setValueAtTime(783.99, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.4); osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(200, now + 0.3);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.15); osc.frequency.setValueAtTime(659.25, now + 0.3); osc.frequency.setValueAtTime(880, now + 0.45);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.8); osc.start(now); osc.stop(now + 0.8);
            } else if (type === 'redeem') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); osc.frequency.linearRampToValueAtTime(1760, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(now); osc.stop(now + 0.5);
            }
        }

        let totalStars = parseInt(localStorage.getItem('mathGameTotalStars')) || 0;
        function toggleStampCard() {
            playSound('click'); const modal = document.getElementById('stampModal');
            if(modal.style.display === 'flex') modal.style.display = 'none';
            else { updateStampUI(); modal.style.display = 'flex'; }
        }
        function updateStampUI() {
            document.getElementById('modalTotalStars').innerText = totalStars;
            const grid = document.getElementById('stampGrid'); grid.innerHTML = '';
            let remainder = totalStars % 10; if (totalStars > 0 && remainder === 0 && totalStars >= 10) remainder = 10; 
            for(let i=0; i<10; i++) {
                if (i < remainder) grid.innerHTML += `<div class="stamp-slot filled">⭐</div>`;
                else grid.innerHTML += `<div class="stamp-slot"></div>`;
            }
            const btn = document.getElementById('redeemBtn');
            if (totalStars >= 10) { btn.disabled = false; btn.innerText = "🎁 兌換禮物 (-10星)"; } 
            else { btn.disabled = true; btn.innerText = `還差 ${10 - remainder} 顆星喔！`; }
        }
        function redeemStars() {
            if(totalStars >= 10) {
                playSound('redeem'); createConfetti(); totalStars -= 10; localStorage.setItem('mathGameTotalStars', totalStars);
                updateStampUI(); setTimeout(() => { alert("🎉 兌換成功！快拿著手機去找爸爸媽媽換獎勵吧！"); }, 300);
            }
        }

        // --- 題庫定義 ---
        const banks = {
            math: [
                { q: "5 + 4 = ?", options: ["8", "9", "10", "7"], ans: "9" },
                { q: "12 - 5 = ?", options: ["6", "7", "8", "9"], ans: "7" },
                { q: "長針指著12，短針指著3，是幾點？", options: ["3點", "12點", "3點半", "12點半"], ans: "3點" },
                { q: "有8顆糖，吃了3顆，剩幾顆？", options: ["5顆", "4顆", "6顆", "11顆"], ans: "5顆" },
                { q: "三角形有幾個邊？", options: ["3個", "4個", "2個", "5個"], ans: "3個" }
            ],
            chinese: [
                { q: "「學校」的「學」注音是？", options: ["ㄒㄩㄝˊ", "ㄒㄩㄝ", "ㄒㄧㄝˊ", "ㄒㄩㄢˊ"], ans: "ㄒㄩㄝˊ" },
                { q: "相反詞：「高」的相反是？", options: ["矮", "大", "低", "短"], ans: "矮" },
                { q: "填空：天上一（　）小鳥飛過。", options: ["隻", "個", "條", "本"], ans: "隻" },
                { q: "選出正確的字：我（　）歡吃草莓。", options: ["喜", "洗", "起", "氣"], ans: "喜" },
                { q: "「下雨了」要撐什麼？", options: ["雨傘", "雨衣", "水壺", "外套"], ans: "雨傘" }
            ],
            life: [
                { q: "過馬路要走哪裡？", options: ["斑馬線", "快車道", "草地", "隨便走"], ans: "斑馬線" },
                { q: "吃飯前要做什麼？", options: ["洗手", "睡覺", "看電視", "玩玩具"], ans: "洗手" },
                { q: "在圖書館應該怎麼說話？", options: ["輕聲細語", "大聲喊", "唱歌", "哭鬧"], ans: "輕聲細語" },
                { q: "遇到長輩要說什麼？", options: ["您好", "再見", "對不起", "沒關係"], ans: "您好" },
                { q: "看電視要保持適當的？", options: ["距離", "聲音", "食物", "姿勢"], ans: "距離" }
            ],
            amis: [
                { q: "馬蘭阿美語的「你好」怎麼說？", options: ["Nga'ay ho", "Aray", "Wacu", "Posi"], ans: "Nga'ay ho" },
                { q: "馬蘭阿美語的「謝謝」怎麼說？", options: ["Aray", "Nga'ay ho", "Cecay", "Tosa"], ans: "Aray" },
                { q: "馬蘭阿美語的「狗」怎麼說？", options: ["wacu", "posi", "fafoy", "ayam"], ans: "wacu" },
                { q: "馬蘭阿美語的「一」怎麼說？", options: ["cecay", "tosa", "telu", "sepat"], ans: "cecay" },
                { q: "馬蘭阿美語的「貓」怎麼說？", options: ["posi", "wacu", "cecay", "aray"], ans: "posi" }
            ],
            english: [
                { q: "「蘋果」的英文是？", options: ["Apple", "Banana", "Cat", "Dog"], ans: "Apple" },
                { q: "「Red」代表什麼顏色？", options: ["紅色", "藍色", "黃色", "綠色"], ans: "紅色" },
                { q: "「狗」的英文是？", options: ["Dog", "Cat", "Pig", "Bird"], ans: "Dog" },
                { q: "「Hello」是什麼意思？", options: ["你好", "再見", "謝謝", "對不起"], ans: "你好" },
                { q: "字母 A 的下一個字母是？", options: ["B", "C", "D", "E"], ans: "B" }
            ]
        };

        let currentGlobalMode = 'practice'; // 'practice' or 'exam'
        let currentSubject = '';
        let currentQuestionIdx = 1; const totalQuestions = 5;
        let score = 0; let correctAnswer = ""; let hasMistakeInCurrentRound = false; let isWaitingForNext = false;

        document.body.addEventListener('touchstart', initAudio, { once: true });
        document.body.addEventListener('click', initAudio, { once: true });

        function selectMode(mode) {
            playSound('click'); currentGlobalMode = mode;
            document.getElementById('modeToggle').className = `mode-toggle-container mode-${mode}`;
            document.getElementById('btnPractice').classList.toggle('active', mode === 'practice');
            document.getElementById('btnExam').classList.toggle('active', mode === 'exam');
        }

        function goHome() {
            playSound('click');
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('quizView').style.display = 'none';
            document.getElementById('summaryView').style.display = 'none';
            document.getElementById('mascot').innerText = "🐶";
            document.getElementById('mascot').style.animation = 'float 3s ease-in-out infinite';
        }

        function startGame(subject) {
            playSound('click'); currentSubject = subject;
            currentQuestionIdx = 1; score = 0; isWaitingForNext = false; hasMistakeInCurrentRound = false;
            
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('summaryView').style.display = 'none';
            document.getElementById('quizView').style.display = 'block';
            
            // 教學區顯示邏輯
            const tutArea = document.getElementById('tutorialArea');
            if(currentGlobalMode === 'practice') {
                tutArea.style.display = 'block';
                tutArea.innerHTML = `<div style="color:#00796b; font-weight:bold; font-size:16px;">💡 導師小提醒：慢慢想，答錯可以重選喔！</div>`;
            } else {
                tutArea.style.display = 'block';
                tutArea.innerHTML = `<div style="color:#d81b60; font-weight:bold; font-size:16px;">🔥 評量測驗中！錯一題就沒星星喔！</div>`;
            }

            const mascot = document.getElementById('mascot');
            mascot.innerText = "🐶✨"; mascot.style.animation = 'happyJump 0.5s ease';
            setTimeout(() => { mascot.style.animation = 'float 3s ease-in-out infinite'; mascot.innerText = "🐶"; }, 500);
            
            updateStatusBar(); generateQuestion();
        }

        function updateStatusBar() {
            document.getElementById('scoreText').innerText = `本局答對: ${score}`;
            document.getElementById('questionNumText').innerText = `題數: ${currentQuestionIdx}/${totalQuestions}`;
            document.getElementById('progressBar').style.width = `${((currentQuestionIdx - 1) / totalQuestions) * 100}%`;
        }

        function generateQuestion() {
            const bank = banks[currentSubject];
            // 隨機選一題
            const qData = bank[Math.floor(Math.random() * bank.length)];
            correctAnswer = qData.ans;
            
            document.getElementById('questionDisplay').innerHTML = qData.q;
            
            const container = document.getElementById('optionsContainer'); container.innerHTML = '';
            let options = [...qData.options];
            options.sort(() => Math.random() - 0.5);
            
            options.forEach(val => {
                const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = val;
                if(val.length > 4) btn.style.fontSize = "clamp(18px, 5vw, 24px)";
                btn.onclick = () => checkAnswer(val, btn); container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (isWaitingForNext) return;

            const overlay = document.getElementById('feedbackOverlay'); const emoji = document.getElementById('feedbackEmoji');
            const text = document.getElementById('feedbackText'); const windowEl = document.getElementById('gameWindow');
            const mascot = document.getElementById('mascot');

            if (selected === correctAnswer) {
                isWaitingForNext = true;
                playSound('correct'); score++;
                mascot.innerText = "🐶✨"; windowEl.style.animation = "happyJump 0.3s ease";
                overlay.className = "feedback-overlay correct-bg";
                emoji.innerText = ["🐰", "🐵", "🦁", "🐸"][Math.floor(Math.random()*4)]; text.innerText = "太棒了！";
                overlay.style.opacity = 1; emoji.style.transform = "scale(1)"; text.style.transform = "scale(1)";
                
                createConfetti(); setTimeout(() => { windowEl.style.animation = ""; nextQuestion(); }, 1500);
            } else {
                playSound('wrong'); mascot.innerText = "🐶💦";
                
                if (currentGlobalMode === 'exam') {
                    hasMistakeInCurrentRound = true;
                }

                overlay.className = "feedback-overlay wrong-bg"; emoji.innerText = "💪"; text.innerText = "再試一次喔！";
                overlay.style.opacity = 1; emoji.style.transform = "scale(1)"; text.style.transform = "scale(1)";
                
                windowEl.classList.add('shake'); btn.style.borderColor = '#ffcdd2'; btn.style.backgroundColor = '#ffebee'; btn.style.color = '#e53935';
                
                // 練習模式允許重答，測驗模式其實也允許重答，但已經標記 hasMistake=true
                isWaitingForNext = true;
                setTimeout(() => {
                    overlay.style.opacity = 0; emoji.style.transform = "scale(0.5)"; text.style.transform = "scale(0.5)";
                    windowEl.classList.remove('shake'); mascot.innerText = "🐶"; isWaitingForNext = false;
                }, 1200); 
            }
        }

        function nextQuestion() {
            document.getElementById('feedbackOverlay').style.opacity = 0;
            document.getElementById('feedbackEmoji').style.transform = "scale(0.5)";
            document.getElementById('feedbackText').style.transform = "scale(0.5)";
            document.getElementById('mascot').innerText = "🐶";

            if (currentQuestionIdx < totalQuestions) {
                currentQuestionIdx++; updateStatusBar(); isWaitingForNext = false; generateQuestion();
            } else {
                playSound('win'); document.getElementById('progressBar').style.width = `100%`;
                
                const todayStr = new Date().toLocaleDateString();
                const lastPlayedDate = localStorage.getItem('mathGameLastPlayedDate');
                
                let resultMessage = ""; let subMessage = "";

                if (currentGlobalMode === 'exam') {
                    if (lastPlayedDate !== todayStr) {
                        if (hasMistakeInCurrentRound) {
                            resultMessage = `挑戰結束！`;
                            subMessage = "💡 哎呀！因為評量中間有答錯，所以這次沒有獲得星星喔。再一次「全部一次答對」就能拿到每日星星！⭐";
                        } else {
                            totalStars += score; localStorage.setItem('mathGameTotalStars', totalStars);
                            localStorage.setItem('mathGameLastPlayedDate', todayStr);
                            resultMessage = `完美過關！獲得了 ${score} 顆星星！⭐`;
                            subMessage = "我看見你剛剛很細心在作答，超棒的！";
                        }
                    } else {
                        resultMessage = `評量完成！答對 ${score} 題！`;
                        subMessage = "💡 今天已經領過星星囉！這是純挑戰，明天再來賺星星！⭐";
                    }
                } else {
                    // 練習模式不給星星
                    resultMessage = `練習完成！`;
                    subMessage = "💡 練習模式很棒喔！如果準備好了，可以去「評量測驗」挑戰拿星星！";
                }
                
                setTimeout(() => {
                    document.getElementById('quizView').style.display = 'none'; document.getElementById('summaryView').style.display = 'block';
                    document.getElementById('mascot').innerText = "🐶👑";
                    document.getElementById('finalScoreText').innerText = resultMessage; document.getElementById('praiseText').innerText = subMessage;
                }, 500);
            }
        }

        function createConfetti() {
            const windowEl = document.getElementById('gameWindow'); const colors = ['#ffeb3b', '#ff5252', '#69f0ae', '#40c4ff', '#e040fb'];
            for (let i = 0; i < 35; i++) { 
                const p = document.createElement('div'); p.className = 'confetti'; p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                if (Math.random() > 0.5) p.style.borderRadius = '50%';
                const angle = Math.random() * Math.PI * 2; const distance = Math.random() * 120 + 40;
                p.style.setProperty('--x', `${Math.cos(angle) * distance}px`); p.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                p.style.left = `calc(50% + ${Math.random() * 20 - 10}px)`; p.style.top = `calc(50% + ${Math.random() * 20 - 10}px)`;
                windowEl.appendChild(p); setTimeout(() => p.remove(), 1000);
            }
        }
    </script>
</body>
</html>
