<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三期牌 / 週牌</title>
    <style>
        /* =========================================
           現代化 UI 變數與亮色模式
           ========================================= */
        :root {
            --bg-color: #f1f5f9; 
            --container-bg: #ffffff;
            --text-color: #334155;
            --heading-color: #2563eb;
            --section-bg: #ffffff;
            --section-border: #e2e8f0;
            --card-bg: #f8fafc;
            --card-border: #e2e8f0;
            --th-bg: #f8fafc;
            --td-border: #e2e8f0;
            --tr-even: #ffffff;
            --tr-hover: #f1f5f9;
            --notice-bg: #fffbeb;
            --notice-border: #f59e0b;
            --notice-text: #92400e;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --ball-bg: linear-gradient(135deg, #3b82f6, #1d4ed8);
            --ball-text: #ffffff;
            --ball-shadow: rgba(37, 99, 235, 0.3);
            --high-rate-color: #ef4444; 
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* =========================================
           深色模式設定 (質感深藍灰)
           ========================================= */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #e2e8f0;
            --heading-color: #60a5fa;
            --section-bg: #1e293b;
            --section-border: #334155;
            --card-bg: #0f172a;
            --card-border: #334155;
            --th-bg: #0f172a;
            --td-border: #334155;
            --tr-even: #1e293b;
            --tr-hover: #334155;
            --notice-bg: #451a03;
            --notice-border: #d97706;
            --notice-text: #fde68a;
            --input-bg: #0f172a;
            --input-border: #475569;
            --ball-bg: linear-gradient(135deg, #60a5fa, #2563eb);
            --ball-shadow: rgba(96, 165, 250, 0.2);
            --high-rate-color: #f87171; 
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            line-height: 1.6; padding: 20px 10px; background-color: var(--bg-color); color: var(--text-color); margin: 0;
            -webkit-font-smoothing: antialiased; transition: background-color 0.3s, color 0.3s;
        }
        
        .container { 
            max-width: 1000px; margin: auto; background: var(--container-bg); padding: 40px; border-radius: 24px; 
            box-shadow: var(--shadow-lg); transition: background-color 0.3s; position: relative;
        }
        
        h1 { color: var(--heading-color); text-align: center; margin-top: 10px; margin-bottom: 35px; font-size: 2em; font-weight: 800; letter-spacing: -0.5px; }

        .theme-toggle {
            position: absolute; top: 25px; right: 25px; background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 50%; width: 44px; height: 44px; font-size: 1.2em; cursor: pointer; color: var(--text-color);
            display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s;
        }
        .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .section { background: var(--section-bg); border: 1px solid var(--section-border); padding: 25px; border-radius: 16px; margin-bottom: 24px; box-shadow: var(--shadow-sm); transition: background-color 0.3s, border-color 0.3s; }
        .section-title { font-weight: 700; font-size: 1.25em; margin-bottom: 20px; color: var(--text-color); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 6px; height: 20px; background: var(--heading-color); margin-right: 12px; border-radius: 6px; }

        .notice { background: var(--notice-bg); padding: 20px 25px; border-left: 6px solid var(--notice-border); border-radius: 12px; margin-bottom: 25px; font-size: 0.95em; color: var(--notice-text); box-shadow: var(--shadow-sm); transition: background-color 0.3s; }

        .control-group { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; }
        #gameTypeRow, #manualUploadRow { display: none !important; }
        
        select { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--input-border); font-size: 16px; color: var(--text-color); background-color: var(--input-bg); cursor: pointer; outline: none; box-shadow: var(--shadow-sm); transition: all 0.2s; }
        select:focus { border-color: var(--heading-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; align-items: start; }
        .stats-grid.single-card { grid-template-columns: 1fr; max-width: 600px; margin: 0 auto 24px auto; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 25px 20px; border-radius: 16px; text-align: center; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .stat-value { font-size: 2.2em; font-weight: 800; color: var(--heading-color); margin: 8px 0; letter-spacing: -1px; }
        .stat-label { font-size: 1em; font-weight: 700; opacity: 0.8; }
        .detailed-stats { margin-top: 15px; font-size: 0.9em; text-align: left; border-top: 1px dashed var(--card-border); padding-top: 12px; display: grid; grid-template-columns: 1fr; gap: 8px; }
        .detailed-stats-row { display: flex; justify-content: space-between; align-items: center; }
        .detailed-stats-row .type-name { color: var(--text-color); font-weight: 500; }
        .detailed-stats-row .type-rate { font-weight: 700; color: var(--heading-color); }
        .detailed-stats-row .type-rate.high-rate { color: var(--high-rate-color); }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; border: 1px solid var(--td-border); box-shadow: var(--shadow-sm); }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; min-width: 550px; }
        th, td { border-bottom: 1px solid var(--td-border); padding: 16px 12px; text-align: center; }
        th { background-color: var(--th-bg); color: var(--text-color); font-weight: 700; white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: var(--tr-even); }
        tr:hover { background-color: var(--tr-hover); }
        
        .status-active { color: #1d4ed8; font-weight: 600; background: #dbeafe; border-radius: 20px; padding: 6px 14px; display: inline-block; font-size: 0.9em;}
        .status-hit { color: #166534; font-weight: 600; background: #dcfce7; border-radius: 20px; padding: 6px 14px; display: inline-block; font-size: 0.9em;}
        .status-miss { color: #b91c1c; font-weight: 600; background: #fee2e2; border-radius: 20px; padding: 6px 14px; display: inline-block; font-size: 0.9em;}
        
        [data-theme="dark"] .status-active { background: rgba(37,99,235,0.2); color: #93c5fd; }
        [data-theme="dark"] .status-hit { background: rgba(22,101,52,0.3); color: #86efac; }
        [data-theme="dark"] .status-miss { background: rgba(185,28,28,0.2); color: #fca5a5; }

        .info-text { font-size: 0.85em; opacity: 0.7; margin-top: 8px; }
        .history-container { max-height: 500px; overflow-y: auto; }
        
        .ball-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .lottery-ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--ball-bg); color: var(--ball-text);
            font-weight: 700; font-size: 14px;
            box-shadow: 0 3px 6px var(--ball-shadow); text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .lottery-ball.target-ball { background: linear-gradient(135deg, #f87171, #dc2626); box-shadow: 0 3px 6px rgba(220, 38, 38, 0.3); }
        
        /* 坐車提示球樣式 */
        .lottery-ball.car-tip { border: 2px solid #fbbf24; box-shadow: 0 0 12px #fbbf24; background: linear-gradient(135deg, #f59e0b, #d97706); }

        .heatmap-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .heatmap-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .heatmap-box {
            position: relative; display: inline-flex; align-items: center; justify-content: center;
            width: 42px; height: 42px; border-radius: 12px; font-weight: 700; font-size: 15px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .heatmap-box:hover { transform: scale(1.1); z-index: 2; box-shadow: var(--shadow-md); }
        .heatmap-badge {
            position: absolute; top: -8px; right: -8px; background: #111; color: #fff;
            font-size: 10px; font-weight: bold; border-radius: 50%; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border: 2px solid var(--section-bg); box-shadow: var(--shadow-sm);
        }
        .omission-text { font-size: 11px; font-weight: 600; opacity: 0.8; }
        .omission-warn { color: #ef4444; font-weight: 800; }

        @media (max-width: 768px) {
            .container { padding: 25px 20px; }
            h1 { font-size: 1.6em; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <h1>三期牌 / 週牌</h1>

    <div class="notice">
        <strong>大數據坐車提示：</strong><br>
        <span style="color: #f59e0b; font-weight: bold;">⭐ 黃金提示：號碼球出現「黃圈發光」代表處於各彩種專屬神級遺漏期。</span><br>
        1. <strong>🇺🇸 天天樂：</strong>漏 8, 9, 10, 11。<br>
        2. <strong>🇹🇼 今彩 539：</strong>漏 8, 9, 11, 15。<br>
        3. <strong>🇬🇭 迦納彩：</strong>漏 2, 3, 13, 15。
    </div>

    <div id="statsGrid" class="stats-grid">
        <div class="stat-card" id="threePeriodCard">
            <div class="stat-label">三期牌 總命中率</div>
            <div id="threePeriodRate" class="stat-value">0%</div>
            <div id="threePeriodDetail" class="info-text">已結束: 0 | 命中: 0</div>
            <div id="threePeriodBreakdown" class="detailed-stats"></div>
        </div>
        <div class="stat-card" id="weeklyCard">
            <div class="stat-label">週牌 總命中率</div>
            <div id="weeklyRate" class="stat-value">0%</div>
            <div id="weeklyDetail" class="info-text">已結束: 0 | 命中: 0</div>
            <div id="weeklyBreakdown" class="detailed-stats"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">開獎數據載入</div>
        <div class="control-group" id="gameTypeRow">
            <select id="gameType">
                <option value="mark6">🇭🇰 香港 六合彩 6/49</option>
                <option value="649">🇹🇼 台灣 大樂透 6/49</option>
                <option value="539">🇹🇼 台灣 今彩 5/39</option>
                <option value="daily4">🇺🇸 加州 天天樂 5/39</option>
                <option value="ghana">🇬🇭 非洲 迦納彩 5/39</option>
            </select>
        </div>
        <div class="control-group">
            <div id="manualUploadRow"><input type="file" id="csvFile" accept=".csv"></div>
            <select id="autoLoadCsv">
                <option value="">-- 請選擇彩球類型 --</option>
                <option value="Six_history_2026.csv">🇭🇰 香港 六合彩</option>
                <option value="649_history_2026.csv">🇹🇼 台灣 大樂透</option>
                <option value="539_history_2026.csv">🇹🇼 台灣 今彩 539</option>
                <option value="Fan_history_2026.csv">🇺🇸 加州 天天樂</option>
                <option value="Ghana_history_2026.csv">🇬🇭 非洲 迦納彩</option>
            </select>
        </div>
    </div>

    <div class="section">
        <div class="section-title">近 10 期熱門號與遺漏期分佈</div>
        <div id="heatmapContainer" class="heatmap-container"></div>
    </div>

    <div class="section">
        <div class="section-title">當前追蹤中的牌組 (中一即停)</div>
        <div class="table-responsive">
            <table id="activeTable">
                <thead><tr><th>類型</th><th>目標號碼</th><th>起始日期</th><th>剩餘期數</th><th>狀態</th></tr></thead>
                <tbody id="activeBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <div class="section-title">完整歷史命中紀錄</div>
        <div class="history-container table-responsive">
            <table id="historyTable">
                <thead><tr><th>起始日期</th><th>類型</th><th>目標號碼</th><th>結果</th><th>命中詳情</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const btn = document.querySelector('.theme-toggle');
        if (currentTheme === 'dark') {
            body.removeAttribute('data-theme');
            btn.textContent = '🌙';
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.textContent = '☀️';
        }
    }

    function formatBalls(numsArray, isTarget = false, historyIndex = -1) {
        const gameType = document.getElementById('gameType').value;
        let ballsHtml = numsArray.map(n => {
            let carTipClass = "";
            if(isTarget && historyIndex !== -1) {
                let omi = getOmissionAt(n, historyIndex);
                // 獨立彩種遺漏推薦邏輯
                if(gameType === 'daily4' && [8,9,10,11].includes(omi)) carTipClass = " car-tip";
                if(gameType === '539' && [8,9,11,15].includes(omi)) carTipClass = " car-tip";
                if(gameType === 'ghana' && [2,3,13,15].includes(omi)) carTipClass = " car-tip";
            }
            let ballClass = isTarget ? ("lottery-ball target-ball" + carTipClass) : "lottery-ball";
            return `<span class="${ballClass}">${n.toString().padStart(2, '0')}</span>`;
        }).join('');
        return `<div class="ball-container">${ballsHtml}</div>`;
    }

    function getOmissionAt(num, index) {
        if (!currentHistoryData || index < 0) return 0;
        let omission = 0;
        for (let i = index; i >= 0; i--) {
            if (currentHistoryData[i].nums.includes(num)) return omission;
            omission++;
        }
        return omission;
    }

    function getOmission(num) { return getOmissionAt(num, currentHistoryData.length - 1); }

    let allRecords = []; 
    let currentHistoryData = [];

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) { processCSV(event.target.result); };
        reader.readAsText(file);
    });

    document.getElementById('autoLoadCsv').addEventListener('change', function(e) {
        const fileName = e.target.value;
        if (!fileName) return;
        const lowerName = fileName.toLowerCase();
        const gameTypeSelect = document.getElementById('gameType');
        if (lowerName.includes('six')) gameTypeSelect.value = 'mark6';
        else if (lowerName.includes('649')) gameTypeSelect.value = '649';
        else if (lowerName.includes('fan') || lowerName.includes('daily')) gameTypeSelect.value = 'daily4';
        else if (lowerName.includes('ghana')) gameTypeSelect.value = 'ghana';
        else gameTypeSelect.value = '539';
        fetch(fileName).then(response => response.text()).then(text => { processCSV(text); });
    });

    document.getElementById('gameType').addEventListener('change', function() { if(currentHistoryData.length > 0) recalculateAll(); });

    function getWeekday(dateStr) { try { return new Date("2026/" + dateStr).getDay(); } catch (e) { return -1; } }

    function processCSV(text) {
        const lines = text.trim().split('\n');
        currentHistoryData = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if(cols.length >= 6) {
                let nums = [];
                for(let c=1; c<cols.length; c++) {
                    let val = parseInt(cols[c]);
                    if(!isNaN(val)) nums.push(val);
                }
                currentHistoryData.push({ date: cols[0].trim(), nums: nums });
            }
        }
        recalculateAll();
    }

    function renderHeatmap() {
        const container = document.getElementById('heatmapContainer'); container.innerHTML = '';
        if(currentHistoryData.length === 0) return;
        const gameType = document.getElementById('gameType').value;
        const maxNum = (gameType === '649' || gameType === 'mark6') ? 49 : 39;
        const recentDraws = currentHistoryData.slice(-10);
        const freq = {};
        for(let i=1; i<=maxNum; i++) freq[i] = 0;
        recentDraws.forEach(draw => { draw.nums.forEach(n => { if(n >= 1 && n <= maxNum) freq[n]++; }); });
        for(let i=1; i<=maxNum; i++) {
            let count = freq[i]; let omission = getOmission(i);
            let item = document.createElement('div'); item.className = 'heatmap-item';
            let box = document.createElement('div'); box.className = 'heatmap-box';
            if(count === 0) { box.style.background = 'var(--th-bg)'; box.style.opacity = '0.5'; } 
            else if(count === 1) { box.style.background = 'linear-gradient(135deg, #4ade80, #16a34a)'; box.style.color = '#fff'; } 
            else if(count === 2) { box.style.background = 'linear-gradient(135deg, #fbbf24, #d97706)'; box.style.color = '#fff'; } 
            else { box.style.background = 'linear-gradient(135deg, #f87171, #dc2626)'; box.style.color = '#fff'; }
            box.innerHTML = i.toString().padStart(2, '0');
            if(count > 0) { let badge = document.createElement('span'); badge.className = 'heatmap-badge'; badge.innerHTML = count; box.appendChild(badge); }
            let omiText = document.createElement('span'); omiText.className = 'omission-text' + (omission >= 20 ? ' omission-warn' : ''); omiText.innerHTML = `漏${omission}`;
            item.appendChild(box); item.appendChild(omiText); container.appendChild(item);
        }
    }

    function recalculateAll() {
        allRecords = [];
        const gameType = document.getElementById('gameType').value;
        const weeklyCard = document.getElementById('weeklyCard'); const statsGrid = document.getElementById('statsGrid');
        if (gameType === '649' || gameType === 'mark6') { weeklyCard.style.display = 'none'; statsGrid.classList.add('single-card'); } 
        else { weeklyCard.style.display = 'block'; statsGrid.classList.remove('single-card'); }
        for(let i = 0; i < currentHistoryData.length; i++) {
            const draw = currentHistoryData[i];
            allRecords.forEach(target => {
                if(target.status === '進行中') {
                    const hits = target.targets.filter(n => draw.nums.includes(n));
                    if(hits.length > 0) { target.status = '命中停止'; target.hitInfo = `${draw.date} 開出 ${formatBalls(hits)}`; } 
                    else { target.life--; if(target.life <= 0) { target.status = '未中結束'; target.hitInfo = '-'; } }
                }
            });
            generateTargets(i);
        }
        renderTables(); renderHeatmap();
    }

    function generateTargets(drawIndex) {
        let draw = currentHistoryData[drawIndex]; const date = draw.date; const gameType = document.getElementById('gameType').value;
        let mainNums = []; let specialNum = null; const maxNum = (gameType === '649' || gameType === 'mark6') ? 49 : 39;
        if (gameType === '649' || gameType === 'mark6') { mainNums = draw.nums.slice(0, 6).sort((a,b)=>a-b); specialNum = draw.nums[6] || null; } 
        else { mainNums = draw.nums.slice(0, 5).sort((a,b)=>a-b); }
        for(let i=0; i<mainNums.length-1; i++) {
            let diff = mainNums[i+1] - mainNums[i];
            if (gameType === 'mark6') {
                if(diff === 9) allRecords.push({ type: '三期牌 (追原號)', targets: [mainNums[i], mainNums[i+1]], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
                else if(diff === 6) allRecords.push({ type: '三期牌 (5連號)', targets: [mainNums[i]+1, mainNums[i]+2, mainNums[i]+3, mainNums[i]+4, mainNums[i]+5], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
            } else if (gameType === '649') {
                if(diff === 6) allRecords.push({ type: '三期牌 (追原號)', targets: [mainNums[i], mainNums[i+1]], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
                else if(diff === 7) allRecords.push({ type: '三期牌 (6連號)', targets: [mainNums[i]+1, mainNums[i]+2, mainNums[i]+3, mainNums[i]+4, mainNums[i]+5, mainNums[i]+6], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
            } else if (['539','daily4','ghana'].includes(gameType)) {
                if(diff === 4) allRecords.push({ type: '三期牌 (3連號)', targets: [mainNums[i]+1, mainNums[i]+2, mainNums[i]+3], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
                else if(diff === 5) {
                    allRecords.push({ type: '三期牌 (4連號)', targets: [mainNums[i]+1, mainNums[i]+2, mainNums[i]+3, mainNums[i]+4], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
                    if(gameType === 'daily4') allRecords.push({ type: '三期牌 (追原號)', targets: [mainNums[i], mainNums[i+1]], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
                } else if(diff === 6) allRecords.push({ type: '三期牌 (5連號)', targets: [mainNums[i]+1, mainNums[i]+2, mainNums[i]+3, mainNums[i]+4, mainNums[i]+5], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
            }
        }
        if(specialNum !== null) {
            allRecords.push({ type: '三期牌 (特別號順推)', targets: [(specialNum % maxNum) + 1, ((specialNum + 1) % maxNum) + 1], startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
            if (gameType === 'mark6') {
                let sTail = specialNum % 10; let tailTargets = []; for(let n=1; n<=49; n++) if(n % 10 === sTail && n !== specialNum) tailTargets.push(n);
                if(tailTargets.length > 0) allRecords.push({ type: '三期牌 (特別號同尾)', targets: tailTargets, startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
            }
        }
        const tc = {}; mainNums.map(n => n % 10).forEach(t => tc[t] = (tc[t] || 0) + 1);
        for(let t in tc) {
            if(tc[t] === 2) allRecords.push({ type: '三期牌 (2同尾)', targets: mainNums.filter(n => n % 10 == t), startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
            else if(tc[t] >= 3) allRecords.push({ type: '三期牌 (3同尾)', targets: mainNums.filter(n => n % 10 == t), startDate: date, life: 3, status: '進行中', drawIdx: drawIndex });
        }
        const day = getWeekday(date); let shouldWeekly = false; let weeklyLife = 5;
        if (gameType === 'daily4' && day === 0) { shouldWeekly = true; weeklyLife = 7; } 
        else if (['539','ghana'].includes(gameType) && day === 6) { shouldWeekly = true; weeklyLife = 6; }
        if(shouldWeekly) { 
            let startIdx = Math.max(0, drawIndex - 9); let past10 = currentHistoryData.slice(startIdx, drawIndex + 1); let allPast = [];
            past10.forEach(d => { allPast.push(...d.nums.slice(0, 5)); }); let fq = {}; allPast.forEach(n => fq[n] = (fq[n] || 0) + 1);
            let sorted = Object.keys(fq).map(Number).sort((a, b) => fq[b] !== fq[a] ? fq[b] - fq[a] : a - b);
            let top6 = sorted.slice(0, 6); while(top6.length < 6) { let f = 1; while(top6.includes(f)) f++; top6.push(f); }
            allRecords.push({ type: `週牌 (第1組)`, targets: [top6[0], top6[1]], startDate: date, life: weeklyLife, status: '進行中', drawIdx: drawIndex });
            allRecords.push({ type: `週牌 (第2組)`, targets: [top6[2], top6[3]], startDate: date, life: weeklyLife, status: '進行中', drawIdx: drawIndex });
            allRecords.push({ type: `週牌 (第3組)`, targets: [top6[4], top6[5]], startDate: date, life: weeklyLife, status: '進行中', drawIdx: drawIndex });
        }
    }

    function renderTables() {
        const activeBody = document.getElementById('activeBody'); const historyBody = document.getElementById('historyBody');
        activeBody.innerHTML = ''; historyBody.innerHTML = ''; let tTotal = 0, tHits = 0, wTotal = 0, wHits = 0, typeStats = {};
        [...allRecords].reverse().forEach(t => {
            const isThree = t.type.includes('三期'); const isWeekly = t.type.includes('週牌');
            if(t.status !== '進行中') {
                if (!typeStats[t.type]) typeStats[t.type] = { total: 0, hits: 0 }; typeStats[t.type].total++;
                if(isThree) { tTotal++; if(t.status === '命中停止') { tHits++; typeStats[t.type].hits++; } }
                else if(isWeekly) { wTotal++; if(t.status === '命中停止') { wHits++; typeStats[t.type].hits++; } }
            }
            const sClass = t.status === '進行中' ? 'status-active' : (t.status === '命中停止' ? 'status-hit' : 'status-miss');
            let isT = t.type.includes('連號') || t.type.includes('追原號') || t.type.includes('特別號') || t.type.includes('同尾');
            const rowHtml = `<td><span style="color:${isT?'var(--high-rate-color)':'inherit'}; font-weight:700;">${t.type}</span></td><td>${formatBalls(t.targets, isT, t.drawIdx)}</td><td>${t.startDate}</td><td>${t.status === '進行中' ? t.life : '-'}</td><td><span class="${sClass}">${t.status}</span></td>`;
            if(t.status === '進行中') { const tr = document.createElement('tr'); tr.innerHTML = rowHtml; activeBody.appendChild(tr); } 
            else { const tr = document.createElement('tr'); tr.innerHTML = `<td>${t.startDate}</td><td><span style="color:${isT?'var(--high-rate-color)':'inherit'}; font-weight:700;">${t.type}</span></td><td>${formatBalls(t.targets, isT, t.drawIdx)}</td><td><span class="${sClass}">${t.status}</span></td><td><span style="font-size:0.9em;">${t.hitInfo}</span></td>`; historyBody.appendChild(tr); }
        });
        document.getElementById('threePeriodRate').innerText = tTotal > 0 ? ((tHits / tTotal) * 100).toFixed(1) + '%' : '0%';
        document.getElementById('threePeriodDetail').innerText = `已結束: ${tTotal} | 命中: ${tHits}`;
        const gameType = document.getElementById('gameType').value;
        if (!['649','mark6'].includes(gameType)) { document.getElementById('weeklyRate').innerText = wTotal > 0 ? ((wHits / wTotal) * 100).toFixed(1) + '%' : '0%'; document.getElementById('weeklyDetail').innerText = `已結束: ${wTotal} | 命中: ${wHits}`; }
        let threeB = '', weeklyB = '';
        Object.keys(typeStats).sort((a, b) => (typeStats[b].hits / typeStats[b].total) - (typeStats[a].hits / typeStats[a].total)).forEach(type => {
            let stat = typeStats[type]; let rate = ((stat.hits / stat.total) * 100).toFixed(1) + '%';
            let row = `<div class="detailed-stats-row"><span class="type-name">${type.replace('三期牌 (', '').replace(')', '').replace('週牌 (', '')}</span><span class="type-rate ${(stat.hits/stat.total)>=0.7?'high-rate':''}">${stat.hits}/${stat.total} (${rate})</span></div>`;
            if (type.includes('三期')) threeB += row; else if (type.includes('週牌')) weeklyB += row;
        });
        document.getElementById('threePeriodBreakdown').innerHTML = threeB;
        if (!['649','mark6'].includes(gameType)) document.getElementById('weeklyBreakdown').innerHTML = weeklyB;
    }
</script>
