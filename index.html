<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三期牌 / 週牌</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* =========================================
           現代化 UI 變數與亮色模式
           ========================================= */
        :root {
            --bg-color: #f1f5f9; 
            --container-bg: #ffffff;
            --text-color: #334155;
            --heading-color: #2563eb;
            --section-bg: #ffffff;
            --section-border: #e2e8f0;
            --card-bg: #f8fafc;
            --card-border: #e2e8f0;
            --th-bg: #f8fafc;
            --td-border: #e2e8f0;
            --tr-even: #ffffff;
            --tr-hover: #f1f5f9;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --ball-bg: linear-gradient(135deg, #3b82f6, #1d4ed8);
            --ball-text: #ffffff;
            --ball-shadow: rgba(37, 99, 235, 0.3);
            --high-rate-color: #ef4444; 
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* =========================================
           深色模式設定
           ========================================= */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #e2e8f0;
            --heading-color: #60a5fa;
            --section-bg: #1e293b;
            --section-border: #334155;
            --card-bg: #0f172a;
            --card-border: #334155;
            --th-bg: #0f172a;
            --td-border: #334155;
            --tr-even: #1e293b;
            --tr-hover: #334155;
            --input-bg: #0f172a;
            --input-border: #475569;
            --ball-bg: linear-gradient(135deg, #60a5fa, #2563eb);
            --ball-shadow: rgba(96, 165, 250, 0.2);
            --high-rate-color: #f87171; 
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            line-height: 1.6; padding: 20px 10px; background-color: var(--bg-color); color: var(--text-color); margin: 0;
            -webkit-font-smoothing: antialiased; transition: background-color 0.3s, color 0.3s;
        }
        
        .container { 
            max-width: 1000px; margin: auto; background: var(--container-bg); padding: 40px; border-radius: 24px; 
            box-shadow: var(--shadow-lg); transition: background-color 0.3s; position: relative;
        }
        
        h1 { color: var(--heading-color); text-align: center; margin-top: 10px; margin-bottom: 35px; font-size: 2em; font-weight: 800; letter-spacing: -0.5px; }

        .theme-toggle {
            position: absolute; top: 25px; right: 25px; background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 50%; width: 44px; height: 44px; font-size: 1.2em; cursor: pointer; color: var(--text-color);
            display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s;
        }
        .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .section { background: var(--section-bg); border: 1px solid var(--section-border); padding: 25px; border-radius: 16px; margin-bottom: 24px; box-shadow: var(--shadow-sm); transition: background-color 0.3s, border-color 0.3s; }
        .section-title { font-weight: 700; font-size: 1.25em; margin-bottom: 20px; color: var(--text-color); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 6px; height: 20px; background: var(--heading-color); margin-right: 12px; border-radius: 6px; }

        .control-group { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; }
        #gameTypeRow, #manualUploadRow { display: none !important; }
        
        select { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--input-border); font-size: 16px; color: var(--text-color); background-color: var(--input-bg); cursor: pointer; outline: none; box-shadow: var(--shadow-sm); transition: all 0.2s; }
        select:focus { border-color: var(--heading-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
        
        #autoLoadCsv { width: 100%; max-width: 450px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 24px; align-items: start; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 15px 10px; border-radius: 16px; text-align: center; box-shadow: var(--shadow-sm); }
        .stat-value { font-size: 1.8em; font-weight: 800; color: var(--heading-color); margin: 4px 0; }
        .stat-label { font-size: 0.9em; font-weight: 700; opacity: 0.8; }
        .info-text { font-size: 0.8em; opacity: 0.7; }
        .detailed-stats { margin-top: 10px; font-size: 0.85em; text-align: left; border-top: 1px dashed var(--card-border); padding-top: 8px; }
        .detailed-stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; border: 1px solid var(--td-border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; min-width: 550px; }
        th, td { border-bottom: 1px solid var(--td-border); padding: 16px 12px; text-align: center; }
        th { background-color: var(--th-bg); color: var(--text-color); font-weight: 700; white-space: nowrap; }
        tr:nth-child(even) { background-color: var(--tr-even); }
        
        .status-active { color: #1d4ed8; font-weight: 600; background: #dbeafe; border-radius: 20px; padding: 6px 14px; font-size: 0.85em;}
        .status-hit { color: #166534; font-weight: 600; background: #dcfce7; border-radius: 20px; padding: 6px 14px; font-size: 0.85em;}
        .status-miss { color: #b91c1c; font-weight: 600; background: #fee2e2; border-radius: 20px; padding: 6px 14px; font-size: 0.85em;}

        .ball-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .lottery-ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 34px; border-radius: 50%; background: #cbd5e1; color: #475569; font-weight: 700; font-size: 14px;
        }

        /* --- 球色分級設定 --- */
        /* 1. 常規階級 (海洋藍/深灰) */
        .lottery-ball.normal-3p { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #ffffff; }
        .lottery-ball.normal-weekly { background: linear-gradient(135deg, #64748b, #334155); color: #ffffff; }

        /* 2. ⭐ 高級階級 (琥珀橙/青藍) - 稍微放寬但有水準 */
        .lottery-ball.advanced-3p { background: linear-gradient(135deg, #f59e0b, #d97706); color: #ffffff; box-shadow: 0 3px 6px rgba(217, 119, 6, 0.3); border: 1px solid #fff; }
        .lottery-ball.advanced-weekly { background: linear-gradient(135deg, #06b6d4, #0891b2); color: #ffffff; box-shadow: 0 3px 6px rgba(8, 145, 178, 0.3); border: 1px solid #fff; }

        /* 3. 👑 神級階級 (魅影紫/翡翠綠) - 極致防守 */
        .lottery-ball.god-tier-ball { 
            border: 2px solid #fbbf24; background: linear-gradient(135deg, #a855f7, #6b21a8); color: #ffffff;
            box-shadow: 0 0 15px #a855f7; animation: pulse-purple 1.5s infinite alternate; 
        }
        .lottery-ball.god-tier-weekly { 
            border: 2px solid #ffffff; background: linear-gradient(135deg, #22c55e, #15803d); color: #ffffff;
            box-shadow: 0 0 15px #22c55e; animation: pulse-green 1.5s infinite alternate; 
        }
        
        @keyframes pulse-purple { from { transform: scale(1); } to { transform: scale(1.08); } }
        @keyframes pulse-green { from { transform: scale(1); } to { transform: scale(1.08); } }

        .heatmap-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .heatmap-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .heatmap-box {
            position: relative; display: inline-flex; align-items: center; justify-content: center;
            width: 42px; height: 42px; border-radius: 12px; font-weight: 700; font-size: 15px;
        }
        .heatmap-badge {
            position: absolute; top: -8px; right: -8px; background: #111; color: #fff;
            font-size: 10px; font-weight: bold; border-radius: 50%; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border: 2px solid var(--section-bg);
        }
        .omission-text { font-size: 11px; font-weight: 600; opacity: 0.8; }
        .omission-warn { color: #ef4444; font-weight: 800; }

        @media (max-width: 768px) {
            .container { padding: 20px 10px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <h1>三期牌 / 週牌</h1>

    <div id="statsGrid" class="stats-grid">
        <div class="stat-card"><div class="stat-label">👑 高機率三期 命中率</div><div id="godT" class="stat-value" style="color:#a855f7;">0%</div><div id="godTD" class="info-text"></div><div id="godTB" class="detailed-stats"></div></div>
        <div class="stat-card"><div class="stat-label">👑 高機率週牌 命中率</div><div id="godW" class="stat-value" style="color:#22c55e;">0%</div><div id="godWD" class="info-text"></div><div id="godWB" class="detailed-stats"></div></div>
        <div class="stat-card"><div class="stat-label">⭐ 中機率三期牌 命中率</div><div id="advT" class="stat-value" style="color:#f59e0b;">0%</div><div id="advTD" class="info-text"></div><div id="advTB" class="detailed-stats"></div></div>
        <div class="stat-card"><div class="stat-label">⭐ 中機率週牌 命中率</div><div id="advW" class="stat-value" style="color:#06b6d4;">0%</div><div id="advWD" class="info-text"></div><div id="advWB" class="detailed-stats"></div></div>
        <div class="stat-card"><div class="stat-label">常規三期牌 命中率</div><div id="norT" class="stat-value">0%</div><div id="norTD" class="info-text"></div><div id="norTB" class="detailed-stats"></div></div>
        <div class="stat-card"><div class="stat-label">常規週牌 命中率</div><div id="norW" class="stat-value">0%</div><div id="norWD" class="info-text"></div><div id="norWB" class="detailed-stats"></div></div>
    </div>

    <div class="section">
        <div class="section-title">開獎數據載入</div>
        <div class="control-group" id="gameTypeRow"><select id="gameType"><option value="mark6">🇭🇰 香港 六合彩</option><option value="649">🇹🇼 台灣 大樂透</option><option value="539">🇹🇼 台灣 今彩 539</option><option value="daily4">🇺🇸 加州 天天樂</option><option value="ghana">🇬🇭 迦納彩</option></select></div>
        <div class="control-group">
            <div id="manualUploadRow"><input type="file" id="csvFile" accept=".csv"></div>
            <select id="autoLoadCsv"><option value="">-- 請選擇彩球種類 --</option><option value="Six_history_2026.csv">🇭🇰 香港 六合彩</option><option value="649_history_2026.csv">🇹🇼 台灣 大樂透</option><option value="539_history_2026.csv">🇹🇼 台灣 今彩 539</option><option value="Fan_history_2026.csv">🇺🇸 加州 天天樂</option><option value="Ghana_history_2026.csv">🇬🇭 迦納彩</option></select>
        </div>
    </div>

    <div class="section"><div class="section-title">熱度分佈圖</div><div id="heatmapContainer" class="heatmap-container"></div></div>
    <div class="section"><div class="section-title">當前追蹤中 (中一即停)</div><div class="table-responsive"><table><thead><tr><th>類型</th><th>目標號碼</th><th>起始日期</th><th>剩餘</th><th>狀態</th></tr></thead><tbody id="activeBody"></tbody></table></div></div>
    <div class="section"><div class="section-title">完整歷史命中紀錄</div><div class="history-container table-responsive"><table><thead><tr><th>起始日期</th><th>類型</th><th>目標號碼</th><th>結果</th><th>詳情</th></tr></thead><tbody id="historyBody"></tbody></table></div></div>
</div>

<script>
    let allRecords = []; let currentHistoryData = [];
    function toggleTheme() { const b = document.body; const t = b.getAttribute('data-theme'); const btn = document.querySelector('.theme-toggle'); if (t === 'dark') { b.removeAttribute('data-theme'); btn.textContent = '🌙'; } else { b.setAttribute('data-theme', 'dark'); btn.textContent = '☀️'; } }
    function getFreq(n, idx) { if (!currentHistoryData.length) return 0; let s = Math.max(0, idx - 9), c = 0; for (let i = s; i <= idx; i++) if (currentHistoryData[i].nums.includes(n)) c++; return c; }
    function getTFreq(tail, idx) { if (!currentHistoryData.length) return 0; let s = Math.max(0, idx - 9), c = 0; for (let i = s; i <= idx; i++) currentHistoryData[i].nums.forEach(n => { if (n % 10 === tail) c++; }); return c; }
    function getRep(idx) { if (idx < 1) return 0; let l = currentHistoryData[idx].nums, p = currentHistoryData[idx-1].nums; return l.filter(n => p.includes(n)).length; }
    function getOmi(n, idx) { let o = 0; for (let i = idx; i >= 0; i--) { if (currentHistoryData[i].nums.includes(n)) return o; o++; } return o; }

    function formatBalls(nums, isT, type, idx) {
        return `<div class="ball-container">${nums.map(n => {
            let cls = "";
            if (isT) {
                if (type.includes('👑')) cls = type.includes('三期') ? " god-tier-ball" : " god-tier-weekly";
                else if (type.includes('⭐')) cls = type.includes('三期') ? " advanced-3p" : " advanced-weekly";
                else cls = type.includes('三期') ? " normal-3p" : " normal-weekly";
            }
            return `<span class="lottery-ball${cls}">${n.toString().padStart(2, '0')}</span>`;
        }).join('')}</div>`;
    }

    document.getElementById('autoLoadCsv').addEventListener('change', e => { if (!e.target.value) return; fetch(e.target.value).then(r => r.text()).then(t => processCSV(t)); });
    document.getElementById('csvFile').addEventListener('change', e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => processCSV(r.result); r.readAsText(f); });
    document.getElementById('gameType').addEventListener('change', () => { if(currentHistoryData.length) recalculateAll(); });

    function processCSV(text) {
        const lines = text.trim().split('\n'); currentHistoryData = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(','); if(cols.length >= 6) {
                let ns = []; for(let c=1; c<cols.length; c++) { let v = parseInt(cols[c]); if(!isNaN(v)) ns.push(v); }
                currentHistoryData.push({ date: cols[0].trim(), nums: ns });
            }
        } recalculateAll();
    }

    function recalculateAll() {
        allRecords = []; const gt = document.getElementById('gameType').value;
        for(let i = 0; i < currentHistoryData.length; i++) {
            const draw = currentHistoryData[i];
            allRecords.forEach(r => { if(r.status === '進行中') { const hits = r.targets.filter(n => draw.nums.includes(n)); if(hits.length > 0) { r.status = '命中停止'; r.hitInfo = `${draw.date} 開出 ${formatBalls(hits, false)}`; } else { r.life--; if(r.life <= 0) { r.status = '未中結束'; r.hitInfo = '-'; } } } });
            generateTargets(i);
        } renderTables(); renderHeatmap();
    }

    function generateTargets(idx) {
        const draw = currentHistoryData[idx]; const date = draw.date; const gt = document.getElementById('gameType').value;
        const maxN = (gt === '649' || gt === 'mark6') ? 49 : 39;
        let main = draw.nums.slice(0, (gt === '649' || gt === 'mark6' ? 6 : 5)).sort((a,b)=>a-b);
        let currentDrawTargets = new Set();

        // 1. 產生常規三期牌 (Normal)
        for(let i=0; i<main.length-1; i++) {
            let diff = main[i+1] - main[i];
            let t = [];
            if (gt==='mark6' && diff===6) t=[main[i]+1,main[i]+2,main[i]+3,main[i]+4,main[i]+5];
            else if (gt==='649' && diff===7) t=[main[i]+1,main[i]+2,main[i]+3,main[i]+4,main[i]+5,main[i]+6];
            else if (['539','daily4','ghana'].includes(gt)) {
                if(diff===4) t=[main[i]+1,main[i]+2,main[i]+3];
                else if(diff===5) t=[main[i]+1,main[i]+2,main[i]+3,main[i]+4];
                else if(diff===6) t=[main[i]+1,main[i]+2,main[i]+3,main[i]+4,main[i]+5];
            }
            if(t.length) { allRecords.push({ type: '三期牌 (連號)', targets: t, startDate: date, life: 3, status: '進行中', drawIndex: idx }); t.forEach(n=>currentDrawTargets.add(n)); }
        }
        const tc = {}; main.map(n => n % 10).forEach(t => tc[t] = (tc[t] || 0) + 1);
        for(let t in tc) if(tc[t] >= 2) { let tg = main.filter(n => n % 10 == t); allRecords.push({ type: `三期牌 (同尾)`, targets: tg, startDate: date, life: 3, status: '進行中', drawIndex: idx }); tg.forEach(n=>currentDrawTargets.add(n)); }

        // 2. 獨立抽出神級(👑)與高級(⭐)三期牌
        if (['539', 'daily4', 'ghana', '649', 'mark6'].includes(gt)) {
            let god3P = [], adv3P = []; let rep = getRep(idx);
            currentDrawTargets.forEach(n => {
                let omi = getOmi(n, idx), tf = getTFreq(n % 10, idx), isOdd = n % 2 !== 0;
                let isGod = false, isAdv = false;
                if(gt === 'daily4') {
                    if (omi>=8 && omi<=11 && rep === 0 && [6,7].includes(tf) && isOdd) isGod = true;
                    else if (omi>=8 && omi<=11 && rep <= 1 && [4,5,6,7].includes(tf)) isAdv = true;
                } else if(gt === '539') {
                    if (omi>=8 && omi<=15 && rep === 0 && [6,7,8].includes(tf)) isGod = true;
                    else if (omi>=8 && omi<=15 && rep <= 1 && [5,6,7,8].includes(tf)) isAdv = true;
                } else if(gt === 'ghana') {
                    if (omi>=2 && omi<=15 && rep >= 3 && [5,6,7].includes(tf)) isGod = true;
                    else if (omi>=2 && omi<=15 && rep >= 2 && [4,5,6,7].includes(tf)) isAdv = true;
                } else if(gt === '649') { if ([6,7,12].includes(omi) && rep === 0 && tf === 2 && isOdd) isGod = true; }
                else if(gt === 'mark6') { if ([8,9,15].includes(omi) && rep <= 1 && [5,6,7].includes(tf) && n <= 25) isGod = true; }
                
                if (isGod) god3P.push(n); else if (isAdv) adv3P.push(n);
            });
            if (god3P.length) allRecords.push({ type: '👑 高機率三期牌', targets: god3P, startDate: date, life: 3, status: '進行中', drawIndex: idx });
            if (adv3P.length) allRecords.push({ type: '⭐ 中機率三期牌', targets: adv3P, startDate: date, life: 3, status: '進行中', drawIndex: idx });
        }

        // 3. 週牌分級
        const day = new Date("2026/" + date).getDay(); let isW = (gt === 'daily4' && day === 0) || (['539','ghana'].includes(gt) && day === 6);
        if(isW) { 
            let sIdx = Math.max(0, idx - 9), past = []; for(let k=sIdx;k<=idx;k++) past.push(...currentHistoryData[k].nums.slice(0,5));
            let fq = {}; past.forEach(n => fq[n] = (fq[n] || 0) + 1);
            let top6 = Object.keys(fq).map(Number).sort((a,b) => fq[b]-fq[a] || a-b).slice(0,6);
            allRecords.push({ type: `週牌 (常規)`, targets: top6, startDate: date, life: 6, status: '進行中', drawIndex: idx });
            let godW = [], advW = [];
            top6.forEach(n => {
                let o = getOmi(n, idx), f = getFreq(n, idx);
                let isTargetOmi = (gt === 'daily4' && [0,1,2].includes(o)) || (gt === '539' && [0,1].includes(o)) || (gt === 'ghana' && [0,1,2].includes(o));
                if (isTargetOmi) {
                    let isGS = false, isAS = false;
                    if(gt === 'daily4') { if (f===5 || (f===4 && o===0) || (f===2 && o===1)) isGS = true; else if (f===4 || (f===3 && o<=1)) isAS = true; }
                    else if(gt === '539') { if ((f===2 && o===0) || (f===5 && o===0)) isGS = true; else if (f===3 || (f===4 && o===0)) isAS = true; }
                    else if(gt === 'ghana') { if ((f===2 && [1,2].includes(o)) || (f===4 && o===2)) isGS = true; else if (f===3 || f===5) isAS = true; }
                    if (isGS) godW.push(n); else if (isAS) advW.push(n);
                }
            });
            if (godW.length) allRecords.push({ type: '👑 高機率週牌', targets: godW, startDate: date, life: 6, status: '進行中', drawIndex: idx });
            if (advW.length) allRecords.push({ type: '⭐ 中機率週牌', targets: advW, startDate: date, life: 6, status: '進行中', drawIndex: idx });
        }
    }

    function renderTables() {
        const ab = document.getElementById('activeBody'); const hb = document.getElementById('historyBody'); ab.innerHTML = hb.innerHTML = '';
        let stats = { godT:{t:0,h:0}, godW:{t:0,h:0}, advT:{t:0,h:0}, advW:{t:0,h:0}, norT:{t:0,h:0}, norW:{t:0,h:0} };
        let typeStats = {};
        [...allRecords].reverse().forEach(t => {
            const isG = t.type.includes('👑'), isA = t.type.includes('⭐'), is3 = t.type.includes('三期');
            if(t.status !== '進行中') {
                if (!typeStats[t.type]) typeStats[t.type] = { total: 0, hits: 0 }; typeStats[t.type].total++;
                let key = (isG ? 'god' : (isA ? 'adv' : 'nor')) + (is3 ? 'T' : 'W'); stats[key].t++;
                if(t.status === '命中停止') { stats[key].h++; typeStats[t.type].hits++; }
            }
            const sCls = t.status === '進行中' ? 'status-active' : (t.status === '命中停止' ? 'status-hit' : 'status-miss');
            const row = `<td style="${isG||isA?'background:#fffbeb':''}"><span style="font-weight:700;">${t.type}</span></td><td>${formatBalls(t.targets, true, t.type, t.drawIndex)}</td><td>${t.startDate}</td><td>${t.status==='進行中'?t.life:'-'}</td><td><span class="${sCls}">${t.status}</span></td>`;
            if(t.status === '進行中') ab.innerHTML += `<tr>${row}</tr>`; else hb.innerHTML += `<tr><td>${t.startDate}</td>${row.replace(`<td>${t.startDate}</td>`,'')}<td><span style="font-size:0.9em;">${t.hitInfo||'-'}</span></td></tr>`;
        });
        Object.keys(stats).forEach(k => { document.getElementById(k).innerText = stats[k].t ? (stats[k].h/stats[k].t*100).toFixed(1)+'%' : '0%'; document.getElementById(k+'D').innerText = `結束:${stats[k].t}|命中:${stats[k].h}`; });
        let bks = { godT: 'godTB', godW: 'godWB', advT: 'advTB', advW: 'advWB', norT: 'norTB', norW: 'norWB' };
        Object.keys(bks).forEach(id => document.getElementById(bks[id]).innerHTML = '');
        Object.keys(typeStats).sort((a,b) => (typeStats[b].hits/typeStats[b].total)-(typeStats[a].hits/typeStats[a].total)).forEach(type => {
            let s = typeStats[type], r = (s.hits/s.total*100).toFixed(1)+'%', isG = type.includes('👑'), isA = type.includes('⭐'), is3 = type.includes('三期');
            let key = (isG ? 'god' : (isA ? 'adv' : 'nor')) + (is3 ? 'T' : 'W');
            document.getElementById(bks[key]).innerHTML += `<div class="detailed-stats-row"><span>${type}</span><span style="font-weight:700;">${s.hits}/${s.total}(${r})</span></div>`;
        });
    }

    function renderHeatmap() {
        const container = document.getElementById('heatmapContainer'); container.innerHTML = ''; if(!currentHistoryData.length) return;
        const gt = document.getElementById('gameType').value; const maxN = (gt === '649' || gt === 'mark6') ? 49 : 39;
        const recent = currentHistoryData.slice(-10); const freq = {}; for(let i=1; i<=maxN; i++) freq[i] = 0;
        recent.forEach(d => d.nums.forEach(n => { if(n <= maxN) freq[n]++; }));
        for(let i=1; i<=maxN; i++) {
            let c = freq[i], o = getOmi(i, currentHistoryData.length-1); let item = document.createElement('div'); item.className = 'heatmap-item';
            let bg = c===0?'#f1f5f9':(c===1?'#4ade80':(c===2?'#fbbf24':'#ef4444'));
            item.innerHTML = `<div class="heatmap-box" style="background:${bg}; color:${c>0?'#fff':'#94a3b8'}">${i.toString().padStart(2,'0')}${c>0?`<span class="heatmap-badge">${c}</span>`:''}</div><span class="omission-text${o>=15?' omission-warn':''}">漏${o}</span>`;
            container.appendChild(item);
        }
    }
</script>
