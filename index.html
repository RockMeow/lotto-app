<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綜合數據分析工具箱 - 首頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }</style>
</head>
<body>
    <div class="bg-slate-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex flex-wrap gap-2 sm:gap-4 justify-center">
            <a href="index.html" class="px-5 py-2.5 rounded-lg font-bold text-white bg-slate-600 shadow-md transition-all">🏠 首頁</a>
            <a href="tool1.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">立柱撞柱工具</a>
            <a href="tool2.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">複合分析工具</a>
            <a href="tool3.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">尾數拖牌工具</a>
            <a href="tool4.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">柱碰版路工具</a>
        </div>
    </div>

    <div class="py-12 px-4 max-w-4xl mx-auto text-center">
        <h1 class="text-4xl font-black text-slate-800 mb-6 flex items-center justify-center gap-3">
            <i data-lucide="layout-dashboard" class="w-10 h-10 text-indigo-600"></i>
            綜合數據分析工具箱
        </h1>
        <p class="text-lg text-slate-600 mb-10 font-medium">請從上方選單或下方卡片選擇您要使用的分析工具。</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <a href="tool1.html" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-blue-400 transition-all flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center"><i data-lucide="columns" class="w-8 h-8"></i></div>
                <h2 class="text-xl font-bold text-slate-800">立柱撞柱工具</h2>
                <p class="text-sm text-slate-500">自動計算碰數成本與偵測撞柱。</p>
            </a>
            <a href="tool2.html" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-indigo-400 transition-all flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center"><i data-lucide="radar" class="w-8 h-8"></i></div>
                <h2 class="text-xl font-bold text-slate-800">複合分析工具</h2>
                <p class="text-sm text-slate-500">頭尾數矩陣與二中一車牌預測。</p>
            </a>
            <a href="tool3.html" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-red-400 transition-all flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center"><i data-lucide="scan-line" class="w-8 h-8"></i></div>
                <h2 class="text-xl font-bold text-slate-800">尾數拖牌工具</h2>
                <p class="text-sm text-slate-500">掃描歷史最高勝率的拖牌版路。</p>
            </a>
            <a href="tool4.html" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-teal-400 transition-all flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center"><i data-lucide="network" class="w-8 h-8"></i></div>
                <h2 class="text-xl font-bold text-slate-800">柱碰版路工具</h2>
                <p class="text-sm text-slate-500">自訂立柱回測歷史跨柱連碰狀況。</p>
            </a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
