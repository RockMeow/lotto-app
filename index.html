<script>
    function getTailBalls(tail) {
        let b = [];
        for(let i=0; i<=3; i++) { let n = i*10+tail; if(n>0 && n<=39) b.push(n); }
        return b;
    }

    function analyze() {
        let lines = document.getElementById('csvData').value.trim().split('\n');
        let data = [];
        lines.forEach(l => {
            let c = l.split(','); if(isNaN(parseInt(c[1]))) return;
            let d = c[0].split('/');
            let dt = new Date(2026, parseInt(d[0])-1, parseInt(d[1]));
            data.push({ date: c[0], nums: [parseInt(c[1]), parseInt(c[2]), parseInt(c[3]), parseInt(c[4]), parseInt(c[5])].sort((a,b)=>a-b), dow: dt.getDay(), day: parseInt(d[1]) });
        });

        let output = '';
        let patterns = [];

        // 引擎 1：星期四日曆版路
        for(let off=0; off<10; off++) {
            let hits=0, valid=0;
            for(let k=0; k<data.length; k++) {
                if(data[k].dow === 4) {
                    valid++;
                    let tail = (data[k].day + off) % 10;
                    let target = getTailBalls(tail);
                    let hit = false;
                    if(data[k].nums.some(n => target.includes(n)) || (k+1<data.length && data[k+1].dow === 5 && data[k+1].nums.some(n => target.includes(n)))) hit=true;
                    if(hit) hits++;
                }
            }
            if(valid > 0) patterns.push({ desc: `四日期+${off}尾數`, score: (hits/valid)*100, hits, valid, targets: getTailBalls((data[data.length-1].day + off) % 10) });
        }

        // 引擎 2：星期六第3顆尾數
        let lastSat = data.filter(d => d.dow === 6).pop();
        if(lastSat) {
            let tail = lastSat.nums[2] % 10;
            let hits=0, valid=0;
            data.forEach((d, k) => {
                if(d.dow === 5) {
                    let prevSat = data.filter((p, i) => i < k && p.dow === 6).pop();
                    if(prevSat) {
                        valid++;
                        let target = getTailBalls(prevSat.nums[2] % 10);
                        if(d.nums.some(n => target.includes(n)) || (k+1<data.length && data[k+1].dow === 6 && data[k+1].nums.some(n => target.includes(n)))) hits++;
                    }
                }
            });
            patterns.push({ desc: `上週六第3顆尾數`, score: (hits/valid)*100, hits, valid, targets: getTailBalls(tail) });
        }

        patterns.sort((a,b) => b.score - a.score);
        patterns.forEach(p => {
            output += `<div class="pred-card"><span class="score-tag">勝率 ${p.score.toFixed(1)}% (${p.hits}/${p.valid})</span><h3>${p.desc}</h3><span class="nums-highlight">${p.targets.join(', ')}</span></div>`;
        });
        document.getElementById('predictionArea').innerHTML = output;
    }
</script>
