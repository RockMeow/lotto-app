<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>版路分析工具</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="版路工具">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-active: #2563eb;
            --bg: #f8fafc; /* 更柔和的底色 */
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --warning: #b45309;
            --warning-bg: #fffbeb;
            --warning-border: #fde68a;
            --success: #15803d;
            --success-bg: #dcfce7;
        }

        /* 基礎設定 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊閃爍 */
        }
        
        .app-container { 
            max-width: 480px; 
            margin: 0 auto; 
            background-color: var(--bg); 
            min-height: 100vh; 
            padding-bottom: 60px; 
        }

        /* 標題列：原生毛玻璃效果 */
        .app-header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            padding: 18px 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            text-align: center; 
        }
        .app-header h1 { 
            margin: 0; 
            font-size: 18px; 
            color: var(--text-main); 
            font-weight: 800; 
            letter-spacing: 0.5px; 
        }

        .content { padding: 16px; }

        /* 控制面板：現代卡片風 */
        .control-panel { 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 24px 20px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin-bottom: 24px; 
        }
        .form-group { display: flex; flex-direction: column; }
        label { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-main); 
            margin-bottom: 10px; 
            padding-left: 4px; 
        }

        /* 下拉選單：加大字體防 iOS 縮放 */
        select { 
            width: 100%; 
            appearance: none; 
            -webkit-appearance: none; 
            background-color: #f8fafc; 
            border: 1.5px solid var(--border); 
            padding: 16px 20px; 
            border-radius: 16px; 
            font-size: 16px; /* 關鍵：防 iOS 放大 */
            font-weight: 600;
            color: var(--text-main); 
            box-sizing: border-box; 
            transition: all 0.2s ease; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; 
            background-position: right 16px center; 
            background-size: 18px; 
            padding-right: 44px; 
        }
        select:focus { outline: none; border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        /* 成立次數：iOS Segmented Control 風格 */
        .button-group { 
            display: flex; 
            background-color: #f1f5f9; 
            padding: 4px; 
            border-radius: 16px; 
            width: 100%; 
            box-sizing: border-box;
        }
        .toggle-btn { 
            flex: 1; 
            background-color: transparent; 
            border: none; 
            padding: 14px 8px; 
            border-radius: 12px; 
            font-size: 15px; 
            color: var(--text-muted); 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .toggle-btn.active { 
            background-color: #ffffff; 
            color: var(--primary-active); 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); 
        }

        /* 底部開始按鈕：圓潤漂浮感 */
        button.start-btn { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-active) 100%); 
            color: white; 
            border: none; 
            padding: 18px; 
            font-size: 18px; 
            font-weight: 800; 
            border-radius: 100px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 12px; 
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); 
            transition: transform 0.15s, box-shadow 0.15s; 
        }
        button.start-btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        button.start-btn:disabled { background: #cbd5e1; box-shadow: none; color: #f8fafc; }

        /* 系統提示文字 */
        .loading-text { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 15px; 
            line-height: 1.6; 
            padding: 40px 20px; 
            background: var(--card-bg); 
            border-radius: 24px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); 
            font-weight: 600;
        }

        /* 預測結果區塊 */
        .pred-block { 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 24px 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); 
        }
        .pred-title { 
            color: var(--primary-active); 
            font-size: 20px; 
            font-weight: 900; 
            margin-bottom: 20px; 
            padding-bottom: 16px; 
            border-bottom: 1.5px solid #f1f5f9; 
            text-align: center;
        }

        /* 版路折疊面板 */
        .pattern-container { margin-bottom: 16px; border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; }
        .pattern-header { 
            background: #ffffff; 
            padding: 18px 16px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 12px; 
            transition: background 0.2s; 
        }
        .pattern-header:active { background: #f8fafc; }
        .pattern-header-text { 
            flex: 1; 
            font-size: 15px; 
            font-weight: 700; 
            color: var(--text-main); 
            line-height: 1.6; 
            display: flex; 
            align-items: flex-start; 
            gap: 10px; 
        }
        
        /* 標籤美化 */
        .hit-count { 
            background: var(--danger-bg); 
            color: var(--danger); 
            padding: 6px 14px; 
            border-radius: 100px; 
            font-size: 13px; 
            font-weight: 800; 
            white-space: nowrap; 
            flex-shrink: 0; 
        }
        .due-badge { 
            background: var(--warning-border); 
            color: #854d0e; 
            padding: 4px 10px; 
            border-radius: 100px; 
            font-size: 12px; 
            font-weight: 800; 
            margin-left: 6px; 
            vertical-align: middle; 
            display: inline-block; 
        }

        /* 細節展開動畫設定 */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pattern-details { 
            display: none; 
            background: #f8fafc; 
            border-top: 1.5px solid var(--border); 
            padding: 20px 16px 16px; 
            font-size: 14px; 
            color: #475569; 
            animation: slideDown 0.3s ease-out forwards;
        }
        .detail-item { 
            border-bottom: 1.5px dashed #cbd5e1; 
            padding-bottom: 16px; 
            margin-bottom: 16px; 
            line-height: 1.7; 
        }
        .detail-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .date-badge { 
            display: inline-block; 
            background: #e2e8f0; 
            color: #334155; 
            padding: 4px 10px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: 700; 
            margin-right: 6px; 
        }
        .target-badge { background: var(--success-bg); color: var(--success); }
        .detail-title { font-weight: 800; color: #64748b; margin-bottom: 10px; font-size: 14px; }
        .highlight-num { color: var(--danger); font-weight: 900; font-size: 16px; }
        
        .due-item { 
            background-color: var(--warning-bg); 
            border: 1.5px solid var(--warning-border); 
            padding: 18px; 
            margin-top: 20px; 
            border-radius: 16px; 
            line-height: 1.7; 
            box-shadow: 0 4px 12px rgba(250, 204, 21, 0.1); 
        }
        .due-title { font-weight: 900; color: var(--warning); margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <h1>版路分析工具</h1>
    </header>
    
    <div class="content">
        <div class="control-panel">
            <div class="form-group">
                <label>選擇彩券類型</label>
                <select id="csvSource" onchange="fetchGoogleCSV()">
                    <option value="">請選擇彩券...</option>
                    <option value="./539_history_all_sorted.csv">今彩539</option>
                    <option value="./649_history_all_sorted.csv">大樂透</option>
                    <option value="./Fan_history_all_sorted.csv">天天樂</option>
                    <option value="./Six_history_all_sorted.csv">六合彩</option>
                </select>
            </div>
            <div class="form-group">
                <label>版路功能</label>
                <select id="logicType">
                    <option value="add_sub">加減</option>
                    <option value="drag">拖牌</option>
                    <option value="sum_val">合值</option>
                </select>
            </div>
            <div class="form-group">
                <label>比對期數</label>
                <select id="period">
                    <option value="1">一期</option>
                    <option value="6">六期</option>
                    <option value="12">十二期</option>
                </select>
            </div>
            <div class="form-group">
                <label>成立次數</label>
                <div class="button-group" id="outCountGroup">
                    <button type="button" class="toggle-btn active" data-value="1">準5+ (輸出1碼)</button>
                    <button type="button" class="toggle-btn" data-value="2">準7+ (輸出2碼)</button>
                </div>
            </div>
            <button id="startBtn" class="start-btn" onclick="startAnalysis()">開始分析</button>
        </div>

        <div id="resultBox">
            <div class="loading-text">請先從上方選單選擇彩券類型。</div>
        </div>
    </div>
</div>

<script>
    let historicalData = [];
    let globalMaxLottoNum = 39; 
    let globalBallCount = 5;    

    document.querySelectorAll('#outCountGroup .toggle-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#outCountGroup .toggle-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    function padZero(num) { return num < 10 ? '0' + num : num.toString(); }

    async function fetchGoogleCSV() {
        const url = document.getElementById('csvSource').value;
        const resultBox = document.getElementById('resultBox');
        
        if (!url || url.includes('請替換成')) {
            resultBox.innerHTML = `<div class="loading-text">請先從上方選單選擇彩券類型。</div>`;
            historicalData = [];
            return;
        }

        resultBox.innerHTML = `<div class="loading-text">🔄 正在抓取最新資料...<br><span style="font-weight:normal; font-size:13px; color:#94a3b8;">請稍候...</span></div>`;
        
        try {
            const fetchUrl = url + (url.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
            const response = await fetch(fetchUrl);
            
            if (!response.ok) throw new Error(`HTTP 錯誤碼: ${response.status}`);
            
            const text = await response.text();
            parseCSV(text);
        } catch (error) {
            resultBox.innerHTML = `<div class="loading-text" style="color:#ef4444;">❌ 載入失敗：無法取得最新資料。<br><span style="font-size:13px; font-weight:normal; color:#f87171;">錯誤訊息：${error.message}</span></div>`;
        }
    }

    function parseCSV(text) {
        const lines = text.trim().split('\n');
        historicalData = [];
        let maxNum = 0;

        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',').map(item => item.trim()).filter(item => item !== '');
            if (cols.length >= 2) { 
                const date = cols[0];
                const nums = cols.slice(1).map(n => parseInt(n, 10)).filter(n => !isNaN(n));
                if (nums.length > 0) {
                    historicalData.push({ date: date, numbers: nums });
                    nums.forEach(n => { if(n > maxNum) maxNum = n; });
                }
            }
        }
        
        if (historicalData.length > 0) {
            globalBallCount = historicalData[0].numbers.length;
            globalMaxLottoNum = maxNum || 39;
            
            let successHtml = `<div class="loading-text" style="color:#2563eb;">✅ 成功載入資料！共 ${historicalData.length} 期紀錄。<br><span style="font-weight:normal; font-size:13px; color:#64748b; margin-top:8px; display:block;">🔍 自動偵測：每期 ${globalBallCount} 顆號碼，最大號碼 ${globalMaxLottoNum}</span></div>`;
            
            let recent10 = historicalData.slice(-10).reverse();
            let recentHtml = `
            <div class="pred-block" style="margin-top: 20px;">
                <div class="pred-title" style="font-size: 16px;">📊 最新 10 期開獎紀錄</div>
                <div style="background: #f8fafc; border-radius: 16px; padding: 4px 16px; border: 1px solid var(--border);">
            `;
            
            recent10.forEach((item, index) => {
                let numsStr = item.numbers.map(n => padZero(n)).join(', ');
                let borderStyle = index === recent10.length - 1 ? '' : 'border-bottom: 1.5px dashed #e2e8f0;';
                recentHtml += `
                    <div style="padding: 14px 0; display: flex; align-items: center; justify-content: space-between; ${borderStyle}">
                        <span class="date-badge" style="margin: 0; background: #e2e8f0; color: #475569;">${item.date}</span>
                        <span style="font-weight: 800; color: #0f172a; font-size: 15px; letter-spacing: 1px;">${numsStr}</span>
                    </div>
                `;
            });
            
            recentHtml += `</div></div>`;
            
            document.getElementById('resultBox').innerHTML = successHtml + recentHtml;
        } else {
            document.getElementById('resultBox').innerHTML = `<div class="loading-text" style="color:#ef4444;">❌ 檔案解析失敗。</div>`;
        }
    }

    function startAnalysis() {
        if (historicalData.length === 0) { alert('請先選擇彩券類型並等待資料載入！'); return; }
        
        const logicText = document.getElementById('logicType').options[document.getElementById('logicType').selectedIndex].text;
        
        document.getElementById('startBtn').disabled = true;
        document.getElementById('startBtn').innerText = '分析中...';
        document.getElementById('resultBox').innerHTML = `<div class="loading-text">正在分析${logicText}版路...<br><span style="font-weight:normal; font-size:13px; color:#94a3b8;">請稍候...</span></div>`;

        setTimeout(() => { runEngine(); }, 100);
    }

    function runEngine() {
        const logicType = document.getElementById('logicType').value;
        const maxT = parseInt(document.getElementById('period').value);
        const outCount = parseInt(document.querySelector('#outCountGroup .toggle-btn.active').dataset.value);
        
        const minHits = outCount === 1 ? 5 : 7;
        const checkStreak = (len) => {
            if (outCount === 1) return len >= 5;
            if (outCount === 2) return len === 7 || len === 9;
            return false;
        };
        
        const L = historicalData.length - 1; 
        let results = {}; 
        
        let maxOffset = (logicType === 'drag') ? 0 : 15; 
        let minOffset = (logicType === 'drag') ? 0 : -15; 

        let valCombsAddSub = [];
        for (let v1 = 0; v1 < globalMaxLottoNum; v1++) {
            if (outCount === 1) valCombsAddSub.push([v1]);
            else for (let v2 = v1 + 1; v2 < globalMaxLottoNum; v2++) valCombsAddSub.push([v1, v2]);
        }
        
        let valCombsSum = [];
        let maxSumLimit = globalMaxLottoNum * 2 + 2;
        for (let z1 = 10; z1 <= maxSumLimit; z1++) {
            if (outCount === 1) valCombsSum.push([z1]);
            else for (let z2 = z1 + 1; z2 <= maxSumLimit; z2++) valCombsSum.push([z1, z2]);
        }

        let maxLottoNum = globalMaxLottoNum;
        let modNum = (num) => ((num % maxLottoNum) + maxLottoNum) % maxLottoNum || maxLottoNum;

        for (let T = 1; T <= maxT; T++) {
            let L_trigger = L - T + 1; 
            if (L_trigger < 0) continue;

            for (let P1 = 0; P1 < globalBallCount; P1++) {
                let X = historicalData[L_trigger].numbers[P1]; 
                
                let H_list = [];
                for (let i = 0; i < L_trigger; i++) {
                    if (historicalData[i].numbers[P1] === X) H_list.push(i);
                }
                if (H_list.length < minHits) continue;
                
                for (let O = minOffset; O <= maxOffset; O++) {
                    let L_ref = L_trigger - O;
                    if (L_ref < 0 || L_ref > L) continue; 
                    
                    for (let P2 = 0; P2 < globalBallCount; P2++) {
                        if (logicType === 'drag' && P2 !== P1) continue;

                        let RefNum = historicalData[L_ref].numbers[P2];

                        if (logicType === 'add_sub' || logicType === 'drag') {
                            for (let vals of valCombsAddSub) {
                                let predsAdd = vals.map(v => modNum(RefNum + v));
                                let hitsArrayAdd = findActiveStreakExact(H_list, L_trigger, O, P2, vals, 'add', T, L);
                                if (checkStreak(hitsArrayAdd.length)) {
                                    recordResult(results, predsAdd, hitsArrayAdd, P1, X, O, P2, getOpStr(vals, 'add'), T, L_trigger);
                                }
                                
                                let isAllZero = vals.every(v => v === 0);
                                if (!isAllZero) {
                                    let predsSub = vals.map(v => modNum(RefNum - v));
                                    let hitsArraySub = findActiveStreakExact(H_list, L_trigger, O, P2, vals, 'sub', T, L);
                                    if (checkStreak(hitsArraySub.length)) {
                                        recordResult(results, predsSub, hitsArraySub, P1, X, O, P2, getOpStr(vals, 'sub'), T, L_trigger);
                                    }
                                }
                            }
                        }

                        if (logicType === 'sum_val') {
                            for (let vals of valCombsSum) {
                                let predsSum = vals.map(z => z - RefNum);
                                if (predsSum.every(p => p >= 1 && p <= globalMaxLottoNum)) {
                                    let hitsArraySum = findActiveStreakExact(H_list, L_trigger, O, P2, vals, 'sum', T, L);
                                    if (checkStreak(hitsArraySum.length)) {
                                        recordResult(results, predsSum, hitsArraySum, P1, X, O, P2, getOpStr(vals, 'sum'), T, L_trigger);
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        renderResults(results);
        
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn').innerText = '開始分析';
    }

    function getOpStr(vals, op) {
        if (op === 'add') return vals.map(v => '+' + v).join(', ');
        if (op === 'sub') return vals.map(v => '-' + v).join(', ');
        if (op === 'sum') return '合' + vals.join('、');
    }

    function findActiveStreakExact(H_list, L_trigger, O, P2, vals, op, T, L) {
        let maxLottoNum = globalMaxLottoNum;
        let modNum = (num) => ((num % maxLottoNum) + maxLottoNum) % maxLottoNum || maxLottoNum;

        let hitsInfo = [];
        let pastTriggers = H_list.slice().sort((a, b) => b - a);

        for (let h of pastTriggers) {
            let h_ref = h - O;
            if (h_ref < 0 || h_ref > L) break; 
            
            let ref_val = historicalData[h_ref].numbers[P2];
            let preds = [];
            let isValid = true;

            for(let val of vals) {
                let p = 0;
                if (op === 'add') p = modNum(ref_val + val);
                else if (op === 'sub') p = modNum(ref_val - val);
                else if (op === 'sum') {
                    p = val - ref_val;
                    if (p < 1 || p > maxLottoNum) isValid = false;
                }
                if (!isValid) break; 
                preds.push(p);
            }
            if (!isValid) break; 
            
            let target_idx = h + T; 
            if (target_idx > L) break;
            
            let targetNums = historicalData[target_idx].numbers;
            let matchedNums = preds.filter(p => targetNums.includes(p));

            if (matchedNums.length > 0) {
                hitsInfo.push({
                    triggerIdx: h,
                    refIdx: h_ref,
                    targetIdx: target_idx,
                    t: T,
                    refVal: ref_val,
                    vals: vals,
                    preds: preds,
                    matchedNums: matchedNums,
                    op: op
                });
            } else {
                break; 
            }
        }
        
        return hitsInfo.reverse();
    }

    function recordResult(results, preds, hitsArray, P1, X, O, P2, opStr, T, L_trigger) {
        let hitsCount = hitsArray.length; 
        let predKey = preds.slice().sort((a,b)=>a-b).map(p=>padZero(p)).join(', ');

        if (!results[predKey]) results[predKey] = { maxHits: 0, patterns: [] };
        
        let offsetStr = (O === 0) ? '同期' : (O > 0 ? `上 ${O} 期` : `下 ${Math.abs(O)} 期`);
        let desc = `開 [${padZero(X)}] 第 ${P1+1} 支，${offsetStr}，第 ${P2+1} 支 ${opStr} ， 下 ${T} 期開`;
        
        let exists = results[predKey].patterns.find(p => p.desc === desc);
        if (!exists) {
            results[predKey].patterns.push({
                desc: desc,
                hitsCount: hitsCount,
                details: hitsArray,
                P1: P1, X: X, O: O, P2: P2,
                T: T, L_trigger: L_trigger
            });
        }
        if (hitsCount > results[predKey].maxHits) {
            results[predKey].maxHits = hitsCount;
        }
    }

    function toggleDetails(id) {
        const el = document.getElementById(id);
        const icon = document.getElementById('icon_' + id);
        if (el.style.display === 'block') {
            el.style.display = 'none';
            icon.innerText = '❯';
            icon.style.transform = 'rotate(0deg)';
        } else {
            el.style.display = 'block';
            icon.innerText = '❯';
            icon.style.transform = 'rotate(90deg)';
        }
    }

    function renderResults(results) {
        const resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '';

        let sortedKeys = Object.keys(results).sort((a, b) => {
            if (results[b].maxHits !== results[a].maxHits) return results[b].maxHits - results[a].maxHits;
            return results[b].patterns.length - results[a].patterns.length;
        });

        if (sortedKeys.length === 0) {
            resultBox.innerHTML = `<div class="loading-text">未尋找到符合條件的版路。</div>`;
            return;
        }

        let patternIdCounter = 0;
        let maxLottoNum = globalMaxLottoNum;
        let modNum = (num) => ((num % maxLottoNum) + maxLottoNum) % maxLottoNum || maxLottoNum;

        sortedKeys.forEach(predKey => {
            let block = document.createElement('div');
            block.className = 'pred-block';
            
            let title = document.createElement('div');
            title.className = 'pred-title';
            title.innerText = `【 ${predKey} 】`;
            block.appendChild(title);

            let sortedPatterns = results[predKey].patterns.sort((a,b) => b.hitsCount - a.hitsCount);

            sortedPatterns.forEach(p => {
                let pId = 'pattern_' + patternIdCounter++;
                
                let detailsHtml = p.details.map((hit, idx) => {
                    let refDate = historicalData[hit.refIdx].date;
                    let refNums = historicalData[hit.refIdx].numbers.map(n => padZero(n)).join(', ');
                    let triggerDate = historicalData[hit.triggerIdx].date;
                    let triggerNums = historicalData[hit.triggerIdx].numbers.map(n => padZero(n)).join(', ');
                    let targetDate = historicalData[hit.targetIdx].date;
                    let targetNums = historicalData[hit.targetIdx].numbers.map(n => padZero(n)).join(', ');
                    
                    let mathStr = hit.vals.map((v, i) => {
                        let predNum = hit.preds[i];
                        let isThisNumHit = hit.matchedNums.includes(predNum);
                        let pStr = isThisNumHit ? `<span class="highlight-num">${padZero(predNum)}</span>` : padZero(predNum);
                        
                        if (hit.op === 'add') {
                            let raw = hit.refVal + v;
                            return raw > maxLottoNum ? `${padZero(hit.refVal)} + ${v} = ${raw} ➔ ${pStr}` : `${padZero(hit.refVal)} + ${v} = ${pStr}`;
                        }
                        if (hit.op === 'sub') {
                            let raw = hit.refVal - v;
                            return raw < 1 ? `${padZero(hit.refVal)} - ${v} = ${raw} ➔ ${pStr}` : `${padZero(hit.refVal)} - ${v} = ${pStr}`;
                        }
                        if (hit.op === 'sum') return `合${v}(${v} - ${padZero(hit.refVal)} = ${pStr})`;
                    }).join(' ， ');
                    
                    return `
                    <div class="detail-item">
                        <div class="detail-title">🔸 歷史連準 第 ${idx+1} 次:</div>
                        <div><span class="date-badge">${triggerDate}</span> 觸發期: (${triggerNums}) 第 ${p.P1+1} 支 <b>${padZero(p.X)}</b></div>
                        <div><span class="date-badge">${refDate}</span> 參考期: (${refNums}) 第 ${p.P2+1} 支 <b>${padZero(hit.refVal)}</b> ➔ ${mathStr}</div>
                        <div><span class="date-badge target-badge">${targetDate}</span> 下 ${hit.t} 期開出: <b>(${targetNums})</b> ✅</div>
                    </div>`;
                }).join('');

                let L_ref = p.L_trigger - p.O;
                let refDate = historicalData[L_ref].date;
                let refNums = historicalData[L_ref].numbers.map(n => padZero(n)).join(', ');
                let ref_val = historicalData[L_ref].numbers[p.P2];
                let triggerDate = historicalData[p.L_trigger].date;
                let triggerNums = historicalData[p.L_trigger].numbers.map(n => padZero(n)).join(', ');

                let dueMathStr = p.details[0].vals.map((v) => {
                    let p_num = 0; let raw = 0;
                    if (p.details[0].op === 'add') {
                        raw = ref_val + v; p_num = modNum(raw);
                        return raw > maxLottoNum ? `${padZero(ref_val)} + ${v} = ${raw} ➔ <b>${padZero(p_num)}</b>` : `${padZero(ref_val)} + ${v} = <b>${padZero(p_num)}</b>`;
                    }
                    if (p.details[0].op === 'sub') {
                        raw = ref_val - v; p_num = modNum(raw);
                        return raw < 1 ? `${padZero(ref_val)} - ${v} = ${raw} ➔ <b>${padZero(p_num)}</b>` : `${padZero(ref_val)} - ${v} = <b>${padZero(p_num)}</b>`;
                    }
                    if (p.details[0].op === 'sum') {
                        p_num = v - ref_val;
                        return `合${v}(${v} - ${padZero(ref_val)} = <b>${padZero(p_num)}</b>)`;
                    }
                }).join(' ， ');

                let dueHtml = `
                <div class="due-item">
                    <div class="due-title">🌟 最新一期計算:</div>
                    <div><span class="date-badge">${triggerDate}</span> 觸發期: (${triggerNums}) 第 ${p.P1+1} 支 <b>${padZero(p.X)}</b></div>
                    <div><span class="date-badge">${refDate}</span> 參考期: (${refNums}) 第 ${p.P2+1} 支 <b>${padZero(ref_val)}</b></div>
                    <div style="margin-top: 8px; font-size: 14px; color: #64748b;">➔ 計算: ${dueMathStr}</div>
                    <div style="margin-top: 8px; font-size: 16px;">本期預測開出：<b class="highlight-num" style="font-size: 18px;">${predKey}</b></div>
                </div>`;

                let pLine = document.createElement('div');
                pLine.className = 'pattern-container';
                pLine.innerHTML = `
                    <div class="pattern-header" onclick="toggleDetails('${pId}')">
                        <div class="pattern-header-text">
                            <span id="icon_${pId}" style="color: #cbd5e1; font-size: 14px; margin-top: 2px; transition: transform 0.2s; display: inline-block;">❯</span> 
                            <span>${p.desc} <span class="due-badge">本期到期</span></span>
                        </div>
                        <span class="hit-count">準 ${p.hitsCount} 進 ${p.hitsCount + 1}</span>
                    </div>
                    <div class="pattern-details" id="${pId}">
                        ${detailsHtml}
                        ${dueHtml}
                    </div>
                `;
                block.appendChild(pLine);
            });

            resultBox.appendChild(block);
        });
    }
</script>

</body>
</html>
