    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.8); }
        h1 { text-align: center; color: #2ecc71; font-size: 26px; margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 15px;}
        .grid { display: flex; gap: 20px; margin-bottom: 20px; }
        .col-data { flex: 1; }
        textarea { width: 100%; height: 160px; padding: 12px; background: #2c2c2c; border: 1px solid #444; border-radius: 6px; font-family: monospace; color: #2ecc71; box-sizing: border-box; resize: vertical;}
        .controls { text-align: center; margin: 20px 0; background: #252525; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .mode-selector { margin-bottom: 15px; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        select { font-size: 16px; padding: 8px 15px; border-radius: 6px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; }
        button { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);}
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46, 204, 113, 0.5); }
        .dashboard { display: none; }
        .summary-panel { background: #2c3e50; border-left: 6px solid #2ecc71; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between;}
        .target-draw { font-size: 20px; font-weight: bold; color: #fff; }
        .top-picks { display: flex; gap: 10px; margin-top: 10px; }
        .ball { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: #fff; background: radial-gradient(circle at 30% 30%, #2ecc71, #27ae60); box-shadow: 0 3px 8px rgba(0,0,0,0.4);}
        .pattern-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; }
        .pattern-card { background: #252525; border: 1px solid #444; border-radius: 8px; padding: 15px; position: relative; overflow: hidden;}
        .pattern-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #3498db; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 10px; }
        .card-title { font-weight: bold; color: #fff; font-size: 16px;}
        .card-rate { background: #3498db; color: #fff; padding: 3px 8px; border-radius: 12px; font-size: 13px; font-weight: bold; }
        .card-body { font-size: 14px; color: #ccc; line-height: 1.8;}
        .highlight-num { color: #2ecc71; font-weight: bold; font-size: 16px; background: #333; padding: 2px 6px; border-radius: 4px;}
        .freq-info { margin-top: 12px; font-size: 13px; color: #aaa; background: #1a1a1a; padding: 10px; border-radius: 4px; border-left: 3px solid #7f8c8d;}
        .section-title { font-size: 20px; color: #2ecc71; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 5px; display: inline-block;}

    <div class="controls">
        <div class="mode-selector">
            <label>🔎 搜尋模式：</label>
            <select id="searchMode">
                <option value="strict">📍 嚴格定位 (特定順球位置必須相同)</option>
                <option value="any">🔄 不定位 (不看位置，只要有開出就算)</option>
            </select>
        </div>
        <button onclick="autoDoubleAnalyze()">🚀 啟動雙重條件搜索</button>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="summary-panel">
            <div>
                <div class="target-draw" id="targetInfo">正在鎖定下一期預測...</div>
                <div style="color: #bdc3c7; margin-top: 8px; font-size: 14px;" id="modeText">基於您選擇的模式，推薦出機率最高的前 5 碼：</div>
            </div>
            <div>
                <div style="text-align: right; margin-bottom: 5px; color: #2ecc71; font-weight: bold;">🏆 下期熱門必抓</div>
                <div class="top-picks" id="topPicksContainer">
                    <!-- Balls will be injected here -->
                </div>
            </div>
        </div>

        <div class="section-title" id="sectionTitle">📊 當前正在發動的雙重版路</div>
        <div class="pattern-grid" id="patternGrid">
            <!-- Pattern cards will be injected here -->
        </div>

<script>
    const MAX_NUM = 39;
    const pad = (n) => n.toString().padStart(2, '0');

    function parseData() {
        const text = document.getElementById('dataInput').value;
        const lines = text.trim().split('\n');
        const data = [];
        for (let line of lines) {
            let parts = line.split(',');
            if (parts.length < 6 || parts[0] === 'Date') continue;
            let date = parts[0];
            let origNums = parts.slice(1, 6).map(Number);
            let sortedNums = [...origNums].sort((a, b) => a - b);
            data.push({ date, origNums, sortedNums });
        }
        return data;
    }

    function autoDoubleAnalyze() {
        const data = parseData();
        if (data.length < 5) return alert("資料量不足！");

        const searchMode = document.getElementById('searchMode').value; // 'strict' 或 'any'
        const lastIdx = data.length - 1;
        const lastDate = data[lastIdx].date;
        
        let allDiscoveredPatterns = [];
        let scoreBoard = {}; 

        // 系統自動往回推 K 期 (找出條件一)，並搭配最後一期 (條件二)
        for (let K = 1; K <= 3; K++) {
            let cond1Idx = data.length - 1 - K;
            let cond2Idx = data.length - 1; 
            
            if (cond1Idx < 0) continue;

            let cond1Draw = data[cond1Idx];
            let cond2Draw = data[cond2Idx];

            // 遍歷所有 5x5 種交叉組合
            for (let pos1 = 0; pos1 < 5; pos1++) {
                let val1 = cond1Draw.sortedNums[pos1];
                
                for (let pos2 = 0; pos2 < 5; pos2++) {
                    let val2 = cond2Draw.sortedNums[pos2];

                    let historyMatches = [];
                    
                    for (let i = 0; i <= data.length - 2 - K; i++) {
                        let isMatch1 = false;
                        let isMatch2 = false;

                        // 判斷：嚴格定位 vs 不定位
                        if (searchMode === 'strict') {
                            isMatch1 = data[i].sortedNums[pos1] === val1;
                            isMatch2 = data[i + K].sortedNums[pos2] === val2;
                        } else {
                            // 不定位：只要那一期的 5 顆球裡面包含這個數字就可以
                            isMatch1 = data[i].sortedNums.includes(val1);
                            isMatch2 = data[i + K].sortedNums.includes(val2);
                        }

                        if (isMatch1 && isMatch2) {
                            historyMatches.push(data[i + K + 1].origNums);
                        }
                    }

                    if (historyMatches.length > 0) {
                        let targetCounts = {};
                        historyMatches.forEach(targetDrawNums => {
                            targetDrawNums.forEach(n => {
                                targetCounts[n] = (targetCounts[n] || 0) + 1;
                            });
                        });

                        let totalOccurrences = historyMatches.length;

                        for (let n = 1; n <= MAX_NUM; n++) {
                            if (targetCounts[n]) {
                                let hits = targetCounts[n];
                                let rate = hits / totalOccurrences;

                                // 篩選門檻：勝率達到 40% (0.4) 且至少發動過 2 次以上
                                if (rate >= 0.4 && totalOccurrences >= 2) {
                                    
                                    // 為了避免「不定位」模式下因為迴圈導致相同數字組合重複推送，設定一組唯一 Key
                                    let uniqueKey = searchMode === 'strict' 
                                        ? `${K}_${pos1}_${val1}_${pos2}_${val2}_${n}` 
                                        : `${K}_any_${val1}_any_${val2}_${n}`;

                                    // 檢查是否已經收錄過這組條件
                                    if (!allDiscoveredPatterns.some(p => p.key === uniqueKey)) {
                                        allDiscoveredPatterns.push({
                                            key: uniqueKey,
                                            K: K,
                                            date1: cond1Draw.date,
                                            pos1: pos1 + 1,
                                            val1: val1,
                                            date2: cond2Draw.date,
                                            pos2: pos2 + 1,
                                            val2: val2,
                                            targetNum: n,
                                            hits: hits,
                                            total: totalOccurrences,
                                            rate: rate
                                        });

                                        let score = (rate * 100) + (hits * 20);
                                        scoreBoard[n] = (scoreBoard[n] || 0) + score;
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        // 排序版路
        allDiscoveredPatterns.sort((a, b) => b.hits - a.hits || b.rate - a.rate);

        // 渲染 Top 5
        let sortedScores = Object.keys(scoreBoard).map(n => ({ num: parseInt(n), score: scoreBoard[n] })).sort((a, b) => b.score - a.score);
        let top5 = sortedScores.slice(0, 5);
        
        document.getElementById('targetInfo').innerText = `🎯 基準期：最新一期 (${lastDate})`;
        document.getElementById('modeText').innerText = searchMode === 'strict' ? '【嚴格定位模式】強烈連動版路：' : '【不定位模式】群聚連動版路：';
        document.getElementById('sectionTitle').innerText = `📊 當前發動中的雙重版路 (${searchMode === 'strict' ? '定位' : '不定位'}勝率 > 40%)`;

        let ballsHtml = '';
        top5.forEach(item => {
            ballsHtml += `<div class="ball">${pad(item.num)}</div>`;
        });
        if(top5.length === 0) ballsHtml = '<div style="color:#aaa;">目前無強烈訊號</div>';
        document.getElementById('topPicksContainer').innerHTML = ballsHtml;

        // 渲染版路卡片
        let cardsHtml = '';
        let displayPatterns = allDiscoveredPatterns.slice(0, 15); 

        if (displayPatterns.length === 0) {
            cardsHtml = '<div style="color: #aaa; padding: 20px;">當前最新期數並無觸發任何符合標準的雙條件連動。</div>';
        } else {
            displayPatterns.forEach(p => {
                let periodText = p.K === 1 ? '上 1 期' : `上 ${p.K} 期`;
                
                // 根據模式切換顯示的文字
                let cond1Text = searchMode === 'strict' 
                    ? `順球第 ${p.pos1} 顆 = <span class="highlight-num">${pad(p.val1)}</span>`
                    : `不定位開出 <span class="highlight-num">${pad(p.val1)}</span>`;
                    
                let cond2Text = searchMode === 'strict' 
                    ? `順球第 ${p.pos2} 顆 = <span class="highlight-num">${pad(p.val2)}</span>`
                    : `不定位開出 <span class="highlight-num">${pad(p.val2)}</span>`;

                cardsHtml += `
                <div class="pattern-card">
                    <div class="card-header">
                        <span class="card-title">下期預測 👉 <span style="font-size: 22px; color: #2ecc71;">${pad(p.targetNum)}</span></span>
                        <span class="card-rate">${(p.rate * 100).toFixed(0)}% 命中</span>
                    </div>
                    <div class="card-body">
                        當 ${periodText} (${p.date1})<br>
                        ${cond1Text}<br>
                        <span style="color:#3498db; font-weight:bold;">➕ 搭配</span> 本期 (${p.date2})<br>
                        ${cond2Text}<br>
                        <div class="freq-info">
                            歷史中共發動 <b>${p.total}</b> 次，<br>
                            其中有 <b>${p.hits}</b> 次下期開出 ${pad(p.targetNum)}。
                        </div>
                    </div>
                </div>`;
            });
        }
        document.getElementById('patternGrid').innerHTML = cardsHtml;
        document.getElementById('dashboard').style.display = 'block';
    }
</script>
