    <style>
        /* ================= 全域與頁籤樣式 ================= */
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ================= 工具一與工具二 CSS ================= */
        .ball-input::-webkit-outer-spin-button,
        .ball-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .ball-input { -moz-appearance: textfield; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        
        pre.json-output {
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 1.5rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            overflow-x: auto;
        }
    </style>

                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <h1 class="text-3xl font-black flex items-center gap-3">

                        </h1>

            <div class="bg-white shadow-xl p-6 sm:p-8 border border-slate-200 rounded-b-2xl">
                
                <div class="mb-8 p-6 bg-slate-50 border border-slate-200 rounded-xl shadow-sm">

                        <div>

                            <select id="pillarCountTab4" onchange="generatePillarInputsTab4()" class="w-full p-3 bg-white border border-slate-300 rounded-xl text-sm font-bold text-slate-700 focus:ring-2 focus:ring-teal-200 focus:border-teal-500 outline-none shadow-sm transition-all">

    <script>
        function switchTab(tabIndex) {
            // 隱藏所有內容
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // 重置所有按鈕樣式
            document.querySelectorAll('[id^="btn-tab"]').forEach(el => {
                el.className = "px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all";
            });
            
            // 顯示選中內容與套用按鈕樣式
            document.getElementById('tab' + tabIndex).classList.add('active');
            let activeBtn = document.getElementById('btn-tab' + tabIndex);
            
            // 給不同的工具配不同的主題色亮點
            if(tabIndex === 1) activeBtn.className = "px-5 py-2.5 rounded-lg font-bold text-white bg-blue-600 shadow-md transition-all";
            if(tabIndex === 2) activeBtn.className = "px-5 py-2.5 rounded-lg font-bold text-white bg-indigo-600 shadow-md transition-all";
            if(tabIndex === 3) activeBtn.className = "px-5 py-2.5 rounded-lg font-bold text-white bg-red-600 shadow-md transition-all";
            if(tabIndex === 4) activeBtn.className = "px-5 py-2.5 rounded-lg font-bold text-white bg-teal-600 shadow-md transition-all";
        }
    </script>

    <script type="text/babel">
        {
            const { useState, useEffect, useMemo, useRef } = React;

            const defaultCSV = ``;

            const App = () => {
                const [csvText, setCsvText] = useState(defaultCSV);
                const [historyData, setHistoryData] = useState([]);
                const [colCount, setColCount] = useState(3);
                const [columns, setColumns] = useState(['', '', '', '', '', '']);
                const [unitPrice, setUnitPrice] = useState(1);
                const fileInputRef = useRef(null);

                useEffect(() => {
                    const lines = csvText.trim().split('\n');
                    const parsedData = [];
                    for (let i = 1; i < lines.length; i++) {
                        const parts = lines[i].split(',').map(s => s.trim());
                        if (parts.length >= 6) {
                            parsedData.push({
                                date: parts[0],
                                nums: parts.slice(1, 6).map(Number).filter(n => !isNaN(n))
                            });
                        }
                    }
                    setHistoryData(parsedData);
                }, [csvText]);

                const handleFileUpload = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            setCsvText(event.target.result);
                        };
                        reader.readAsText(file);
                    }
                };

                const handleColChange = (index, val) => {
                    const newCols = [...columns];
                    newCols[index] = val;
                    setColumns(newCols);
                };

                const parsedColumns = useMemo(() => {
                    return columns.slice(0, colCount).map(colStr => {
                        return Array.from(new Set(
                            colStr.replace(/[^0-9\s,]/g, ' ')
                                  .split(/[\s,]+/)
                                  .filter(s => s !== '')
                                  .map(Number)
                                  .filter(n => n > 0 && n <= 39)
                        )).sort((a,b) => a - b);
                    });
                }, [columns, colCount]);

                const collisions = useMemo(() => {
                    const results = [];
                    parsedColumns.forEach((colNums, colIndex) => {
                        if (colNums.length < 2) return;
                        for (let i = 0; i < colNums.length; i++) {
                            for (let j = i + 1; j < colNums.length; j++) {
                                const num1 = colNums[i];
                                const num2 = colNums[j];
                                const collidedDraws = historyData.filter(draw => 
                                    draw.nums.includes(num1) && draw.nums.includes(num2)
                                );
                                if (collidedDraws.length > 0) {
                                    results.push({
                                        column: colIndex + 1,
                                        num1: num1 < 10 ? '0'+num1 : String(num1),
                                        num2: num2 < 10 ? '0'+num2 : String(num2),
                                        dates: collidedDraws.map(d => d.date).join(', ')
                                    });
                                }
                            }
                        }
                    });
