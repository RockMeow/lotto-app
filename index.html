        .col-settings { flex: 1.5; }

        input[type="number"] { width: 60px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background-color 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px;}
        button:hover { background-color: #2980b9; }
        #results { margin-top: 20px; display: none;}
        .summary-box { background-color: #e8f4f8; border-left: 5px solid #3498db; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-size: 16px; }
        .results-grid { display: flex; gap: 15px; }
        .result-col { flex: 1; background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .result-header { background: #2c3e50; color: #fff; text-align: center; padding: 10px; font-weight: bold; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #eee; }
        .result-row:last-child { border-bottom: none; }
        .result-row:nth-child(even) { background-color: #fbfbfb; }
        .rank-num { font-weight: bold; color: #e74c3c; font-size: 18px;}
        .rank-stats { color: #666; font-size: 14px;}
        .progress-bar { height: 6px; background-color: #e0e0e0; border-radius: 3px; margin-top: 5px; overflow: hidden;}
        .progress-fill { height: 100%; background-color: #e74c3c; }

                <div class="row">
                    <label>全局排序：</label>
                    <select id="globalSort">
                        <option value="sorted">順球 (小到大)</option>

                <hr style="border: 0; border-top: 1px solid #cbd4db; margin: 15px 0;">

                    <label>當期條件：</label>
                    <select id="tPos">
                        <option value="any">不定位 (只要開出)</option>
                        <option value="1">第 1 顆</option>
                        <option value="2" selected>第 2 顆</option>
                        <option value="3">第 3 顆</option>
                        <option value="4">第 4 顆</option>
                        <option value="5">第 5 顆</option>
                    </select>
                    開出號碼: <input type="number" id="tVal" value="9" min="1" max="39">
                </div>
                <p style="font-size: 13px; color: #555; margin-top: 5px;">
                    💡 提示：設定好條件後，系統會自動幫您統計符合條件的期數，並結算其後 1~3 期最常開出的「不定位」號碼。
                </p>
                <button onclick="runAutoSearch()">🔍 自動搜尋下 3 期熱門拖牌</button>

    <div id="results">

            請點擊上方按鈕開始搜尋...
        </div>

            <div class="result-col" id="col-t1">
                <div class="result-header">👉 下 1 期 (T+1) 排行</div>
                <div id="list-t1"></div>
            </div>
            <div class="result-col" id="col-t2">
                <div class="result-header">👉 下 2 期 (T+2) 排行</div>
                <div id="list-t2"></div>
            </div>
            <div class="result-col" id="col-t3">
                <div class="result-header">👉 下 3 期 (T+3) 排行</div>
                <div id="list-t3"></div>
            </div>
        </div>

<script>
    const MAX_NUM = 39;
    const pad = (n) => n.toString().padStart(2, '0');

    function parseData() {
        const text = document.getElementById('dataInput').value;
        const lines = text.trim().split('\n');
        const data = [];
        for (let line of lines) {
            let parts = line.split(',');
            if (parts.length < 6 || parts[0] === 'Date') continue;
            let date = parts[0];
            let origNums = parts.slice(1, 6).map(Number);
            let sortedNums = [...origNums].sort((a, b) => a - b);
            data.push({ date, origNums, sortedNums });
        }
        return data;
    }

    function checkCondition(row, pos, val, isSorted) {
        if (!row) return false;
        const arr = isSorted ? row.sortedNums : row.origNums;
        const targetVal = parseInt(val);
        if (pos === 'any') return arr.includes(targetVal);
        return arr[parseInt(pos) - 1] === targetVal;
    }

    function runAutoSearch() {
        const data = parseData();
        const isGlobalSorted = document.getElementById('globalSort').value === 'sorted';
        const tPos = document.getElementById('tPos').value;
        const tVal = document.getElementById('tVal').value;

        let matchIndices = [];
        for (let i = 0; i < data.length; i++) {
            if (checkCondition(data[i], tPos, tVal, isGlobalSorted)) {
                matchIndices.push(i);
            }
        }

        // 準備統計陣列
        let stats = { 1: {}, 2: {}, 3: {} };
        let validDraws = { 1: 0, 2: 0, 3: 0 }; // 紀錄有效的下N期期數

        for(let offset = 1; offset <= 3; offset++){
            for(let n = 1; n <= MAX_NUM; n++) stats[offset][n] = 0;
        }

        // 開始計數
        matchIndices.forEach(idx => {
            for (let offset = 1; offset <= 3; offset++) {
                let targetIdx = idx + offset;
                if (targetIdx < data.length) {
                    validDraws[offset]++;
                    // 將目標期的落球加入統計 (不重複計數同一期內的相同號碼，雖然彩券不會重複，但保險起見用 Set)
                    let uniqueNums = new Set(data[targetIdx].origNums);
                    uniqueNums.forEach(n => {
                        stats[offset][n]++;
                    });
                }
            }
        });

        // 渲染結果函數
        function renderList(offset, containerId) {
            let listHtml = '';
            if (validDraws[offset] === 0) {
                document.getElementById(containerId).innerHTML = '<div style="padding:20px;text-align:center;color:#999;">無足夠資料</div>';
                return;
            }

            // 轉換為陣列並排序 (由大到小)
            let arr = [];
            for (let n = 1; n <= MAX_NUM; n++) {
                if (stats[offset][n] > 0) {
                    arr.push({ num: n, count: stats[offset][n] });
                }
            }
            arr.sort((a, b) => b.count - a.count);

            // 取前 5 名
            let top5 = arr.slice(0, 5);
            
            top5.forEach(item => {
                let rate = ((item.count / validDraws[offset]) * 100).toFixed(1);
                listHtml += `
                <div class="result-row">
                    <div>
                        <span class="rank-num">${pad(item.num)}</span>
                    </div>
                    <div style="text-align: right; width: 70%;">
                        <div class="rank-stats">${item.count} 次 (${rate}%)</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${rate}%;"></div></div>
                    </div>
                </div>`;
            });
            
            // 如果連1次都沒開出
            if(top5.length === 0) listHtml = '<div style="padding:20px;text-align:center;color:#999;">尚未開出任何號碼</div>';

            document.getElementById(containerId).innerHTML = listHtml;
        }

        // 顯示結果
        document.getElementById('results').style.display = 'block';
        
        let sortText = isGlobalSorted ? "順球" : "原始落球";
        let posText = tPos === 'any' ? "不定位" : `第 ${tPos} 顆`;
        document.getElementById('summaryText').innerHTML = `
            📊 <b>條件分析結果：</b> 歷史中符合「${sortText} ${posText} 開出 <b>${pad(tVal)}</b>」的次數共計 <b>${matchIndices.length}</b> 次。<br>
            以下為其發動後，下 1 到 3 期的熱門號碼拖牌機率（取前 5 名）：
        `;

        renderList(1, 'list-t1');
        renderList(2, 'list-t2');
        renderList(3, 'list-t3');
    }

    // 網頁載入時預設執行一次
    window.onload = function() { runAutoSearch(); };
</script>
