<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加州天天樂 三期牌</title>
    <style>
        :root {
            --primary-color: #1a237e;
            --primary-hover: #283593;
            --bg-color: #f0f2f5;
            --card-bg: #fff;
            --border-color: #e0e0e0;
            --hit-1-3-bg: #e8f5e9;
            --hit-1-3-text: #2e7d32;
            --track-1-3-bg: #fff8e1;
            --track-1-3-border: #f57c00;
            --hit-4-6-bg: #e3f2fd;
            --hit-4-6-text: #1565c0;
            --track-4-6-bg: #f3e5f5;
            --track-4-6-border: #8e24aa;
            --fail-bg: #fafafa;
            --fail-text: #9e9e9e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: #333; line-height: 1.5; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { font-size: 1.4rem; margin-bottom: 15px; border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .ai-status { display: flex; align-items: center; gap: 10px; }
        .ai-badge { background: #ff1744; color: white; font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .toggle-btn { cursor: pointer; padding: 5px 12px; border-radius: 15px; border: 1px solid #ff1744; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .toggle-on { background: #ff1744; color: white; }
        .toggle-off { background: white; color: #ff1744; }

        .controls { background: #e8eaf6; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c5cae9; }
        input[type="file"] { background: #fff; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); width: 100%; margin-top: 10px; }
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); }

        #predictionArea { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .pred-card { padding: 15px; border-radius: 8px; width: calc(50% - 7.5px); background: var(--card-bg); box-shadow: 0 2px 6px rgba(0,0,0,0.05); position: relative; }
        .pred-card h3 { font-size: 1.1rem; margin-bottom: 8px; color: #424242; }
        .nums-highlight { font-size: 1.4em; font-weight: bold; letter-spacing: 2px; }
        .score-badge { position: absolute; top: 15px; right: 15px; background: #3949ab; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }

        .t1-3 { border-left: 6px solid var(--track-1-3-border); background-color: var(--track-1-3-bg); }
        .t1-3 .nums-highlight { color: var(--track-1-3-border); }
        .t4-6 { border-left: 6px solid var(--track-4-6-border); background-color: var(--track-4-6-bg); }
        .t4-6 .nums-highlight { color: var(--track-4-6-border); }

        .summary { background: #e8eaf6; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 1rem; display: flex; gap: 20px; flex-wrap: wrap; border: 1px solid #c5cae9; }
        .summary span { font-weight: bold; }

        .table-container { width: 100%; overflow-x: auto; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; white-space: nowrap; background: #fff; }
        th, td { border: 1px solid var(--border-color); padding: 12px 8px; text-align: center; }
        th { background-color: var(--primary-color); color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #fcfcfc; }

        .row-hit-1-3 { color: var(--hit-1-3-text); font-weight: bold; }
        .row-hit-4-6 { color: var(--hit-4-6-text); font-weight: bold; }

        @media screen and (max-width: 768px) {
            .pred-card { width: 100%; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { display: none; }
            tr { border: 1px solid var(--border-color); margin-bottom: 15px; border-radius: 8px; overflow: hidden; }
            td { text-align: right; padding-left: 45%; position: relative; border-bottom: 1px solid #f0f0f0; }
            td:before { position: absolute; left: 12px; width: 40%; text-align: left; font-weight: bold; color: #666; }
            td:nth-of-type(1):before { content: "開獎日期"; }
            td:nth-of-type(2):before { content: "開出號碼"; }
            td:nth-of-type(3):before { content: "命中版路 (觸發日)"; }
            td:nth-of-type(4):before { content: "命中號碼"; }
            td:nth-of-type(5):before { content: "狀態"; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <span>加州天天樂 三期牌</span>
        <div class="ai-status">
            <span id="aiBadge" class="ai-badge" style="display:none;">過濾中</span>
            <div id="toggleFilter" class="toggle-btn toggle-off" onclick="toggleFilter()">二次過濾 OFF</div>
        </div>
    </h2>
    
    <div class="controls">
        <label><strong>載入歷史資料：</strong></label>
        <input type="file" id="csvFileInput" accept=".csv">
        <button onclick="processData()">執行計算</button>
    </div>

    <h2 style="font-size: 1.2rem; margin-top: 25px;">目前追蹤中</h2>
    <div id="predictionArea">
        <div style="padding: 10px; color: #666;">載入資料後將顯示號碼...</div>
    </div>
    
    <div id="summaryArea" class="summary" style="display:none;"></div>

    <h2 style="font-size: 1.2rem; margin-top: 25px;">回測紀錄 (按開獎日期)</h2>
    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>開獎日期</th>
                    <th>開出號碼</th>
                    <th>命中版路 (觸發日)</th>
                    <th>命中號碼</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                <tr><td colspan="5">請載入資料並點擊計算</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const modGroups = {
        1: [1, 7, 13, 19, 25, 31, 37], 2: [2, 8, 14, 20, 26, 32, 38],
        3: [3, 9, 15, 21, 27, 33, 39], 4: [4, 10, 16, 22, 28, 34],
        5: [5, 11, 17, 23, 29, 35], 0: [6, 12, 18, 24, 30, 36]
    };

    let parsedData = [];
    let isFilterEnabled = false;

    function fNum(n) { return String(n).padStart(2, '0'); }
    function intersect(arr1, arr2) { return arr1.filter(value => arr2.includes(value)); }

    function toggleFilter() {
        isFilterEnabled = !isFilterEnabled;
        const btn = document.getElementById('toggleFilter');
        const badge = document.getElementById('aiBadge');
        if (isFilterEnabled) {
            btn.innerText = "二次過濾 ON";
            btn.className = "toggle-btn toggle-on";
            badge.style.display = "block";
        } else {
            btn.innerText = "二次過濾 OFF";
            btn.className = "toggle-btn toggle-off";
            badge.style.display = "none";
        }
        if(parsedData.length > 0) runAnalysis();
    }

    function getSmartPatterns(nums, currentIndex, allData) {
        let rawPatterns = [];
        nums.forEach(n => {
            if (n >= 36) rawPatterns.push({ type: `歸零大號 (${n})`, target: [1, 2, 3], score: 20 });
            else if (n + 3 <= 39) rawPatterns.push({ type: `順勢連號 (${n})`, target: [n + 1, n + 2, n + 3], score: 10 });
        });

        let mods = new Set(nums.map(n => n % 6));
        [0, 1, 2, 3, 4, 5].forEach(m => {
            if (!mods.has(m)) {
                let g = modGroups[m];
                if (g.length >= 3) rawPatterns.push({ type: `漏牌補位 (餘${m})`, target: g.slice(0, 3), score: 15 });
                if (g.length >= 6) rawPatterns.push({ type: `漏牌補位 (餘${m})`, target: g.slice(3, 6), score: 12 });
            }
        });

        if (isFilterEnabled) {
            let numFreq = {};
            rawPatterns.forEach(p => p.target.forEach(n => numFreq[n] = (numFreq[n] || 0) + 1));
            rawPatterns.forEach(p => {
                p.target.forEach(n => { if (numFreq[n] > 1) p.score += 25; });
                let missCount = 0;
                for(let j = currentIndex - 1; j >= 0 && j >= currentIndex - 15; j--) {
                    if(intersect(p.target, allData[j].nums).length > 0) break;
                    missCount++;
                }
                p.score += (missCount * 3);
            });
            rawPatterns.sort((a, b) => b.score - a.score);
            return rawPatterns.slice(0, 2);
        }
        return rawPatterns;
    }

    async function processData() {
        const fileInput = document.getElementById('csvFileInput');
        if (fileInput.files.length === 0) { alert('請先選擇 CSV 檔案！'); return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.trim().split('\n');
            parsedData = [];
            for (let i = 0; i < lines.length; i++) {
                let cols = lines[i].split(',').map(c => c.trim());
                if (!cols[0] || cols[0].toLowerCase().includes('date') || cols.length < 6) continue;
                let nums = [parseInt(cols[1]), parseInt(cols[2]), parseInt(cols[3]), parseInt(cols[4]), parseInt(cols[5])];
                if (!nums.some(isNaN)) parsedData.push({ date: cols[0], nums: nums });
            }
            if(parsedData.length > 0) runAnalysis();
        };
        reader.readAsText(fileInput.files[0]);
    }

    function runAnalysis() {
        const resultBody = document.getElementById('resultBody');
        const predictionArea = document.getElementById('predictionArea');
        const summaryArea = document.getElementById('summaryArea');

        let dailyResults = parsedData.map(d => ({ date: d.date, actual: d.nums, hits: [] }));
        let currentlyTracking = [];
        let stats = { total: 0, hit13: 0, hit46: 0 };

        for (let i = 0; i < parsedData.length; i++) {
            let patterns = getSmartPatterns(parsedData[i].nums, i, parsedData);
            
            patterns.forEach(p => {
                stats.total++;
                let foundHit = false;
                for (let j = 1; j <= 6; j++) {
                    if (i + j < parsedData.length) {
                        let inter = intersect(p.target, parsedData[i + j].nums);
                        if (inter.length > 0) {
                            if (j <= 3) stats.hit13++; else stats.hit46++;
                            dailyResults[i + j].hits.push({
                                triggerDate: parsedData[i].date,
                                type: p.type,
                                hitNums: inter,
                                period: j
                            });
                            foundHit = true;
                            break;
                        }
                    }
                }

                let age = parsedData.length - 1 - i;
                if (!foundHit && age < 6) {
                    currentlyTracking.push({
                        triggerDate: parsedData[i].date, age: age + 1, type: p.type, targetStr: p.target.map(fNum).join(', '),
                        cardClass: age < 3 ? 't1-3' : 't4-6', score: p.score || '-'
                    });
                }
            });
        }

        // 渲染追蹤卡片
        currentlyTracking.reverse();
        predictionArea.innerHTML = currentlyTracking.length > 0 ? currentlyTracking.map(t => `
            <div class="pred-card ${t.cardClass}">
                ${isFilterEnabled ? `<div class="score-badge">評分: ${t.score}</div>` : ''}
                <h3>${t.type}</h3>
                <p>觸發日期：${t.triggerDate} (第 ${t.age} 期)</p>
                <p>預測號碼：<span class="nums-highlight">${t.targetStr}</span></p>
            </div>
        `).join('') : '<div style="padding: 10px; color: #666;">無追蹤中版路。</div>';

        // 渲染回測表格 (僅顯示有命中的日期)
        let hitTableHtml = dailyResults.slice().reverse().filter(d => d.hits.length > 0).map(d => {
            return d.hits.map(h => {
                let statusClass = h.period <= 3 ? 'row-hit-1-3' : 'row-hit-4-6';
                let statusText = h.period <= 3 ? `1~3期命 (${h.period})` : `4~6期命 (${h.period})`;
                return `
                <tr class="${statusClass}">
                    <td>${d.date}</td>
                    <td>${d.actual.map(fNum).join(', ')}</td>
                    <td>${h.type} (${h.triggerDate})</td>
                    <td>${h.hitNums.map(fNum).join(', ')}</td>
                    <td>${statusText}</td>
                </tr>`;
            }).join('');
        }).join('');
        
        resultBody.innerHTML = hitTableHtml || '<tr><td colspan="5">尚無命中紀錄</td></tr>';

        // 渲染統計
        summaryArea.style.display = 'flex';
        let totalHits = stats.hit13 + stats.hit46;
        summaryArea.innerHTML = `
            <div style="width: 100%;"><strong>回測統計：</strong> 共產生 ${stats.total} 組牌</div>
            <div style="color: var(--track-1-3-border);"><span>● 1~3期命中：</span> ${stats.hit13} 組</div>
            <div style="color: var(--track-4-6-border);"><span>● 4~6期命中：</span> ${stats.hit46} 組</div>
            <div><span>● 總命中率：</span> ${stats.total > 0 ? ((totalHits/stats.total)*100).toFixed(1) : 0}%</div>
        `;
    }
</script>
</body>
</html>
