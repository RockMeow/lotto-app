<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 雙軌量化投組系統</title>
    <style>
        /* =========================================
           全新 Dashboard UI 變數 (預設亮色質感)
           ========================================= */
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #0ea5e9;
            --success: #10b981;
            --success-bg: #d1fae5;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --hot-bg: #fef3c7;
            --hot-text: #d97706;
            --hot-border: #fcd34d;
            --cold-bg: #f3f4f6;
            --cold-text: #475569;
            --cold-border: #cbd5e1;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-header: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        /* =========================================
           深色模式設定 (一鍵切換)
           ========================================= */
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-header: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --success-bg: rgba(16, 185, 129, 0.15);
            --danger-bg: rgba(239, 68, 68, 0.15);
            --hot-bg: rgba(245, 158, 11, 0.15);
            --hot-text: #fbbf24;
            --hot-border: #b45309;
            --cold-bg: rgba(71, 85, 105, 0.2);
            --cold-text: #94a3b8;
            --cold-border: #475569;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            --shadow-header: 0 1px 3px 0 rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 導覽列 */
        .header {
            background: var(--bg-header); padding: 16px 24px; box-shadow: var(--shadow-header);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .header h1 { margin: 0; font-size: 1.5em; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .header h1 span { color: var(--primary); }
        .controls { display: flex; gap: 12px; align-items: center; }
        
        select { 
            padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 14px; 
            background: var(--bg-body); color: var(--text-main); cursor: pointer; font-weight: 600; outline: none;
            transition: border-color 0.2s;
        }
        select:focus { border-color: var(--primary); }
        
        .theme-toggle {
            background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 50%; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-main); font-size: 1.2em; transition: all 0.2s;
        }
        .theme-toggle:hover { background: var(--border-color); }

        /* 主佈局 */
        .container { max-width: 1400px; margin: 24px auto; padding: 0 20px; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 24px; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }

        /* 卡片樣式 */
        .card { 
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 24px; 
            box-shadow: var(--shadow-card); border: 1px solid var(--border-color);
        }
        .card-header { display: flex; align-items: center; margin-bottom: 16px; gap: 10px; }
        .card-title { font-size: 1.2em; font-weight: 800; margin: 0; color: var(--text-main); }
        .card-desc { font-size: 0.85em; color: var(--text-muted); margin-bottom: 16px; font-weight: 500;}

        /* 四尾陣型小卡 */
        .tail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .tail-box { 
            background: var(--bg-body); border-radius: var(--radius-md); padding: 16px; 
            border: 1px solid var(--border-color); border-top: 4px solid var(--primary);
        }
        .tail-box-header { font-weight: 800; font-size: 1.1em; color: var(--primary); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        .tail-box-label { font-size: 0.75em; font-weight: 700; color: var(--text-muted); background: var(--bg-card); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-color);}
        
        .num-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--border-color); }
        .num-row:last-child { border-bottom: none; }
        .num-val { font-weight: 900; font-size: 1.1em; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        th, td { padding: 14px 12px; text-align: center; border-bottom: 1px solid var(--border-color); }
        th { font-weight: 800; color: var(--text-muted); position: sticky; top: 0; }
        tr:last-child td { border-bottom: none; }
        
        /* 標籤 */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 0.8em; font-weight: 800; }
        .badge-hot { background: var(--hot-bg); color: var(--hot-text); border: 1px solid var(--hot-border); }
        .badge-cold { background: var(--cold-bg); color: var(--cold-text); border: 1px solid var(--cold-border); }
        .badge-ice { background: var(--primary); color: #fff; }

        .text-win { color: var(--success); font-weight: 800; }
        .text-lose { color: var(--danger); font-weight: 600; opacity: 0.8; }
        .highlight-row { background: rgba(79, 70, 229, 0.05); border-left: 3px solid var(--primary); }
        [data-theme="dark"] .highlight-row { background: rgba(99, 102, 241, 0.1); }

        /* 雙軌歷史回測區 */
        .history-section { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px; }
        @media (max-width: 768px) { .history-section { grid-template-columns: 1fr; } }
        .history-list { max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        
        .history-item { 
            display: flex; flex-direction: column; gap: 4px; padding: 12px 16px; 
            background: var(--bg-body); border-radius: var(--radius-md); margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }
        .h-top { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; font-weight: 700; color: var(--text-muted); }
        .h-bot { font-size: 0.95em; display: flex; justify-content: space-between; align-items: center; }
        .cost-tag { font-size: 0.8em; font-weight: 700; background: var(--bg-card); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-color);}
    </style>
</head>
<body>

<header class="header">
    <h1>📊 AI <span>量化雙軌系統</span></h1>
    <div class="controls">
        <select id="autoLoadCsv">
            <option value="">-- 請選擇彩球類型 --</option>
            <option value="Six_history_2026.csv">🇭🇰 香港 六合彩</option>
            <option value="649_history_2026.csv">🇹🇼 台灣 大樂透</option>
            <option value="539_history_2026.csv">🇹🇼 台灣 今彩 539</option>
            <option value="Fan_history_2026.csv">🇺🇸 加州 天天樂</option>
            <option value="Ghana_history_2026.csv">🇬🇭 非洲 迦納彩</option>
        </select>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
</header>

<div class="container" id="mainContainer" style="display: none;">
    
    <div class="dashboard-grid">
        <div class="card">
            <div class="card-header">
                <div style="font-size: 1.5em;">🛡️</div>
                <h2 class="card-title">四尾強攻陣型</h2>
            </div>
            <div class="card-desc">依據最新馬可夫匯聚點與伴生雷達推算，自動列出 4 大作戰尾數。</div>
            <div class="tail-grid" id="aiFilterBody"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <div style="font-size: 1.5em;">🧬</div>
                <h2 class="card-title">馬可夫鏈傳染矩陣</h2>
            </div>
            <div class="card-desc">上一期開出尾數，對下一期造成的物理傳染機率。</div>
            <div style="overflow-x: auto;">
                <table id="markovTable">
                    <thead>
                        <tr>
                            <th style="text-align: left; padding-left: 20px;">如果上期開出...</th>
                            <th>最強推薦</th>
                            <th>次強推薦</th>
                            <th>避開死角</th>
                        </tr>
                    </thead>
                    <tbody id="markovBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div class="card">
            <div class="card-header">
                <div style="font-size: 1.5em;">🔥</div>
                <h2 class="card-title">策略 A：觀望 ＋ 熱門</h2>
            </div>
            <div class="card-desc">條件：在 4 個目標尾數中，挑選遺漏期數 <strong>0 ~ 9 期</strong> 的號碼 (覆蓋率極高)。</div>
            <div class="history-list" id="historyA"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <div style="font-size: 1.5em;">🧊</div>
                <h2 class="card-title">策略 B：破冰 ＋ 熱門</h2>
            </div>
            <div class="card-desc">條件：在 4 個目標尾數中，挑選遺漏期數 <strong>≥ 10 期 或 ≤ 2 期</strong> 的號碼 (成本極低)。</div>
            <div class="history-list" id="historyB"></div>
        </div>
    </div>

</div>

<script>
    let rawData = [];

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'dark') { 
            body.removeAttribute('data-theme'); 
            btn.textContent = '🌙'; 
        } else { 
            body.setAttribute('data-theme', 'dark'); 
            btn.textContent = '☀️'; 
        }
    }

    function parseDateObj(dateStr) {
        let s = dateStr.trim().replace(/-/g, '/');
        let parts = s.split('/');
        let y = 2026, m = 1, d = 1;
        if (parts.length === 3) { y = parseInt(parts[0]); m = parseInt(parts[1]); d = parseInt(parts[2]); } 
        else if (parts.length === 2) { m = parseInt(parts[0]); d = parseInt(parts[1]); } 
        else { return null; }
        if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
        let mStr = String(m).padStart(2, '0'); let dStr = String(d).padStart(2, '0');
        let dateObj = new Date(`${y}-${mStr}-${dStr}T00:00:00`);
        if (isNaN(dateObj.getTime())) dateObj = new Date(`${y}/${mStr}/${dStr} 00:00:00`);
        return isNaN(dateObj.getTime()) ? null : dateObj;
    }

    document.getElementById('autoLoadCsv').addEventListener('change', function(e) {
        const fileName = e.target.value; if (!fileName) return;
        fetch(fileName).then(response => response.text()).then(text => { processCSV(text); });
    });

    function processCSV(text) {
        const lines = text.trim().split('\n'); rawData = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if(cols.length >= 6) {
                let nums = [];
                for(let c=1; c<cols.length; c++) { let val = parseInt(cols[c]); if(!isNaN(val)) nums.push(val); }
                let dObj = parseDateObj(cols[0]);
                if (dObj && nums.length >= 5) rawData.push({ date: cols[0].trim(), wd: dObj.getDay(), nums: nums.sort((a,b)=>a-b) });
            }
        }
        runAnalysis();
    }

    function getMarkovMatrixAll(dataSlice) {
        let trans = {}; let counts = {};
        for(let i=0; i<10; i++) { trans[i] = {}; counts[i] = 0; for(let j=0; j<10; j++) trans[i][j] = 0; }
        for(let i=0; i<dataSlice.length-1; i++) {
            let todayTails = [...new Set(dataSlice[i].nums.map(n=>n%10))];
            let tmrwTails = [...new Set(dataSlice[i+1].nums.map(n=>n%10))];
            todayTails.forEach(t1 => { counts[t1]++; tmrwTails.forEach(t2 => { trans[t1][t2]++; }); });
        }
        let results = [];
        for(let t=0; t<10; t++) {
            if(counts[t] > 0) {
                let probs = [];
                for(let nextT=0; nextT<10; nextT++) {
                    probs.push({ tail: nextT, prob: trans[t][nextT] / counts[t] });
                }
                probs.sort((a,b) => b.prob - a.prob); 
                results.push({ today: t, top1: probs[0], top2: probs[1], worst: probs[probs.length-1] });
            }
        }
        return results;
    }

    function runAnalysis() {
        document.getElementById('mainContainer').style.display = 'block';
        
        const L = rawData.length;
        if(L < 40) return;

        let lastDraw = rawData[L-1];
        let lastTails = [...new Set(lastDraw.nums.map(n => n % 10))]; 
        let maxNum = Math.max(39, ...rawData.map(d => Math.max(...d.nums)));
        let markovData = getMarkovMatrixAll(rawData);

        // --- 1. 四尾聯動陣型 (最新一期預測) ---
        let scores = {}; for(let i=0; i<10; i++) scores[i] = 0;
        lastTails.forEach(t => {
            let m = markovData.find(x => x.today === t);
            if(m) { scores[m.top1.tail] += 2; scores[m.top2.tail] += 1; scores[m.worst.tail] -= 2; }
        });
        let sortedMarkov = Object.keys(scores).map(Number).sort((a,b) => scores[b] - scores[a]);
        let top1 = sortedMarkov[0]; let top2 = sortedMarkov[1];

        let companionScores = {}; for(let i=0; i<10; i++) companionScores[i] = 0;
        rawData.forEach(d => {
            let tails = d.nums.map(n => n % 10);
            if (tails.includes(top1)) tails.forEach(t => { if(t !== top1) companionScores[t]++; });
        });
        let bestCompanion = Object.keys(companionScores).map(Number).sort((a,b) => companionScores[b] - companionScores[a])[0];

        let tailLastSeen = Array(10).fill(-1);
        for(let i=0; i<L; i++) rawData[i].nums.forEach(n => { tailLastSeen[n % 10] = i; });
        let tailOmissions = tailLastSeen.map((last, idx) => (L - 1 - last));
        let coldestTail = tailOmissions.map((omi, idx) => ({idx, omi}))
                                       .filter(x => ![top1, top2, bestCompanion].includes(x.idx))
                                       .sort((a,b) => b.omi - a.omi)[0].idx;

        let targets = [
            { t: top1, label: "榜首" }, { t: top2, label: "次席" },
            { t: bestCompanion, label: "伴生" }, { t: coldestTail, label: "回補" }
        ];

        let omissions = {};
        for(let i=1; i<=maxNum; i++) omissions[i] = L;
        for(let i=0; i<L; i++) rawData[i].nums.forEach(n => { omissions[n] = L - 1 - i; });

        let filterHtml = '';
        targets.forEach(tgt => {
            filterHtml += `<div class="tail-box">
                <div class="tail-box-header"><span>${tgt.t} 尾</span><span class="tail-box-label">${tgt.label}</span></div>`;
            for(let num=tgt.t; num<=maxNum; num+=10) {
                if(num === 0) continue;
                let omi = omissions[num];
                let isNeighbor = lastDraw.nums.includes(num - 1) || lastDraw.nums.includes(num + 1);
                let advice = omi >= 10 ? "破冰" : (omi <= 2 ? "熱號" : "觀望");
                let badgeClass = omi >= 10 ? "badge-ice" : (omi <= 2 ? "badge-hot" : "badge-cold");
                if (isNeighbor) advice += " ★";
                
                filterHtml += `<div class="num-row">
                    <span class="num-val">${num < 10 ? '0'+num : num}</span>
                    <span style="font-size:0.85em; opacity:0.7;">遺漏 ${omi}</span>
                    <span class="badge ${badgeClass}">${advice}</span>
                </div>`;
            }
            filterHtml += `</div>`;
        });
        document.getElementById('aiFilterBody').innerHTML = filterHtml;

        // --- 2. 渲染馬可夫矩陣表 ---
        let mHtml = '';
        for(let i=0; i<10; i++) {
            let m = markovData.find(x => x.today === i);
            if(!m) continue;
            let isTriggered = lastTails.includes(i);
            let trClass = isTriggered ? ' class="highlight-row"' : '';
            let indicator = isTriggered ? ' <span style="font-size:0.8em; color:var(--primary); font-weight:800;">(上期)</span>' : '';
            mHtml += `<tr${trClass}>
                <td style="text-align: left; padding-left: 20px; font-weight:800;">${m.today} 尾${indicator}</td>
                <td><span class="badge badge-hot" style="font-size:1em;">${m.top1.tail} 尾</span> <span style="font-size:0.85em; font-weight:700; opacity:0.7;">${(m.top1.prob*100).toFixed(1)}%</span></td>
                <td><span class="badge badge-hot" style="opacity:0.8;">${m.top2.tail} 尾</span> <span style="font-size:0.85em; font-weight:700; opacity:0.7;">${(m.top2.prob*100).toFixed(1)}%</span></td>
                <td><span class="badge badge-cold">${m.worst.tail} 尾</span></td>
            </tr>`;
        }
        document.getElementById('markovBody').innerHTML = mHtml;

        // --- 3. 雙軌歷史足跡回測 ---
        let htmlA = ''; let htmlB = '';
        let startIdx = 40; 
        
        for(let idx = L - 1; idx >= startIdx; idx--) {
            let subData = rawData.slice(0, idx);
            let subL = subData.length;
            
            // 重新計算當下的馬可夫與四尾
            let c_counts = {}; let c_trans = {}; let c_co = {};
            for(let i=0; i<10; i++) { c_counts[i]=0; c_trans[i]={}; c_co[i]={}; for(let j=0; j<10; j++) {c_trans[i][j]=0; c_co[i][j]=0;} }
            for(let i=0; i<subL-1; i++) {
                let t1s = [...new Set(subData[i].nums.map(n=>n%10))];
                let t2s = [...new Set(subData[i+1].nums.map(n=>n%10))];
                t1s.forEach(t1 => {
                    c_counts[t1]++;
                    t2s.forEach(t2 => { c_trans[t1][t2]++; });
                    t1s.forEach(t2 => { if(t1!==t2) c_co[t1][t2]++; });
                });
            }
            
            let c_lastDraw = subData[subL-1];
            let c_lastTails = [...new Set(c_lastDraw.nums.map(n=>n%10))];
            let c_scores = {}; for(let i=0; i<10; i++) c_scores[i]=0;
            c_lastTails.forEach(t => {
                if(c_counts[t] > 0) {
                    let probs = [];
                    for(let nextT=0; nextT<10; nextT++) probs.push({t: nextT, p: c_trans[t][nextT]/c_counts[t]});
                    probs.sort((a,b)=>b.p - a.p);
                    c_scores[probs[0].t] += 2; c_scores[probs[1].t] += 1; c_scores[probs[9].t] -= 2;
                }
            });
            
            let sortedMarkov = Object.keys(c_scores).map(Number).sort((a,b)=>c_scores[b]-c_scores[a]);
            let c_top1 = sortedMarkov[0]; let c_top2 = sortedMarkov[1];
            
            let c_companionScores = c_co[c_top1];
            let c_bestCompanion = -1; let maxCo = -1;
            for(let t=0; t<10; t++) { if(t !== c_top1 && c_companionScores[t] > maxCo) { maxCo = c_companionScores[t]; c_bestCompanion = t; } }
            
            let c_tailLastSeen = Array(10).fill(-1);
            for(let i=0; i<subL; i++) subData[i].nums.forEach(n => { c_tailLastSeen[n%10] = i; });
            let c_coldestTail = -1; let maxOmi = -1;
            for(let t=0; t<10; t++) {
                if(![c_top1, c_top2, c_bestCompanion].includes(t)) {
                    let omi = c_tailLastSeen[t] === -1 ? 999 : (subL - 1 - c_tailLastSeen[t]);
                    if(omi > maxOmi) { maxOmi = omi; c_coldestTail = t; }
                }
            }
            
            let c_targets = [c_top1, c_top2, c_bestCompanion, c_coldestTail];
            let numsA = []; let numsB = [];
            
            c_targets.forEach(tail => {
                for(let num=tail; num<=maxNum; num+=10) {
                    if(num === 0) continue;
                    let omi = 999;
                    for(let i=subL-1; i>=0; i--) { if(subData[i].nums.includes(num)) { omi = subL - 1 - i; break; } }
                    if(omi === 999) omi = subL;
                    
                    if(omi <= 9) numsA.push(num); // 觀望+熱門
                    if(omi <= 2 || omi >= 10) numsB.push(num); // 破冰+熱門
                }
            });

            let actualNums = rawData[idx].nums;
            let hitsA = actualNums.filter(n => numsA.includes(n));
            let hitsB = actualNums.filter(n => numsB.includes(n));

            // Generate HTML for A
            let resA = hitsA.length > 0 ? `<span class="text-win">命中 ${hitsA.length} 顆 (${hitsA.map(n=>n<10?'0'+n:n).join(', ')})</span>` : `<span class="text-lose">全倒</span>`;
            htmlA += `<div class="history-item">
                <div class="h-top"><span>[${rawData[idx].date}]</span> <span class="cost-tag">成本 ${numsA.length} 顆</span></div>
                <div class="h-bot">${resA}</div>
            </div>`;

            // Generate HTML for B
            let resB = hitsB.length > 0 ? `<span class="text-win">命中 ${hitsB.length} 顆 (${hitsB.map(n=>n<10?'0'+n:n).join(', ')})</span>` : `<span class="text-lose">全倒</span>`;
            htmlB += `<div class="history-item">
                <div class="h-top"><span>[${rawData[idx].date}]</span> <span class="cost-tag">成本 ${numsB.length} 顆</span></div>
                <div class="h-bot">${resB}</div>
            </div>`;
        }
        
        document.getElementById('historyA').innerHTML = htmlA;
        document.getElementById('historyB').innerHTML = htmlB;
    }
</script>
</body>
</html>
