<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星期慣性與馬可夫鏈</title>
    <style>
        :root {
            --bg-color: #f8fafc; 
            --container-bg: #ffffff;
            --text-color: #334155;
            --heading-color: #0f172a;
            --primary-color: #4f46e5;
            --section-bg: #ffffff;
            --section-border: #e2e8f0;
            --card-bg: #f1f5f9;
            --card-border: #cbd5e1;
            --th-bg: #f8fafc;
            --td-border: #e2e8f0;
            --tr-even: #ffffff;
            --tr-hover: #f1f5f9;
            --highlight-bg: #e0e7ff;
            --highlight-text: #3730a3;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f1f5f9;
            --heading-color: #e2e8f0;
            --primary-color: #818cf8;
            --section-bg: #1e293b;
            --section-border: #334155;
            --card-bg: #0f172a;
            --card-border: #334155;
            --th-bg: #0f172a;
            --td-border: #334155;
            --tr-even: #1e293b;
            --tr-hover: #334155;
            --highlight-bg: #312e81;
            --highlight-text: #c7d2fe;
        }

        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; padding: 20px 10px; background-color: var(--bg-color); color: var(--text-color); margin: 0; transition: all 0.3s; }
        .container { max-width: 900px; margin: auto; background: var(--container-bg); padding: 35px; border-radius: 20px; box-shadow: var(--shadow-lg); position: relative; }
        
        h1 { color: var(--heading-color); text-align: center; margin-bottom: 5px; font-size: 2.2em; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--primary-color); font-weight: 600; margin-bottom: 30px; font-size: 1.1em; }

        .theme-toggle { position: absolute; top: 25px; right: 25px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 50%; width: 44px; height: 44px; font-size: 1.2em; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); transition: transform 0.2s; }
        .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .section { background: var(--section-bg); border: 1px solid var(--section-border); padding: 25px; border-radius: 16px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
        .section-title { font-weight: 800; font-size: 1.3em; margin-bottom: 8px; color: var(--text-color); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 6px; height: 20px; background: var(--primary-color); margin-right: 12px; border-radius: 6px; }
        .section-desc { font-size: 0.95em; opacity: 0.7; margin-bottom: 20px; margin-left: 18px; font-weight: 500;}

        select { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--card-border); font-size: 15px; color: var(--text-color); background-color: var(--container-bg); cursor: pointer; outline: none; width: 100%; max-width: 400px; display: block; margin: 0 auto; box-shadow: var(--shadow-sm); }
        
        /* 決策面板 */
        .decision-panel { background: var(--card-bg); border-radius: 12px; padding: 20px; border-left: 5px solid var(--primary-color); margin-bottom: 20px; }
        .decision-header { font-size: 1.1em; font-weight: 800; margin-bottom: 15px; color: var(--heading-color); }
        .decision-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--card-border); }
        .decision-row:last-child { border-bottom: none; }
        .decision-label { font-weight: 600; opacity: 0.8; }
        .decision-val { font-weight: 800; font-size: 1.1em; }
        .final-verdict { margin-top: 15px; padding: 15px; border-radius: 10px; font-weight: 800; text-align: center; font-size: 1.2em; }
        
        .verdict-resonance { background: linear-gradient(135deg, #ec4899, #be185d); color: white; animation: pulse 1.5s infinite alternate; box-shadow: 0 0 15px rgba(236,72,153,0.5); }
        .verdict-conflict { background: rgba(220, 38, 38, 0.1); color: #dc2626; border: 1px solid #fca5a5; }
        .verdict-neutral { background: var(--highlight-bg); color: var(--highlight-text); }
        
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.02); } }

        /* 表格樣式 */
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--td-border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.98em; min-width: 600px; }
        th, td { border-bottom: 1px solid var(--td-border); padding: 16px 14px; text-align: center; }
        th { background-color: var(--th-bg); color: var(--text-color); font-weight: 800; white-space: nowrap; }
        tr:nth-child(even) { background-color: var(--tr-even); }
        
        .badge { display: inline-block; padding: 6px 12px; border-radius: 8px; font-weight: 800; font-size: 0.95em; }
        .badge-hot { background: rgba(245, 158, 11, 0.15); color: #d97706; border: 1px solid #fcd34d; }
        .badge-cold { background: rgba(220, 38, 38, 0.1); color: #dc2626; border: 1px solid #fca5a5; }
        .badge-formula { background: var(--highlight-bg); color: var(--highlight-text); }
        
        [data-theme="dark"] .badge-hot { color: #fbbf24; border-color: #b45309; }
        [data-theme="dark"] .badge-cold { color: #f87171; border-color: #991b1b; }
        
        .weekday-col { font-size: 1.1em; font-weight: 900; color: var(--primary-color); }
        .rate-col { font-weight: 900; color: #16a34a; font-size: 1.1em; }
        .prob-text { font-weight: 800; margin-left: 6px; font-size: 0.9em; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <h1>星期慣性 & 馬可夫鏈</h1>

    <div class="section" style="border: none; box-shadow: none; padding: 0 25px; margin-bottom: 10px;">
        <select id="autoLoadCsv">
            <option value="">-- 請選擇彩球類型 --</option>
            <option value="Six_history_2026.csv">🇭🇰 香港 六合彩</option>
            <option value="649_history_2026.csv">🇹🇼 台灣 大樂透</option>
            <option value="539_history_2026.csv">🇹🇼 台灣 今彩 539</option>
            <option value="Fan_history_2026.csv">🇺🇸 加州 天天樂</option>
            <option value="Ghana_history_2026.csv">🇬🇭 非洲 迦納彩</option>
        </select>
    </div>

    <!-- AI 決策仲裁區 -->
    <div class="section" id="decisionSection" style="display: none;">
        <div class="section-title">智能裁決</div>
        <div class="section-desc">系統已將「星期公式」與上期的「馬可夫」進行比對，為您解決訊號衝突。</div>
        
        <div class="decision-panel">
            <div class="decision-header" id="targetNextDraw">目標：計算中...</div>
            <div class="decision-row">
                <span class="decision-label">星期公式預測</span>
                <span class="decision-val" id="decFormula" style="color:var(--primary-color)">-</span>
            </div>
            <div class="decision-row">
                <span class="decision-label">馬可夫最強尾數</span>
                <span class="decision-val" id="decMarkovTop" style="color:#d97706">-</span>
            </div>
            <div class="decision-row">
                <span class="decision-label">馬可夫避開尾數</span>
                <span class="decision-val" id="decMarkovWorst" style="color:#dc2626">-</span>
            </div>
            <div id="finalVerdict" class="final-verdict">-</div>
        </div>
    </div>

    <div class="section" id="formulaSection" style="display: none;">
        <div class="section-title">星期專屬動態公式</div>
        <div class="table-responsive">
            <table id="formulaTable">
                <thead><tr><th>星期</th><th>基準</th><th>公式</th><th>勝率</th><th>命中/總次數</th></tr></thead>
                <tbody id="formulaBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section" id="markovSection" style="display: none;">
        <div class="section-title">馬可夫鏈(總表)</div>
        <div class="table-responsive">
            <table id="markovTable">
                <thead><tr><th>如果開出...</th><th>最強尾數</th><th>次強尾數</th><th>避開尾數</th></tr></thead>
                <tbody id="markovBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let rawData = [];
    const weekdayDisplayOrder = [1, 2, 3, 4, 5, 6, 0]; 
    const weekdayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];

    function toggleTheme() {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') { body.removeAttribute('data-theme'); document.querySelector('.theme-toggle').textContent = '🌙'; } 
        else { body.setAttribute('data-theme', 'dark'); document.querySelector('.theme-toggle').textContent = '☀️'; }
    }

    function parseDateObj(dateStr) {
        let s = dateStr.trim().replace(/-/g, '/');
        let parts = s.split('/');
        let y = 2026, m = 1, d = 1;
        if (parts.length === 3) { y = parseInt(parts[0]); m = parseInt(parts[1]); d = parseInt(parts[2]); } 
        else if (parts.length === 2) { m = parseInt(parts[0]); d = parseInt(parts[1]); } 
        else { return null; }
        if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
        let mStr = String(m).padStart(2, '0'); let dStr = String(d).padStart(2, '0');
        let dateObj = new Date(`${y}-${mStr}-${dStr}T00:00:00`);
        if (isNaN(dateObj.getTime())) dateObj = new Date(`${y}/${mStr}/${dStr} 00:00:00`);
        return isNaN(dateObj.getTime()) ? null : dateObj;
    }

    document.getElementById('autoLoadCsv').addEventListener('change', function(e) {
        const fileName = e.target.value; if (!fileName) return;
        fetch(fileName).then(response => response.text()).then(text => { processCSV(text); });
    });

    function processCSV(text) {
        const lines = text.trim().split('\n'); rawData = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if(cols.length >= 6) {
                let nums = [];
                for(let c=1; c<cols.length; c++) { let val = parseInt(cols[c]); if(!isNaN(val)) nums.push(val); }
                let dObj = parseDateObj(cols[0]);
                if (dObj && nums.length >= 5) rawData.push({ date: cols[0].trim(), wd: dObj.getDay(), nums: nums.sort((a,b)=>a-b) });
            }
        }
        runAnalysis();
    }

    function findBestDynamicFormula(dataSlice, targetWd) {
        let evalDraws = [];
        for(let k=7; k<dataSlice.length; k++) if(dataSlice[k].wd === targetWd) evalDraws.push(k);
        let total = evalDraws.length;
        if(total < 3) return null; 

        let rulesStats = {};
        for(let lagType of ['lag1', 'lagWd']) {
            for(let i=0; i<4; i++) {
                for(let j=i+1; j<5; j++) {
                    rulesStats[`${lagType}_add_${i}_${j}`] = 0; rulesStats[`${lagType}_sub_${i}_${j}`] = 0;
                }
            }
        }

        evalDraws.forEach(k => {
            let currTails = dataSlice[k].nums.map(n => n % 10);
            let prev1 = dataSlice[k-1].nums;
            let prevWdIdx = -1;
            for(let p=k-1; p>=0; p--) { if(dataSlice[p].wd === targetWd) { prevWdIdx = p; break; } }
            
            for(let i=0; i<4; i++){
                for(let j=i+1; j<5; j++){
                    if(currTails.includes((prev1[i]+prev1[j])%10)) rulesStats[`lag1_add_${i}_${j}`]++;
                    if(currTails.includes(Math.abs(prev1[j]-prev1[i])%10)) rulesStats[`lag1_sub_${i}_${j}`]++;
                    if(prevWdIdx !== -1) {
                        let pWd = dataSlice[prevWdIdx].nums;
                        if(currTails.includes((pWd[i]+pWd[j])%10)) rulesStats[`lagWd_add_${i}_${j}`]++;
                        if(currTails.includes(Math.abs(pWd[j]-pWd[i])%10)) rulesStats[`lagWd_sub_${i}_${j}`]++;
                    }
                }
            }
        });

        let bestRuleKey = ""; let maxHits = -1;
        for(let key in rulesStats) if(rulesStats[key] > maxHits) { maxHits = rulesStats[key]; bestRuleKey = key; }
        
        let rate = maxHits / total; let parts = bestRuleKey.split('_');
        return { lagType: parts[0], op: parts[1], i: parseInt(parts[2]), j: parseInt(parts[3]), rate: rate, hits: maxHits, total: total,
                 lagName: parts[0] === 'lag1' ? ' (上期)' : '上週同星期', calcName: `第${parseInt(parts[3])+1}碼 ${parts[1] === 'add' ? '+' : '-'} 第${parseInt(parts[2])+1}碼` };
    }

    function calculateTail(dataSlice, targetWd, rule) {
        let L = dataSlice.length; let refNums = [];
        if(rule.lagType === 'lag1') refNums = dataSlice[L-1].nums;
        else { for(let p=L-1; p>=0; p--) { if(dataSlice[p].wd === targetWd) { refNums = dataSlice[p].nums; break; } } }
        if(refNums.length === 0) return null;
        return rule.op === 'add' ? (refNums[rule.i] + refNums[rule.j]) % 10 : Math.abs(refNums[rule.j] - refNums[rule.i]) % 10;
    }

    function getMarkovMatrixAll(dataSlice) {
        let trans = {}; let counts = {};
        for(let i=0; i<10; i++) { trans[i] = {}; counts[i] = 0; for(let j=0; j<10; j++) trans[i][j] = 0; }
        for(let i=0; i<dataSlice.length-1; i++) {
            let todayTails = [...new Set(dataSlice[i].nums.map(n=>n%10))];
            let tmrwTails = [...new Set(dataSlice[i+1].nums.map(n=>n%10))];
            todayTails.forEach(t1 => { counts[t1]++; tmrwTails.forEach(t2 => { trans[t1][t2]++; }); });
        }
        let results = [];
        for(let t=0; t<10; t++) {
            if(counts[t] > 0) {
                let probs = [];
                for(let nextT=0; nextT<10; nextT++) probs.push({ tail: nextT, prob: trans[t][nextT] / counts[t] });
                probs.sort((a,b) => b.prob - a.prob);
                results.push({ today: t, top1: probs[0], top2: probs[1], worst: probs[probs.length-1] });
            }
        }
        return results;
    }

    function getNextDrawMarkov(dataSlice) {
        let matrix = getMarkovMatrixAll(dataSlice);
        let lastTails = [...new Set(dataSlice[dataSlice.length-1].nums.map(n=>n%10))];
        let aggScores = {}; for(let i=0; i<10; i++) aggScores[i] = 0;
        
        lastTails.forEach(t => {
            let m = matrix.find(x => x.today === t);
            if(m) {
                // 給最強加分，給最弱扣分
                aggScores[m.top1.tail] += 2;
                aggScores[m.top2.tail] += 1;
                aggScores[m.worst.tail] -= 2; 
            }
        });
        
        let sorted = Object.keys(aggScores).map(Number).sort((a,b)=>aggScores[b]-aggScores[a]);
        return {
            lastTails: lastTails,
            topTails: [sorted[0], sorted[1]], // 最高分的兩個
            worstTail: sorted[9] // 最低分(扣最多分)的一個
        };
    }

    function runAnalysis() {
        document.getElementById('decisionSection').style.display = 'block';
        document.getElementById('formulaSection').style.display = 'block';
        document.getElementById('markovSection').style.display = 'block';
        
        const L = rawData.length;
        if(L < 40) { alert("數據不足"); return; }

        // --- 1. AI 決策仲裁 ---
        let nextWd = (rawData[L-1].wd + 1) % 7;
        document.getElementById('targetNextDraw').innerText = `目標：下一期 (星期${weekdayNames[nextWd]})`;

        let bestFormula = findBestDynamicFormula(rawData, nextWd);
        let predictedTail = calculateTail(rawData, nextWd, bestFormula);
        
        let nextMarkov = getNextDrawMarkov(rawData);

        document.getElementById('decFormula').innerText = predictedTail !== null ? `${predictedTail} 尾 (${bestFormula.calcName})` : '資料不足';
        document.getElementById('decMarkovTop').innerText = `${nextMarkov.topTails.join(', ')} 尾`;
        document.getElementById('decMarkovWorst').innerText = `${nextMarkov.worstTail} 尾`;

        let verdictEl = document.getElementById('finalVerdict');
        if(predictedTail === null) {
            verdictEl.className = 'final-verdict verdict-neutral';
            verdictEl.innerText = '等待最新數據';
        } else if(predictedTail === nextMarkov.worstTail) {
            verdictEl.className = 'final-verdict verdict-conflict';
            verdictEl.innerHTML = `⚠️ 動能衝突！<br><span style="font-size:0.8em; font-weight:500;">星期公式推薦 ${predictedTail} 尾，但昨晚的盤勢極度排斥它。<br>💡 仲裁結果：<b>馬可夫否決。請避開或降為防守注。</b></span>`;
        } else if(nextMarkov.topTails.includes(predictedTail)) {
            verdictEl.className = 'final-verdict verdict-resonance';
            verdictEl.innerHTML = `✨ 絕對共振！鐵牌出現！<br><span style="font-size:0.8em; font-weight:500;">長期的星期慣性與短期的物理傳染完美重疊。<br>💡 仲裁結果：<b>全力強攻 ${predictedTail} 尾！</b></span>`;
        } else {
            verdictEl.className = 'final-verdict verdict-neutral';
            verdictEl.innerHTML = `🟢 獨立動能<br><span style="font-size:0.8em; font-weight:500;">沒有衝突也沒有完美共振。<br>💡 仲裁結果：<b> ${predictedTail} 尾可作為主要參考，依個人資金配置。</b></span>`;
        }

        // --- 2. 渲染公式總表 ---
        let fHtml = '';
        weekdayDisplayOrder.forEach(wd => {
            let rule = findBestDynamicFormula(rawData, wd);
            if(rule) {
                fHtml += `<tr><td class="weekday-col">${weekdayNames[wd]}</td><td style="font-weight:700;">${rule.lagName}</td><td><span class="badge badge-formula">${rule.calcName}</span></td><td class="rate-col">${(rule.rate*100).toFixed(1)}%</td><td style="font-weight:600; opacity:0.8;">${rule.hits} / ${rule.total}</td></tr>`;
            }
        });
        document.getElementById('formulaBody').innerHTML = fHtml;

        // --- 3. 渲染馬可夫總表 (將百分比加回) ---
        let markovData = getMarkovMatrixAll(rawData);
        let mHtml = '';
        for(let i=0; i<10; i++) {
            let m = markovData.find(x => x.today === i);
            if(m) {
                mHtml += `<tr>
                    <td style="font-size:1.15em; font-weight:800;">有 <span style="color:var(--primary-color);">${m.today}</span> 尾</td>
                    <td><span class="badge badge-hot"> ${m.top1.tail} 尾</span> <span class="prob-text">(${(m.top1.prob*100).toFixed(1)}%)</span></td>
                    <td><span class="badge badge-hot" style="opacity:0.95;"> ${m.top2.tail} 尾</span> <span class="prob-text">(${(m.top2.prob*100).toFixed(1)}%)</span></td>
                    <td><span class="badge badge-cold"> ${m.worst.tail} 尾</span> <span class="prob-text">(${(m.worst.prob*100).toFixed(1)}%)</span></td>
                </tr>`;
            }
        }
        document.getElementById('markovBody').innerHTML = mHtml;
    }
</script>
</body>
</html>
