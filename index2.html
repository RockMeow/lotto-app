<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧全車版路分析系統</title>
    <link rel="manifest" href="manifest3.json">
    <meta name="theme-color" content="#1e293b">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1e293b; --primary-light: #334155; --accent: #2563eb;
            --success: #16a34a; --warning: #ea580c; --danger: #dc2626;
            --purple: #9333ea; --bg: #0f172a; --card: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155;
            --input-bg: #334155; --radius-md: 12px; --radius-sm: 8px;
        }

        [data-theme="light"] {
            --primary: #1e293b; --primary-light: #334155; --accent: #2563eb;
            --success: #16a34a; --warning: #ea580c; --danger: #dc2626;
            --purple: #9333ea; --bg: #f8fafc; --card: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
            --input-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text-main); padding: 12px; line-height: 1.5; transition: background-color 0.3s, color 0.3s; }

        .container { max-width: 600px; margin: 0 auto; }
        .header { background: var(--primary); color: white; padding: 18px; border-radius: var(--radius-md); margin-bottom: 20px; text-align: center; position: relative;}
        h1 { font-size: 1.15rem; font-weight: 700; margin: 0; }
        .subtitle { font-size: 0.8rem; color: #94a3b8; margin-top: 6px; }
        .theme-toggle { position: absolute; right: 15px; top: 18px; background: transparent; border: 1px solid var(--border); color: white; padding: 5px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem; }

        .selector-box { background: var(--card); padding: 20px; border-radius: var(--radius-md); margin-bottom: 20px; border: 1px solid var(--border); }
        select, input[type="number"] { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 0.95rem; background: var(--input-bg); margin-bottom: 10px; color: var(--text-main); outline: none; }
        .config-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .config-label { font-weight: 600; font-size: 0.9rem; color: var(--primary-light); min-width: 90px; }

        .run-btn { background: var(--success); color: white; border: none; padding: 14px; border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; }
        .section-title { font-size: 1.05rem; font-weight: 700; margin: 24px 0 12px 2px; border-left: 4px solid var(--accent); padding-left: 8px; }
        .summary { background: var(--card); padding: 18px; border-radius: var(--radius-md); margin-bottom: 24px; font-size: 0.9rem; border: 1px solid var(--border); line-height: 1.6; }

        .result-item { background: var(--card); border-radius: var(--radius-md); padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .res-date { font-weight: 700; color: var(--primary-light); font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .day-badge { background: var(--input-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; border: 1px solid var(--border); }
        .day-target { background: var(--accent); color: white; border-color: var(--accent); }
        .res-actual { font-family: monospace; font-size: 1.05rem; font-weight: 700; letter-spacing: 1px; }

        .source-box { background: var(--bg); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 10px; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; }
        .source-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .source-hl { color: var(--text-main); font-weight: 600; }

        .hit-detail { padding: 12px; border-radius: var(--radius-sm); margin-top: 10px; border: 1px solid var(--success); background: rgba(22, 163, 74, 0.1); }
        .miss-detail { padding: 12px; border-radius: var(--radius-sm); margin-top: 10px; border: 1px solid var(--border); background: var(--bg); }
        .hit-badge { background-color: var(--success); color: white; padding: 1px 5px; border-radius: 4px; font-weight: 700; margin: 0 2px; display: inline-block; }
        
        .pred-card { background: var(--card); padding: 18px; border-radius: var(--radius-md); border-left: 4px solid var(--purple); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .nums-highlight { font-size: 1.6rem; font-weight: 800; color: var(--purple); letter-spacing: 2px; display: block; margin-top: 10px; text-align: center;}
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header">
        <h1>智慧全車版路系統</h1>
        <div class="subtitle">專攻全車下注策略｜動態智能捕捉「追兩期」連準規律</div>
        <button class="theme-toggle" onclick="toggleTheme()">切換主題</button>
    </div>
    
    <div class="selector-box">
        <select id="csvSelect" onchange="processData()">
            <option value="539_history_2026.csv">今彩 539 (歷史資料)</option>
            <option value="Fan_history_2026.csv">天天樂</option>
        </select>

        <div style="padding-top: 5px; display: flex; flex-direction: column; gap: 4px;">
            <div class="config-row">
                <span class="config-label">預測核心：</span>
                <select id="algoMode" onchange="runAnalysis()" style="margin-bottom: 0; flex: 1;">
                    <option value="custom">特定版路 (一第3球+2, 日第1球+0, 三第5球-4 ➔ 下四五)</option>
                    <option value="auto">全自動搜尋 (±4範圍，智能尋找「追兩期」最強 3 顆)</option>
                </select>
            </div>

            <label class="config-row" style="cursor: pointer; margin-bottom: 15px; margin-top: 5px;">
                <input type="checkbox" id="sortBalls" checked onchange="runAnalysis()">
                <span style="font-weight: 600; font-size: 0.9rem;">使用順球排序 (依據號碼大小排列後取位置)</span>
            </label>

            <div class="config-row" style="flex-wrap: wrap; align-items: flex-start;">
                <span class="config-label" style="padding-top: 8px;">全車賠率設定：</span>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1;">
                    <label style="display: flex; align-items: center; gap: 6px; font-size: 0.9rem;">單車成本 <input type="number" id="costPerCar" value="74" step="1" min="1" onchange="runAnalysis()" style="width: 100%; margin-bottom: 0; padding: 6px 10px;"></label>
                    <label style="display: flex; align-items: center; gap: 6px; font-size: 0.9rem;">單車獎金 <input type="number" id="prizePerCar" value="550" step="1" min="1" onchange="runAnalysis()" style="width: 100%; margin-bottom: 0; padding: 6px 10px;"></label>
                </div>
            </div>

            <button class="run-btn" onclick="runAnalysis()">執行全車版路回測</button>
        </div>
    </div>

    <div class="section-title">下期預測目標 (全車 3 顆)</div>
    <div id="predictionArea"></div>
    
    <div class="section-title">累積全車損益曲線</div>
    <div class="selector-box" style="padding: 15px; margin-bottom: 24px;">
        <canvas id="pnlChart" height="150"></canvas>
    </div>

    <div id="summaryArea" class="summary" style="display:none;"></div>

    <div class="section-title">全車下注紀錄</div>
    <div id="resultList"></div>
</div>

<script>
    let parsedData = [];
    let maxNum = 39;
    let pnlChartInstance = null;

    const DAY_NAMES = ['日', '一', '二', '三', '四', '五', '六'];

    function fNum(n) { return String(n).padStart(2, '0'); }
    function intersect(arr1, arr2) { return arr1.filter(value => arr2.includes(value)); }
    function wrapNum(n, max) { let v = Math.round(n) % max; if (v <= 0) v += max; return v || 1; }
    function getDayOfWeek(dateStr) {
        let dStr = dateStr.includes('/') && dateStr.split('/').length === 2 ? `2026/${dateStr}` : dateStr;
        return new Date(dStr.replace(/\//g, '-')).getDay();
    }

    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        if(pnlChartInstance) {
            pnlChartInstance.options.scales.y.grid.color = body.getAttribute('data-theme') === 'dark' ? '#334155' : '#e2e8f0';
            pnlChartInstance.update();
        }
    }

    async function processData() {
        const fileName = document.getElementById('csvSelect').value;
        maxNum = (fileName.includes('649') || fileName.includes('Six')) ? 49 : 39;
        try {
            const res = await fetch(fileName);
            const text = await res.text();
            const lines = text.trim().split('\n');
            parsedData = [];
            for(let i = 1; i < lines.length; i++) {
                let cols = lines[i].split(',').map(s => s.trim());
                if(cols.length < 6 || isNaN(parseInt(cols[1]))) continue;
                parsedData.push({ date: cols[0], originalNums: cols.slice(1).map(Number) });
            }
            runAnalysis();
        } catch(e) { 
            alert("讀取失敗，請確認檔案位置。"); 
        }
    }

    // 模式 A：特定版路 (週一第3球+2, 日第1球+0, 三第5球-4 ➔ 下四五)
    function getCustomTargetsFromData(dataArray, upToIndex) {
        let lastMon = null, lastSun = null, lastWed = null;
        for (let k = upToIndex; k >= Math.max(0, upToIndex - 15); k--) {
            if (dataArray[k].day === 1 && !lastMon) lastMon = dataArray[k];
            if (dataArray[k].day === 0 && !lastSun) lastSun = dataArray[k];
            if (dataArray[k].day === 3 && !lastWed) lastWed = dataArray[k];
        }

        if (lastMon && lastSun && lastWed) {
            let t1 = wrapNum(lastMon.nums[2] + 2, maxNum); 
            let t2 = wrapNum(lastSun.nums[0] + 0, maxNum); 
            let t3 = wrapNum(lastWed.nums[4] - 4, maxNum); 
            
            let targets = [...new Set([t1, t2, t3])].sort((a,b)=>a-b);
            
            let allValid = Array.from({length: maxNum}, (_, i) => i+1).filter(n => !targets.includes(n));
            while(targets.length < 3 && allValid.length > 0) {
                targets.push(allValid.shift());
            }

            return { targets: targets.sort((a,b)=>a-b), isCustom: true, lastMon, lastSun, lastWed };
        }
        return null;
    }

    // 模式 B：全自動版路目標搜尋 (±4範圍，追兩期連準)
    function getAutoTargetsFromData(dataArray, upToIndex) {
        let rules = [];
        
        for(let d=0; d<7; d++) {
            let last_d_idx = dataArray[upToIndex].lastDayIndices[d];
            if (last_d_idx === -1) continue;
            
            let distance = upToIndex - last_d_idx;
            if (distance !== 1 && distance !== 2) continue; // 只追兩期

            for(let p=0; p<5; p++) {
                for(let offset=-4; offset<=4; offset++) {
                    let tNum = wrapNum(dataArray[last_d_idx].nums[p] + offset, maxNum);
                    
                    // 實戰邏輯：如果距離是第2天，且第1天已經命中，就自動放棄不追了
                    if (distance === 2) {
                        let check1 = (maxNum === 49 && dataArray[last_d_idx+1].nums.length >= 7) ? dataArray[last_d_idx+1].nums.slice(0,6) : dataArray[last_d_idx+1].nums;
                        if (check1.includes(tNum)) continue; 
                    }

                    let hits=0, trials=0, streak=0, maxStreak=0;
                    
                    // 回測這個規律過去的「追兩期」表現
                    for(let k=0; k < last_d_idx; k++) {
                        if (dataArray[k].day === d) {
                            let pastTNum = wrapNum(dataArray[k].nums[p] + offset, maxNum);
                            let isHit = false;
                            
                            if (k + 1 < upToIndex) {
                                let c1 = (maxNum === 49 && dataArray[k+1].nums.length >= 7) ? dataArray[k+1].nums.slice(0,6) : dataArray[k+1].nums;
                                if (c1.includes(pastTNum)) isHit = true;
                            }
                            if (!isHit && k + 2 < upToIndex) {
                                let c2 = (maxNum === 49 && dataArray[k+2].nums.length >= 7) ? dataArray[k+2].nums.slice(0,6) : dataArray[k+2].nums;
                                if (c2.includes(pastTNum)) isHit = true;
                            }
                            
                            if (isHit) {
                                hits++; streak++;
                                if(streak > maxStreak) maxStreak = streak;
                            } else {
                                streak = 0;
                            }
                            trials++;
                        }
                    }
                    
                    // 必須經過一定歷史驗證
                    if (trials > 5 && hits/trials > 0) {
                        rules.push({d, p, offset, hitRate: hits/trials, maxStreak, hits, tNum, triggerDraw: dataArray[last_d_idx], distance});
                    }
                }
            }
        }
        
        // 核心排序：連準數最優先
        rules.sort((a,b) => b.maxStreak - a.maxStreak || b.hitRate - a.hitRate);
        
        let targets = [];
        let chosenRules = [];
        
        for(let r of rules) {
            if (targets.length >= 3) break;
            if (!targets.includes(r.tNum)) {
                targets.push(r.tNum);
                chosenRules.push({ rule: r, tNum: r.tNum, triggerDraw: r.triggerDraw });
            }
        }
        
        let allValid = Array.from({length: maxNum}, (_, i) => i+1).filter(n => !targets.includes(n));
        while(targets.length < 3 && allValid.length > 0) targets.push(allValid.shift());

        return { targets: targets.sort((a,b)=>a-b), isCustom: false, chosenRules: chosenRules };
    }

    function runAnalysis() {
        let algoMode = document.getElementById('algoMode').value;
        let isSorted = document.getElementById('sortBalls').checked;
        let costPerCar = parseFloat(document.getElementById('costPerCar').value) || 74;
        let prizePerCar = parseFloat(document.getElementById('prizePerCar').value) || 550;

        // 預處理
        let lastDay = [-1, -1, -1, -1, -1, -1, -1];
        let processedData = parsedData.map((d, index) => {
            let nums = [...d.originalNums];
            if (isSorted) {
                if (maxNum === 49 && nums.length >= 7) {
                    nums = nums.slice(0, 6).sort((a, b) => a - b).concat(nums.slice(6));
                } else {
                    nums.sort((a, b) => a - b);
                }
            }
            let day = getDayOfWeek(d.date);
            let dObj = { date: d.date, nums: nums, day: day, lastDayIndices: [...lastDay] };
            lastDay[day] = index;
            return dObj;
        });

        let stats = { bets: 0, hits: 0, cost: 0, win: 0 };
        let dailyView = [];
        let chartLabels = [], chartData = [], cumulativePnL = 0;

        for (let i = 0; i < processedData.length; i++) {
            let currentDraw = processedData[i];
            let condition = null;

            if (algoMode === 'custom') {
                if (currentDraw.day === 4 || currentDraw.day === 5) {
                    condition = getCustomTargetsFromData(processedData, i - 1);
                }
            } else {
                condition = getAutoTargetsFromData(processedData, i);
            }
            
            if (condition && condition.targets.length > 0) {
                let targets = condition.targets;
                let checkNums = (maxNum === 49 && currentDraw.nums.length >= 7) ? currentDraw.nums.slice(0, 6) : currentDraw.nums;
                
                let hitNums = intersect(targets, checkNums);
                let hitCount = hitNums.length;

                let netCost = targets.length * costPerCar;
                let winAmount = hitCount * prizePerCar;

                stats.bets += targets.length;
                stats.cost += netCost;
                
                if (winAmount > 0) {
                    stats.win += winAmount;
                    stats.hits += hitCount;
                }

                cumulativePnL += (winAmount - netCost);

                chartLabels.push(currentDraw.date);
                chartData.push(cumulativePnL);

                dailyView.push({
                    date: currentDraw.date, day: currentDraw.day, nums: currentDraw.nums,
                    targets: targets, hitNums: hitNums, source: condition,
                    netCost: netCost, winAmount: winAmount, isHit: winAmount > 0
                });
            }
        }

        // 繪製圖表
        if (pnlChartInstance) pnlChartInstance.destroy();
        const ctx = document.getElementById('pnlChart').getContext('2d');
        const gridColor = document.body.getAttribute('data-theme') === 'dark' ? '#334155' : '#e2e8f0';

        pnlChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [{
                    label: '累積全車淨利',
                    data: chartData,
                    borderColor: '#9333ea',
                    backgroundColor: 'rgba(147, 51, 234, 0.1)',
                    borderWidth: 2, pointRadius: 0, pointHoverRadius: 5, fill: true, tension: 0.2
                }]
            },
            options: {
                responsive: true,
                interaction: { intersect: false, mode: 'index' },
                scales: { x: { display: true, grid: { display: false } }, y: { display: true, grid: { color: gridColor } } },
                plugins: { legend: { display: false } }
            }
        });

        // 預測最新一期
        if (processedData.length > 0) {
            let nextIndex = processedData.length;
            let lastD = processedData[nextIndex-1];
            let nextDay = (lastD.day + 1) % 7;
            
            let tempLastIndices = [...lastD.lastDayIndices];
            tempLastIndices[lastD.day] = nextIndex - 1;
            processedData.push({ day: nextDay, lastDayIndices: tempLastIndices }); 

            let latestCondition = algoMode === 'custom' 
                ? ((nextDay === 4 || nextDay === 5) ? getCustomTargetsFromData(processedData, nextIndex - 1) : null)
                : getAutoTargetsFromData(processedData, nextIndex);
            
            processedData.pop(); 

            if (latestCondition && (!latestCondition.isCustom ? latestCondition.chosenRules.length > 0 : true)) {
                let targetDisplay = latestCondition.targets.map(fNum).join(' , ');
                let nextPlayText = algoMode === 'custom' ? "預測下期 (週四或週五) 準備下注" : `下期 (週${DAY_NAMES[nextDay]}) 全車推薦目標`;
                
                let sourceHtml = "";
                if (latestCondition.isCustom) {
                    let s = latestCondition;
                    sourceHtml = `週一 (${s.lastMon.date}) 第3球為 ${fNum(s.lastMon.nums[2])} ➔ <span style="color:var(--accent);">+2 = ${fNum(wrapNum(s.lastMon.nums[2]+2, maxNum))}</span><br>
                    週日 (${s.lastSun.date}) 第1球為 ${fNum(s.lastSun.nums[0])} ➔ <span style="color:var(--accent);">+0 = ${fNum(wrapNum(s.lastSun.nums[0]+0, maxNum))}</span><br>
                    週三 (${s.lastWed.date}) 第5球為 ${fNum(s.lastWed.nums[4])} ➔ <span style="color:var(--accent);">-4 = ${fNum(wrapNum(s.lastWed.nums[4]-4, maxNum))}</span>`;
                } else {
                    sourceHtml = latestCondition.chosenRules.map(r => {
                        let sign = r.rule.offset >= 0 ? '+' : '';
                        let dayCount = r.rule.distance === 1 ? "第 1 天追牌" : "第 2 天追牌";
                        return `週${DAY_NAMES[r.rule.d]} (${r.triggerDraw.date}) 第${r.rule.p+1}球: ${fNum(r.triggerDraw.nums[r.rule.p])} ➔ <span style="color:var(--accent);">${sign}${r.rule.offset} = ${fNum(r.tNum)}</span> <span style="font-size:0.75rem; color:var(--text-muted);">(歷史最高連準: ${r.rule.maxStreak} 期 | ${dayCount})</span>`;
                    }).join('<br>');
                }

                document.getElementById('predictionArea').innerHTML = `
                <div class="pred-card">
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">觸發版路來源：</div>
                    <div style="font-size: 0.8rem; line-height: 1.6; margin-bottom: 12px; background: var(--bg); padding: 10px; border-radius: 6px; border: 1px dashed var(--border);">
                        ${sourceHtml}
                    </div>
                    <div style="text-align: center; color: var(--text-muted); font-size: 0.9rem;">${nextPlayText}</div>
                    <span class="nums-highlight">${targetDisplay}</span>
                </div>`;
            } else {
                let msg = algoMode === 'custom' ? "下期並非週四或週五，目前無需下注。" : "歷史資料不足或版路已中斷，目前空手觀望。";
                document.getElementById('predictionArea').innerHTML = `<div style="padding:20px; color:var(--text-muted); text-align:center; background: var(--card); border-radius: 12px;">${msg}</div>`;
            }
        }

        // 渲染列表
        let listHtml = dailyView.slice().reverse().map(d => {
            let dayClass = (algoMode === 'custom' && (d.day === 4 || d.day === 5)) || algoMode === 'auto' ? 'day-target' : '';
            let s = d.source;
            let actualNumsHtml = d.nums.map(n => d.hitNums.includes(n) ? `<span class="hit-badge">${fNum(n)}</span>` : `<span style="padding: 0 2px;">${fNum(n)}</span>`).join(' ');

            let sourceBoxHtml = '';
            if (s.isCustom) {
                sourceBoxHtml = `<div class="source-box">
                    <div class="source-row"><span>週一 (${s.lastMon.date}) 第3球: <span class="source-hl">${fNum(s.lastMon.nums[2])}</span></span> <span>+2 = <b>${fNum(wrapNum(s.lastMon.nums[2]+2, maxNum))}</b></span></div>
                    <div class="source-row"><span>週日 (${s.lastSun.date}) 第1球: <span class="source-hl">${fNum(s.lastSun.nums[0])}</span></span> <span>+0 = <b>${fNum(wrapNum(s.lastSun.nums[0]+0, maxNum))}</b></span></div>
                    <div class="source-row"><span>週三 (${s.lastWed.date}) 第5球: <span class="source-hl">${fNum(s.lastWed.nums[4])}</span></span> <span>-4 = <b>${fNum(wrapNum(s.lastWed.nums[4]-4, maxNum))}</b></span></div>
                </div>`;
            } else {
                let rulesText = s.chosenRules.map(r => {
                    let sign = r.rule.offset >= 0 ? '+' : '';
                    let dayCount = r.rule.distance === 1 ? "第 1 天追牌" : "第 2 天追牌";
                    return `<div class="source-row"><span>週${DAY_NAMES[r.rule.d]} (${r.triggerDraw.date}) 第${r.rule.p+1}球: <span class="source-hl">${fNum(r.triggerDraw.nums[r.rule.p])}</span></span> <span>${sign}${r.rule.offset} = <b>${fNum(r.tNum)}</b> <span style="color:var(--text-muted); font-size:0.75rem;">(${dayCount})</span></span></div>`;
                }).join('');
                sourceBoxHtml = `<div class="source-box">${rulesText}</div>`;
            }

            let detailBox = d.isHit ? `
                <div class="hit-detail">
                    <div style="font-weight: 700; color: var(--success); margin-bottom: 6px;">版路成功命中！</div>
                    <div style="font-size: 0.85rem; line-height: 1.6;">
                        <b>下注球號：</b> ${d.targets.map(fNum).join(', ')}<br>
                        <b>總買車數：</b> ${d.targets.length} 車 ｜ <b>實際命中：</b> <span style="color:var(--success); font-weight:700;">${d.hitNums.length} 車</span><br>
                        <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--success);">
                            <span><b>總成本：</b>${d.netCost.toFixed(0)} 元 ｜ <b>中獎獎金：</b><span style="color:var(--success);font-weight:700;">${d.winAmount.toFixed(0)}</span> 元</span>
                        </div>
                    </div>
                </div>` : `
                <div class="miss-detail">
                    <div style="font-weight: 700; color: var(--text-muted); margin-bottom: 6px;">當期未命中</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.6;">
                        <b>下注球號：</b> ${d.targets.map(fNum).join(', ')}<br>
                        <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);">
                            <span><b>總成本：</b>${d.netCost.toFixed(0)} 元 ｜ <b>中獎獎金：</b>0 元</span>
                        </div>
                    </div>
                </div>`;

            return `<div class="result-item">
                <div class="res-header">
                    <div class="res-date"><span>開獎日: ${d.date}</span> <span class="day-badge ${dayClass}">週${DAY_NAMES[d.day]}</span></div>
                    <div class="res-actual">${actualNumsHtml}</div>
                </div>
                ${sourceBoxHtml}
                ${detailBox}
            </div>`;
        }).join('');

        document.getElementById('resultList').innerHTML = listHtml || '<div style="text-align:center;padding:20px; color:var(--text-muted);">無符合條件的下注紀錄</div>';

        // 結算
        let net = stats.win - stats.cost;
        let totalPlays = dailyView.length;
        let winPlays = dailyView.filter(d => d.isHit).length;
        let winRate = totalPlays > 0 ? ((winPlays / totalPlays) * 100).toFixed(1) : 0;

        document.getElementById('summaryArea').style.display = 'block';
        document.getElementById('summaryArea').innerHTML = `
            <div style="font-weight: 700; font-size: 1.05rem; margin-bottom: 8px;">全車版路回測總覽</div>
            <span>總計出手下注 <b>${totalPlays}</b> 期，其中獲利 <b>${winPlays}</b> 期 (期數勝率 <b>${winRate}%</b>)<br>
            總計共買：<b>${stats.bets}</b> 車 ｜ 實際命中：<b>${stats.hits}</b> 車<br>
            累積總成本：${stats.cost.toFixed(0)} 元 ｜ 累積總派彩：${stats.win.toFixed(0)} 元</span>
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 1.1rem;">
                <b>總淨利結算：<span style="color: ${net >= 0 ? 'var(--success)' : 'var(--danger)'}">${net >= 0 ? '+' : ''}${net.toFixed(0)}</span></b>
            </div>`;
    }

    window.onload = () => { processData(); };
</script>
</body>
</html>
