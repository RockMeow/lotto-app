<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 星期慣性與馬可夫矩陣 (全表分析版)</title>
    <style>
        /* =========================================
           現代化 UI 變數與亮色模式
           ========================================= */
        :root {
            --bg-color: #f8fafc; 
            --container-bg: #ffffff;
            --text-color: #334155;
            --heading-color: #0f172a;
            --primary-color: #4f46e5;
            --section-bg: #ffffff;
            --section-border: #e2e8f0;
            --card-bg: #f1f5f9;
            --card-border: #cbd5e1;
            --th-bg: #f8fafc;
            --td-border: #e2e8f0;
            --tr-even: #ffffff;
            --tr-hover: #f1f5f9;
            --highlight-bg: #e0e7ff;
            --highlight-text: #3730a3;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* =========================================
           深色模式設定
           ========================================= */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f1f5f9;
            --heading-color: #e2e8f0;
            --primary-color: #818cf8;
            --section-bg: #1e293b;
            --section-border: #334155;
            --card-bg: #0f172a;
            --card-border: #334155;
            --th-bg: #0f172a;
            --td-border: #334155;
            --tr-even: #1e293b;
            --tr-hover: #334155;
            --highlight-bg: #312e81;
            --highlight-text: #c7d2fe;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; padding: 20px 10px; background-color: var(--bg-color); color: var(--text-color); margin: 0;
            transition: all 0.3s;
        }
        
        .container { 
            max-width: 1000px; margin: auto; background: var(--container-bg); padding: 35px; border-radius: 20px; 
            box-shadow: var(--shadow-lg); position: relative;
        }
        
        h1 { color: var(--heading-color); text-align: center; margin-bottom: 5px; font-size: 2.2em; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--primary-color); font-weight: 600; margin-bottom: 30px; font-size: 1.1em; }

        .theme-toggle {
            position: absolute; top: 25px; right: 25px; background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 50%; width: 44px; height: 44px; font-size: 1.2em; cursor: pointer; color: var(--text-color);
            display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); transition: transform 0.2s;
        }
        .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .section { background: var(--section-bg); border: 1px solid var(--section-border); padding: 25px; border-radius: 16px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
        .section-title { font-weight: 700; font-size: 1.25em; margin-bottom: 8px; color: var(--text-color); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 6px; height: 20px; background: var(--primary-color); margin-right: 12px; border-radius: 6px; }
        .section-desc { font-size: 0.9em; opacity: 0.7; margin-bottom: 20px; margin-left: 18px; }

        .control-group { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; }
        select { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--card-border); font-size: 15px; color: var(--text-color); background-color: var(--container-bg); cursor: pointer; outline: none; transition: all 0.2s; font-weight: 600; width: 100%; max-width: 400px; }
        select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }

        /* 表格樣式 */
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--td-border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; min-width: 600px; }
        th, td { border-bottom: 1px solid var(--td-border); padding: 14px 12px; text-align: center; }
        th { background-color: var(--th-bg); color: var(--text-color); font-weight: 700; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
        tr:nth-child(even) { background-color: var(--tr-even); }
        tr:hover { background-color: var(--tr-hover); }

        /* 動能條樣式 */
        .progress-bar-container { width: 100%; max-width: 150px; background: var(--card-border); border-radius: 8px; height: 10px; margin: 0 auto; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary-color); border-radius: 8px; }
        .progress-hot { background: #f59e0b; }
        .progress-cold { background: #3b82f6; opacity: 0.6; }

        /* 標籤樣式 */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.85em; }
        .badge-hot { background: rgba(245, 158, 11, 0.15); color: #d97706; border: 1px solid #fcd34d; }
        .badge-cold { background: rgba(59, 130, 246, 0.1); color: #2563eb; border: 1px solid #bfdbfe; opacity: 0.8; }
        .badge-normal { background: var(--highlight-bg); color: var(--highlight-text); }
        .badge-pred { background: #10b981; color: white; padding: 6px 12px; border-radius: 8px; font-size: 1.1em; }

        [data-theme="dark"] .badge-hot { color: #fbbf24; border-color: #b45309; }
        [data-theme="dark"] .badge-cold { color: #60a5fa; border-color: #1e3a8a; }

        .rank-1 { font-size: 1.3em; font-weight: 900; color: #f59e0b; }
        .rank-2 { font-size: 1.15em; font-weight: 800; color: #94a3b8; }
        .rank-3 { font-size: 1.1em; font-weight: 800; color: #b45309; }

    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <h1>AI 星期慣性 & 馬可夫矩陣</h1>
    <div class="subtitle" id="targetDateInfo">請先載入歷史數據庫</div>

    <div class="section" style="border: none; box-shadow: none; padding: 0 25px;">
        <div class="control-group">
            <select id="autoLoadCsv">
                <option value="">-- 請選擇歷史數據庫載入 --</option>
                <option value="Six_history_2026.csv">🇭🇰 香港 六合彩</option>
                <option value="649_history_2026.csv">🇹🇼 台灣 大樂透</option>
                <option value="539_history_2026.csv">🇹🇼 台灣 今彩 539</option>
                <option value="Fan_history_2026.csv">🇺🇸 加州 天天樂</option>
                <option value="Ghana_history_2026.csv">🇬🇭 非洲 迦納彩</option>
            </select>
        </div>
    </div>

    <div class="section" id="formulaSection" style="display: none;">
        <div class="section-title">🏆 專屬星期動態公式 (最強預測排名)</div>
        <div class="section-desc">針對「下一期」的專屬星期，系統自動回測歷史數據，找出目前勝率最高的加減法公式。</div>
        
        <div class="table-responsive" style="max-height: 400px;">
            <table id="formulaTable">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>參考基準</th>
                        <th>計算公式</th>
                        <th>歷史勝率</th>
                        <th>命中/總次數</th>
                        <th>👉 明天預測尾數</th>
                    </tr>
                </thead>
                <tbody id="formulaBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section" id="markovSection" style="display: none;">
        <div class="section-title">🧬 馬可夫鏈尾數傳染 (狀態轉移機率矩陣)</div>
        <div class="section-desc" id="markovDesc">根據昨晚開出的尾數，動態計算所有尾數在「明天」被感染開出的真實機率。</div>
        
        <div class="table-responsive">
            <table id="markovTable">
                <thead>
                    <tr>
                        <th>預測尾數</th>
                        <th>綜合傳染機率</th>
                        <th>機率動能條</th>
                        <th>狀態評估</th>
                    </tr>
                </thead>
                <tbody id="markovBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let rawData = [];
    const weekdayNames = ["日", "一", "二", "三", "四", "五", "六"];

    function toggleTheme() {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') { 
            body.removeAttribute('data-theme'); 
            document.querySelector('.theme-toggle').textContent = '🌙'; 
        } else { 
            body.setAttribute('data-theme', 'dark'); 
            document.querySelector('.theme-toggle').textContent = '☀️'; 
        }
    }

    function parseDateObj(dateStr) {
        let parts = dateStr.split('/');
        if(parts.length === 2) {
            let m = parts[0].padStart(2, '0'); let d = parts[1].padStart(2, '0');
            return new Date(`2026-${m}-${d}T00:00:00`);
        }
        return new Date();
    }
    
    function getNextDayInfo(dateStr) {
        let d = parseDateObj(dateStr);
        d.setDate(d.getDate() + 1);
        return { wd: d.getDay(), str: `${d.getMonth()+1}/${d.getDate()}` };
    }

    document.getElementById('autoLoadCsv').addEventListener('change', function(e) {
        const fileName = e.target.value; if (!fileName) return;
        fetch(fileName).then(response => response.text()).then(text => { processCSV(text); });
    });

    function processCSV(text) {
        const lines = text.trim().split('\n'); rawData = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if(cols.length >= 6) {
                let nums = [];
                for(let c=1; c<cols.length; c++) { let val = parseInt(cols[c]); if(!isNaN(val)) nums.push(val); }
                let dObj = parseDateObj(cols[0].trim());
                rawData.push({ date: cols[0].trim(), wd: dObj.getDay(), nums: nums.sort((a,b)=>a-b) });
            }
        }
        runAnalysis();
    }

    // 核心 AI 1：找出所有動態公式並排序
    function findAllDynamicFormulas(dataSlice, targetWd) {
        let evalDraws = [];
        for(let k=7; k<dataSlice.length; k++) {
            if(dataSlice[k].wd === targetWd) evalDraws.push(k);
        }
        
        let total = evalDraws.length;
        if(total < 3) return []; 

        let rulesStats = {};
        for(let lagType of ['lag1', 'lag_wd']) {
            for(let i=0; i<4; i++) {
                for(let j=i+1; j<5; j++) {
                    rulesStats[`${lagType}_add_${i}_${j}`] = 0;
                    rulesStats[`${lagType}_sub_${i}_${j}`] = 0;
                }
            }
        }

        evalDraws.forEach(k => {
            let currTails = dataSlice[k].nums.map(n => n % 10);
            let prev1 = dataSlice[k-1].nums;
            let prevWdIdx = -1;
            for(let p=k-1; p>=0; p--) { if(dataSlice[p].wd === targetWd) { prevWdIdx = p; break; } }
            
            for(let i=0; i<4; i++){
                for(let j=i+1; j<5; j++){
                    if(currTails.includes((prev1[i]+prev1[j])%10)) rulesStats[`lag1_add_${i}_${j}`]++;
                    if(currTails.includes(Math.abs(prev1[j]-prev1[i])%10)) rulesStats[`lag1_sub_${i}_${j}`]++;
                    
                    if(prevWdIdx !== -1) {
                        let pWd = dataSlice[prevWdIdx].nums;
                        if(currTails.includes((pWd[i]+pWd[j])%10)) rulesStats[`lag_wd_add_${i}_${j}`]++;
                        if(currTails.includes(Math.abs(pWd[j]-pWd[i])%10)) rulesStats[`lag_wd_sub_${i}_${j}`]++;
                    }
                }
            }
        });

        let results = [];
        for(let key in rulesStats) {
            let hits = rulesStats[key];
            let rate = hits / total;
            let parts = key.split('_');
            let lagName = parts[0] === 'lag1' ? '昨晚(上期)' : '上週同日';
            let opSymbol = parts[1] === 'add' ? '+' : '-';
            let iIdx = parseInt(parts[2]); let jIdx = parseInt(parts[3]);
            
            results.push({
                key: key, lagType: parts[0], op: parts[1], i: iIdx, j: jIdx,
                lagName: lagName,
                calcName: `第${jIdx+1}碼 ${opSymbol} 第${iIdx+1}碼`,
                rate: rate, hits: hits, total: total
            });
        }
        
        results.sort((a, b) => b.rate !== a.rate ? b.rate - a.rate : b.hits - a.hits);
        return results;
    }

    function calculateTail(dataSlice, targetWd, rule) {
        let L = dataSlice.length;
        let refNums = [];
        if(rule.lagType === 'lag1') {
            refNums = dataSlice[L-1].nums;
        } else {
            for(let p=L-1; p>=0; p--) {
                if(dataSlice[p].wd === targetWd) { refNums = dataSlice[p].nums; break; }
            }
        }
        if(refNums.length === 0) return "-";
        if(rule.op === 'add') return (refNums[rule.i] + refNums[rule.j]) % 10;
        else return Math.abs(refNums[rule.j] - refNums[rule.i]) % 10;
    }

    // 核心 AI 2：馬可夫矩陣分數
    function getMarkovScores(dataSlice) {
        let trans = {}; let counts = {};
        for(let i=0; i<10; i++) { trans[i] = {}; counts[i] = 0; for(let j=0; j<10; j++) trans[i][j] = 0; }
        
        for(let i=0; i<dataSlice.length-1; i++) {
            let todayTails = [...new Set(dataSlice[i].nums.map(n=>n%10))];
            let tmrwTails = [...new Set(dataSlice[i+1].nums.map(n=>n%10))];
            todayTails.forEach(t1 => { counts[t1]++; tmrwTails.forEach(t2 => { trans[t1][t2]++; }); });
        }
        
        let lastTails = [...new Set(dataSlice[dataSlice.length-1].nums.map(n=>n%10))];
        let scores = [];
        
        for(let tNext=0; tNext<10; tNext++) {
            let totalProb = 0;
            let validCount = 0;
            lastTails.forEach(tPrev => {
                if(counts[tPrev] > 0) {
                    totalProb += (trans[tPrev][tNext] / counts[tPrev]);
                    validCount++;
                }
            });
            let avgProb = validCount > 0 ? (totalProb / validCount) : 0;
            scores.push({ tail: tNext, prob: avgProb * 100 });
        }
        
        scores.sort((a,b) => b.prob - a.prob);
        return { scores: scores, lastTails: lastTails.sort() };
    }

    function runAnalysis() {
        document.getElementById('formulaSection').style.display = 'block';
        document.getElementById('markovSection').style.display = 'block';
        
        const L = rawData.length;
        if(L < 40) return;

        let lastDraw = rawData[L-1];
        let nextInfo = getNextDayInfo(lastDraw.date);
        document.getElementById('targetDateInfo').innerText = `預測目標：${nextInfo.str} (星期${weekdayNames[nextInfo.wd]})`;
        
        // --- 渲染公式表 ---
        let rules = findAllDynamicFormulas(rawData, nextInfo.wd);
        let fHtml = '';
        // 取前 15 名
        rules.slice(0, 15).forEach((r, idx) => {
            let predTail = calculateTail(rawData, nextInfo.wd, r);
            let rankClass = idx === 0 ? 'rank-1' : (idx === 1 ? 'rank-2' : (idx === 2 ? 'rank-3' : ''));
            let rankIcon = idx === 0 ? '🥇' : (idx === 1 ? '🥈' : (idx === 2 ? '🥉' : idx + 1));
            
            fHtml += `<tr>
                <td class="${rankClass}">${rankIcon}</td>
                <td style="font-weight:600;">${r.lagName}</td>
                <td><span class="badge badge-normal">${r.calcName}</span></td>
                <td style="font-weight:700; color:var(--primary-color);">${(r.rate*100).toFixed(1)}%</td>
                <td style="opacity:0.8;">${r.hits} / ${r.total}</td>
                <td><span class="badge badge-pred">${predTail} 尾</span></td>
            </tr>`;
        });
        document.getElementById('formulaBody').innerHTML = fHtml;

        // --- 渲染馬可夫表 ---
        let markovData = getMarkovScores(rawData);
        document.getElementById('markovDesc').innerHTML = `昨晚開出尾數：<strong style="color:var(--primary-color);">${markovData.lastTails.join(', ')}</strong>。以下是這包尾數在明天引發各尾數感染的綜合機率。`;
        
        let mHtml = '';
        let maxProb = markovData.scores[0].prob; // 用於進度條比例
        
        markovData.scores.forEach((item, idx) => {
            let widthPct = (item.prob / maxProb) * 100;
            let status = '';
            let pBarClass = 'progress-bar';
            
            if(idx < 3) { status = '<span class="badge badge-hot">🔥 強勢傳染</span>'; pBarClass += ' progress-hot'; }
            else if(idx > 6) { status = '<span class="badge badge-cold">❄️ 冰凍死區</span>'; pBarClass += ' progress-cold'; }
            else { status = '<span style="opacity:0.6; font-size:0.9em;">一般</span>'; }
            
            mHtml += `<tr>
                <td style="font-size:1.2em; font-weight:800;">${item.tail} 尾</td>
                <td style="font-weight:700;">${item.prob.toFixed(1)}%</td>
                <td>
                    <div class="progress-bar-container">
                        <div class="${pBarClass}" style="width: ${widthPct}%"></div>
                    </div>
                </td>
                <td>${status}</td>
            </tr>`;
        });
        document.getElementById('markovBody').innerHTML = mHtml;
    }
</script>
</body>
</html>
