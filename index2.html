            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }

            color: white;

<body class="pb-6">
    
    <div class="marking-toolbar no-print">
        <div class="flex items-center gap-2 mr-4">
            
            <button id="toggleSort" onclick="switchOrder()" class="btn-action btn-mode active"><i
                    data-lucide="arrow-down-0-1" style="width: 14px; height: 14px;"></i> 順球</button>
            
        </div>
        <div class="h-8 w-px bg-slate-200 mx-3"></div>

        <div class="flex items-center gap-2">
            <button id="clickModeColor" onclick="setClickMode('color')" class="btn-action btn-mode active">
                <i data-lucide="palette" style="width: 14px; height: 14px;"></i> 上色
            </button>
            <button id="clickModeDim" onclick="setClickMode('dim')" class="btn-action btn-mode">

        <button id="toggleDrawMode" class="btn-action btn-mode" onclick="toggleDrawingMode()">

        <div id="drawColorPalette" class="hidden items-center gap-3">

                <div class="color-dot bg-[#10b981]" onclick="setDrawColor('emerald', '#10b981')" title="翡翠綠"></div>
                <div class="color-dot bg-[#f59e0b]" onclick="setDrawColor('amber', '#f59e0b')" title="琥珀黃"></div>
                <div class="color-dot bg-[#0ea5e9]" onclick="setDrawColor('sky', '#0ea5e9')" title="天空藍"></div>

        <div class="search-inputs">

        <script>

    <div id="drawingWrapper">
        <svg id="drawingCanvas">
            <defs>
                <marker id="arrowhead-indigo" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
                    <polygon points="0 0, 6 2, 0 4" fill="#6366f1" />
                </marker>
                <marker id="arrowhead-rose" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
                    <polygon points="0 0, 6 2, 0 4" fill="#f43f5e" />
                </marker>
                <marker id="arrowhead-emerald" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
                    <polygon points="0 0, 6 2, 0 4" fill="#10b981" />
                </marker>
                <marker id="arrowhead-amber" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
                    <polygon points="0 0, 6 2, 0 4" fill="#f59e0b" />
                </marker>
                <marker id="arrowhead-sky" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
                    <polygon points="0 0, 6 2, 0 4" fill="#0ea5e9" />
                </marker>
            </defs>
            <g id="linesGroup"></g>
        </svg>

        
        <div class="page-container " style="margin-bottom: 60px;">
            <div class="title-section" >
                <h1 class="header-title">
                    加州天天樂 開獎單
                    
                </h1>
                
                <div class="flex items-center gap-3 no-print">
                    <button onclick="window.print()" class="btn-print">
                        <i data-lucide="printer" style="width: 16px; height: 16px;"></i> 直接列印
                    </button>
                    <div class="tooltip-container">
                        <button class="btn-info">
                            <i data-lucide="help-circle" style="width: 16px; height: 16px;"></i> 使用說明
                        </button>
                        <div class="tooltip-content">
                            開獎單可以使用滑鼠直接點號碼上色
                        </div>
                    </div>
                </div>
                
            </div>

            <div id="dynamicGridContainer" class="grid-container header-us539">
            </div>
        </div>
        
    </div>

    <footer class="mt-6 text-center text-xs text-black font-bold">

    <script>
        lucide.createIcons();

        // --- State ---
        let isDrawingMode = false;
        let firstBall = null;
        let currentDrawColor = 'indigo';
        let currentDrawColorHex = '#6366f1';
        let currentClickMode = 'color';
        window.drawnLines = [];
        window.currentOrder = 'sort';

        function setClickMode(mode) {
            currentClickMode = mode;
            document.getElementById('clickModeColor').classList.toggle('active', mode === 'color');
            document.getElementById('clickModeDim').classList.toggle('active', mode === 'dim');
        }

        // --- Search Logic ---
        document.querySelectorAll('.check-input').forEach(input => {
            input.addEventListener('input', () => {
                updateHighlights();
            });
        });

        function updateHighlights() {
            const inputs = document.querySelectorAll('.check-input');
            const highlightsMap = {};
            inputs.forEach((input, index) => {
                const val = input.value.trim();
                if (val !== '') {
                    const numVal = parseInt(val, 10).toString();
                    if (!(numVal in highlightsMap)) highlightsMap[numVal] = index;
                }
            });
            const cells = document.querySelectorAll('.num-cell');
            cells.forEach(cell => {
                for (let i = 0; i <= 5; i++) cell.classList.remove(`hl-${i}`);
                const ballVal = cell.getAttribute('data-ball-val');
                if (ballVal) {
                    const normalizedBallVal = parseInt(ballVal, 10).toString();
                    if (normalizedBallVal in highlightsMap) {
                        cell.classList.add(`hl-${highlightsMap[normalizedBallVal]}`);
                    }
                }
            });
        }

        function clearAllMarkers() {
            document.querySelectorAll('.check-input').forEach(input => input.value = '');
            document.querySelectorAll('.num-cell').forEach(cell => {
                for (let i = 0; i <= 5; i++) cell.classList.remove(`hl-${i}`);
                cell.classList.remove('is-dimmed');
                cell.style.boxShadow = '';
            });
            document.getElementById('linesGroup').innerHTML = '';
            window.drawnLines = [];
            firstBall = null;
            updateHighlights();
        }

        // --- 核心：從後台資料庫撈取數據並渲染成 4 欄排版 ---
        function loadAndRenderTable() {
            const db = JSON.parse(localStorage.getItem('ttLottoDb')) || [];
            const container = document.getElementById('dynamicGridContainer');
            container.innerHTML = '';

            const ROWS_PER_COLUMN = 48; // 每直欄固定 48 行，維持精美排版
            const TOTAL_COLUMNS = 4;
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            let dataIndex = 0;

            for (let c = 0; c < TOTAL_COLUMNS; c++) {
                const columnBox = document.createElement('div');
                columnBox.className = 'column-box';
                columnBox.style.width = '275px';

                let tableHtml = `
                    <table class="joined-table">
                        <colgroup>
                            <col style="width: 30px;"><col style="width: 30px;"><col style="width: 35px;">
                            <col style="width: 36.0px;"><col style="width: 36.0px;"><col style="width: 36.0px;"><col style="width: 36.0px;"><col style="width: 36.0px;">
                        </colgroup>
                        <thead>
                            <tr>
                                <th class="month-cell">月</th><th class="day-cell">日</th><th class="weekday-cell">星期</th>
                                <th colspan="5" class="header-order-text-dynamic">順球</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                let lastMonthText = "";

                for (let r = 0; r < ROWS_PER_COLUMN; r++) {
                    const item = db[dataIndex];
                    
                    if (item) {
                        const dateParts = item.twDate.split('-');
                        const monthText = parseInt(dateParts[1], 10).toString();
                        const dayText = dateParts[2];
                        const dayOfWeek = weekDays[new Date(item.twDate).getDay()];

                        const sortNums = [...item.nums].sort((a,b)=>a-b);
                        const drawNums = item.nums;

                        const displayMonth = (monthText === lastMonthText) ? "" : monthText;
                        lastMonthText = monthText;

                        tableHtml += `
                            <tr>
                                <td class="month-cell">${displayMonth}</td>
                                <td class="day-cell">${dayText}</td>
                                <td class="weekday-cell">${dayOfWeek}</td>
                                ${sortNums.map((num, i) => `
                                    <td class="num-cell" 
                                        data-ball-val="${window.currentOrder === 'sort' ? num : drawNums[i]}" 
                                        data-val-sort="${num}" 
                                        data-val-draw="${drawNums[i]}">${window.currentOrder === 'sort' ? num : drawNums[i]}</td>
                                `).join('')}
                            </tr>
                        `;
                        dataIndex++;
                    } else {
                        // 補足空行以維持高度
                        tableHtml += `
                            <tr>
                                <td style="border-top: hidden !important;"></td><td></td><td></td>
                                <td></td><td></td><td></td><td></td><td></td>
                            </tr>
                        `;
                    }
                }

                tableHtml += `</tbody></table>`;
                columnBox.innerHTML = tableHtml;
                container.appendChild(columnBox);
            }
        }

        // --- Order Switch Logic ---
        function switchOrder() {
            // 切換狀態
            window.currentOrder = (window.currentOrder === 'sort') ? 'draw' : 'sort';
            const order = window.currentOrder;

            const btnSort = document.getElementById('toggleSort');
            
            // 重新渲染表格
            loadAndRenderTable();

            if (order === 'sort') {
                btnSort.innerHTML = '<i data-lucide="arrow-down-0-1" style="width: 14px; height: 14px;"></i> 順球';
            } else {
                btnSort.innerHTML = '<i data-lucide="shuffle" style="width: 14px; height: 14px;"></i> 落球';
            }

            document.querySelectorAll('.header-order-text-dynamic').forEach(el => {
                el.textContent = order === 'sort' ? '順球' : '落球';
            });

            rebindBallEvents();
            updateHighlights();
            lucide.createIcons();
        }

        // --- Drawing Logic ---
        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            const btn = document.getElementById('toggleDrawMode');
            const palette = document.getElementById('drawColorPalette');
            if (isDrawingMode) {
                btn.classList.add('active');
                palette.classList.remove('hidden');
                palette.classList.add('flex');
            } else {
                btn.classList.remove('active');
                palette.classList.add('hidden');
                palette.classList.remove('flex');
                if (firstBall) firstBall.style.boxShadow = '';
                firstBall = null;
            }
        }

        function setDrawColor(colorName, colorHex) {
            currentDrawColor = colorName;
            currentDrawColorHex = colorHex;
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.toggle('active', dot.getAttribute('onclick').includes(colorName));
            });
        }

        function drawLineBetween(b1, b2, colorName = 'indigo') {
            const wrapper = document.getElementById('drawingWrapper');
            const wrapRect = wrapper.getBoundingClientRect();
            const r1 = b1.getBoundingClientRect();
            const r2 = b2.getBoundingClientRect();

            const x1 = (r1.left + r1.width / 2) - wrapRect.left;
            const y1 = (r1.top + r1.height / 2) - wrapRect.top + 10;
            const x2 = (r2.left + r2.width / 2) - wrapRect.left;
            const y2 = (r2.top + r2.height / 2) - wrapRect.top + 10;

            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);

            let actualX2 = x2, actualY2 = y2;
            if (len > 15) {
                const offset = 12;
                actualX2 = x2 - (dx / len) * offset;
                actualY2 = y2 - (dy / len) * offset;
            }

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1); line.setAttribute('y1', y1);
            line.setAttribute('x2', actualX2); line.setAttribute('y2', actualY2);
            line.setAttribute('class', `draw-line marker-${colorName}`);
            line.setAttribute('marker-end', `url(#arrowhead-${colorName})`);
            document.getElementById('linesGroup').appendChild(line);
        }

        function redrawLines() {
            document.getElementById('linesGroup').innerHTML = '';
            window.drawnLines.forEach(l => drawLineBetween(l.b1, l.b2, l.color));
        }

        function handleBallDrawingClick(cell) {
            if (!firstBall) {
                firstBall = cell;
                cell.style.boxShadow = `inset 0 0 0 3px ${currentDrawColorHex}`;
            } else {
                if (firstBall === cell) {
                    cell.style.boxShadow = '';
                    firstBall = null;
                    return;
                }
                drawLineBetween(firstBall, cell, currentDrawColor);
                window.drawnLines.push({ b1: firstBall, b2: cell, color: currentDrawColor });
                firstBall.style.boxShadow = '';
                firstBall = null;
            }
        }

        // --- Handling Ball Click Event ---
        function handleBallClick(cell) {
            const val = cell.getAttribute('data-ball-val');
            if (!val) return;

            if (currentClickMode === 'dim') {
                cell.classList.toggle('is-dimmed');
                return;
            }

            const numStr = parseInt(val, 10).toString();
            const inputs = document.querySelectorAll('.check-input');

            // 1. Check if already marked
            let existingInput = null;
            inputs.forEach(input => {
                if (input.value.trim() !== '' && parseInt(input.value, 10).toString() === numStr) {
                    existingInput = input;
                }
            });

            if (existingInput) {
                existingInput.value = '';
            } else {
                // 2. Find first empty slot
                let emptyInput = null;
                for (let input of inputs) {
                    if (input.value.trim() === '') {
                        emptyInput = input;
                        break;
                    }
                }
                if (emptyInput) {
                    const num = parseInt(val, 10);
                    emptyInput.value = (num < 10 ? '0' : '') + num;
                }
            }
            updateHighlights();
        }

        function rebindBallEvents() {
            document.querySelectorAll('.num-cell').forEach(cell => {
                cell.addEventListener('mousedown', (e) => {
                    if (isDrawingMode) {
                        handleBallDrawingClick(cell);
                    } else {
                        handleBallClick(cell);
                    }
                    e.preventDefault();
                });
            });
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            window.currentOrder = 'sort'; // 預設順球
            
            // 1. 從 LocalStorage 載入並渲染表格
            loadAndRenderTable();

            // 2. 綁定搜尋框事件
            document.querySelectorAll('.check-input').forEach(input => {
                input.addEventListener('input', () => {
                    input.value = input.value.replace(/[^0-9]/g, '').slice(0, 2);
                    updateHighlights();
                });
            });

            // 3. 綁定號碼球點擊事件
            rebindBallEvents();

            window.addEventListener('resize', redrawLines);

            // Init Dark Mode
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                updateDarkModeButton();
            }
        });

        // --- Dark Mode Logic ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            updateDarkModeButton();
        }

        function updateDarkModeButton() {
            const btn = document.getElementById('toggleDarkMode');
            const isDark = document.body.classList.contains('dark-mode');
            if (isDark) {
                btn.classList.add('active');
                btn.innerHTML = '<i data-lucide="sun" style="width: 14px; height: 14px;"></i> 日間';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<i data-lucide="moon" style="width: 14px; height: 14px;"></i> 護眼';
            }
            lucide.createIcons();
        }
    </script>
