<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星級日期與號碼變幻版路分析系統</title>
    <meta name="theme-color" content="#3b82f6">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #9b59b6;
            --success: #27ae60;
            --warning: #e67e22;
            --danger: #e74c3c;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; line-height: 1.4; }
        .container { max-width: 600px; margin: 0 auto; }

        /* Header Area */
        .header { background: linear-gradient(135deg, var(--primary), #34495e); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;}
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

        /* Controls */
        .selector-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #dfe6e9; font-size: 1rem; appearance: none; background: #fff; margin-bottom: 10px; cursor: pointer; outline: none; }
        select:focus { border-color: var(--accent); }
        .status-bar { font-size: 0.85rem; color: #636e72; display: flex; align-items: center; gap: 5px; }

        /* Prediction Cards */
        .section-title { font-size: 1rem; font-weight: bold; margin: 15px 0 10px 5px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        #predictionArea { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .pred-card { background: var(--card); padding: 15px; border-radius: 12px; border-left: 6px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .pred-card h3 { font-size: 0.95rem; margin-bottom: 5px; color: var(--primary); font-weight: 800; }
        .pred-info { font-size: 0.8rem; color: #636e72; margin-bottom: 8px; }
        .nums-highlight { font-size: 1.4rem; font-weight: 900; color: var(--accent); letter-spacing: 1px; display: block; margin-top: 5px; }
        .target-tail { font-size: 0.85rem; color: #fff; background: var(--primary); padding: 2px 8px; border-radius: 12px; vertical-align: middle; margin-left: 5px; }
        .score-tag { position: absolute; top: 0; right: 0; background: #dfe6e9; color: #2d3436; padding: 4px 10px; border-bottom-left-radius: 10px; font-size: 0.75rem; font-weight: bold; }
        .score-high { background: #ffeaa7; color: #d35400; }
        .score-perfect { background: var(--success); color: white; }

        /* Summary Area */
        .summary { background: #f3e5f5; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid #e1bee7; color: #4a148c; }

        /* Result List */
        .result-item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .res-date { font-weight: bold; color: var(--primary); }
        .res-actual { font-family: monospace; font-size: 1rem; color: #2d3436; font-weight: bold; }
        
        /* Event Details */
        .hit-detail { background: #f0fdf4; padding: 8px; border-radius: 8px; margin-top: 8px; border: 1px solid #bbf7d0; }
        .miss-detail { background: #f9fafb; padding: 8px; border-radius: 8px; margin-top: 8px; border: 1px solid #eee; }
        .trigger-detail { background: #eff6ff; padding: 8px; border-radius: 8px; margin-top: 8px; border: 1px solid #bfdbfe; }

        .hit-type { font-size: 0.85rem; font-weight: bold; color: var(--success); }
        .trigger-type { font-size: 0.85rem; font-weight: bold; color: #1d4ed8; }
        
        .hit-nums { color: var(--success); font-weight: 900; font-size: 1rem; margin-top: 2px; }
        .miss-nums { color: #b2bec3; font-weight: 900; font-size: 1rem; margin-top: 2px; }
        .trigger-nums { color: #1e40af; font-weight: 900; font-size: 1rem; margin-top: 2px; }

        .hit-status { font-size: 0.75rem; color: var(--success); font-weight: bold; margin-top: 3px; }
        .miss-status { font-size: 0.75rem; color: #636e72; font-weight: bold; margin-top: 3px; }
        .trigger-status { font-size: 0.75rem; color: #1d4ed8; font-weight: bold; margin-top: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>星級日期與號碼變幻版路分析系統</h1>
    </div>
    
    <div class="selector-box">
        <select id="csvSelect" onchange="processData()">
            <option value="539_history_2026.csv">今彩 539</option>
            <option value="Fan_history_2026.csv">天天樂</option>
            <option value="Ghana_history_2026.csv">迦納彩</option>
            <option value="649_history_2026.csv">大樂透</option>
            <option value="Six_history_2026.csv">六合彩</option>
        </select>
        
        <select id="patternSelect" onchange="runAnalysis()">
            <option value="mon_date">【日期版】週一日期 (+0, +1, +2) 👉 用於週一、二</option>
            <option value="tue_date">【日期版】週二日期 (+3, +4, +5) 👉 用於週二、三</option>
            <option value="thu_date">【日期版】週四日期 (-2, -1, -0) 👉 用於週四、五、六</option>
            <option value="mon_min">【號碼版】週一最小號 (+1, +2, +3) 👉 用於週二、三</option>
            <option value="wed_min">【號碼版】週三最小號 (+0, +1, +2) 👉 用於週四、五</option>
        </select>

        <div class="status-bar">
            <span>資料狀態:</span>
            <span id="dataStatus" style="font-weight: bold;">讀取中...</span>
        </div>
    </div>

    <div class="section-title">🕒 目前最新訊號追蹤 (等待開獎)</div>
    <div id="predictionArea"></div>
    
    <div id="summaryArea" class="summary" style="display:none;"></div>

    <div class="section-title">📜 歷史滾動回測紀錄</div>
    <div id="resultList"></div>
</div>

<script>
    let parsedData = [];
    let maxNum = 39;

    function fNum(n) { return String(n).padStart(2, '0'); }
    function intersect(arr1, arr2) { return arr1.filter(value => arr2.includes(value)); }
    
    function getWeekDay(dateStr) {
        let parts = dateStr.split('/');
        let date = new Date(2026, parseInt(parts[0]) - 1, parseInt(parts[1]));
        return date.getDay();
    }

    function getDateDay(dateStr) {
        return parseInt(dateStr.split('/')[1]);
    }

    async function processData() {
        const fileName = document.getElementById('csvSelect').value;
        const statusEl = document.getElementById('dataStatus');
        maxNum = (fileName.includes('649') || fileName.includes('Six')) ? 49 : 39;
        
        statusEl.innerText = "讀取中...";
        try {
            const res = await fetch(fileName);
            if(!res.ok) throw new Error();
            const text = await res.text();
            const lines = text.trim().split('\n');
            
            parsedData = [];
            for(let i = 1; i < lines.length; i++) {
                let cols = lines[i].split(',').map(s => s.trim());
                if(cols.length < 6 || isNaN(parseInt(cols[1]))) continue;
                let nums = [];
                for(let j = 1; j < cols.length; j++) {
                    let n = parseInt(cols[j]);
                    if(!isNaN(n)) nums.push(n);
                }
                parsedData.push({ date: cols[0], nums: nums, weekday: getWeekDay(cols[0]), dayNum: getDateDay(cols[0]) });
            }
            
            statusEl.innerText = `✅ 載入成功 (共 ${parsedData.length} 期)`;
            runAnalysis();
        } catch(e) { 
            statusEl.innerText = "❌ 讀取失敗 (請檢查本機伺服器環境或檔名)"; 
            document.getElementById('predictionArea').innerHTML = '';
            document.getElementById('resultList').innerHTML = '';
            document.getElementById('summaryArea').style.display = 'none';
        }
    }

    function calculateTargets(row, patternConfig) {
        let baseValue = 0;
        if (patternConfig.baseType === 'date') {
            baseValue = row.dayNum;
        } else if (patternConfig.baseType === 'min_num') {
            baseValue = Math.min(...row.nums);
        }

        return patternConfig.offsets.map(offset => {
            let val = baseValue + offset;
            return (val > 0 && val <= maxNum) ? val : null;
        }).filter(v => v !== null);
    }

    function getHistoricalWinRate(currentIndex, patternConfig) {
        let totalTriggers = 0;
        let successfulTriggers = 0;

        for (let i = 0; i <= currentIndex; i++) {
            if (parsedData[i].weekday !== patternConfig.triggerWday) continue;
            
            let targets = calculateTargets(parsedData[i], patternConfig);
            if (targets.length === 0) continue;

            totalTriggers++;
            let isHit = false;

            for (let targetWday of patternConfig.targetWdays) {
                for (let j = 1; j <= 5; j++) {
                    if (i + j <= currentIndex) {
                        if (parsedData[i + j].weekday === targetWday) {
                            let hits = intersect(targets, parsedData[i + j].nums);
                            if (hits.length > 0) { isHit = true; break; }
                        }
                    }
                }
                if (isHit) break;
            }
            if (isHit) successfulTriggers++;
        }

        return {
            score: totalTriggers > 0 ? (successfulTriggers / totalTriggers * 100) : 0,
            total: totalTriggers
        };
    }

    function runAnalysis() {
        const patternType = document.getElementById('patternSelect').value;
        
        const configs = {
            'mon_date': { name: '週一日期版路', baseType: 'date', triggerWday: 1, targetWdays: [1, 2], offsets: [0, 1, 2], desc: '加 0, 1, 2' },
            'tue_date': { name: '週二日期版路', baseType: 'date', triggerWday: 2, targetWdays: [2, 3], offsets: [3, 4, 5], desc: '加 3, 4, 5' },
            'thu_date': { name: '週四日期版路', baseType: 'date', triggerWday: 4, targetWdays: [4, 5, 6], offsets: [-2, -1, 0], desc: '減 2, 1, 0' },
            'mon_min':  { name: '週一最小號版路', baseType: 'min_num', triggerWday: 1, targetWdays: [2, 3], offsets: [1, 2, 3], desc: '最小號 +1, +2, +3' },
            'wed_min':  { name: '週三最小號版路', baseType: 'min_num', triggerWday: 3, targetWdays: [4, 5], offsets: [0, 1, 2], desc: '最小號 +0, +1, +2' }
        };

        const config = configs[patternType];
        let dailyView = parsedData.map(d => ({ date: d.date, nums: d.nums, weekday: d.weekday, events: [] }));
        let tracking = [];
        let stats = { total: 0, hit: 0 };

        for (let i = 0; i < parsedData.length; i++) {
            if (parsedData[i].weekday !== config.triggerWday) continue;

            let targets = calculateTargets(parsedData[i], config);
            if (targets.length === 0) continue;

            let r = getHistoricalWinRate(i, config);
            stats.total++;

            let signalEvent = {
                type: 'trigger',
                name: config.name,
                desc: config.desc,
                targets: targets,
                score: r.score
            };
            dailyView[i].events.push(signalEvent);

            let hitInfo = null;
            let maxPeriodsToCheck = 5;

            for (let j = 0; j <= maxPeriodsToCheck; j++) {
                if (i + j < parsedData.length) {
                    let nextRow = parsedData[i + j];
                    if (config.targetWdays.includes(nextRow.weekday)) {
                        let hitNums = intersect(targets, nextRow.nums);
                        if (hitNums.length > 0) {
                            hitInfo = { hitIndex: i + j, hitDate: nextRow.date, hitWday: nextRow.weekday, n: hitNums };
                            stats.hit++;
                            break;
                        }
                    }
                }
            }

            const wdayNames = ['日', '一', '二', '三', '四', '五', '六'];
            if (hitInfo) {
                dailyView[hitInfo.hitIndex].events.push({
                    type: 'hit',
                    name: config.name,
                    hitNums: hitInfo.n,
                    triggerDate: parsedData[i].date,
                    hitWdayName: wdayNames[hitInfo.hitWday]
                });
            } else {
                let lastTargetWday = config.targetWdays[config.targetWdays.length - 1];
                let passedTargetDay = false;
                let missIndex = i;
                
                for(let k = 0; k <= 5; k++) {
                    if (i + k < parsedData.length) {
                        if (parsedData[i+k].weekday === lastTargetWday) {
                            passedTargetDay = true;
                            missIndex = i + k;
                            break;
                        }
                    }
                }

                if (passedTargetDay) {
                    dailyView[missIndex].events.push({
                        type: 'miss',
                        name: config.name,
                        targets: targets,
                        triggerDate: parsedData[i].date
                    });
                } else {
                    tracking.push({
                        name: config.name,
                        desc: config.desc,
                        targets: targets,
                        date: parsedData[i].date,
                        score: r.score
                    });
                }
            }
        }

        tracking.reverse();
        document.getElementById('predictionArea').innerHTML = tracking.length > 0 ? tracking.map(t => {
            let scoreClass = t.score === 100 ? 'score-perfect' : (t.score >= 80 ? 'score-high' : '');
            return `
            <div class="pred-card">
                <div class="score-tag ${scoreClass}">${t.score.toFixed(1)}% 滾動勝率</div>
                <h3>${t.name} <span class="target-tail">${t.desc}</span></h3>
                <div class="pred-info">觸發基準日: ${t.date} </div>
                <span class="nums-highlight">${t.targets.map(fNum).join(', ')}</span>
            </div>`
        }).join('') : '<div style="padding:20px; color:#999; text-align:center; background: var(--card); border-radius: 12px;">該版路目前無最新訊號或已驗證完畢 ☕</div>';

        const wdayNames = ['日', '一', '二', '三', '四', '五', '六'];
        const listHtml = dailyView.slice().reverse().map(d => {
            if (d.events.length === 0) return ''; 
            
            let eventsHtml = d.events.map(e => {
                if (e.type === 'trigger') {
                    return `
                    <div class="trigger-detail">
                        <div class="trigger-type">🔔 訊號建立: ${e.name} (${e.desc})</div>
                        <div class="trigger-nums">演算預測號: ${e.targets.map(fNum).join(', ')}</div>
                        <div class="trigger-status">👉 當期勝率統計基準: ${e.score.toFixed(1)}%</div>
                    </div>`;
                } else if (e.type === 'hit') {
                    return `
                    <div class="hit-detail">
                        <div class="hit-type">🎯 版路精準命中！ 【${e.name}】</div>
                        <div class="hit-nums">命中號碼: ${e.hitNums.map(fNum).join(', ')}</div>
                        <div class="hit-status">📈 依據 ${e.triggerDate} 訊號，於 (週${e.hitWdayName}) 成功開出</div>
                    </div>`;
                } else if (e.type === 'miss') {
                    return `
                    <div class="miss-detail">
                        <div class="hit-type" style="color:#636e72;">❌ 版路落空 【${e.name}】</div>
                        <div class="miss-nums">失準號碼: ${e.targets.map(fNum).join(', ')}</div>
                        <div class="miss-status">歷史備忘: 起始觸發日為 ${e.triggerDate}</div>
                    </div>`;
                }
            }).join('');

            return `
            <div class="result-item">
                <div class="res-header">
                    <span class="res-date">開獎日期: ${d.date} (週${wdayNames[d.weekday]})</span>
                    <span class="res-actual">${d.nums.map(fNum).join(' ')}</span>
                </div>
                ${eventsHtml}
            </div>`;
        }).join('');
        
        document.getElementById('resultList').innerHTML = listHtml || '<div style="text-align:center;padding:20px; color:#999;">尚無符合版路紀錄</div>';

        let hitRate = stats.total > 0 ? (stats.hit / stats.total * 100).toFixed(1) : 0;
        document.getElementById('summaryArea').style.display = 'block';
        document.getElementById('summaryArea').innerHTML = `💡 <b>當前版路歷史總計 (動態滾動回測)：</b>共觸發 <b>${stats.total}</b> 次，成功命中 <b>${stats.hit}</b> 次，平均精準率達 <b>${hitRate}%</b>`;
    }

    window.onload = processData;
</script>
</body>
</html>
