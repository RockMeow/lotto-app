            body.dark-mode .num-cell.hl-1 { color: white !important; }

            z-index: 10;
            transform: scale(1.1);

        /* 最新期數尚未開出的預測觸發號碼 */
        .hl-pattern-predict {

        .tooltip-content {
            visibility: hidden;

        .tooltip-container:hover .tooltip-content {

            opacity: 1;

        body.dark-mode { background-color: #0f172a; color: #f1f5f9; }

        /* Pattern Panel Styles */
        #patternPanel {
            position: fixed;
            right: -360px;
            top: 0;
            width: 360px;
            height: 100vh;
            background: #fff;

    <script>
        lucide.createIcons();

        // --- State ---
        let isDrawingMode = false;
        let firstBall = null;
        let currentDrawColor = 'indigo';
        let currentDrawColorHex = '#6366f1';
        let currentClickMode = 'color';
        window.drawnLines = [];
        window.currentOrder = 'sort';
        let currentPatterns = [];
        let currentGame = 'ttLottoDb'; // 預設彩種

        // --- 遊戲切換功能 ---
        function switchGame(gameKey) {
            currentGame = gameKey;
            
            // 更新按鈕樣式
            document.getElementById('btn-ttLottoDb').className = gameKey === 'ttLottoDb' 
                ? 'px-3 py-1.5 rounded-lg font-bold transition bg-blue-600 text-white text-sm shadow-sm'
                : 'px-3 py-1.5 rounded-lg font-bold transition bg-slate-200 text-slate-700 hover:bg-slate-300 text-sm';
                
            document.getElementById('btn-tw539LottoDb').className = gameKey === 'tw539LottoDb' 
                ? 'px-3 py-1.5 rounded-lg font-bold transition bg-blue-600 text-white text-sm shadow-sm'
                : 'px-3 py-1.5 rounded-lg font-bold transition bg-slate-200 text-slate-700 hover:bg-slate-300 text-sm';

            // 更新標題與表格顏色
            const container = document.getElementById('dynamicGridContainer');
            if (gameKey === 'ttLottoDb') {
                document.getElementById('mainTitle').innerText = '加州天天樂 開獎單';
                container.classList.remove('header-tw539');
                container.classList.add('header-us539');
            } else {
                document.getElementById('mainTitle').innerText = '今彩 539 開獎單';
                container.classList.remove('header-us539');
                container.classList.add('header-tw539');
            }
            
            // 重置並重新渲染
            clearAllMarkers();
            loadAndRenderTable();
            rebindBallEvents();
            
            // 關閉版路面板並清空結果
            const panel = document.getElementById('patternPanel');
            if(panel) panel.classList.remove('open');
            const btn = document.getElementById('togglePatternPanelBtn');
            if(btn) btn.classList.remove('active');
            
            const resultsDiv = document.getElementById('patternResults');
            if(resultsDiv) {
                resultsDiv.innerHTML = `
                    <div style="text-align: center; color: #94a3b8; font-size: 13px; margin-top: 40px;">
                        <i data-lucide="mouse-pointer-click" style="width: 32px; height: 32px; margin: 0 auto 10px auto; opacity: 0.5;"></i>
                        請設定條件並點擊「開始分析」
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function setClickMode(mode) {
            currentClickMode = mode;
            document.getElementById('clickModeColor').classList.toggle('active', mode === 'color');
            document.getElementById('clickModeDim').classList.toggle('active', mode === 'dim');
        }

        // --- Search Logic ---
        document.querySelectorAll('.check-input').forEach(input => {
            input.addEventListener('input', () => {
                updateHighlights();
            });
        });

        function updateHighlights() {
            const inputs = document.querySelectorAll('.check-input');
            const highlightsMap = {};
            inputs.forEach((input, index) => {
                const val = input.value.trim();
                if (val !== '') {
                    const numVal = parseInt(val, 10).toString();
                    if (!(numVal in highlightsMap)) highlightsMap[numVal] = index;
                }
            });
            const cells = document.querySelectorAll('.num-cell');
            cells.forEach(cell => {
                for (let i = 0; i <= 5; i++) cell.classList.remove(`hl-${i}`);
                const ballVal = cell.getAttribute('data-ball-val');
                if (ballVal) {
                    const normalizedBallVal = parseInt(ballVal, 10).toString();
                    if (normalizedBallVal in highlightsMap) {
                        cell.classList.add(`hl-${highlightsMap[normalizedBallVal]}`);
                    }
                }
            });
        }

        function clearAllMarkers() {
            document.querySelectorAll('.check-input').forEach(input => input.value = '');
            document.querySelectorAll('.num-cell').forEach(cell => {
                for (let i = 0; i <= 5; i++) cell.classList.remove(`hl-${i}`);
                cell.classList.remove('is-dimmed');
                cell.style.boxShadow = '';
            });
            document.getElementById('linesGroup').innerHTML = '';
            window.drawnLines = [];
            firstBall = null;
            clearPatternHighlights(); 
            document.querySelectorAll('.pattern-result-item').forEach(el => el.classList.remove('active'));
            updateHighlights();
        }

        // --- 核心：從後台資料庫撈取數據並渲染成 4 欄排版 ---
        function loadAndRenderTable() {
            const db = JSON.parse(localStorage.getItem(currentGame)) || [];
            const container = document.getElementById('dynamicGridContainer');
            container.innerHTML = '';

            const ROWS_PER_COLUMN = 48;
            const TOTAL_COLUMNS = 4;
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            let dataIndex = 0;

            for (let c = 0; c < TOTAL_COLUMNS; c++) {
                const columnBox = document.createElement('div');
                columnBox.className = 'column-box';
                columnBox.style.width = '275px';

                let tableHtml = `
                    <table class="joined-table">
                        <colgroup>
                            <col style="width: 30px;"><col style="width: 30px;"><col style="width: 35px;">
                            <col style="width: 36.0px;"><col style="width: 36.0px;"><col style="width: 36.0px;"><col style="width: 36.0px;"><col style="width: 36.0px;">
                        </colgroup>
                        <thead>
                            <tr>
                                <th class="month-cell">月</th><th class="day-cell">日</th><th class="weekday-cell">星期</th>
                                <th colspan="5" class="header-order-text-dynamic">順球</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                let lastMonthText = "";

                for (let r = 0; r < ROWS_PER_COLUMN; r++) {
                    const item = db[dataIndex];
                    
                    if (item) {
                        const dateParts = item.twDate.split('-');
                        const monthText = parseInt(dateParts[1], 10).toString();
                        const dayText = dateParts[2];
                        const dayOfWeek = weekDays[new Date(item.twDate).getDay()];

                        const sortNums = [...item.nums].sort((a,b)=>a-b);
                        const drawNums = item.nums;

                        const displayMonth = (monthText === lastMonthText) ? "" : monthText;
                        lastMonthText = monthText;

                        // 加入 data-draw-idx 用於定位期數
                        tableHtml += `
                            <tr data-draw-idx="${dataIndex}">
                                <td class="month-cell">${displayMonth}</td>
                                <td class="day-cell">${dayText}</td>
                                <td class="weekday-cell">${dayOfWeek}</td>
                                ${sortNums.map((num, i) => `
                                    <td class="num-cell" 
                                        data-ball-val="${window.currentOrder === 'sort' ? num : drawNums[i]}" 
                                        data-val-sort="${num}" 
                                        data-val-draw="${drawNums[i]}">${window.currentOrder === 'sort' ? num : drawNums[i]}</td>
                                `).join('')}
                            </tr>
                        `;
                        dataIndex++;
                    } else {
                        tableHtml += `
                            <tr>
                                <td style="border-top: hidden !important;"></td><td></td><td></td>
                                <td></td><td></td><td></td><td></td><td></td>
                            </tr>
                        `;
                    }
                }

                tableHtml += `</tbody></table>`;
                columnBox.innerHTML = tableHtml;
                container.appendChild(columnBox);
            }
        }

        // --- Order Switch Logic ---
        function switchOrder() {
            window.currentOrder = (window.currentOrder === 'sort') ? 'draw' : 'sort';
            const order = window.currentOrder;
            const btnSort = document.getElementById('toggleSort');
            
            loadAndRenderTable();

            if (order === 'sort') {
                btnSort.innerHTML = '<i data-lucide="arrow-down-0-1" style="width: 14px; height: 14px;"></i> 順球';
            } else {
                btnSort.innerHTML = '<i data-lucide="shuffle" style="width: 14px; height: 14px;"></i> 落球';
            }

            document.querySelectorAll('.header-order-text-dynamic').forEach(el => {
                el.textContent = order === 'sort' ? '順球' : '落球';
            });

            rebindBallEvents();
            updateHighlights();
            
            // 如果版路面板有開啟中的項目，重新綁定高亮
            const activePatternNode = document.querySelector('.pattern-result-item.active');
            if (activePatternNode && currentPatterns.length > 0) {
                const activeIndex = Array.from(activePatternNode.parentNode.children).indexOf(activePatternNode);
                if(currentPatterns[activeIndex]) highlightPattern(currentPatterns[activeIndex]);
            }
            
            lucide.createIcons();
        }

        // --- Drawing Logic ---
        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            const btn = document.getElementById('toggleDrawMode');
            const palette = document.getElementById('drawColorPalette');
            if (isDrawingMode) {
                btn.classList.add('active');
                palette.classList.remove('hidden');
                palette.classList.add('flex');
            } else {
                btn.classList.remove('active');
                palette.classList.add('hidden');
                palette.classList.remove('flex');
                if (firstBall) firstBall.style.boxShadow = '';
                firstBall = null;
            }
        }

        function setDrawColor(colorName, colorHex) {
            currentDrawColor = colorName;
            currentDrawColorHex = colorHex;
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.toggle('active', dot.getAttribute('onclick').includes(colorName));
            });
        }

        function drawLineBetween(b1, b2, colorName = 'indigo') {
            const wrapper = document.getElementById('drawingWrapper');
            const wrapRect = wrapper.getBoundingClientRect();
            const r1 = b1.getBoundingClientRect();
            const r2 = b2.getBoundingClientRect();

            const x1 = (r1.left + r1.width / 2) - wrapRect.left;
            const y1 = (r1.top + r1.height / 2) - wrapRect.top + 10;
            const x2 = (r2.left + r2.width / 2) - wrapRect.left;
            const y2 = (r2.top + r2.height / 2) - wrapRect.top + 10;

            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);

            let actualX2 = x2, actualY2 = y2;
            if (len > 15) {
                const offset = 12;
                actualX2 = x2 - (dx / len) * offset;
                actualY2 = y2 - (dy / len) * offset;
            }

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1); line.setAttribute('y1', y1);
            line.setAttribute('x2', actualX2); line.setAttribute('y2', actualY2);
            line.setAttribute('class', `draw-line marker-${colorName}`);
            line.setAttribute('marker-end', `url(#arrowhead-${colorName})`);
            document.getElementById('linesGroup').appendChild(line);
        }

        function redrawLines() {
            document.getElementById('linesGroup').innerHTML = '';
            window.drawnLines.forEach(l => drawLineBetween(l.b1, l.b2, l.color));
        }

        function handleBallDrawingClick(cell) {
            if (!firstBall) {
                firstBall = cell;
                cell.style.boxShadow = `inset 0 0 0 3px ${currentDrawColorHex}`;
            } else {
                if (firstBall === cell) {
                    cell.style.boxShadow = '';
                    firstBall = null;
                    return;
                }
                drawLineBetween(firstBall, cell, currentDrawColor);
                window.drawnLines.push({ b1: firstBall, b2: cell, color: currentDrawColor });
                firstBall.style.boxShadow = '';
                firstBall = null;
            }
        }

        function handleBallClick(cell) {
            const val = cell.getAttribute('data-ball-val');
            if (!val) return;

            if (currentClickMode === 'dim') {
                cell.classList.toggle('is-dimmed');
                return;
            }

            const numStr = parseInt(val, 10).toString();
            const inputs = document.querySelectorAll('.check-input');

            let existingInput = null;
            inputs.forEach(input => {
                if (input.value.trim() !== '' && parseInt(input.value, 10).toString() === numStr) {
                    existingInput = input;
                }
            });

            if (existingInput) {
                existingInput.value = '';
            } else {
                let emptyInput = null;
                for (let input of inputs) {
                    if (input.value.trim() === '') {
                        emptyInput = input;
                        break;
                    }
                }
                if (emptyInput) {
                    const num = parseInt(val, 10);
                    emptyInput.value = (num < 10 ? '0' : '') + num;
                }
            }
            updateHighlights();
        }

        function rebindBallEvents() {
            document.querySelectorAll('.num-cell').forEach(cell => {
                cell.addEventListener('mousedown', (e) => {
                    if (isDrawingMode) {
                        handleBallDrawingClick(cell);
                    } else {
                        handleBallClick(cell);
                    }
                    e.preventDefault();
                });
            });
        }

        // --- Pattern Analysis Logic (版路分析系統) ---
        function togglePatternPanel() {
            const panel = document.getElementById('patternPanel');
            const btn = document.getElementById('togglePatternPanelBtn');
            panel.classList.toggle('open');
            btn.classList.toggle('active');
            if (!panel.classList.contains('open')) {
                // 不自動清除 highlight，讓使用者可以保留看圖
            }
        }

        function analyzePatterns() {
            const db = JSON.parse(localStorage.getItem(currentGame)) || [];
            if (db.length === 0) return alert('目前沒有足夠的開獎數據可供分析');

            const type = document.getElementById('patternType').value;
            const offset = parseInt(document.getElementById('patternOffset').value, 10);
            const minHits = parseInt(document.getElementById('patternMinHits').value, 10);

            currentPatterns = [];
            const resultsDiv = document.getElementById('patternResults');
            resultsDiv.innerHTML = `
                <div style="text-align: center; padding: 30px; color: #64748b;">
                    <i data-lucide="loader-2" class="animate-spin" style="width: 24px; height: 24px; margin: 0 auto 10px auto;"></i>
                    <p style="font-weight: 700;">運算中...</p>
                </div>
            `;
            lucide.createIcons();

            setTimeout(() => {
                if (type === 'any') {
                    for (let x = 1; x <= 39; x++) {
                        let triggerIndices = [];
                        // 包含最新的未結算觸發期數
                        for (let i = 0; i < db.length; i++) {
                            if (db[i].nums.includes(x)) triggerIndices.push(i);
                        }
                        if (triggerIndices.length === 0) continue;

                        let targetCounts = {};
                        let targetHitIndicesMap = {};
                        let completedCount = 0;
                        
                        triggerIndices.forEach(i => {
                            if (i + offset < db.length) {
                                completedCount++;
                                db[i + offset].nums.forEach(y => {
                                    targetCounts[y] = (targetCounts[y] || 0) + 1;
                                    if (!targetHitIndicesMap[y]) targetHitIndicesMap[y] = [];
                                    targetHitIndicesMap[y].push(i + offset);
                                });
                            }
                        });
                        
                        for (let y in targetCounts) {
                            if (targetCounts[y] >= minHits) {
                                currentPatterns.push({
                                    type: 'any', triggerVal: x, targetVal: parseInt(y),
                                    triggerCount: completedCount,
                                    hits: targetCounts[y],
                                    offset: offset,
                                    dbLength: db.length, // 記錄資料庫長度供高亮判斷
                                    allTriggerIndices: triggerIndices,
                                    targetIndices: targetHitIndicesMap[y],
                                    desc: `【不定位】 <span style="color: #f59e0b;">${x}</span> 拖 <span style="color: #10b981;">${y}</span>`
                                });
                            }
                        }
                    }
                } else if (type === 'fixed') {
                    for (let p = 0; p < 5; p++) {
                        for (let x = 1; x <= 39; x++) {
                            let triggerIndices = [];
                            // 包含最新的未結算觸發期數
                            for (let i = 0; i < db.length; i++) {
                                const sortedNums = [...db[i].nums].sort((a,b)=>a-b);
                                if (sortedNums[p] === x) triggerIndices.push(i);
                            }
                            if (triggerIndices.length === 0) continue;

                            let targetCounts = {};
                            let targetHitIndicesMap = {};
                            let completedCount = 0;
                            
                            triggerIndices.forEach(i => {
                                if (i + offset < db.length) {
                                    completedCount++;
                                    db[i + offset].nums.forEach(y => {
                                        targetCounts[y] = (targetCounts[y] || 0) + 1;
                                        if (!targetHitIndicesMap[y]) targetHitIndicesMap[y] = [];
                                        targetHitIndicesMap[y].push(i + offset);
                                    });
                                }
                            });
                            
                            for (let y in targetCounts) {
                                if (targetCounts[y] >= minHits) {
                                    currentPatterns.push({
                                        type: 'fixed', pos: p, triggerVal: x, targetVal: parseInt(y),
                                        triggerCount: completedCount,
                                        hits: targetCounts[y],
                                        offset: offset,
                                        dbLength: db.length, // 記錄資料庫長度供高亮判斷
                                        allTriggerIndices: triggerIndices,
                                        targetIndices: targetHitIndicesMap[y],
                                        desc: `【順球第${p+1}顆】 <span style="color: #f59e0b;">${x}</span> 拖 <span style="color: #10b981;">${y}</span>`
                                    });
                                }
                            }
                        }
                    }
                }

                // 排序邏輯：優先按位置，接著觸發號碼小到大，最後拖出號碼小到大
                currentPatterns.sort((a, b) => {
                    if (a.type === 'fixed' && b.type === 'fixed' && a.pos !== b.pos) {
                        return a.pos - b.pos;
                    }
                    if (a.triggerVal !== b.triggerVal) {
                        return a.triggerVal - b.triggerVal;
                    }
                    return a.targetVal - b.targetVal;
                });

                if (currentPatterns.length === 0) {
                    resultsDiv.innerHTML = `
                        <div style="text-align: center; padding: 30px; color: #94a3b8;">
                            <i data-lucide="ghost" style="width: 32px; height: 32px; margin: 0 auto 10px auto; opacity: 0.5;"></i>
                            <p>在此條件下找不到任何版路規律</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                resultsDiv.innerHTML = '';
                currentPatterns.forEach((pat, idx) => {
                    const item = document.createElement('div');
                    item.className = 'pattern-result-item';
                    
                    // 修正邏輯：必須確切在「即將開獎的這一期 (idx + offset === dbLength)」才會顯示為預測中紅色警告
                    const isPredicting = pat.allTriggerIndices.some(i => i + pat.offset === pat.dbLength);
                    if (isPredicting) {
                        item.classList.add('pattern-predicting');
                    }

                    item.onclick = () => {
                        document.querySelectorAll('.pattern-result-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        highlightPattern(pat);
                        
                        // 點擊版路後自動縮回右側面板
                        const panel = document.getElementById('patternPanel');
                        const btn = document.getElementById('togglePatternPanelBtn');
                        panel.classList.remove('open');
                        btn.classList.remove('active');
                    };

                    let offsetStr = `下${offset}期`;
                    if(offset === 1) offsetStr = '下一期';
                    else if(offset === 2) offsetStr = '下二期';
                    else if(offset === 3) offsetStr = '下三期';
                    else if(offset === 4) offsetStr = '下四期';
                    else if(offset === 5) offsetStr = '下五期';

                    item.innerHTML = `
                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <span class="pattern-badge">${offsetStr}</span>
                            <span style="color: #f43f5e; font-weight: 900; font-size: 13px; display: flex; align-items: center; gap: 4px;">
                                <i data-lucide="target" style="width: 14px; height: 14px;"></i> 觸發 ${pat.triggerCount} / 命中 ${pat.hits}
                            </span>
                        </div>
                        <div class="pattern-text">${pat.desc}</div>
                    `;
                    resultsDiv.appendChild(item);
                });
                lucide.createIcons();
            }, 150);
        }

        function clearPatternHighlights() {
            document.querySelectorAll('.hl-pattern-trigger').forEach(el => el.classList.remove('hl-pattern-trigger'));
            document.querySelectorAll('.hl-pattern-target').forEach(el => el.classList.remove('hl-pattern-target'));
            document.querySelectorAll('.hl-pattern-predict').forEach(el => el.classList.remove('hl-pattern-predict'));
            document.getElementById('linesGroup').innerHTML = '';
            window.drawnLines = [];
        }

        function highlightPattern(pattern) {
            clearPatternHighlights();

            pattern.allTriggerIndices.forEach(idx => {
                const tr = document.querySelector(`tr[data-draw-idx="${idx}"]`);
                if (tr) {
                    const cell = tr.querySelector(`.num-cell[data-val-sort="${pattern.triggerVal}"]`);
                    if (cell) {
                        // 修正邏輯：必須確切在「即將開獎的這一期」才會顯示紅色預測
                        if (idx + pattern.offset === pattern.dbLength) {
                            cell.classList.add('hl-pattern-predict');
                        } else {
                            cell.classList.add('hl-pattern-trigger');
                        }
                    }
                }
            });

            pattern.targetIndices.forEach(targetIdx => {
                const targetTr = document.querySelector(`tr[data-draw-idx="${targetIdx}"]`);
                const triggerIdx = targetIdx - pattern.offset;
                const triggerTr = document.querySelector(`tr[data-draw-idx="${triggerIdx}"]`);
                
                if (targetTr) {
                    const targetCell = targetTr.querySelector(`.num-cell[data-val-sort="${pattern.targetVal}"]`);
                    if (targetCell) {
                        targetCell.classList.add('hl-pattern-target');
                        
                        if (triggerTr) {
                            const triggerCell = triggerTr.querySelector(`.num-cell[data-val-sort="${pattern.triggerVal}"]`);
                            if (triggerCell) {
                                drawLineBetween(triggerCell, targetCell, 'rose');
                                window.drawnLines.push({ b1: triggerCell, b2: targetCell, color: 'rose' });
                            }
                        }
                    }
                }
            });
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            window.currentOrder = 'sort';
            
            // 使用預設遊戲彩種進行初始渲染
            switchGame('ttLottoDb');

            window.addEventListener('resize', redrawLines);

            // Init Dark Mode
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                updateDarkModeButton();
            }
        });

        // --- Dark Mode Logic ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            updateDarkModeButton();
        }

        function updateDarkModeButton() {
            const btn = document.getElementById('toggleDarkMode');
            const isDark = document.body.classList.contains('dark-mode');
            if (isDark) {
                btn.classList.add('active');
                btn.innerHTML = '<i data-lucide="sun" style="width: 14px; height: 14px;"></i> 日間';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<i data-lucide="moon" style="width: 14px; height: 14px;"></i> 護眼';
            }
            lucide.createIcons();
        }
    </script>
</body>

</html>
