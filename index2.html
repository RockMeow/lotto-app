<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三期牌分析系統</title>
    <link rel="manifest" href="manifest2.json">
    <meta name="theme-color" content="#3b82f6">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; line-height: 1.4; }

        .container { max-width: 600px; margin: 0 auto; }

        /* Header Area */
        .header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

        .toggle-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .toggle-on { background: var(--success); border-color: var(--success); }

        /* Controls */
        .selector-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #dfe6e9; font-size: 1rem; appearance: none; background: #fff; margin-bottom: 8px; }
        .status-bar { font-size: 0.85rem; color: #636e72; display: flex; align-items: center; gap: 5px; }

        /* Prediction Cards */
        .section-title { font-size: 1rem; font-weight: bold; margin: 15px 0 10px 5px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        #predictionArea { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .pred-card { background: var(--card); padding: 15px; border-radius: 12px; border-left: 6px solid var(--warning); box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .pred-card h3 { font-size: 0.95rem; margin-bottom: 5px; color: var(--primary); }
        .pred-info { font-size: 0.8rem; color: #636e72; margin-bottom: 8px; }
        .nums-highlight { font-size: 1.5rem; font-weight: 900; color: var(--warning); letter-spacing: 2px; display: block; margin-top: 5px; }
        .score-tag { position: absolute; top: 0; right: 0; background: #dfe6e9; color: #2d3436; padding: 4px 10px; border-bottom-left-radius: 10px; font-size: 0.7rem; font-weight: bold; }

        /* Summary Area */
        .summary { background: #e1f5fe; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid #b3e5fc; }

        /* Result List (Mobile-optimized table replacement) */
        .result-item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .res-date { font-weight: bold; color: var(--primary); }
        .res-actual { font-family: monospace; font-size: 1rem; color: #2d3436; font-weight: bold; }
        .hit-detail { background: #fdfaf0; padding: 8px; border-radius: 8px; margin-top: 8px; }
        .hit-type { font-size: 0.85rem; font-weight: bold; color: #d35400; }
        .hit-nums { color: var(--success); font-weight: 900; font-size: 1rem; }
        .hit-status { font-size: 0.75rem; color: var(--success); font-weight: bold; margin-top: 3px; }

        /* Animations */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .loading { animation: pulse 1s infinite; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <h1>三期牌分析系統</h1>
            <div id="toggleFilter" class="toggle-btn" onclick="toggleFilter()">過濾 OFF</div>
        </div>
        <div id="aiBadge" style="display:none; font-size: 0.7rem; color: #ffeb3b; font-weight: bold;">● 勝率精選模式已開啟</div>
    </div>
    
    <div class="selector-box">
        <select id="csvSelect" onchange="processData()">
            <option value="539_history_2026.csv">今彩 539</option>
            <option value="649_history_2026.csv">大樂透</option>
            <option value="Six_history_2026.csv">六合彩</option>
            <option value="Fan_history_2026.csv">天天樂</option>
            <option value="Ghana_history_2026.csv">迦納彩</option>
        </select>
        <div class="status-bar">
            <span>資料狀態:</span>
            <span id="dataStatus" style="font-weight: bold;">讀取中...</span>
        </div>
    </div>

    <div class="section-title">🕒 目前追蹤中</div>
    <div id="predictionArea"></div>
    
    <div id="summaryArea" class="summary" style="display:none;"></div>

    <div class="section-title">📜 回測紀錄</div>
    <div id="resultList"></div>
</div>

<script>
    let parsedData = [];
    let isFilterEnabled = false;

    function fNum(n) { return String(n).padStart(2, '0'); }
    function intersect(arr1, arr2) { return arr1.filter(value => arr2.includes(value)); }

    function toggleFilter() {
        isFilterEnabled = !isFilterEnabled;
        const btn = document.getElementById('toggleFilter');
        btn.innerText = isFilterEnabled ? "過濾 ON" : "過濾 OFF";
        btn.className = isFilterEnabled ? "toggle-btn toggle-on" : "toggle-btn";
        document.getElementById('aiBadge').style.display = isFilterEnabled ? "block" : "none";
        if(parsedData.length > 0) runAnalysis();
    }

    function getSmartPatterns(nums, fileName) {
        let rawPatterns = [];
        let numSet = new Set(nums);
        let maxNum = (fileName.includes('649') || fileName.includes('Six')) ? 49 : 39;

        let sorted = [...nums].sort((a,b)=>a-b);
        let consec = [];
        for(let i=0; i<sorted.length-1; i++) if(sorted[i+1]-sorted[i]===1) consec.push(sorted[i+1]);
        if(consec.length > 0) {
            let targets = [];
            consec.forEach(c => { if(c+1 <= maxNum) targets.push(c+1); if(c+2 <= maxNum) targets.push(c+2); });
            targets = [...new Set(targets)];
            rawPatterns.push({ type: '連號拖牌', target: targets.slice(0,3), score: 68.9 });
        }

        let tails = nums.map(n => n % 10);
        let tailCounts = {};
        tails.forEach(t => tailCounts[t] = (tailCounts[t]||0)+1);
        Object.keys(tailCounts).filter(t => tailCounts[t]>1).forEach(t => {
            let targets = [];
            for(let i=0; i<=4; i++) {
                let cand = i*10 + parseInt(t);
                if(cand > 0 && cand <= maxNum && !numSet.has(cand)) targets.push(cand);
            }
            rawPatterns.push({ type: `同尾牽引 (${t}尾)`, target: targets.slice(0,3), score: 67.0 });
        });

        let zLimit = Math.floor(maxNum / 3);
        let z1 = nums.filter(n => n <= zLimit).length;
        let z2 = nums.filter(n => n > zLimit && n <= zLimit*2).length;
        let z3 = nums.filter(n => n > zLimit*2).length;
        if(z1===0) rawPatterns.push({ type: '一區斷層回補', target: [Math.floor(zLimit/2)], score: 70.0 });
        if(z2===0) rawPatterns.push({ type: '二區斷層回補', target: [Math.floor(zLimit*1.5)], score: 85.0 });
        if(z3===0) rawPatterns.push({ type: '三區斷層回補', target: [Math.floor(zLimit*2.5)], score: 50.0 });

        if (isFilterEnabled) {
            let strong = rawPatterns.filter(p => p.score >= 65.0).sort((a,b)=>b.score-a.score);
            return strong.length > 0 ? [strong[0]] : [];
        }
        return rawPatterns.slice(0, 2);
    }

    async function processData() {
        const fileName = document.getElementById('csvSelect').value;
        const statusEl = document.getElementById('dataStatus');
        statusEl.innerText = "讀取中...";
        try {
            const res = await fetch(fileName);
            const text = await res.text();
            const lines = text.trim().split('\n');
            parsedData = [];
            lines.forEach(line => {
                let cols = line.split(',');
                if(cols.length < 6 || isNaN(parseInt(cols[1]))) return;
                parsedData.push({ date: cols[0], nums: cols.slice(1,7).map(n => parseInt(n)).filter(n => !isNaN(n)) });
            });
            statusEl.innerText = "✅ 載入成功";
            runAnalysis();
        } catch(e) { statusEl.innerText = "❌ 檔案異常"; }
    }

    function runAnalysis() {
        const fileName = document.getElementById('csvSelect').value;
        let dailyResults = parsedData.map(d => ({ ...d, hits: [] }));
        let tracking = [];
        let stats = { total: 0, hit: 0 };

        for (let i = 0; i < parsedData.length; i++) {
            let patterns = getSmartPatterns(parsedData[i].nums, fileName);
            patterns.forEach(p => {
                stats.total++;
                let found = false;
                for (let j = 1; j <= 3; j++) {
                    if (i + j < parsedData.length && intersect(p.target, parsedData[i+j].nums).length > 0) {
                        stats.hit++;
                        dailyResults[i+j].hits.push({ type: p.type, triggerDate: parsedData[i].date, n: intersect(p.target, parsedData[i+j].nums), p: j });
                        found = true; break;
                    }
                }
                if (!found && parsedData.length - 1 - i < 3) 
                    tracking.push({ type: p.type, target: p.target.map(fNum).join(', '), date: parsedData[i].date, age: parsedData.length-i, score: p.score });
            });
        }

        tracking.reverse();
        document.getElementById('predictionArea').innerHTML = tracking.length > 0 ? tracking.map(t => `
            <div class="pred-card">
                <div class="score-tag">${t.score}% 勝率</div>
                <h3>${t.type}</h3>
                <div class="pred-info">觸發日: ${t.date} | 第 ${t.age} 期</div>
                <span class="nums-highlight">${t.target}</span>
            </div>`).join('') : '<div style="padding:20px; color:#999; text-align:center;">無追蹤版路</div>';

        const listHtml = dailyResults.slice().reverse().filter(d=>d.hits.length>0).map(d => `
            <div class="result-item">
                <div class="res-header">
                    <span class="res-date">${d.date}</span>
                    <span class="res-actual">${d.nums.map(fNum).join(' ')}</span>
                </div>
                ${d.hits.map(h => `
                    <div class="hit-detail">
                        <div class="hit-type">${h.type} <span style="font-weight:normal;color:#999">(${h.triggerDate} 觸發)</span></div>
                        <div class="hit-nums">命中: ${h.n.map(fNum).join(', ')}</div>
                        <div class="hit-status">🎯 1~3期內命中 (第 ${h.p} 期)</div>
                    </div>
                `).join('')}
            </div>`).join('');
        
        document.getElementById('resultList').innerHTML = listHtml || '<div style="text-align:center;padding:20px;">尚無命中紀錄</div>';

        document.getElementById('summaryArea').style.display = 'block';
        document.getElementById('summaryArea').innerHTML = `💡 <b>統計：</b> 共產出 ${stats.total} 組，命中 ${stats.hit} 組，精準率 <b>${(stats.hit/stats.total*100).toFixed(1)}%</b>`;
    }

    window.onload = processData;
</script>
</body>
</html>
