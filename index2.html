<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>馬可夫鏈與定膽過濾</title>
    <style>
        /* =========================================
           現代化 UI 變數與亮色模式
           ========================================= */
        :root {
            --bg-color: #f8fafc; 
            --container-bg: #ffffff;
            --text-color: #334155;
            --heading-color: #0f172a;
            --primary-color: #4f46e5;
            --section-bg: #ffffff;
            --section-border: #e2e8f0;
            --card-bg: #f1f5f9;
            --card-border: #cbd5e1;
            --th-bg: #f8fafc;
            --td-border: #e2e8f0;
            --tr-even: #ffffff;
            --tr-hover: #f1f5f9;
            --highlight-bg: #e0e7ff;
            --highlight-text: #3730a3;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* =========================================
           深色模式設定
           ========================================= */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f1f5f9;
            --heading-color: #e2e8f0;
            --primary-color: #818cf8;
            --section-bg: #1e293b;
            --section-border: #334155;
            --card-bg: #0f172a;
            --card-border: #334155;
            --th-bg: #0f172a;
            --td-border: #334155;
            --tr-even: #1e293b;
            --tr-hover: #334155;
            --highlight-bg: #312e81;
            --highlight-text: #c7d2fe;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; padding: 20px 10px; background-color: var(--bg-color); color: var(--text-color); margin: 0;
            transition: all 0.3s;
        }
        
        .container { 
            max-width: 1050px; margin: auto; background: var(--container-bg); padding: 35px; border-radius: 20px; 
            box-shadow: var(--shadow-lg); position: relative;
        }
        
        h1 { color: var(--heading-color); text-align: center; margin-bottom: 5px; font-size: 2.2em; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--primary-color); font-weight: 600; margin-bottom: 30px; font-size: 1.1em; }

        .theme-toggle {
            position: absolute; top: 25px; right: 25px; background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 50%; width: 44px; height: 44px; font-size: 1.2em; cursor: pointer; color: var(--text-color);
            display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); transition: transform 0.2s;
        }
        .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .section { background: var(--section-bg); border: 1px solid var(--section-border); padding: 25px; border-radius: 16px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
        .section-title { font-weight: 800; font-size: 1.3em; margin-bottom: 8px; color: var(--text-color); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 6px; height: 20px; background: var(--primary-color); margin-right: 12px; border-radius: 6px; }
        .section-desc { font-size: 0.95em; opacity: 0.7; margin-bottom: 20px; margin-left: 18px; font-weight: 500;}

        .control-group { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; }
        select { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--card-border); font-size: 15px; color: var(--text-color); background-color: var(--container-bg); cursor: pointer; outline: none; transition: all 0.2s; font-weight: 600; width: 100%; max-width: 400px; box-shadow: var(--shadow-sm); }
        select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }

        /* 表格樣式 */
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--td-border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.98em; min-width: 600px; }
        th, td { border-bottom: 1px solid var(--td-border); padding: 16px 14px; text-align: center; }
        th { background-color: var(--th-bg); color: var(--text-color); font-weight: 800; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
        tr:nth-child(even) { background-color: var(--tr-even); }
        tr:hover { background-color: var(--tr-hover); }

        /* 高亮樣式 */
        .highlight-row { background-color: rgba(79, 70, 229, 0.08) !important; box-shadow: inset 4px 0 0 var(--primary-color); }
        [data-theme="dark"] .highlight-row { background-color: rgba(129, 140, 248, 0.15) !important; }

        /* 標籤樣式 */
        .badge { display: inline-block; padding: 6px 12px; border-radius: 8px; font-weight: 800; font-size: 0.95em; letter-spacing: 0.5px; }
        .badge-hot { background: rgba(245, 158, 11, 0.15); color: #d97706; border: 1px solid #fcd34d; }
        .badge-cold { background: rgba(220, 38, 38, 0.1); color: #dc2626; border: 1px solid #fca5a5; }
        .badge-formula { background: var(--highlight-bg); color: var(--highlight-text); border: 1px solid rgba(79, 70, 229, 0.3); }
        
        [data-theme="dark"] .badge-hot { color: #fbbf24; border-color: #b45309; }
        [data-theme="dark"] .badge-cold { color: #f87171; border-color: #991b1b; }

        .prob-text { font-weight: 800; margin-left: 6px; font-size: 0.9em; opacity: 0.8; }

        @media (max-width: 768px) {
            .container { padding: 25px 15px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <h1>馬可夫鏈 & 智能定膽</h1>
    <div class="subtitle">AI 動態過濾系統</div>

    <div class="section" style="border: none; box-shadow: none; padding: 0 25px; margin-bottom: 10px;">
        <div class="control-group">
            <select id="autoLoadCsv">
                <option value="">-- 請選擇彩球類型 --</option>
                <option value="Six_history_2026.csv">🇭🇰 香港 六合彩</option>
                <option value="649_history_2026.csv">🇹🇼 台灣 大樂透</option>
                <option value="539_history_2026.csv">🇹🇼 台灣 今彩 539</option>
                <option value="Fan_history_2026.csv">🇺🇸 加州 天天樂</option>
                <option value="Ghana_history_2026.csv">🇬🇭 非洲 迦納彩</option>
            </select>
        </div>
    </div>

    <div class="section" id="aiFilterSection" style="display: none;">
        <div class="section-title">🤖 AI 深度過濾 (定膽推薦)</div>
        <div class="section-desc">系統自動提取馬可夫鏈最強動能尾數，並計算遺漏值與斜連狀態。</div>
        <div id="aiFilterBody"></div>
    </div>

    <div class="section" id="markovSection" style="display: none;">
        <div class="section-title">馬可夫鏈矩陣</div>
        <div class="table-responsive">
            <table id="markovTable">
                <thead>
                    <tr>
                        <th>如果開出...</th>
                        <th>最強尾數</th>
                        <th>次強尾數</th>
                        <th>避開尾數</th>
                    </tr>
                </thead>
                <tbody id="markovBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let rawData = [];

    function toggleTheme() {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') { 
            body.removeAttribute('data-theme'); 
            document.querySelector('.theme-toggle').textContent = '🌙'; 
        } else { 
            body.setAttribute('data-theme', 'dark'); 
            document.querySelector('.theme-toggle').textContent = '☀️'; 
        }
    }

    function parseDateObj(dateStr) {
        let s = dateStr.trim().replace(/-/g, '/');
        let parts = s.split('/');
        let y = 2026, m = 1, d = 1;
        if (parts.length === 3) { y = parseInt(parts[0]); m = parseInt(parts[1]); d = parseInt(parts[2]); } 
        else if (parts.length === 2) { m = parseInt(parts[0]); d = parseInt(parts[1]); } 
        else { return null; }
        if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
        let mStr = String(m).padStart(2, '0'); let dStr = String(d).padStart(2, '0');
        let dateObj = new Date(`${y}-${mStr}-${dStr}T00:00:00`);
        if (isNaN(dateObj.getTime())) dateObj = new Date(`${y}/${mStr}/${dStr} 00:00:00`);
        return isNaN(dateObj.getTime()) ? null : dateObj;
    }

    document.getElementById('autoLoadCsv').addEventListener('change', function(e) {
        const fileName = e.target.value; if (!fileName) return;
        fetch(fileName).then(response => response.text()).then(text => { processCSV(text); });
    });

    function processCSV(text) {
        const lines = text.trim().split('\n'); rawData = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if(cols.length >= 6) {
                let nums = [];
                for(let c=1; c<cols.length; c++) { let val = parseInt(cols[c]); if(!isNaN(val)) nums.push(val); }
                let dObj = parseDateObj(cols[0]);
                if (dObj && nums.length >= 5) rawData.push({ date: cols[0].trim(), wd: dObj.getDay(), nums: nums.sort((a,b)=>a-b) });
            }
        }
        runAnalysis();
    }

    function getMarkovMatrixAll(dataSlice) {
        let trans = {}; let counts = {};
        for(let i=0; i<10; i++) { trans[i] = {}; counts[i] = 0; for(let j=0; j<10; j++) trans[i][j] = 0; }
        
        for(let i=0; i<dataSlice.length-1; i++) {
            let todayTails = [...new Set(dataSlice[i].nums.map(n=>n%10))];
            let tmrwTails = [...new Set(dataSlice[i+1].nums.map(n=>n%10))];
            todayTails.forEach(t1 => { counts[t1]++; tmrwTails.forEach(t2 => { trans[t1][t2]++; }); });
        }
        
        let results = [];
        for(let t=0; t<10; t++) {
            if(counts[t] > 0) {
                let probs = [];
                for(let nextT=0; nextT<10; nextT++) {
                    probs.push({ tail: nextT, prob: trans[t][nextT] / counts[t] });
                }
                probs.sort((a,b) => b.prob - a.prob); 
                
                results.push({
                    today: t,
                    top1: probs[0],
                    top2: probs[1],
                    worst: probs[probs.length-1]
                });
            }
        }
        return results;
    }

    function runAnalysis() {
        document.getElementById('aiFilterSection').style.display = 'block';
        document.getElementById('markovSection').style.display = 'block';
        
        const L = rawData.length;
        if(L < 40) return;

        let lastDraw = rawData[L-1];
        let lastTails = [...new Set(lastDraw.nums.map(n => n % 10))]; 

        // 自動判斷球數上限 (例如大樂透49，天天樂/迦納彩39)
        let maxNum = Math.max(39, ...rawData.map(d => Math.max(...d.nums)));
        
        let markovData = getMarkovMatrixAll(rawData);

        // --- 1. AI 深度過濾定膽邏輯 ---
        
        // A. 計算明天的目標馬可夫強勢尾數 (基於昨晚開出的所有尾數加總評分)
        let scores = {};
        for(let i=0; i<10; i++) scores[i] = 0;
        
        lastTails.forEach(t => {
            let m = markovData.find(x => x.today === t);
            if(m) {
                scores[m.top1.tail] += 2;   // 最強傳染 +2
                scores[m.top2.tail] += 1;   // 次強傳染 +1
                scores[m.worst.tail] -= 2;  // 避開死角 -2
            }
        });
        
        // 抓出分數最高的兩個尾數作為主力目標
        let sortedTails = Object.keys(scores).map(Number).sort((a,b) => scores[b] - scores[a]);
        let targetTails = [sortedTails[0], sortedTails[1]];

        // B. 計算所有號碼的遺漏期數
        let omissions = {};
        for(let i=1; i<=maxNum; i++) omissions[i] = L;
        for(let i=0; i<L; i++) {
            rawData[i].nums.forEach(n => {
                omissions[n] = L - 1 - i;
            });
        }

        // C. 渲染過濾報告
        let filterHtml = '';
        targetTails.forEach(tail => {
            filterHtml += `<div style="background: var(--card-bg); border: 1px solid var(--card-border); padding: 15px; border-radius: 12px; margin-bottom: 15px;">`;
            filterHtml += `<div style="font-weight: 800; color: var(--primary-color); font-size: 1.15em; margin-bottom: 12px;">🎯 目標鎖定：<span style="background: var(--primary-color); color: white; padding: 2px 8px; border-radius: 6px;">${tail} 尾</span></div>`;
            filterHtml += `<table style="width:100%; border-collapse: collapse; font-size: 0.95em; text-align: center;">`;
            filterHtml += `<tr style="border-bottom: 2px solid var(--td-border); opacity: 0.8;"><th style="padding-bottom:10px;">號碼</th><th style="padding-bottom:10px;">遺漏期數</th><th style="padding-bottom:10px;">斜連狀態</th><th style="padding-bottom:10px;">AI 判定</th></tr>`;
            
            let candidates = [];
            for(let i=tail; i<=maxNum; i+=10) {
                if(i === 0) continue;
                candidates.push(i);
            }
            
            candidates.forEach(num => {
                let omi = omissions[num];
                let isNeighbor = lastDraw.nums.includes(num - 1) || lastDraw.nums.includes(num + 1);
                
                let advice = "";
                let badgeClass = "";
                
                // 定膽規則：冷破冰、熱連莊、防守觀望
                if (omi >= 10) { 
                    advice = "冷號破冰"; 
                    badgeClass = "badge-formula"; 
                } else if (omi <= 2) { 
                    advice = "熱號連莊"; 
                    badgeClass = "badge-hot"; 
                } else { 
                    advice = "觀望區間"; 
                    badgeClass = "badge-cold"; 
                }
                
                // 鄰號加成判定
                if (isNeighbor && omi >= 10) {
                    advice = "🔥 極品鐵膽";
                    badgeClass = "badge-hot";
                } else if (isNeighbor) {
                    advice += " (鄰號)";
                }
                
                let neighborText = isNeighbor ? `<span style="color:var(--primary-color); font-weight:800;">有鄰號</span>` : "-";
                let numStr = num < 10 ? '0' + num : num;
                
                filterHtml += `<tr style="border-bottom: 1px dashed var(--td-border);">
                    <td style="font-weight: 900; padding: 12px; font-size: 1.15em;">${numStr}</td>
                    <td style="font-weight: 600; opacity: 0.8;">${omi} 期</td>
                    <td>${neighborText}</td>
                    <td><span class="badge ${badgeClass}">${advice}</span></td>
                </tr>`;
            });
            filterHtml += `</table></div>`;
        });
        document.getElementById('aiFilterBody').innerHTML = filterHtml;


        // --- 2. 渲染馬可夫矩陣表 (自動高亮上期開出尾數) ---
        let mHtml = '';
        for(let i=0; i<10; i++) {
            let m = markovData.find(x => x.today === i);
            if(!m) continue;
            
            let isTriggered = lastTails.includes(i);
            let trClass = isTriggered ? ' class="highlight-row"' : '';
            let indicator = isTriggered ? '<br><span style="font-size:0.75em; color:var(--primary-color); background:var(--highlight-bg); padding:2px 6px; border-radius:4px; font-weight:800;">👉 上期有開</span>' : '';

            mHtml += `<tr${trClass}>
                <td style="font-size:1.15em; font-weight:800;">有 <span style="color:var(--primary-color); font-size:1.2em;">${m.today}</span> 尾${indicator}</td>
                <td><span class="badge badge-hot"> ${m.top1.tail} 尾</span> <span class="prob-text">(${(m.top1.prob*100).toFixed(1)}%)</span></td>
                <td><span class="badge badge-hot" style="opacity:0.95;"> ${m.top2.tail} 尾</span> <span class="prob-text">(${(m.top2.prob*100).toFixed(1)}%)</span></td>
                <td><span class="badge badge-cold"> ${m.worst.tail} 尾</span> <span class="prob-text">(${(m.worst.prob*100).toFixed(1)}%)</span></td>
            </tr>`;
        }
        document.getElementById('markovBody').innerHTML = mHtml;
    }
</script>
</body>
</html>
