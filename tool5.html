<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星期版路工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        
        /* 配合原本 JS 動態生成的 class 樣式，改用 Tailwind 風格配色 */
        .status-wait { background-color: #fef3c7; color: #92400e; padding: 0.375rem 0.75rem; border-radius: 9999px; font-weight: 700; font-size: 0.875rem; border: 1px solid #fde68a; display: inline-block; white-space: nowrap; }
        .status-chase { background-color: #ef4444; color: #ffffff; padding: 0.375rem 0.75rem; border-radius: 9999px; font-weight: 700; font-size: 0.875rem; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.5); animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; display: inline-block; white-space: nowrap; }
        .status-hit { background-color: #d1fae5; color: #065f46; padding: 0.375rem 0.75rem; border-radius: 9999px; font-weight: 700; font-size: 0.875rem; border: 1px solid #a7f3d0; display: inline-block; white-space: nowrap; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }

        .predict-num { width: 2.25rem; height: 2.25rem; border-radius: 9999px; background-color: #dbeafe; color: #1e40af; font-weight: 900; display: inline-flex; align-items: center; justify-content: center; font-size: 1rem; border: 2px solid #bfdbfe; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); margin: 0 0.125rem; }

        /* 表格樣式 */
        .alert-table, .results-table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 0.75rem; overflow: hidden; border: 1px solid #e2e8f0; background: white; }
        .alert-table th, .results-table th { font-weight: 700; padding: 0.75rem 1rem; text-align: left; }
        .alert-table td, .results-table td { padding: 0.75rem 1rem; border-top: 1px solid #e2e8f0; vertical-align: middle; color: #334155; }
        .results-table tr:nth-child(even) td { background-color: #f8fafc; }
        .results-table tr:hover td { background-color: #f1f5f9; }

        /* 警報專用表格配色 */
        .alert-table th { background-color: #fef2f2; color: #991b1b; border-bottom: 1px solid #fecaca; }
        .alert-table tr:hover td { background-color: #fff1f2; }
        
        /* 歷史排行榜表格配色 */
        .results-table th { background-color: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

    <div class="bg-slate-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex flex-wrap gap-2 sm:gap-4 justify-center">
            <a href="index.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">🏠 首頁</a>
            <a href="tool1.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">立柱撞柱工具</a>
            <a href="tool5.html" class="px-5 py-2.5 rounded-lg font-bold text-white bg-blue-600 shadow-md transition-all">星期版路工具</a>
            <a href="tool3.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">尾數拖牌工具</a>
            <a href="tool6.html" class="px-5 py-2.5 rounded-lg font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">版路分析工具</a>
        </div>
    </div>

    <div class="py-8 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto">
        <div class="bg-slate-800 rounded-t-2xl p-6 sm:p-8 text-white shadow-xl border-b-4 border-blue-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-3xl font-black flex items-center gap-3">
                        <i data-lucide="target" class="w-8 h-8 text-blue-400"></i>
                        星期版路工具
                    </h1>
                    <p class="mt-2 text-slate-300 font-medium opacity-90">上傳最新開獎紀錄，自動掃描全網版路與計算最新進場時機。</p>
                </div>
            </div>
        </div>

        <div class="bg-white shadow-xl p-6 sm:p-8 border border-slate-200 rounded-b-2xl">
            
            <div class="mb-10">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                    <i data-lucide="database" class="w-5 h-5 text-blue-600"></i>
                    第一步：更新資料庫
                </h2>
                <div class="flex flex-col md:flex-row gap-6 items-center bg-slate-50 p-6 rounded-xl border border-slate-200 shadow-inner">
                    <div class="w-full md:w-64 flex flex-col justify-center gap-3">
                        <label class="w-full py-3 px-4 bg-white hover:bg-slate-100 text-slate-700 font-bold rounded-xl border-2 border-dashed border-blue-400 hover:border-blue-600 transition-colors flex items-center justify-center gap-2 shadow-sm cursor-pointer">
                            <input type="file" id="csvFileInput" accept=".csv" class="hidden" />
                            <i data-lucide="upload-cloud" class="w-5 h-5 text-blue-600"></i> 上傳開獎紀錄 (CSV)
                        </label>
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <p id="fileNameDisplay" class="text-slate-500 font-bold text-lg">尚未讀取檔案</p>
                    </div>
                </div>
                
                <div id="loading" style="display: none;" class="mt-6 p-4 bg-amber-50 text-amber-800 rounded-xl border border-amber-200 font-bold shadow-sm">
                    <div class="flex items-center justify-center gap-3">
                        <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-amber-600"></i> 
                        <span class="text-lg">正在掃描全網版路與計算最新進場時機...</span>
                    </div>
                </div>
            </div>

            <div id="alertDashboard" style="display: none;" class="mb-10 p-6 bg-red-50 border-2 border-red-200 rounded-xl shadow-sm">
                <h2 class="text-xl font-black text-red-700 mb-4 flex items-center gap-2">
                    <i data-lucide="siren" class="w-6 h-6"></i>
                    🚨 本期/近期 下注決策警報 (高勝率版路提示)
                </h2>
                <div class="overflow-x-auto">
                    <table class="alert-table" id="tableAlerts">
                        <thead>
                            <tr>
                                <th width="15%">進場狀態</th>
                                <th width="20%">觸發之版路規則</th>
                                <th width="25%">🔥 目標號碼</th>
                                <th width="25%">行動指令/剩餘期數</th>
                                <th width="15%">該版路勝率</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="resultsArea" style="display: none;" class="space-y-10">
                <div>
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 border-b border-slate-100 pb-2 gap-4">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="calendar-days" class="w-5 h-5 text-blue-600"></i>
                            📅 歷史勝率榜：日期定位法 (Top 10)
                        </h2>
                        <div class="bg-blue-50 p-1.5 rounded-xl border border-blue-100">
                            <span class="text-sm font-bold text-blue-800 px-3 py-1" id="dataInfo1"></span>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="results-table" id="tableLogic1">
                            <thead>
                                <tr><th>版路規則</th><th>週期/回測</th><th>歷史勝率</th><th>詳細命中紀錄 (日期)</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div>
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 border-b border-slate-100 pb-2 gap-4">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="git-commit" class="w-5 h-5 text-blue-600"></i>
                            🎾 歷史勝率榜：順球尾數拖牌法 (Top 10)
                        </h2>
                        <div class="bg-blue-50 p-1.5 rounded-xl border border-blue-100">
                            <span class="text-sm font-bold text-blue-800 px-3 py-1" id="dataInfo2"></span>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="results-table" id="tableLogic2">
                            <thead>
                                <tr><th>版路規則</th><th>週期/回測</th><th>歷史勝率</th><th>詳細命中紀錄 (日期)</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
    const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
    let globalAlerts = [];
    
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('fileNameDisplay').textContent = "資料庫已更新：" + file.name;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultsArea').style.display = 'none';
        document.getElementById('alertDashboard').style.display = 'none';

        const reader = new FileReader();
        reader.onload = function(e) { setTimeout(() => { analyzeData(e.target.result); }, 200); };
        reader.readAsText(file);
    });

    function analyzeData(csv) {
        const lines = csv.split('\n').filter(line => line.trim() !== '');
        const draws = [];
        globalAlerts = []; // 清空警報

        for (let i = 1; i < lines.length; i++) {
            const parts = lines[i].split(',');
            if (parts.length < 6) continue;
            const dateStr = parts[0].trim();
            const nums = parts.slice(1, 6).map(n => parseInt(n.trim()));
            const sortedNums = [...nums].sort((a, b) => a - b);
            const d = new Date("2026/" + dateStr);
            draws.push({ dateStr, nums, sortedNums, dayOfWeek: d.getDay(), dayOfMonth: d.getDate() });
        }

        if (draws.length === 0) return alert("檔案錯誤！");

        const lastDraw = draws[draws.length - 1];
        const infoText = `最新紀錄至：${lastDraw.dateStr} (星期${dayNames[lastDraw.dayOfWeek]})`;
        document.getElementById('dataInfo1').textContent = infoText;
        document.getElementById('dataInfo2').textContent = infoText;

        const res1 = findLogic1(draws);
        const res2 = findLogic2(draws);

        // 整理警報並依照狀態排序 (追蹤中優先 > 等待中 > 已命中)
        globalAlerts.sort((a, b) => {
            const rank = { 'chase': 1, 'wait': 2, 'hit': 3 };
            return rank[a.statusType] - rank[b.statusType] || b.winRate - a.winRate;
        });

        renderAlerts(globalAlerts);
        renderTable('tableLogic1', res1.slice(0, 10));
        renderTable('tableLogic2', res2.slice(0, 10));

        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultsArea').style.display = 'block';
        if(globalAlerts.length > 0) document.getElementById('alertDashboard').style.display = 'block';
    }

    function findLogic1(draws) {
        const results = [];
        const offsetsToTest = [[0,1,2], [1,2,3], [2,3,4], [3,4,5], [-1,0,1], [-2,-1,0]];

        for (let anchorDay = 1; anchorDay <= 6; anchorDay++) {
            for (let offsets of offsetsToTest) {
                for (let periods of [1, 2, 3]) {
                    let totalPlays = 0, hitCount = 0;
                    let hitHistory = [];
                    const ruleName = `星期${dayNames[anchorDay]}日期 ${offsets.map(o=>o>0?'+'+o:o).join(',')}`;

                    for (let i = 0; i < draws.length; i++) {
                        if (draws[i].dayOfWeek === anchorDay) {
                            let targetNums = offsets.map(off => {
                                let n = draws[i].dayOfMonth + off;
                                return n > 39 ? n - 39 : (n < 1 ? n + 39 : n);
                            });

                            let isHit = false;
                            let hitDateStr = '';
                            let triggerDateStr = draws[i].dateStr;
                            
                            for (let j = 0; j < periods; j++) {
                                if (i + j < draws.length && targetNums.some(n => draws[i+j].nums.includes(n))) {
                                    isHit = true;
                                    hitDateStr = draws[i+j].dateStr;
                                    break;
                                }
                            }
                            if (i + periods - 1 < draws.length || isHit) {
                                totalPlays++;
                                if (isHit) {
                                    hitCount++;
                                    hitHistory.push(`<span class="text-green-600">${triggerDateStr} 觸發 ➔ ${hitDateStr} 命中</span>`);
                                } else {
                                    hitHistory.push(`<span class="text-red-500">${triggerDateStr} 觸發 ➔ ❌ 失敗</span>`);
                                }
                            }
                        }
                    }

                    if (totalPlays >= 10) {
                        const winRate = hitCount / totalPlays;
                        results.push({ rule: ruleName, periods, plays: totalPlays, hitCount, hitHistory, winRate });

                        // 🔔 檢查是否產生警報 (勝率 >= 85%)
                        if (winRate >= 0.85) {
                            const reversedDraws = [...draws].reverse();
                            const lastAnchorIdxFromEnd = reversedDraws.findIndex(d => d.dayOfWeek === anchorDay);
                            if (lastAnchorIdxFromEnd !== -1) {
                                const realAnchorIdx = draws.length - 1 - lastAnchorIdxFromEnd;
                                const consumed = draws.length - realAnchorIdx; // 已開獎的期數
                                
                                if (consumed <= periods && (draws.length - realAnchorIdx <= 7)) {
                                    let predictNums = offsets.map(off => {
                                        let n = draws[realAnchorIdx].dayOfMonth + off;
                                        return n > 39 ? n - 39 : (n < 1 ? n + 39 : n);
                                    });

                                    let hitAlready = false;
                                    for (let k = realAnchorIdx; k < draws.length; k++) {
                                        if (predictNums.some(n => draws[k].nums.includes(n))) hitAlready = true;
                                    }

                                    if (consumed < periods) { // 還有剩餘期數可追
                                        if (hitAlready) {
                                            globalAlerts.push({ statusType: 'hit', statusText: '✅ 提前命中', rule: ruleName, nums: predictNums, action: `前 ${consumed} 期已命中，視情況停利。`, winRate, hitCount, plays: totalPlays });
                                        } else {
                                            globalAlerts.push({ statusType: 'chase', statusText: '🔥 尚未開出 (強力推薦)', rule: ruleName, nums: predictNums, action: `前 ${consumed} 期未出，最後倒數 ${periods - consumed} 期必拗！`, winRate, hitCount, plays: totalPlays });
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
        return results.sort((a, b) => b.winRate - a.winRate);
    }

    function findLogic2(draws) {
        const results = [];
        for (let refDay = 1; refDay <= 6; refDay++) {
            for (let ballPos = 0; ballPos < 5; ballPos++) {
                for (let targetDay = 1; targetDay <= 6; targetDay++) {
                    for (let periods of [1, 2, 3]) {
                        let totalPlays = 0, hitCount = 0;
                        let hitHistory = [];
                        const ruleName = `上週${dayNames[refDay]} 順${ballPos+1}尾，星期${dayNames[targetDay]}起用`;

                        for (let i = 0; i < draws.length; i++) {
                            if (draws[i].dayOfWeek === refDay) {
                                const tail = draws[i].sortedNums[ballPos] % 10;
                                const targetNums = [tail, tail+10, tail+20, tail+30].filter(n => n>=1 && n<=39);
                                let startIdx = -1;
                                let triggerDateStr = draws[i].dateStr;
                                
                                for (let k = i + 1; k < draws.length && k <= i + 7; k++) {
                                    if (draws[k].dayOfWeek === targetDay) { startIdx = k; break; }
                                }
                                if (startIdx !== -1) {
                                    let isHit = false;
                                    let hitDateStr = '';
                                    
                                    for (let j = 0; j < periods; j++) {
                                        if (startIdx + j < draws.length && targetNums.some(n => draws[startIdx+j].nums.includes(n))) {
                                            isHit = true;
                                            hitDateStr = draws[startIdx+j].dateStr;
                                            break;
                                        }
                                    }
                                    if (startIdx + periods - 1 < draws.length || isHit) {
                                        totalPlays++;
                                        if (isHit) {
                                            hitCount++;
                                            hitHistory.push(`<span class="text-green-600">${triggerDateStr} 觸發 ➔ ${hitDateStr} 命中</span>`);
                                        } else {
                                            hitHistory.push(`<span class="text-red-500">${triggerDateStr} 觸發 ➔ ❌ 失敗</span>`);
                                        }
                                    }
                                }
                            }
                        }

                        if (totalPlays >= 10) {
                            const winRate = hitCount / totalPlays;
                            results.push({ rule: ruleName, periods, plays: totalPlays, hitCount, hitHistory, winRate });

                            // 🔔 檢查是否產生警報
                            if (winRate >= 0.85) {
                                const reversedDraws = [...draws].reverse();
                                const lastRefIdxFromEnd = reversedDraws.findIndex(d => d.dayOfWeek === refDay);
                                if (lastRefIdxFromEnd !== -1) {
                                    const realRefIdx = draws.length - 1 - lastRefIdxFromEnd;
                                    if (draws.length - realRefIdx <= 10) { // 確保不是太久以前的紀錄
                                        const tail = draws[realRefIdx].sortedNums[ballPos] % 10;
                                        const predictNums = [tail, tail+10, tail+20, tail+30].filter(n => n>=1 && n<=39);
                                        
                                        let startIdx = -1;
                                        for (let k = realRefIdx + 1; k < draws.length; k++) {
                                            if (draws[k].dayOfWeek === targetDay) { startIdx = k; break; }
                                        }

                                        if (startIdx === -1 && (draws.length - realRefIdx < 7)) {
                                            // 尚未到達進場星期
                                            globalAlerts.push({ statusType: 'wait', statusText: '⏳ 等待進場', rule: ruleName, nums: predictNums, action: `等待星期${dayNames[targetDay]}開始，可追 ${periods} 期`, winRate, hitCount, plays: totalPlays });
                                        } else if (startIdx !== -1) {
                                            const consumed = draws.length - startIdx;
                                            if (consumed < periods) {
                                                let hitAlready = false;
                                                for (let k = startIdx; k < draws.length; k++) {
                                                    if (predictNums.some(n => draws[k].nums.includes(n))) hitAlready = true;
                                                }
                                                if (hitAlready) {
                                                    globalAlerts.push({ statusType: 'hit', statusText: '✅ 提前命中', rule: ruleName, nums: predictNums, action: `已命中過，視情況續守。`, winRate, hitCount, plays: totalPlays });
                                                } else {
                                                    globalAlerts.push({ statusType: 'chase', statusText: '🔥 強力續追', rule: ruleName, nums: predictNums, action: `前 ${consumed} 期落空，剩下 ${periods - consumed} 期高機率開出！`, winRate, hitCount, plays: totalPlays });
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
        return results.sort((a, b) => b.winRate - a.winRate);
    }

    function renderAlerts(alerts) {
        const tbody = document.getElementById('tableAlerts').querySelector('tbody');
        tbody.innerHTML = '';
        if (alerts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center font-bold text-slate-400 py-6">目前最新期數暫無觸發高勝率版路。</td></tr>';
            return;
        }

        alerts.forEach(item => {
            const tr = document.createElement('tr');
            let statusClass = item.statusType === 'chase' ? 'status-chase' : (item.statusType === 'wait' ? 'status-wait' : 'status-hit');
            const predictHtml = item.nums.map(n => `<span class="predict-num">${n < 10 ? '0'+n : n}</span>`).join('');
            
            tr.innerHTML = `
                <td><span class="${statusClass}">${item.statusText}</span></td>
                <td style="font-weight:bold;">${item.rule}</td>
                <td>${predictHtml}</td>
                <td style="color:#333; font-weight:700;">${item.action}</td>
                <td style="color:#c0392b; font-weight:900; font-size:1.1rem;">
                    ${(item.winRate * 100).toFixed(1)}%
                    <div class="text-xs text-slate-500 font-normal mt-0.5">中${item.hitCount} / 錯${item.plays - item.hitCount}</div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderTable(tableId, data) {
        const tbody = document.getElementById(tableId).querySelector('tbody');
        tbody.innerHTML = '';
        data.forEach(item => {
            const tr = document.createElement('tr');
            
            // 將歷史紀錄陣列轉換成可滾動的列表
            const historyDisp = `<div class="max-h-32 overflow-y-auto pr-2 space-y-1">` + item.hitHistory.join('<br>') + `</div>`;
            
            tr.innerHTML = `
                <td class="font-bold text-slate-700 w-1/4">${item.rule}</td>
                <td class="text-slate-500 w-1/4">用 ${item.periods} 期 <span class="text-xs ml-1">(測 ${item.plays} 次)</span></td>
                <td class="font-black text-blue-600 w-1/6">
                    ${(item.winRate * 100).toFixed(1)}%
                    <div class="text-xs font-normal text-slate-400 mt-0.5">中${item.hitCount} / 錯${item.plays - item.hitCount}</div>
                </td>
                <td class="text-xs font-mono text-slate-600 w-1/3 leading-tight" style="min-width: 200px;">${historyDisp}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>
<script>setTimeout(() => { lucide.createIcons(); }, 100);</script>
</body>
</html>
