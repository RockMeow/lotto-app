<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三期牌/週牌監控</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f1f5f9; --text: #0f172a; --danger: #ef4444; --success: #22c55e; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 80px; }
        .container { max-width: 100%; padding: 15px; box-sizing: border-box; }
        .card { background: #ffffff; padding: 18px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .strategy-card { background: #eef2ff; border-left: 5px solid var(--primary); padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 1.1em;}
        h2 { margin-top: 0; color: var(--primary); font-size: 1.5em; text-align: center;}
        
        .input-group { margin-bottom: 18px; }
        label { display: flex; justify-content: space-between; align-items: center; font-weight: 600; margin-bottom: 8px; font-size: 1em; color: #475569; }
        .label-title { font-weight: 600; margin-bottom: 8px; font-size: 1em; color: #475569; display: block; }
        
        /* 輸入框與刪除按鈕並排設計 */
        .input-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        input, select { flex: 1; padding: 14px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; background-color: #f8fafc; appearance: none; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2); }
        
        .btn-del {
            background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; border-radius: 10px;
            width: 48px; height: 48px; font-size: 1.5em; line-height: 1; display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: 0.1s;
        }
        .btn-del:active { background: #fee2e2; transform: scale(0.95); }

        .btn-sm { background: #e2e8f0; color: #475569; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.9em; cursor: pointer; font-weight: bold; }
        .btn-sm:active { background: #cbd5e1; }
        
        .status-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 0.9em; font-weight: bold; margin-top: 5px;}
        .safe { background: #dcfce7; color: #166534; }
        .dropped { background: #fee2e2; color: #991b1b; }
        .system-msg { font-size: 0.9em; color: #64748b; margin-top: 6px; text-align: right; }
        
        /* 手機版底部浮動操作列 */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); padding: 12px 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); display: flex; gap: 10px; backdrop-filter: blur(10px); z-index: 100; }
        .btn-main { flex: 1; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-main:active { background: #4338ca; transform: scale(0.98); }
        .btn-danger { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
        .btn-danger:active { background: #fee2e2; }

        .result-item { border-bottom: 1px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 12px; }
        .result-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .result-item p { margin: 0 0 5px 0; font-size: 1.1em; color: #334155;}
        
        .bet-details { margin-top: 12px; font-size: 0.95em; color: #334155; background: #ffffff; padding: 10px; border-radius: 6px; border: 1px dashed #cbd5e1; }
        .bet-label { font-weight: bold; color: var(--primary); margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📊 號碼監控系統</h2>
        
        <!-- 自動讀取選單區塊 -->
        <div class="input-group">
            <span class="label-title">選擇遊戲類型</span>
            <select id="csvSelect" onchange="onGameChange()">
                <option value="Fan_history_2026.csv" selected>天天樂</option>
                <option value="Ghana_history_2026.csv">迦納彩</option>
                <option value="539_history_2026.csv">今彩539</option>
            </select>
            <div id="loadStatus" class="system-msg">等待載入資料庫...</div>
        </div>

        <div class="input-group">
            <label>
                <span>三期牌號碼</span>
                <button type="button" class="btn-sm" onclick="addThreeInput()">+ 新增</button>
            </label>
            <div id="threeContainer">
                <!-- 動態生成的三期牌輸入框 -->
            </div>
        </div>

        <!-- 固定週牌，加入 input-row 與刪除按鈕 -->
        <div class="input-group" id="group-w1">
            <label class="label-title">週牌 1</label>
            <div class="input-row">
                <input type="text" id="w1" placeholder="請輸入號碼" inputmode="numeric" oninput="saveInputs()">
                <button type="button" class="btn-del" onclick="hideWeekly('group-w1', 'w1')">×</button>
            </div>
        </div>
        <div class="input-group" id="group-w2">
            <label class="label-title">週牌 2</label>
            <div class="input-row">
                <input type="text" id="w2" placeholder="請輸入號碼" inputmode="numeric" oninput="saveInputs()">
                <button type="button" class="btn-del" onclick="hideWeekly('group-w2', 'w2')">×</button>
            </div>
        </div>
        <div class="input-group" id="group-w3">
            <label class="label-title">週牌 3</label>
            <div class="input-row">
                <input type="text" id="w3" placeholder="請輸入號碼" inputmode="numeric" oninput="saveInputs()">
                <button type="button" class="btn-del" onclick="hideWeekly('group-w3', 'w3')">×</button>
            </div>
        </div>
    </div>

    <!-- 分析結果區塊 -->
    <div id="results" style="display:none;" class="card">
        <h3 style="margin-top:0; color: #334155;">監控狀態</h3>
        <div id="statusList"></div>
        <div id="strategyBox" class="strategy-card"></div>
    </div>
</div>

<!-- 底部浮動操作列 -->
<div class="bottom-bar">
    <button class="btn-main btn-danger" onclick="clearInputs()">清空紀錄</button>
    <button class="btn-main" onclick="analyzeGroups()">執行分析</button>
</div>

<script>
    let csvData = [];
    let threeInputCount = 0;
    const STORAGE_KEY = 'lottery_monitor_data_v2';

    function onGameChange() {
        const selectedGame = document.getElementById('csvSelect').value;
        loadInputsForGame(selectedGame);
        processData();
        document.getElementById('results').style.display = 'none';
        saveInputs();
    }

    function saveInputs() {
        const currentGame = document.getElementById('csvSelect').value;
        const threeInputs = Array.from(document.querySelectorAll('.three-input')).map(input => input.value);
        
        let masterData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        
        // 同時儲存各個輸入框的值，以及週牌是否被隱藏的狀態
        masterData[currentGame] = {
            threeCards: threeInputs,
            w1: document.getElementById('w1').value,
            w2: document.getElementById('w2').value,
            w3: document.getElementById('w3').value,
            w1_hidden: document.getElementById('group-w1').style.display === 'none',
            w2_hidden: document.getElementById('group-w2').style.display === 'none',
            w3_hidden: document.getElementById('group-w3').style.display === 'none'
        };
        masterData['_lastSelectedGame'] = currentGame;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(masterData));
    }

    function loadInputsForGame(gameKey) {
        let masterData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let data = masterData[gameKey];
        
        const container = document.getElementById('threeContainer');
        container.innerHTML = '';
        threeInputCount = 0;
        
        if (data) {
            // 恢復週牌的值與隱藏狀態
            ['w1', 'w2', 'w3'].forEach(id => {
                document.getElementById(id).value = data[id] || '';
                document.getElementById('group-' + id).style.display = data[`${id}_hidden`] ? 'none' : 'block';
            });

            // 恢復三期牌
            if (data.threeCards && data.threeCards.length > 0) {
                data.threeCards.forEach(val => addThreeInput(val));
            } else {
                addThreeInput();
            }
        } else {
            // 若無紀錄，恢復預設全開狀態
            ['w1', 'w2', 'w3'].forEach(id => {
                document.getElementById(id).value = '';
                document.getElementById('group-' + id).style.display = 'block';
            });
            addThreeInput();
        }
    }

    function clearInputs() {
        const currentGame = document.getElementById('csvSelect').value;
        const gameName = document.querySelector(`#csvSelect option[value="${currentGame}"]`).text;
        
        if (confirm(`確定要清除【${gameName}】的輸入紀錄，並恢復所有輸入框嗎？`)) {
            let masterData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            delete masterData[currentGame];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(masterData));
            
            loadInputsForGame(currentGame);
            document.getElementById('results').style.display = 'none';
        }
    }

    function addThreeInput(value = '') {
        threeInputCount++;
        const container = document.getElementById('threeContainer');
        
        // 創建整行的容器
        const row = document.createElement('div');
        row.className = 'input-row';
        row.style.marginBottom = '12px';
        
        // 創建輸入框
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'three-input';
        input.inputMode = 'numeric'; 
        input.placeholder = `組別 ${threeInputCount} (如: 01,02)`;
        input.value = value;
        input.oninput = saveInputs;
        
        // 創建專屬刪除按鈕
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn-del';
        btn.innerHTML = '×';
        btn.onclick = () => { 
            row.remove(); 
            saveInputs(); 
        };
        
        row.appendChild(input);
        row.appendChild(btn);
        container.appendChild(row);
        
        if (value === '') saveInputs();
    }

    // 刪除(隱藏)固定週牌的函式
    function hideWeekly(groupId, inputId) {
        document.getElementById(groupId).style.display = 'none';
        document.getElementById(inputId).value = '';
        saveInputs();
    }

    async function processData() {
        const filename = document.getElementById('csvSelect').value;
        const statusEl = document.getElementById('loadStatus');
        
        statusEl.innerText = `讀取中...`;
        statusEl.style.color = "#d97706"; 

        try {
            const response = await fetch(filename);
            if (!response.ok) throw new Error("無檔案");
            
            const text = await response.text();
            let rawData = text.split(/\r?\n/).filter(r => r.trim()).map(r => r.split(',').map(s => s.trim()));
            
            // 略過第一行的標題列 (若第一格包含 Date 或 date)
            if (rawData.length > 0 && rawData[0][0].toLowerCase() === 'date') {
                rawData.shift();
            }
            
            csvData = rawData;
            
            statusEl.innerText = `✅ 已載入 ${csvData.length} 期資料`;
            statusEl.style.color = "#166534"; 
        } catch (error) {
            statusEl.innerText = `❌ 讀取失敗 (檢查Local Server)`;
            statusEl.style.color = "#dc2626"; 
            csvData = [];
        }
    }

    window.onload = () => {
        let masterData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const selectEl = document.getElementById('csvSelect');
        
        if (masterData['_lastSelectedGame']) {
            let exists = Array.from(selectEl.options).some(opt => opt.value === masterData['_lastSelectedGame']);
            if (exists) selectEl.value = masterData['_lastSelectedGame'];
        }

        const currentGame = selectEl.value;
        loadInputsForGame(currentGame);
        processData();
    };

    function parseDate(dateStr) {
        const parts = dateStr.split('/');
        return new Date(2026, parseInt(parts[0], 10) - 1, parseInt(parts[1], 10));
    }

    function normalizeNumber(numStr) {
        const num = parseInt(numStr, 10);
        return isNaN(num) ? numStr.trim() : num.toString();
    }

    function analyzeGroups() {
        if (!csvData || csvData.length === 0) return alert("資料庫未載入！");

        const groups = [];

        // 收集頁面上存在的三期牌
        const threeInputs = document.querySelectorAll('.three-input');
        threeInputs.forEach((input, index) => {
            if (input.value.trim() !== '') {
                groups.push({
                    name: `三期牌 (組別 ${index + 1})`,
                    val: input.value.split(',').filter(s => s.trim()).map(normalizeNumber)
                });
            }
        });

        // 收集尚未被隱藏的週牌
        const w1 = document.getElementById('w1').value;
        if(document.getElementById('group-w1').style.display !== 'none' && w1.trim()) 
            groups.push({ name: "週牌 1", val: w1.split(',').filter(s => s.trim()).map(normalizeNumber) });
        
        const w2 = document.getElementById('w2').value;
        if(document.getElementById('group-w2').style.display !== 'none' && w2.trim()) 
            groups.push({ name: "週牌 2", val: w2.split(',').filter(s => s.trim()).map(normalizeNumber) });
        
        const w3 = document.getElementById('w3').value;
        if(document.getElementById('group-w3').style.display !== 'none' && w3.trim()) 
            groups.push({ name: "週牌 3", val: w3.split(',').filter(s => s.trim()).map(normalizeNumber) });

        if (groups.length === 0) return alert("請輸入至少一組號碼再分析！");

        const weekStart = new Date(2026, 4, 17); // 5/17
        const weekEnd = new Date(2026, 4, 23);   // 5/23
        
        let statusListHtml = "";
        let activeGroups = [];

        groups.forEach(g => {
            let hitLog = null; 
            for (let i = 0; i < csvData.length; i++) {
                const row = csvData[i];
                const dateObj = parseDate(row[0]);
                const wins = row.slice(1).filter(s => s.trim()).map(normalizeNumber);
                
                if (dateObj >= weekStart && dateObj <= weekEnd) {
                    const matches = g.val.filter(n => wins.includes(n));
                    if (matches.length > 0) {
                        hitLog = `${row[0]} (命中: ${matches.join(',')})`;
                        break; 
                    }
                }
            }

            if (hitLog) {
                statusListHtml += `<div class="result-item"><p><strong>${g.name}</strong></p><span class="status-badge dropped">已於 ${hitLog}</span></div>`;
            } else {
                statusListHtml += `<div class="result-item"><p><strong>${g.name}</strong></p><span class="status-badge safe">繼續養牌</span></div>`;
                activeGroups.push(g);
            }
        });

        // 產生策略與下注號碼
        let strategyTitle = "";
        let betDetailsHtml = "";

        if (activeGroups.length === 0) {
            strategyTitle = "⚠️ <strong>停止下注</strong>";
            betDetailsHtml = "<div class='bet-details'>本週所有輸入的號碼皆已開出，建議休息。</div>";
        } 
        else if (activeGroups.length === 1) {
            strategyTitle = "🚗 <strong>建議策略：坐車</strong>";
            betDetailsHtml = `
                <div class='bet-details'>
                    <span class='bet-label'>坐車號碼組合：</span>
                    ${activeGroups[0].val.join(', ')}
                </div>`;
        } 
        else if (activeGroups.length === 2) {
            strategyTitle = "⛓️ <strong>建議策略：連碰</strong>";
            // 將兩組號碼合併並去重
            let combined = [...new Set([...activeGroups[0].val, ...activeGroups[1].val])];
            betDetailsHtml = `
                <div class='bet-details'>
                    <span class='bet-label'>連碰號碼組合：</span>
                    ${combined.join(', ')}
                </div>`;
        } 
        else {
            strategyTitle = "🏗️ <strong>建議策略：柱碰</strong>";
            // 將第一組安全牌設為「柱」，其餘合併為「拖」
            let keyGroup = activeGroups[0];
            let dragNums = [];
            for(let i = 1; i < activeGroups.length; i++) {
                dragNums.push(...activeGroups[i].val);
            }
            let uniqueDrags = [...new Set(dragNums)]; // 去重
            
            betDetailsHtml = `
                <div class='bet-details'>
                    <span class='bet-label'>柱碰號碼組合：</span>
                    <span style="color:var(--danger)">[柱]</span> ${keyGroup.val.join(', ')} <br>
                    <span style="color:var(--primary); margin-top:4px; display:inline-block;">[拖]</span> ${uniqueDrags.join(', ')}
                </div>`;
        }

        document.getElementById('statusList').innerHTML = statusListHtml;
        document.getElementById('strategyBox').innerHTML = strategyTitle + betDetailsHtml;
        document.getElementById('results').style.display = 'block';
        
        // 分析完後自動向下捲動
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
