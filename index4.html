<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純前端 | 零股網格交易系統</title>
    <style>
        :root {
            --bg-color: #f4f7f6; --card-bg: #ffffff;
            --primary-color: #2c3e50; --accent-color: #27ae60;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--primary-color);
            margin: 0; padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .btn { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; margin-bottom: 10px; font-weight: bold;}
        .btn:hover { background: #1a252f; }
        .btn-blue { background: #2980b9; } .btn-blue:hover { background: #1c5980; }
        .btn-red { background: #e74c3c; } .btn-red:hover { background: #c0392b; }
        .btn-small { width: auto; padding: 6px 12px; margin: 0; }
        
        /* 股票池標籤設計 */
        .stock-tag {
            display: inline-block; background: #e0e6ed; padding: 5px 10px; 
            border-radius: 15px; margin: 5px; font-weight: bold;
        }
        .stock-tag span { cursor: pointer; color: #c0392b; margin-left: 5px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .log-box { height: 150px; overflow-y: auto; background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.9em; margin-bottom: 20px;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📈 網格交易中心 (動態股票池防護版)</h1>
    </div>

    <div class="log-box" id="sysLog">系統已就緒。等待操作...</div>

    <div class="card">
        <h2>🎯 監控股票池設定</h2>
        <div class="input-group">
            <input type="text" id="newStockInput" placeholder="輸入台股代號 (如: 2330, 0050)..." maxlength="6">
            <button class="btn btn-blue btn-small" onclick="addStock()">＋ 新增標的</button>
        </div>
        <div id="stockTagsArea">
            </div>
    </div>

    <div class="card">
        <h2>💰 資金池與控制台</h2>
        <p style="color: #7f8c8d; margin-top: -10px;">每月 5 號自動儲值 1,000 元 (遇假日遞延)</p>
        <h1 style="color: var(--accent-color); margin: 10px 0;" id="poolAmount">$0</h1>
        
        <button class="btn btn-blue" onclick="runScanner()" id="btnScan">🔍 1. 手動啟動雷達掃描</button>
        <button class="btn" onclick="executeGrid()" id="btnExec">▶ 2. 執行今日網格判斷</button>
        <button class="btn btn-red" onclick="clearLedger()">⚠️ 清除瀏覽器帳本重置</button>
    </div>

    <div class="card">
        <h2>📝 歷史帳本與庫存狀態</h2>
        <table>
            <thead>
                <tr><th>日期</th><th>標的</th><th>動作</th><th>股數</th><th>成交價</th></tr>
            </thead>
            <tbody id="ledgerBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ==========================================
    // 1. 動態股票池管理
    // ==========================================
    const DEFAULT_POOL = ["00878", "0056", "2881", "2882"];
    
    function getStockPool() {
        return JSON.parse(localStorage.getItem('gridStockPool')) || DEFAULT_POOL;
    }
    function saveStockPool(pool) {
        localStorage.setItem('gridStockPool', JSON.stringify(pool));
        renderStockPool();
    }
    
    function renderStockPool() {
        const pool = getStockPool();
        const area = document.getElementById('stockTagsArea');
        area.innerHTML = pool.map(stock => 
            `<div class="stock-tag">${stock} <span onclick="removeStock('${stock}')">✖</span></div>`
        ).join('');
    }

    function addStock() {
        const input = document.getElementById('newStockInput');
        const stock = input.value.trim();
        if(!stock) return;
        
        const pool = getStockPool();
        if(pool.includes(stock)) {
            alert("該股票已在清單中！");
            return;
        }
        pool.push(stock);
        saveStockPool(pool);
        input.value = '';
        logMsg(`✅ 成功新增監控標的：${stock}`);
    }

    function removeStock(stock) {
        let pool = getStockPool();
        pool = pool.filter(s => s !== stock);
        saveStockPool(pool);
        logMsg(`🗑️ 已移除監控標的：${stock}`);
    }

    // ==========================================
    // 2. 虛擬帳本管理
    // ==========================================
    const MONTHLY_DEPOSIT = 1000;

    function getLedger() {
        return JSON.parse(localStorage.getItem('gridLedger_v3')) || { pool: 0, logs: [], holdings: [] };
    }
    function saveLedger(ledger) {
        localStorage.setItem('gridLedger_v3', JSON.stringify(ledger));
        loadUI();
    }
    function clearLedger() {
        if(confirm("確定要刪除所有紀錄嗎？資金池與庫存將歸零。")) {
            localStorage.removeItem('gridLedger_v3');
            logMsg("🗑️ 帳本已重置。");
            loadUI();
        }
    }

    function loadUI() {
        const ledger = getLedger();
        document.getElementById('poolAmount').innerText = `$${ledger.pool.toFixed(0)}`;
        
        const tbody = document.getElementById('ledgerBody');
        tbody.innerHTML = '';
        [...ledger.logs].reverse().forEach(log => {
            let color = log.action.includes('BUY') ? '#27ae60' : (log.action.includes('SELL') ? '#c0392b' : '#2980b9');
            tbody.innerHTML += `<tr>
                <td>${log.date}</td><td>${log.stock}</td>
                <td><span style="background:${color}; color:white; padding:3px 6px; border-radius:4px; font-size:0.85em;">${log.action}</span></td>
                <td>${log.shares}</td><td>$${log.price}</td>
            </tr>`;
        });
    }

    function logMsg(msg) {
        const box = document.getElementById('sysLog');
        box.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
        box.scrollTop = box.scrollHeight;
    }

    // ==========================================
    // 3. 核心數據抓取 (包含日期防呆)
    // ==========================================
    async function fetchStockData(stock) {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${stock}.TW?interval=1d&range=6mo`;
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        
        try {
            const res = await fetch(proxyUrl);
            const parsed = await res.json();
            const result = parsed.chart.result[0];
            const quotes = result.indicators.quote[0];
            
            let closes = [], highs = [], lows = [];
            for(let i=0; i<quotes.close.length; i++) {
                // 必須確保高、低、收盤價皆非空值才納入計算 (過濾假日假數據)
                if(quotes.close[i] !== null && quotes.high[i] !== null && quotes.low[i] !== null) {
                    closes.push(quotes.close[i]);
                    highs.push(quotes.high[i]);
                    lows.push(quotes.low[i]);
                }
            }
            return { closes, highs, lows };
        } catch (e) {
            logMsg(`❌ 抓取 ${stock} 失敗，伺服器無回應。`);
            return null;
        }
    }

    // 數學指標公式
    function calcSMA(data, period) {
        let sum = 0;
        for(let i = data.length - period; i < data.length; i++) sum += data[i];
        return sum / period;
    }
    function calcStdDev(data, period, sma) {
        let sumSq = 0;
        for(let i = data.length - period; i < data.length; i++) {
            sumSq += Math.pow(data[i] - sma, 2);
        }
        return Math.sqrt(sumSq / period);
    }
    function calcATR(highs, lows, closes, period=14) {
        let trs = [];
        for(let i = 1; i < closes.length; i++) {
            let hl = highs[i] - lows[i];
            let hc = Math.abs(highs[i] - closes[i-1]);
            let lc = Math.abs(lows[i] - closes[i-1]);
            trs.push(Math.max(hl, hc, lc));
        }
        return calcSMA(trs, period);
    }

    // ==========================================
    // 4. 交易邏輯執行 (加入休市防護)
    // ==========================================
    async function runScanner() {
        const currentPool = getStockPool();
        if(currentPool.length === 0) {
            logMsg("⚠️ 股票池為空，請先新增標的！");
            return null;
        }

        logMsg("📡 開始掃描市場尋找地板價標的...");
        document.getElementById('btnScan').disabled = true;
        let bestTarget = null;
        let bestScore = 999;

        for (let stock of currentPool) {
            let data = await fetchStockData(stock);
            if (!data || data.closes.length < 20) continue;

            let c = data.closes;
            let currentPrice = c[c.length-1];
            let ma20 = calcSMA(c, 20);
            let std = calcStdDev(c, 20, ma20);
            let lowerBand = ma20 - (2 * std);
            
            let cv = std / ma20;
            let distance = (currentPrice - lowerBand) / lowerBand;

            if (cv > 0.01 && cv < 0.08) { 
                if (distance < bestScore) {
                    bestScore = distance;
                    bestTarget = stock;
                }
            }
        }
        if (bestTarget) logMsg(`🏆 掃描完成！最佳佈局標的為：【${bestTarget}】`);
        else logMsg("⚠️ 目前市場波動過大，無適合標的。");
        document.getElementById('btnScan').disabled = false;
        return bestTarget;
    }

    async function executeGrid() {
        let today = new Date();
        
        // 🛡️ 週末防護機制：星期六 (6) 或星期日 (0) 直接阻擋
        let dayOfWeek = today.getDay();
        if (dayOfWeek === 0 || dayOfWeek === 6) {
            logMsg("⏸️ 今日為週末休市，停止執行網格與儲值運算以防重複記錄。");
            return;
        }

        let ledger = getLedger();
        let todayStr = today.toISOString().split('T')[0];
        document.getElementById('btnExec').disabled = true;

        // 1. 發薪日邏輯
        let lastDeposit = ledger.logs.filter(l => l.action === 'DEPOSIT').pop();
        if (today.getDate() >= 5) {
            let currentMonth = todayStr.substring(0, 7);
            let lastDepositMonth = lastDeposit ? lastDeposit.date.substring(0, 7) : "";
            
            if (currentMonth !== lastDepositMonth) {
                ledger.pool += MONTHLY_DEPOSIT;
                ledger.logs.push({date: todayStr, stock: 'SYSTEM', action: 'DEPOSIT', shares: 0, price: 0});
                logMsg(`💰 【發薪日】自動匯入 ${MONTHLY_DEPOSIT} 元。`);
            }
        }

        // 2. 目標確認
        let holding = ledger.holdings[0]; 
        let targetStock = holding ? holding.stock : await runScanner();

        if (!targetStock) {
            logMsg("⏸️ 無合適目標，系統待命。");
            saveLedger(ledger);
            document.getElementById('btnExec').disabled = false;
            return;
        }

        // 3. 抓取指標
        let data = await fetchStockData(targetStock);
        if(!data) { document.getElementById('btnExec').disabled = false; return; }

        let currentPrice = data.closes[data.closes.length-1];
        let atr = calcATR(data.highs, data.lows, data.closes, 14);
        logMsg(`▶ ${targetStock} 市價: ${currentPrice.toFixed(2)} | ATR: ${atr.toFixed(2)}`);

        let actionTaken = false;

        // 4. 判斷賣出
        if (holding) {
            if (currentPrice >= holding.target) {
                ledger.pool += currentPrice * holding.shares;
                ledger.logs.push({date: todayStr, stock: targetStock, action: 'SELL_PROFIT', shares: holding.shares, price: currentPrice.toFixed(2)});
                ledger.holdings = []; 
                logMsg(`🚨 【停利】成功賣出 ${holding.shares} 股！`);
                actionTaken = true;
            } else if (currentPrice <= holding.buyPrice * 0.85) { 
                ledger.pool += currentPrice * holding.shares;
                ledger.logs.push({date: todayStr, stock: targetStock, action: 'SELL_LOSS', shares: holding.shares, price: currentPrice.toFixed(2)});
                ledger.holdings = [];
                logMsg(`🩸 【停損】跌幅達 15%，認賠殺出。`);
                actionTaken = true;
            }
        }

        // 5. 判斷買進
        let isHolding = ledger.holdings.length > 0;
        let lastBuyPrice = isHolding ? ledger.holdings[ledger.holdings.length-1].buyPrice : currentPrice + atr;
        let buyPoint = lastBuyPrice - atr;

        if (currentPrice <= buyPoint && !actionTaken) {
            let shares = Math.floor(ledger.pool / currentPrice);
            if (shares >= 10) {
                ledger.pool -= shares * currentPrice;
                let target = buyPoint + (atr * 1.5);
                ledger.holdings.push({stock: targetStock, shares: shares, buyPrice: currentPrice, target: target});
                ledger.logs.push({date: todayStr, stock: targetStock, action: 'BUY', shares: shares, price: currentPrice.toFixed(2)});
                logMsg(`🛒 【買進】以 ${currentPrice.toFixed(2)} 元買進 ${shares} 股。`);
                actionTaken = true;
            } else if (ledger.pool > 0) {
                logMsg("⏳ 已達買點，但資金池餘額不足最低 10 股。");
            }
        }

        if (!actionTaken && ledger.pool > 0) logMsg("⏸️ 今日無買賣動作。");
        
        saveLedger(ledger);
        document.getElementById('btnExec').disabled = false;
    }

    // 初始化網頁
    window.onload = () => {
        renderStockPool();
        loadUI();
    };
</script>

</body>
</html>
