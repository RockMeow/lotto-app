<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quant App | 專業量化終端</title>
    <style>
        /* ==========================================
           True Mobile APP UI (底層導航列設計)
           ========================================== */
        :root {
            --bg-base: #0f172a;       
            --bg-card: #1e293b;       
            --bg-input: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #334155;
            --nav-height: 70px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base); color: var(--text-main);
            margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* 頂部 Header (固定) */
        header { 
            background-color: var(--bg-card); padding: 15px 20px; 
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }
        
        /* 中間可滑動內容區 */
        .content-area {
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 20px; /* 留白 */
        }
        
        /* 卡片共用樣式 */
        .card { 
            background: var(--bg-card); border: 1px solid var(--border-color); 
            border-radius: 12px; padding: 16px; 
        }
        .card-title { font-size: 0.9rem; font-weight: 700; color: var(--text-dim); margin-top: 0; margin-bottom: 12px; text-transform: uppercase;}
        
        /* 資金池與輸入框 */
        .pool-amount { font-size: 2.5rem; font-weight: 800; color: var(--accent-green); margin: 0; }
        .input-row { display: flex; gap: 10px; margin-top: 15px; }
        .input-row input { 
            flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); 
            color: var(--text-main); padding: 12px; border-radius: 8px; font-size: 1rem; 
        }
        .btn-small { 
            background: var(--border-color); color: var(--text-main); border: none; 
            padding: 0 20px; border-radius: 8px; font-weight: 700; cursor: pointer; 
        }
        
        /* 終端機日誌 */
        .terminal-box { 
            background: #000; border: 1px solid #222; border-radius: 8px; 
            padding: 12px; height: 280px; overflow-y: auto; 
            font-family: monospace; font-size: 0.85rem; line-height: 1.6;
        }
        .log-row { border-bottom: 1px solid #111; padding: 4px 0; word-break: break-all;}
        .c-buy { color: var(--accent-green); } 
        .c-sell { color: var(--accent-red); }
        .c-warn { color: #facc15; }
        .c-info { color: var(--accent-blue); }
        
        /* 監控標籤 */
        .tag-area { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px;}
        .tag { background: var(--bg-input); border: 1px solid var(--border-color); padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;}
        
        /* 歷史帳本表格 */
        .table-container { overflow-x: auto; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; white-space: nowrap; }
        th { text-align: left; padding: 10px 6px; color: var(--text-dim); border-bottom: 1px solid var(--border-color); }
        td { padding: 10px 6px; border-bottom: 1px solid var(--border-color); }
        .badge { padding: 4px 6px; border-radius: 4px; font-weight: 700; font-size: 0.75rem; color: #fff;}
        .bg-buy { background: var(--accent-green); } 
        .bg-sell { background: var(--accent-red); } 
        .bg-sys { background: var(--accent-blue); }
        
        .btn-reset { background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 12px; width: 100%; border-radius: 8px; font-weight: 700; margin-top: 15px;}

        /* ==========================================
           底部導航列 (Bottom Navigation Bar)
           ========================================== */
        .bottom-nav {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center;
            height: var(--nav-height); flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom); /* 適配 iPhone 底部安全區 */
        }
        .nav-item {
            flex: 1; height: 100%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; gap: 4px;
            background: transparent; border: none; color: var(--text-dim);
            cursor: pointer; transition: all 0.2s;
        }
        .nav-item:active { background-color: rgba(255,255,255,0.05); }
        .nav-item:disabled { opacity: 0.4; pointer-events: none; }
        .nav-icon { font-size: 1.4rem; }
        .nav-text { font-size: 0.75rem; font-weight: 700; }
        
        /* 導航按鈕專屬顏色 */
        #btnScan { color: #818cf8; }
        #btnTest { color: #fbbf24; }
        #btnGrid { color: #34d399; }
    </style>
</head>
<body>

<header>
    <h1>QUANT APP <span style="color: var(--accent-blue);">PRO</span></h1>
    <span id="clock" style="font-size: 0.9rem; font-family: monospace; color: var(--text-dim);">00:00:00</span>
</header>

<div class="content-area">
    
    <div class="card">
        <h2 class="card-title">CAPITAL POOL 資金池</h2>
        <div class="pool-amount" id="poolAmount">$0</div>
        <div class="input-row">
            <input type="number" id="depositAmount" placeholder="輸入注入金額 (TWD)...">
            <button class="btn-small" onclick="manualDeposit()">注入</button>
        </div>
    </div>

    <div class="card">
        <h2 class="card-title">SYSTEM TERMINAL 運算日誌</h2>
        <div class="terminal-box" id="sysLog">
            <div class="log-row" style="color: var(--text-dim);">[系統就緒] 原生 APP 模式已啟動。</div>
            <div class="log-row" style="color: var(--text-dim);">請點擊下方導航列執行任務。</div>
        </div>
    </div>

    <div class="card">
        <h2 class="card-title">MONITOR LIST 待回測清單</h2>
        <div class="tag-area" id="stockTagsArea"></div>
    </div>

    <div class="card">
        <h2 class="card-title">LEDGER 歷史帳本</h2>
        <div class="table-container">
            <table>
                <thead><tr><th>日期</th><th>標的名稱</th><th>動作</th><th>股數</th><th>金額</th></tr></thead>
                <tbody id="ledgerBody"></tbody>
            </table>
        </div>
        <button class="btn-reset" onclick="clearLedger()">⚠️ 重置所有系統資料</button>
    </div>

</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="step1_ScanMarket()" id="btnScan">
        <span class="nav-icon">🔍</span>
        <span class="nav-text">全市場掃描</span>
    </button>
    <button class="nav-item" onclick="step2_RunBacktest()" id="btnTest">
        <span class="nav-icon">📊</span>
        <span class="nav-text">預算回測</span>
    </button>
    <button class="nav-item" onclick="step3_ExecuteGrid()" id="btnGrid">
        <span class="nav-icon">🛒</span>
        <span class="nav-text">網格掛單</span>
    </button>
</nav>

<script>
    // ==========================================
    // 系統狀態與資料庫 (邏輯完全無更改)
    // ==========================================
    const STOP_LOSS_PCT = 0.15;
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function getStockName(code) {
        if (code === 'SYS' || code === 'SYSTEM') return '系統';
        const map = JSON.parse(localStorage.getItem('quant_stock_names')) || {};
        const fallback = {"0050":"元大台灣50", "0056":"元大高股息", "00878":"國泰永續高股息", "00919":"群益台灣精選高息", "00713":"元大台灣高息低波", "006208":"富邦台50", "2330":"台積電", "2317":"鴻海", "2454":"聯發科", "2881":"富邦金", "2882":"國泰金", "2891":"中信金"};
        let name = map[code] || fallback[code] || "";
        return name ? `${code} ${name}` : code;
    }

    function getCandidates() { return JSON.parse(localStorage.getItem('quant_candidates')) || []; }
    function saveCandidates(list) { localStorage.setItem('quant_candidates', JSON.stringify(list)); renderTags(); }
    
    function getLedger() { return JSON.parse(localStorage.getItem('quant_ledger')) || { pool: 0, logs: [], holdings: [], bestTarget: null }; }
    function saveLedger(ledger) { localStorage.setItem('quant_ledger', JSON.stringify(ledger)); loadUI(); }

    function renderTags() {
        const list = getCandidates();
        document.getElementById('stockTagsArea').innerHTML = list.length > 0 
            ? list.map(s => `<div class="tag">${getStockName(s)}</div>`).join('') 
            : "<span style='color: var(--text-dim); font-size: 0.85rem;'>目前無名單。請點擊下方「全市場掃描」。</span>";
    }

    function loadUI() {
        const ledger = getLedger();
        document.getElementById('poolAmount').innerText = `$${ledger.pool.toFixed(0)}`;
        const tbody = document.getElementById('ledgerBody');
        tbody.innerHTML = '';
        [...ledger.logs].reverse().forEach(log => {
            let bgClass = log.action.includes('BUY') ? 'bg-buy' : (log.action.includes('SELL') ? 'bg-sell' : 'bg-sys');
            let priceStr = log.action === 'DEPOSIT' ? `+$${log.price}` : `$${log.price}`;
            tbody.innerHTML += `<tr>
                <td>${log.date.substring(5)}</td>
                <td style="font-weight:bold;">${getStockName(log.stock)}</td>
                <td><span class="badge ${bgClass}">${log.action}</span></td>
                <td>${log.shares || '-'}</td><td>${priceStr}</td>
            </tr>`;
        });
    }

    function clearLedger() {
        if(confirm("警告：這將清除資金池、庫存與歷史紀錄！確定執行？")) {
            localStorage.removeItem('quant_ledger');
            localStorage.removeItem('quant_candidates');
            logMsg("系統資料已清空。", "c-sell");
            renderTags(); loadUI();
        }
    }

    function logMsg(msg, cssClass = '') {
        const box = document.getElementById('sysLog');
        const time = new Date().toLocaleTimeString('en-US', {hour12: false});
        box.innerHTML += `<div class="log-row ${cssClass}"><span style="color: var(--text-dim);">[${time}]</span> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function manualDeposit() {
        const input = document.getElementById('depositAmount');
        const amt = parseFloat(input.value);
        if (isNaN(amt) || amt <= 0) return alert("請輸入有效金額");
        let ledger = getLedger();
        ledger.pool += amt;
        ledger.logs.push({date: new Date().toISOString().split('T')[0], stock: 'SYS', action: 'DEPOSIT', shares: 0, price: amt});
        saveLedger(ledger); input.value = '';
        logMsg(`資金池注入 $${amt}`, 'c-buy');
    }

    // ==========================================
    // 網路 API 工具 (新增自動重試機制保證 100% 抓取)
    // ==========================================
    async function fetchEntireMarketList() {
        try {
            const url = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL';
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
            const res = await fetch(proxyUrl);
            const data = await res.json();
            
            let nameMap = {};
            let codes = [];
            data.forEach(item => {
                if(item.Code.length === 4) {
                    codes.push(item.Code);
                    nameMap[item.Code] = item.Name;
                }
            });
            localStorage.setItem('quant_stock_names', JSON.stringify(nameMap));
            return codes;
        } catch (e) {
            logMsg("證交所 API 異常，啟用本地核心備用清單。", "c-warn");
            return ["0050", "0056", "00878", "00919", "00713", "006208", "2330", "2317", "2454", "2881", "2882", "2891"]; 
        }
    }

    // 【核心升級】加入 retry 機制，保證不漏接
    async function fetchStockData(stock, range="1y", retries=3) {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${stock}.TW?interval=1d&range=${range}`;
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        try {
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error('Proxy or Server Error');
            const parsed = await res.json();
            const quotes = parsed.chart.result[0].indicators.quote[0];
            const timestamps = parsed.chart.result[0].timestamp;
            
            let dates = [], closes = [], highs = [], lows = [];
            for(let i=0; i<quotes.close.length; i++) {
                if(quotes.close[i] !== null && quotes.high[i] !== null && quotes.low[i] !== null) {
                    dates.push(new Date(timestamps[i] * 1000).toISOString().split('T')[0]);
                    closes.push(quotes.close[i]); highs.push(quotes.high[i]); lows.push(quotes.low[i]);
                }
            }
            return { dates, closes, highs, lows };
        } catch (e) { 
            if (retries > 0) {
                // 被阻擋時，冷卻 1 秒鐘後自動重新抓取
                await sleep(1000); 
                return await fetchStockData(stock, range, retries - 1);
            }
            return null; 
        }
    }

    function calcStats(data) {
        let sum = 0; for(let i=data.length-20; i<data.length; i++) sum += data[i];
        let ma20 = sum / 20;
        let sumSq = 0; for(let i=data.length-20; i<data.length; i++) sumSq += Math.pow(data[i] - ma20, 2);
        let std = Math.sqrt(sumSq / 20);
        return { ma20, std, lower: ma20 - (2 * std), cv: std / ma20 };
    }

    // 控制導航列按鈕狀態
    function setNavState(disabled) {
        document.getElementById('btnScan').disabled = disabled;
        document.getElementById('btnTest').disabled = disabled;
        document.getElementById('btnGrid').disabled = disabled;
    }

    // ==========================================
    // STEP 1: 全市場掃描
    // ==========================================
    async function step1_ScanMarket() {
        setNavState(true);
        logMsg("========== [STEP 1 啟動] ==========", "c-info");
        logMsg("開始撈取 TWSE 全市場名單...");
        
        let candidates = [];
        const marketPool = await fetchEntireMarketList();
        let scanned = 0;
        
        logMsg(`共取得 ${marketPool.length} 檔標的，開始無漏接掃描 (約需數分鐘)...`);
        
        for (let stock of marketPool) {
            scanned++;
            if (scanned % 50 === 0) logMsg(`...已完成掃描 ${scanned}/${marketPool.length} 檔`);
            
            // 延遲 150ms 配合自動重試機制，確保 100% 抓取率
            let data = await fetchStockData(stock, "6mo");
            await sleep(150); 
            
            if (!data || data.closes.length < 20) continue;

            let c = data.closes;
            let currentPrice = c[c.length-1];
            let stats = calcStats(c);
            
            if (stats.cv > 0.01 && stats.cv < 0.15) { 
                if (currentPrice <= stats.lower * 1.03) { 
                    candidates.push(stock);
                    logMsg(`[命中] ${getStockName(stock)} 跌近地板價！`, "c-buy");
                }
            }
        }
        
        saveCandidates(candidates);
        logMsg(`掃描結束。共 ${candidates.length} 檔股票符合初步條件。`, "c-info");
        setNavState(false);
    }

    // ==========================================
    // STEP 2: 執行回測 (資金池預算推薦)
    // ==========================================
    async function step2_RunBacktest() {
        const candidates = getCandidates();
        if (candidates.length === 0) return alert("待回測清單為空！請先執行 🔍 全市場掃描。");
        
        let ledger = getLedger();
        let capital = ledger.pool;
        
        if (capital === 0) {
            alert("資金池為 $0，請先注入資金才能推薦符合預算的股票！");
            return;
        }

        setNavState(true);
        logMsg("========== [STEP 2 啟動] ==========", "c-info");
        logMsg(`根據餘額 ($${capital.toFixed(0)})，篩選買得起且勝率最高標的...`);
        
        let bestTarget = null;
        let maxProfit = -999999;

        for (let stock of candidates) {
            logMsg(`分析 ${getStockName(stock)}...`);
            let data = await fetchStockData(stock, "1y");
            await sleep(150);
            if (!data || data.closes.length < 200) {
                logMsg(`  -> 歷史數據不足，跳過。`, "c-sell"); continue;
            }
            
            let c = data.closes;
            let currentPrice = c[c.length-1];
            let minRequired = currentPrice * 10; 
            
            if (capital < minRequired) {
                logMsg(`  -> 市價 $${currentPrice.toFixed(2)}，需 $${minRequired.toFixed(0)}。預算不足剔除！`, "c-warn"); 
                continue;
            }
            
            let simPool = capital;
            let simHoldings = [];
            let trades = 0, wins = 0;
            let h = data.highs, l = data.lows;
            
            for(let i = 20; i < c.length; i++) {
                let p = c[i];
                let trSum = 0;
                for(let j = i-13; j <= i; j++) trSum += Math.max(h[j]-l[j], Math.abs(h[j]-c[j-1]), Math.abs(l[j]-c[j-1]));
                let atr = trSum / 14;

                for(let j = simHoldings.length - 1; j >= 0; j--) {
                    if (p >= simHoldings[j].target) {
                        simPool += p * simHoldings[j].shares; trades++; wins++; simHoldings.splice(j, 1);
                    } else if (p <= simHoldings[j].buyPrice * (1 - STOP_LOSS_PCT)) {
                        simPool += p * simHoldings[j].shares; trades++; simHoldings.splice(j, 1);
                    }
                }

                let refPrice = simHoldings.length > 0 ? simHoldings[simHoldings.length-1].buyPrice : p + atr;
                let buyPoint = refPrice - atr;
                if (p <= buyPoint) {
                    let shares = Math.floor(simPool / p);
                    if (shares >= 10) { 
                        simPool -= shares * p;
                        simHoldings.push({ buyPrice: p, shares: shares, target: buyPoint + (atr * 1.5) });
                    }
                }
            }
            
            let finalValue = simPool;
            for(let hold of simHoldings) finalValue += hold.shares * c[c.length-1];
            let totalProfit = finalValue - capital;
            
            logMsg(`  -> 交易 ${trades} 次，預期純利 $${totalProfit.toFixed(0)}`);
            
            if (trades > 0 && totalProfit > 0 && totalProfit > maxProfit) {
                maxProfit = totalProfit;
                bestTarget = stock;
            }
        }
        
        if (bestTarget) {
            ledger.bestTarget = bestTarget;
            saveLedger(ledger);
            logMsg(`[推薦] 符合預算且獲利最佳：${getStockName(bestTarget)}！`, "c-buy");
            logMsg(`系統已鎖定目標。請執行 🛒 網格掛單。`, "c-info");
        } else {
            ledger.bestTarget = null;
            saveLedger(ledger);
            logMsg(`[警告] 清單內無符合預算且能獲利的標的，建議注入資金或觀望。`, "c-sell");
        }
        
        setNavState(false);
    }

    // ==========================================
    // STEP 3: 網格掛單 (判斷與交易)
    // ==========================================
    async function step3_ExecuteGrid() {
        let ledger = getLedger();
        let targetStock = ledger.holdings.length > 0 ? ledger.holdings[0].stock : ledger.bestTarget;
        
        if (!targetStock) return alert("目前無庫存，且無鎖定回測目標。請先完成 📊 預算回測！");
        
        setNavState(true);
        logMsg("========== [STEP 3 啟動] ==========", "c-info");
        
        let data = await fetchStockData(targetStock, "6mo");
        if(!data) { setNavState(false); return; }

        let today = new Date();
        let isHoliday = (today.getDay() === 0 || today.getDay() === 6);
        let c = data.closes, h = data.highs, l = data.lows;
        let currentPrice = c[c.length-1];
        
        let trSum = 0; let idx = c.length - 1;
        for(let j = idx-13; j <= idx; j++) trSum += Math.max(h[j]-l[j], Math.abs(h[j]-c[j-1]), Math.abs(l[j]-c[j-1]));
        let atr = trSum / 14;

        let holding = ledger.holdings[0];
        logMsg(`標的: ${getStockName(targetStock)} | 市價: $${currentPrice.toFixed(2)} | ATR: $${atr.toFixed(2)}`);

        if (isHoliday) {
            logMsg(`[假日模式] 週末休市，提供下週一掛單建議：`, "c-warn");
            if (holding) {
                logMsg(`👉 停利掛單：【賣出】$${holding.target.toFixed(2)}`, "c-buy");
                logMsg(`👉 停損防線：若跌破 $${(holding.buyPrice * (1-STOP_LOSS_PCT)).toFixed(2)} 手動停損`, "c-sell");
            } else {
                let buyPoint = currentPrice - atr;
                let shares = Math.floor(ledger.pool / buyPoint);
                if (shares >= 10) {
                    logMsg(`👉 佈局掛單：【買進】${shares} 股 @ $${buyPoint.toFixed(2)}`, "c-buy");
                } else {
                    logMsg(`資金不足 (餘額 $${ledger.pool.toFixed(0)})，建議觀望。`);
                }
            }
        } else {
            let actionTaken = false;
            let todayStr = today.toISOString().split('T')[0];

            if (holding) {
                if (currentPrice >= holding.target) {
                    ledger.pool += currentPrice * holding.shares;
                    ledger.logs.push({date: todayStr, stock: targetStock, action: 'SELL_PROFIT', shares: holding.shares, price: currentPrice.toFixed(2)});
                    ledger.holdings = []; logMsg(`🚨 停利賣出 ${holding.shares} 股！`, 'c-buy'); actionTaken = true;
                } else if (currentPrice <= holding.buyPrice * (1 - STOP_LOSS_PCT)) { 
                    ledger.pool += currentPrice * holding.shares;
                    ledger.logs.push({date: todayStr, stock: targetStock, action: 'SELL_LOSS', shares: holding.shares, price: currentPrice.toFixed(2)});
                    ledger.holdings = []; logMsg(`🩸 跌破防線，停損賣出。`, 'c-sell'); actionTaken = true;
                }
            }

            let isHolding = ledger.holdings.length > 0;
            let lastBuyPrice = isHolding ? ledger.holdings[ledger.holdings.length-1].buyPrice : currentPrice + atr;
            let buyPoint = lastBuyPrice - atr;

            if (currentPrice <= buyPoint && !actionTaken) {
                let shares = Math.floor(ledger.pool / currentPrice);
                if (shares >= 10) {
                    ledger.pool -= shares * currentPrice;
                    let target = buyPoint + (atr * 1.5);
                    ledger.holdings.push({stock: targetStock, shares: shares, buyPrice: currentPrice, target: target});
                    ledger.logs.push({date: todayStr, stock: targetStock, action: 'BUY', shares: shares, price: currentPrice.toFixed(2)});
                    logMsg(`🛒 買進 ${shares} 股 @ $${currentPrice.toFixed(2)}`, 'c-buy'); actionTaken = true;
                } else if (ledger.pool > 0) { logMsg(`達買點 ($${buyPoint.toFixed(2)})，但餘額不足買 10 股。`); }
            }
            
            if (!actionTaken && ledger.pool > 0) logMsg("今日未達買賣點，無交易動作。");
            saveLedger(ledger);
        }
        setNavState(false);
    }

    window.onload = () => { renderTags(); loadUI(); };
</script>
