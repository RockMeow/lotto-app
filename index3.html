<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坐車公式自動計算系統</title>
    <link rel="manifest" href="manifest3.json">
    <style>
        :root {
            --primary-color: #2c3e50;
            --primary-hover: #1a252f;
            --bg-color: #f5f5f5;
            --card-bg: #fff;
            --border-color: #ddd;
            --hit-bg: #e8f5e9;
            --hit-text: #d32f2f;
            --pred-bg: #fff8e1;
            --pred-border: #ffa000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.5;
            padding: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .controls {
            background: #eef2f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #fff;
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-group input[type="radio"]:checked + label {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* 預測區塊響應式優化 */
        #predictionArea > div {
            padding: 15px;
            border-radius: 6px;
            border-left: 5px solid var(--pred-border);
            margin-bottom: 15px;
        }

        #predictionArea h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        #predictionArea p {
            font-size: 0.95rem;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .summary {
            background: #eef2f5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        /* 表格響應式設計：在手機上轉為卡片式顯示 */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px 6px;
            text-align: center;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .hit-row {
            background-color: var(--hit-bg) !important;
        }

        .hit-text {
            color: var(--hit-text);
            font-weight: bold;
        }

        /* 手機版樣式斷點 */
        @media screen and (max-width: 768px) {
            body {
                padding: 0;
            }
            .container {
                border-radius: 0;
                box-shadow: none;
            }
            
            /* 將表格轉換為卡片式佈局，方便手機垂直滾動查看 */
            table, thead, tbody, th, td, tr { 
                display: block; 
            }
            
            thead tr { 
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            
            tr { 
                border: 1px solid var(--border-color);
                border-radius: 6px;
                margin-bottom: 10px;
                background: #fff;
                padding: 5px;
            }
            
            td { 
                border: none;
                border-bottom: 1px solid #eee; 
                position: relative;
                padding-left: 50%; 
                text-align: right;
                padding-top: 10px;
                padding-bottom: 10px;
            }
            
            td:last-child {
                border-bottom: 0;
            }
            
            td:before { 
                position: absolute;
                top: 10px;
                left: 10px;
                width: 45%; 
                padding-right: 10px; 
                white-space: nowrap;
                text-align: left;
                font-weight: bold;
                color: #555;
            }

            /* 加入標題標籤 */
            td:nth-of-type(1):before { content: "日期"; }
            td:nth-of-type(2):before { content: "星期"; }
            td:nth-of-type(3):before { content: "基準 (前週)"; }
            td:nth-of-type(4):before { content: "預測 (公式)"; }
            td:nth-of-type(5):before { content: "當期開獎 (順球)"; }
            td:nth-of-type(6):before { content: "公式結果"; }
            td:nth-of-type(7):before { content: "公式命中"; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>坐車公式自動計算系統</h2>
    
    <div class="controls">
        <div class="form-group">
            <label><strong>1. 選擇遊戲類型：</strong></label>
            <div class="radio-group">
                <input type="radio" id="game539" name="gameType" value="539" checked style="display:none;">
                <label for="game539">今彩 539</label>
                
                <input type="radio" id="gameFan" name="gameType" value="fan" style="display:none;">
                <label for="gameFan">天天樂</label>
                
                <input type="radio" id="gameGhana" name="gameType" value="ghana" style="display:none;">
                <label for="gameGhana">迦納彩</label>
            </div>
        </div>

        <div class="form-group">
            <button onclick="processData()">讀取並計算</button>
        </div>
    </div>

    <div id="predictionArea"></div>
    <div id="summaryArea" class="summary" style="display:none;"></div>

    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>星期</th>
                    <th>基準 (前週)</th>
                    <th>預測號碼 (公式)</th>
                    <th>當期開獎號碼 (順球)</th>
                    <th>公式結果</th>
                    <th>公式命中號碼</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                <tr>
                    <td colspan="7" style="text-align:center; padding-left:10px;">點擊上方按鈕載入資料</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const formulas539 = {
        0: { rank: 1, c1: 18, c2: 25 },
        1: { rank: 1, c1: 10, c2: 16 },
        2: { rank: 1, c1: 7, c2: 36 },
        3: { rank: 4, c1: 20, c2: 23 },
        4: { rank: 1, c1: 17, c2: 33 },
        5: { rank: 2, c1: 5, c2: 34 }
    };

    const formulasFan = {
        0: { rank: 1, c1: 18, c2: 30 },
        1: { rank: 5, c1: 3, c2: 5 },
        2: { rank: 1, c1: 4, c2: 12 },
        3: { rank: 3, c1: 3, c2: 20 },
        4: { rank: 3, c1: 19, c2: 30 },
        5: { rank: 1, c1: 17, c2: 20 },
        6: { rank: 4, c1: 2, c2: 4 }
    };

    const formulasGhana = {
        0: { rank: 2, c1: 3, c2: 20 },
        1: { rank: 2, c1: 5, c2: 15 },
        2: { rank: 1, c1: 6, c2: 10 },
        3: { rank: 5, c1: 35, c2: 37 },
        4: { rank: 1, c1: 11, c2: 28 },
        5: { rank: 3, c1: 17, c2: 33 }
    };

    const dayNames = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"];

    document.querySelectorAll('input[name="gameType"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            // 這個區塊原本有顯示檔名邏輯，因介面移除 fileNameDisplay 故保留為空，確保其他功能正常運作
        });
    });

    function addMod(val, offset) {
        let res = (val + offset) % 39;
        return res === 0 ? 39 : res;
    }

    function formatNum(num) {
        return num.toString().padStart(2, '0');
    }

    async function processData() {
        const gameType = document.querySelector('input[name="gameType"]:checked').value;
        let fileName = '539_history_2026.csv';
        if (gameType === 'fan') fileName = 'Fan_history_2026.csv';
        if (gameType === 'ghana') fileName = 'Ghana_history_2026.csv';

        const resultBody = document.getElementById('resultBody');
        const summaryArea = document.getElementById('summaryArea');
        const predictionArea = document.getElementById('predictionArea');

        let text = "";
        try {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error('File not found');
            text = await response.text();
        } catch (e) {
            alert(`讀取 ${fileName} 失敗！\n由於瀏覽器安全性限制，自動讀取本地檔案必須將 HTML 放在本地伺服器 (如 VS Code 的 Live Server) 上執行，直接點擊 HTML 檔 (file://) 會被阻擋。`);
            return;
        }

        const lines = text.trim().split('\n');
        let parsedData = [];
        
        for (let i = 1; i < lines.length; i++) {
            let cols = lines[i].split(',').map(c => c.trim());
            if (cols.length < 6) continue;

            let dateStr = cols[0];
            let nums = [parseInt(cols[1]), parseInt(cols[2]), parseInt(cols[3]), parseInt(cols[4]), parseInt(cols[5])];
            if (nums.some(isNaN)) continue;

            let fullDate = new Date('2026/' + dateStr);
            let jsDay = fullDate.getDay(); 
            let pyDay = (jsDay === 0) ? 6 : jsDay - 1; 
            
            let sortedNums = [...nums].sort((a, b) => a - b);
            parsedData.push({ dateStr, fullDate, pyDay, sortedNums });
        }

        parsedData.sort((a, b) => a.fullDate - b.fullDate);

        let activeFormulas = formulas539;
        if (gameType === 'fan') activeFormulas = formulasFan;
        if (gameType === 'ghana') activeFormulas = formulasGhana;

        let history = {}; 
        let results = [];
        
        // 公式變數
        let totalHit = 0;
        let totalCalc = 0;

        for (let row of parsedData) {
            let pyDay = row.pyDay;
            let f = activeFormulas[pyDay];

            // 動態運算：公式
            if (f && history[pyDay]) {
                let prevNums = history[pyDay];
                let baseVal = prevNums[f.rank - 1];
                let pred1 = addMod(baseVal, f.c1);
                let pred2 = addMod(baseVal, f.c2);

                let hit1 = row.sortedNums.includes(pred1);
                let hit2 = row.sortedNums.includes(pred2);
                let isHit = hit1 || hit2;
                
                let hitNums = [];
                if (hit1) hitNums.push(formatNum(pred1));
                if (hit2) hitNums.push(formatNum(pred2));

                if (isHit) totalHit++;
                totalCalc++;

                results.push({
                    date: row.dateStr,
                    dayName: dayNames[pyDay],
                    baseStr: `順${f.rank} (${formatNum(baseVal)})`,
                    predStr: `${formatNum(pred1)}, ${formatNum(pred2)}`,
                    actualStr: row.sortedNums.map(formatNum).join(', '),
                    isHit: isHit,
                    hitStr: isHit ? hitNums.join(', ') : '-'
                });
            }
            
            // 更新歷史供下一次迴圈使用
            history[pyDay] = row.sortedNums;
        }

        // --- 未來一期預測邏輯 ---
        if (parsedData.length > 0) {
            let lastRow = parsedData[parsedData.length - 1];
            let nextDate = new Date(lastRow.fullDate);
            nextDate.setDate(nextDate.getDate() + 1);
            
            if ((gameType === '539' || gameType === 'ghana') && nextDate.getDay() === 0) {
                nextDate.setDate(nextDate.getDate() + 1);
            }
            
            let nextJsDay = nextDate.getDay();
            let nextPyDay = (nextJsDay === 0) ? 6 : nextJsDay - 1;
            let nextDayName = dayNames[nextPyDay];
            let fNext = activeFormulas[nextPyDay];

            if (fNext && history[nextPyDay]) {
                let prevNums = history[nextPyDay];
                let baseVal = prevNums[fNext.rank - 1];
                let p1 = addMod(baseVal, fNext.c1);
                let p2 = addMod(baseVal, fNext.c2);

                predictionArea.innerHTML = `
                    <div style="background-color: var(--pred-bg); padding: 15px; border-radius: 6px; border-left: 5px solid var(--pred-border);">
                        <h3 style="margin-top:0; color: var(--pred-border);">下期預測：${nextDate.toLocaleDateString()} (${nextDayName})</h3>
                        <p style="margin-bottom: 0;"><strong>公式預測：</strong> 基準為上週${nextDayName}順${fNext.rank}(${formatNum(baseVal)})，預測為 <span style="color: var(--hit-text); font-weight: bold; font-size: 1.1em;">${formatNum(p1)}, ${formatNum(p2)}</span></p>
                    </div>
                `;
            } else {
                predictionArea.innerHTML = '';
            }
        }

        results.reverse();

        resultBody.innerHTML = '';
        results.forEach(r => {
            let tr = document.createElement('tr');
            if (r.isHit) tr.className = 'hit-row'; 
            
            tr.innerHTML = `
                <td>${r.date}</td>
                <td>${r.dayName}</td>
                <td>${r.baseStr}</td>
                <td class="${r.isHit ? 'hit-text' : ''}">${r.predStr}</td>
                <td>${r.actualStr}</td>
                <td class="${r.isHit ? 'hit-text' : ''}">${r.isHit ? '命中' : '未中'}</td>
                <td class="${r.isHit ? 'hit-text' : ''}">${r.hitStr}</td>
            `;
            resultBody.appendChild(tr);
        });

        let hitRate = totalCalc > 0 ? ((totalHit / totalCalc) * 100).toFixed(1) : 0;
        
        summaryArea.style.display = 'block';
        summaryArea.innerHTML = `
            <div style="margin-bottom: 0;"><strong>公式勝率：</strong> 測 ${totalCalc} 期，中 ${totalHit} 期 (${hitRate}%)</div>
        `;
    }
</script>

</body>
</html>
