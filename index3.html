<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三期牌分析系統(拖尾) - 滾動回測版</title>
    <link rel="manifest" href="manifest3.json">
    <meta name="theme-color" content="#3b82f6">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; line-height: 1.4; }

        .container { max-width: 600px; margin: 0 auto; }

        /* Header Area */
        .header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-top { display: flex; justify-content: center; align-items: center; margin-bottom: 0; }
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

        /* Controls */
        .selector-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #dfe6e9; font-size: 1rem; appearance: none; background: #fff; margin-bottom: 8px; cursor: pointer; outline: none; }
        select:focus { border-color: var(--accent); }
        .status-bar { font-size: 0.85rem; color: #636e72; display: flex; align-items: center; gap: 5px; }

        /* Prediction Cards */
        .section-title { font-size: 1rem; font-weight: bold; margin: 15px 0 10px 5px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        #predictionArea { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .pred-card { background: var(--card); padding: 15px; border-radius: 12px; border-left: 6px solid var(--warning); box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .pred-card h3 { font-size: 0.95rem; margin-bottom: 5px; color: var(--primary); font-weight: 800; }
        .pred-info { font-size: 0.8rem; color: #636e72; margin-bottom: 8px; }
        .nums-highlight { font-size: 1.4rem; font-weight: 900; color: var(--warning); letter-spacing: 1px; display: block; margin-top: 5px; }
        .target-tail { font-size: 0.85rem; color: #fff; background: var(--accent); padding: 2px 8px; border-radius: 12px; vertical-align: middle; margin-left: 5px; }
        .score-tag { position: absolute; top: 0; right: 0; background: #dfe6e9; color: #2d3436; padding: 4px 10px; border-bottom-left-radius: 10px; font-size: 0.75rem; font-weight: bold; }
        .score-high { background: #ffeaa7; color: #d35400; }
        .score-perfect { background: var(--success); color: white; }

        /* Summary Area */
        .summary { background: #e1f5fe; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid #b3e5fc; }

        /* Result List */
        .result-item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .res-date { font-weight: bold; color: var(--primary); }
        .res-actual { font-family: monospace; font-size: 1rem; color: #2d3436; font-weight: bold; }
        
        /* Event Details */
        .hit-detail { background: #fdfaf0; padding: 8px; border-radius: 8px; margin-top: 8px; }
        .miss-detail { background: #f5f6f7; padding: 8px; border-radius: 8px; margin-top: 8px; border: 1px solid #eee; }
        .trigger-detail { background: #f0f8ff; padding: 8px; border-radius: 8px; margin-top: 8px; border: 1px solid #cce5ff; }

        .hit-type { font-size: 0.85rem; font-weight: bold; color: #d35400; }
        .trigger-type { font-size: 0.85rem; font-weight: bold; color: #0056b3; }
        
        .hit-nums { color: var(--success); font-weight: 900; font-size: 1rem; margin-top: 2px; }
        .miss-nums { color: #b2bec3; font-weight: 900; font-size: 1rem; margin-top: 2px; }
        .trigger-nums { color: #004085; font-weight: 900; font-size: 1rem; margin-top: 2px; }

        .hit-status { font-size: 0.75rem; color: var(--success); font-weight: bold; margin-top: 3px; }
        .miss-status { font-size: 0.75rem; color: #636e72; font-weight: bold; margin-top: 3px; }
        .trigger-status { font-size: 0.75rem; color: #0056b3; font-weight: bold; margin-top: 3px; }

        /* PnL Week Summary */
        .week-summary { background: #fffcf0; border: 1px solid #f1c40f; padding: 15px; border-radius: 12px; margin: 20px 0 15px 0; font-size: 0.9rem; box-shadow: 0 2px 4px rgba(241,196,15,0.15); }
        .week-summary .pnl-positive { color: var(--success); }
        .week-summary .pnl-negative { color: var(--danger); }
        .pnl-row { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.85rem; color: #2d3436; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <h1>三期牌分析系統(拖尾)</h1>
        </div>
    </div>
    
    <div class="selector-box">
        <select id="csvSelect" onchange="processData()">
            <option value="Fan_history_2026.csv">天天樂</option>
            <option value="Ghana_history_2026.csv">迦納彩</option>
            <option value="539_history_2026.csv">今彩 539</option>
            <option value="649_history_2026.csv">大樂透</option>
            <option value="Six_history_2026.csv">六合彩</option>
        </select>
        <div class="status-bar">
            <span>資料狀態:</span>
            <span id="dataStatus" style="font-weight: bold;">讀取中...</span>
        </div>

        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #dfe6e9;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" id="excludeZeroHead" checked onchange="runAnalysis()" style="width: 18px; height: 18px; cursor: pointer;">
                <span style="font-weight: bold; font-size: 0.95rem;">排除 0 頭 (不包含 01~09)</span>
            </label>
        </div>
    </div>

    <div class="section-title">🕒 目前追蹤中 (養三期)</div>
    <div id="predictionArea"></div>
    
    <div id="summaryArea" class="summary" style="display:none;"></div>

    <div class="section-title">📜 每日開獎與訊號紀錄</div>
    <div id="resultList"></div>
</div>

<script>
    let parsedData = [];
    let maxNum = 39;

    const COST_PER_BALL = 38;
    const REBATE_RATE = 0.2107;
    const WIN_MULTIPLIER = 5.5789;

    function fNum(n) { return String(n).padStart(2, '0'); }
    function intersect(arr1, arr2) { return arr1.filter(value => arr2.includes(value)); }

    function getWeekRange(dateStr) {
        let normalized = dateStr.replace(/\//g, '-');
        let d = new Date(normalized);
        if(isNaN(d)) return "未知週次";
        let day = d.getDay(); 
        let diffToMonday = d.getDate() - day + (day === 0 ? -6 : 1); 
        
        let mon = new Date(d); mon.setDate(diffToMonday);
        let sun = new Date(mon); sun.setDate(mon.getDate() + 6);
        
        let pad = (n) => String(n).padStart(2, '0');
        let fmt = (dateObj) => `${dateObj.getFullYear()}-${pad(dateObj.getMonth() + 1)}-${pad(dateObj.getDate())}`;
        
        return `${fmt(mon)} ~ ${fmt(sun)}`;
    }

    function getIronBalls(tail) {
        let balls = [];
        let maxHeads = Math.floor(maxNum / 10);
        let excludeZero = document.getElementById('excludeZeroHead').checked;
        let startH = excludeZero ? 1 : 0;

        for(let h = startH; h <= maxHeads; h++) {
            let n = h * 10 + tail;
            if(n > 0 && n <= maxNum) balls.push(n);
        }
        return balls;
    }

    async function processData() {
        const fileName = document.getElementById('csvSelect').value;
        const statusEl = document.getElementById('dataStatus');
        maxNum = (fileName.includes('649') || fileName.includes('Six')) ? 49 : 39;
        
        statusEl.innerText = "讀取中...";
        try {
            const res = await fetch(fileName);
            if(!res.ok) throw new Error();
            const text = await res.text();
            const lines = text.trim().split('\n');
            
            parsedData = [];
            for(let i = 1; i < lines.length; i++) {
                let cols = lines[i].split(',').map(s => s.trim());
                if(cols.length < 6 || isNaN(parseInt(cols[1]))) continue;
                let nums = [];
                for(let j = 1; j < cols.length; j++) {
                    let n = parseInt(cols[j]);
                    if(!isNaN(n)) nums.push(n);
                }
                parsedData.push({ date: cols[0], nums: nums });
            }
            
            statusEl.innerText = `✅ 載入成功 (共 ${parsedData.length} 期)`;
            runAnalysis();
        } catch(e) { 
            statusEl.innerText = "❌ 讀取失敗 (需在本機伺服器環境執行)"; 
            document.getElementById('predictionArea').innerHTML = '';
            document.getElementById('resultList').innerHTML = '';
            document.getElementById('summaryArea').style.display = 'none';
        }
    }

    function getRulesForDay(currentIndex) {
        let dStats = {}; let tStats = {};
        for (let i = 0; i < 10; i++) {
            dStats[i] = { total: 0, hits: new Array(10).fill(0) };
            tStats[i] = { total: 0, hits: new Array(10).fill(0) };
        }

        let excludeZero = document.getElementById('excludeZeroHead').checked;

        for (let k = 0; k <= currentIndex; k++) {
            let tails = parsedData[k].nums.map(n => n % 10);
            let counts = new Array(10).fill(0);
            tails.forEach(t => counts[t]++);

            let next3ValidTails = new Set();
            for (let j = 1; j <= 3; j++) {
                if (k + j <= currentIndex) { 
                    parsedData[k + j].nums.forEach(n => {
                        if (!excludeZero || n >= 10) next3ValidTails.add(n % 10); 
                    });
                }
            }

            for (let t = 0; t < 10; t++) {
                if (counts[t] >= 2) {
                    dStats[t].total++;
                    next3ValidTails.forEach(nt => dStats[t].hits[nt]++);
                }
                if (counts[t] >= 3) {
                    tStats[t].total++;
                    next3ValidTails.forEach(nt => tStats[t].hits[nt]++);
                }
            }
        }

        let localRules = { double: {}, triple: {} };
        for (let t = 0; t < 10; t++) {
            let bestDTail = -1, maxDHit = -1;
            for (let nt = 0; nt < 10; nt++) {
                if (dStats[t].hits[nt] > maxDHit) { maxDHit = dStats[t].hits[nt]; bestDTail = nt; }
            }
            localRules.double[t] = { targetTail: bestDTail, score: dStats[t].total > 0 ? (maxDHit / dStats[t].total * 100) : 0, total: dStats[t].total };

            let bestTTail = -1, maxTHit = -1;
            for (let nt = 0; nt < 10; nt++) {
                if (tStats[t].hits[nt] > maxTHit) { maxTHit = tStats[t].hits[nt]; bestTTail = nt; }
            }
            localRules.triple[t] = { targetTail: bestTTail, score: tStats[t].total > 0 ? (maxTHit / tStats[t].total * 100) : 0, total: tStats[t].total };
        }
        return localRules;
    }

    function getSmartPatterns(nums, currentRules) {
        let patterns = [];
        let tails = nums.map(n => n % 10);
        let counts = new Array(10).fill(0);
        tails.forEach(t => counts[t]++);

        for (let t = 0; t < 10; t++) {
            if (counts[t] >= 3) {
                let r = currentRules.triple[t];
                if(r && r.total > 0) patterns.push({ type: `三尾拖牌 (${t}尾)`, targetTail: r.targetTail, target: getIronBalls(r.targetTail), score: r.score });
            } else if (counts[t] >= 2) {
                let r = currentRules.double[t];
                if(r && r.total > 0) patterns.push({ type: `雙尾拖牌 (${t}尾)`, targetTail: r.targetTail, target: getIronBalls(r.targetTail), score: r.score });
            }
        }
        return patterns.sort((a,b)=>b.score-a.score).slice(0, 3);
    }

    function renderWeekSummary(weekStr, stats) {
        let net = stats.win - stats.cost;
        let netClass = net >= 0 ? 'pnl-positive' : 'pnl-negative';
        let netSign = net >= 0 ? '+' : '';
        return `
        <div class="week-summary">
            <div style="color: var(--primary); margin-bottom: 8px; border-bottom: 1px dashed #f1c40f; padding-bottom: 5px; font-weight: 900; font-size: 0.95rem;">
                📅 結算週次：${weekStr}
            </div>
            <div class="pnl-row">
                <span>下注總球數: ${stats.bets} (命中 ${stats.hits})</span>
            </div>
            <div class="pnl-row">
                <span>總成本 (扣退水): ${stats.cost.toFixed(1)}</span>
                <span>總獎金: ${stats.win.toFixed(1)}</span>
            </div>
            <div class="pnl-row" style="margin-top: 10px; font-size: 1.1rem; border-top: 1px solid #f9e79f; padding-top: 8px;">
                <span>週淨損益:</span>
                <span class="${netClass}">${netSign}${net.toFixed(1)}</span>
            </div>
        </div>`;
    }

    function runAnalysis() {
        let dailyView = parsedData.map(d => ({ 
            date: d.date, 
            nums: d.nums, 
            events: [], 
            pnl: { cost: 0, win: 0, bets: 0, hits: 0 } 
        }));
        
        let tracking = [];
        let stats = { total: 0, hit: 0 };
        let totalStats = { cost: 0, win: 0, bets: 0, hits: 0 };

        for (let i = 0; i < parsedData.length; i++) {
            let currentRules = getRulesForDay(i);
            let patterns = getSmartPatterns(parsedData[i].nums, currentRules);
            
            patterns.forEach(p => {
                if (p.target.length === 0) return;
                stats.total++;
                
                dailyView[i].events.push({
                    type: 'trigger',
                    pattern: p
                });

                let hitInfo = null;
                
                for (let j = 1; j <= 3; j++) {
                    if (i + j < parsedData.length) {
                        let hitNums = intersect(p.target, parsedData[i+j].nums);
                        if (hitNums.length > 0) {
                            hitInfo = { hitIndex: i + j, p: j, n: hitNums };
                            stats.hit++;
                            break;
                        }
                    }
                }
                
                // 損益計算邏輯
                let maxPeriod = hitInfo ? hitInfo.p : 3;
                for (let j = 1; j <= maxPeriod; j++) {
                    let playIndex = i + j;
                    if (playIndex < parsedData.length) {
                        let numBets = p.target.length;
                        let costAmount = numBets * COST_PER_BALL;
                        let rebateAmount = costAmount * REBATE_RATE;
                        
                        dailyView[playIndex].pnl.bets += numBets;
                        dailyView[playIndex].pnl.cost += (costAmount - rebateAmount);
                        
                        if (hitInfo && playIndex === hitInfo.hitIndex) {
                            dailyView[playIndex].pnl.hits += hitInfo.n.length;
                            dailyView[playIndex].pnl.win += (hitInfo.n.length * COST_PER_BALL * WIN_MULTIPLIER);
                        }
                    }
                }
                
                if (hitInfo) {
                    dailyView[hitInfo.hitIndex].events.push({
                        type: 'hit',
                        pattern: p,
                        triggerDate: parsedData[i].date,
                        hitPeriod: hitInfo.p,
                        hitNums: hitInfo.n
                    });
                } else if (parsedData.length - 1 - i < 3) {
                    tracking.push({ ...p, date: parsedData[i].date, age: parsedData.length - i });
                } else {
                    dailyView[i + 3].events.push({
                        type: 'miss',
                        pattern: p,
                        triggerDate: parsedData[i].date
                    });
                }
            });
        }

        // 渲染「目前追蹤中」卡片
        tracking.reverse();
        document.getElementById('predictionArea').innerHTML = tracking.length > 0 ? tracking.map(t => {
            let scoreClass = t.score === 100 ? 'score-perfect' : (t.score >= 80 ? 'score-high' : '');
            return `
            <div class="pred-card">
                <div class="score-tag ${scoreClass}">${t.score.toFixed(1)}% 勝率</div>
                <h3>${t.type} <span class="target-tail">拖 ${t.targetTail} 尾</span></h3>
                <div class="pred-info">觸發日: ${t.date} | 養牌第 ${t.age} 期</div>
                <span class="nums-highlight">${t.target.map(fNum).join(', ')}</span>
            </div>`
        }).join('') : '<div style="padding:20px; color:#999; text-align:center; background: var(--card); border-radius: 12px;">目前無追蹤版路 ☕</div>';

        // 渲染「每日開獎與訊號紀錄」含每週損益結算
        let reversedData = dailyView.slice().reverse();
        let chunksHtml = [];
        let currentWeek = null;
        let weekStats = { cost: 0, win: 0, bets: 0, hits: 0 };
        let currentWeekDaysHtml = [];

        reversedData.forEach(d => {
            let week = getWeekRange(d.date);
            
            // 換週判斷，輸出上一週總結與該週明細
            if (week !== currentWeek) {
                if (currentWeek) {
                    chunksHtml.push(renderWeekSummary(currentWeek, weekStats) + currentWeekDaysHtml.join(''));
                }
                currentWeek = week;
                weekStats = { cost: 0, win: 0, bets: 0, hits: 0 };
                currentWeekDaysHtml = [];
            }

            // 累加該週與歷史總損益
            weekStats.cost += d.pnl.cost;
            weekStats.win += d.pnl.win;
            weekStats.bets += d.pnl.bets;
            weekStats.hits += d.pnl.hits;
            
            totalStats.cost += d.pnl.cost;
            totalStats.win += d.pnl.win;

            let eventsHtml = '';
            if (d.events.length === 0) {
                eventsHtml = `<div style="padding: 8px; color: #b2bec3; font-size: 0.85rem; text-align: center;">☕ 本期無訊號</div>`;
            } else {
                eventsHtml = d.events.map(e => {
                    if (e.type === 'trigger') {
                        return `
                        <div class="trigger-detail">
                            <div class="trigger-type">🔔 新訊號觸發: ${e.pattern.type} <span class="target-tail" style="background:#3498db; font-size:0.75rem;">拖 ${e.pattern.targetTail}尾</span></div>
                            <div class="trigger-nums">預測號碼: ${e.pattern.target.map(fNum).join(', ')}</div>
                            <div class="trigger-status">👉 開始養牌三期</div>
                        </div>`;
                    } else if (e.type === 'hit') {
                        return `
                        <div class="hit-detail">
                            <div class="hit-type">${e.pattern.type} <span class="target-tail" style="font-size:0.75rem;">拖 ${e.pattern.targetTail}尾</span></div>
                            <div class="hit-nums">命中號碼: ${e.hitNums.map(fNum).join(', ')}</div>
                            <div class="hit-status">🎯 觸發日: ${e.triggerDate} (於第 ${e.hitPeriod} 期獲利)</div>
                        </div>`;
                    } else if (e.type === 'miss') {
                        return `
                        <div class="miss-detail">
                            <div class="hit-type" style="color:#636e72;">${e.pattern.type} <span class="target-tail" style="background:#b2bec3; font-size:0.75rem;">拖 ${e.pattern.targetTail}尾</span></div>
                            <div class="miss-nums">預測號碼: ${e.pattern.target.map(fNum).join(', ')}</div>
                            <div class="miss-status">❌ 養牌三期未中 (觸發日: ${e.triggerDate})</div>
                        </div>`;
                    }
                }).join('');
            }

            currentWeekDaysHtml.push(`
            <div class="result-item">
                <div class="res-header">
                    <span class="res-date">開獎日: ${d.date}</span>
                    <span class="res-actual">${d.nums.map(fNum).join(' ')}</span>
                </div>
                ${eventsHtml}
            </div>`);
        });

        // 處理最後一週
        if (currentWeek) {
            chunksHtml.push(renderWeekSummary(currentWeek, weekStats) + currentWeekDaysHtml.join(''));
        }
        
        document.getElementById('resultList').innerHTML = chunksHtml.join('') || '<div style="text-align:center;padding:20px; color:#999;">尚無紀錄</div>';

        // 渲染整體歷史摘要
        let totalNet = totalStats.win - totalStats.cost;
        let hitRate = stats.total > 0 ? (stats.hit / stats.total * 100).toFixed(1) : 0;
        document.getElementById('summaryArea').style.display = 'block';
        document.getElementById('summaryArea').innerHTML = `
            💡 <b>歷史結算 (動態滾動回測)：</b><br>
            共掃描 <b>${stats.total}</b> 組訊號，命中 <b>${stats.hit}</b> 組，精準率 <b>${hitRate}%</b><br>
            <div style="margin-top: 6px; padding-top: 6px; border-top: 1px dashed #b3e5fc; font-size: 0.95rem;">
                💰 <b>歷史總淨利：<span style="color: ${totalNet >= 0 ? 'var(--success)' : 'var(--danger)'}">${totalNet >= 0 ? '+' : ''}${totalNet.toFixed(1)}</span></b>
            </div>`;
    }

    window.onload = processData;
</script>
</body>
</html>
