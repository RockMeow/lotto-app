<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 混沌共振預測引擎 (修復版)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f1f5f9;
            --primary-color: #818cf8;
            --accent-color: #f472b6; 
            --card-bg: #0f172a;
            --card-border: #334155;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: var(--container-bg); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { text-align: center; font-weight: 800; color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { text-align: center; opacity: 0.7; margin-bottom: 30px; font-size: 0.9em; }

        .section { background: var(--card-bg); border: 1px solid var(--card-border); padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .section-title { font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ""; width: 4px; height: 18px; background: var(--primary-color); border-radius: 4px; }

        select { width: 100%; padding: 12px; border-radius: 10px; background: var(--bg-color); color: white; border: 1px solid var(--card-border); font-weight: 600; cursor: pointer; font-size: 16px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--card-border); }
        th { font-size: 0.85em; opacity: 0.6; }

        .ball-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; margin-top: 15px; }
        .ball { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #334155; font-weight: 800; font-size: 14px; position: relative; }
        
        .res-high { background: linear-gradient(135deg, #4f46e5, #3730a3); box-shadow: 0 0 10px var(--primary-color); border: 1px solid #fff; }
        .res-chaos { 
            background: linear-gradient(135deg, #ec4899, #be185d); 
            box-shadow: 0 0 20px var(--accent-color), 0 0 5px #fff; 
            animation: pulse 1.5s infinite alternate;
            z-index: 2;
            border: 1px solid #fff;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .badge { padding: 2px 8px; border-radius: 6px; font-size: 0.75em; font-weight: 700; }
        .badge-win { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        
        #loadingMsg { text-align: center; padding: 20px; display: none; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>混沌共振 · AI 預測引擎</h1>
    <div class="subtitle">自動權重分配 / 跨維度特徵提取系統</div>

    <select id="autoLoadCsv">
        <option value="">-- 請選擇檔案 --</option>
        <option value="Fan_history_2026.csv">🇺🇸 加州天天樂 (特化優化)</option>
        <option value="539_history_2026.csv">🇹🇼 今彩 539 (動態權重)</option>
    </select>
    
    <div id="loadingMsg">AI 矩陣計算中，請稍候...</div>

    <div class="section" id="resSection" style="display:none; margin-top:20px;">
        <div class="section-title">✨ AI 核心決策：下一期推薦</div>
        <div id="decisionText" style="font-size:0.9em; opacity:0.8; margin-bottom:15px;"></div>
        <div class="ball-grid" id="ballGrid"></div>
        <div style="margin-top:20px; font-size:0.8em; opacity:0.6;">
            <span style="color:var(--accent-color)">●</span> 粉色閃爍：三重共振(神級) | 
            <span style="color:var(--primary-color)">●</span> 藍色：雙重命中(高級)
        </div>
    </div>

    <div class="section" id="detailSection" style="display:none;">
        <div class="section-title">📊 預測維度分解</div>
        <table id="analysisTable">
            <thead>
                <tr>
                    <th>維度</th>
                    <th>推薦尾數</th>
                    <th>當前權重</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="analysisBody"></tbody>
        </table>
    </div>
</div>

<script>
    let rawData = [];
    const weekdayNames = ["日", "一", "二", "三", "四", "五", "六"];

    document.getElementById('autoLoadCsv').addEventListener('change', function(e) {
        if (!e.target.value) return;
        document.getElementById('loadingMsg').style.display = 'block';
        fetch(e.target.value)
            .then(r => r.text())
            .then(text => {
                processCSV(text);
                document.getElementById('loadingMsg').style.display = 'none';
            })
            .catch(err => {
                alert("讀取檔案失敗，請檢查 CSV 是否在同一資料夾");
                document.getElementById('loadingMsg').style.display = 'none';
            });
    });

    function processCSV(text) {
        const lines = text.trim().split('\n'); 
        rawData = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if(cols.length >= 6) {
                let nums = cols.slice(1,6).map(n => parseInt(n.trim())).filter(n => !isNaN(n)).sort((a,b)=>a-b);
                // 修復日期解析：天天樂格式為 M/D
                let dateStr = cols[0].trim();
                let wd = -1;
                try {
                    // 強制補上年份避免解析錯誤
                    let d = new Date("2026/" + dateStr);
                    wd = d.getDay();
                } catch(e) { wd = 0; }
                
                if(nums.length >= 5) {
                    rawData.push({ date: dateStr, wd: wd, nums });
                }
            }
        }
        if(rawData.length > 0) analyze();
    }

    function analyze() {
        const L = rawData.length;
        if(L < 15) {
            alert("數據量不足以啟動 AI 矩陣");
            return;
        }
        const lastDraw = rawData[L-1];
        const targetWd = (lastDraw.wd + 1) % 7;

        let formulaRes = findBestFormula(rawData, targetWd);
        let markovRes = getMarkovTails(rawData);
        let meanReversionTails = getMeanReversionTails(rawData);

        renderUI(formulaRes, markovRes, meanReversionTails, targetWd);
    }

    function findBestFormula(data, twd) {
        let scores = {};
        let L = data.length;
        // 定義運算組合
        for(let lag of [1, 7]) {
            for(let i=0; i<4; i++) {
                for(let j=i+1; j<5; j++) {
                    ['add','sub'].forEach(op => {
                        let key = `${lag}_${op}_${i}_${j}`;
                        let hits = 0;
                        let total = 0;
                        for(let k=15; k < L; k++) {
                            if(data[k].wd !== twd) continue;
                            total++;
                            let refIdx = (lag === 1) ? k-1 : -1;
                            if(lag === 7) {
                                for(let p=k-1; p>=0; p--) { if(data[p].wd === twd) { refIdx = p; break; } }
                            }
                            if(refIdx === -1 || !data[refIdx]) continue;
                            let ref = data[refIdx].nums;
                            let val = (op==='add') ? (ref[i]+ref[j])%10 : Math.abs(ref[j]-ref[i])%10;
                            if(data[k].nums.map(n=>n%10).includes(val)) hits++;
                        }
                        scores[key] = total > 0 ? hits/total : 0;
                    });
                }
            }
        }
        let bestKey = Object.keys(scores).sort((a,b)=>scores[b]-scores[a])[0];
        let p = bestKey.split('_');
        let finalRef = null;
        if(p[0]==='1') finalRef = data[L-1].nums;
        else {
            for(let p_wd=L-1; p_wd>=0; p_wd--) { if(data[p_wd].wd === twd) { finalRef = data[p_wd].nums; break; } }
        }
        if(!finalRef) finalRef = data[L-1].nums;
        
        let predTail = p[1]==='add' ? (finalRef[p[2]]+finalRef[p[3]])%10 : Math.abs(finalRef[p[3]]-finalRef[p[2]])%10;
        return { tail: predTail, rate: scores[bestKey] };
    }

    function getMarkovTails(data) {
        let tailCounts = {};
        for(let i=0; i<10; i++) tailCounts[i] = 0;
        let trans = {}; 
        
        data.forEach((d, i) => {
            let tails = [...new Set(d.nums.map(n=>n%10))];
            tails.forEach(t => tailCounts[t]++);
            if(i === 0) return;
            let prevTails = [...new Set(data[i-1].nums.map(n=>n%10))];
            prevTails.forEach(pt => {
                if(!trans[pt]) trans[pt] = {};
                tails.forEach(ct => {
                    trans[pt][ct] = (trans[pt][ct] || 0) + 1;
                });
            });
        });
        
        let lastTails = [...new Set(data[data.length-1].nums.map(n=>n%10))];
        let finalScores = {};
        for(let i=0; i<10; i++) finalScores[i] = 0;

        lastTails.forEach(lt => {
            if(trans[lt]) {
                for(let t=0; t<10; t++) {
                    finalScores[t] += (trans[lt][t] || 0) / (tailCounts[lt] || 1);
                }
            }
        });
        return Object.keys(finalScores).sort((a,b)=>finalScores[b]-finalScores[a]).slice(0,2).map(Number);
    }

    function getMeanReversionTails(data) {
        let lastSeen = Array(10).fill(0);
        data.forEach((d, i) => d.nums.forEach(n => lastSeen[n%10] = i));
        let omissions = lastSeen.map(idx => data.length - 1 - idx);
        return omissions.map((omi, t) => ({t, omi})).sort((a,b)=>b.omi-a.omi).slice(0,2).map(x=>x.t);
    }

    function renderUI(f, m, mr, twd) {
        document.getElementById('resSection').style.display = 'block';
        document.getElementById('detailSection').style.display = 'block';
        document.getElementById('decisionText').innerText = `目標：下期星期${weekdayNames[twd]} | 已完成多維度演算。`;

        let body = `
            <tr><td>星期慣性公式</td><td>${f.tail} 尾</td><td>45%</td><td><span class="badge badge-win">勝率 ${(f.rate*100).toFixed(1)}%</span></td></tr>
            <tr><td>馬可夫傳染矩陣</td><td>${m.join(', ')} 尾</td><td>35%</td><td><span class="badge" style="background:rgba(129,140,248,0.1)">動能擴散</span></td></tr>
            <tr><td>均值回歸(AI)</td><td>${mr.join(', ')} 尾</td><td>20%</td><td><span class="badge" style="background:rgba(244,114,182,0.1)">物理回補</span></td></tr>
        `;
        document.getElementById('analysisBody').innerHTML = body;

        let grid = '';
        for(let i=1; i<=39; i++) {
            let t = i % 10;
            let hitCount = 0;
            if(t === f.tail) hitCount++;
            if(m.includes(t)) hitCount++;
            if(mr.includes(t)) hitCount++;

            let cls = 'ball';
            if(hitCount >= 3) cls += ' res-chaos';
            else if(hitCount === 2) cls += ' res-high';
            grid += `<div class="${cls}">${String(i).padStart(2,'0')}</div>`;
        }
        document.getElementById('ballGrid').innerHTML = grid;
    }
</script>
</body>
</html>
