name: 每日更新-天天樂 (12:00)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-fan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4
      - name: 執行 天天樂 爬蟲
        run: python update_Fan.py
      - name: 儲存 CSV 變更並上傳
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add Fan_history_all_sorted.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新天天樂" && git push)
