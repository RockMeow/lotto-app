name: 每日更新-六合彩 (23:59)

on:
  schedule:
    - cron: '59 15 * * *'
  workflow_dispatch:

jobs:
  update-six:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4
      - name: 執行 六合彩 開獎數據更新
        run: python update_Six.py
      - name: 儲存 CSV 變更並上傳
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add Six_history_all_sorted.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新六合彩開獎數據" && git push)
